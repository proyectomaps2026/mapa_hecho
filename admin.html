<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGF Master - Editor Profesional</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; }
        #map { flex: 1; height: 100%; }
        #sidebar { width: 350px; background: #1e293b; display: flex; flex-direction: column; border-left: 2px solid #334155; }
        .header { padding: 20px; background: #3b82f6; text-align: center; font-weight: bold; }
        .control-group { padding: 15px; border-bottom: 1px solid #334155; }
        .btn-update { width: 100%; padding: 12px; background: #10b981; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-sync { width: 100%; padding: 12px; background: #f59e0b; border: none; color: white; border-radius: 8px; cursor: pointer; margin-top: 5px; }
        #store-list { flex: 1; overflow-y: auto; padding: 10px; }
        .store-item { background: #334155; padding: 10px; margin-bottom: 8px; border-radius: 5px; cursor: pointer; font-size: 13px; }
        .store-item:hover { background: #475569; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
    <div class="header">SGF - PANEL DE CONTROL MASTER</div>
    
    <div class="control-group">
        <label>Base de Datos (Google Sheets):</label>
        <input type="text" id="sheetUrl" style="width:90%; padding:8px; margin-top:5px; border-radius:4px; border:none;">
        <button class="btn-update" onclick="saveConfig()">PUBLICAR MAPA (LA JEFA)</button>
    </div>

    <div class="control-group">
        <button class="btn-sync" onclick="triggerAirtable()">🔄 SINCRONIZAR CON AIRTABLE</button>
    </div>

    <div id="store-list">
        <p style="text-align:center; color:#94a3b8;">Cargando censo...</p>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Inicialización del mapa para edición
    const map = L.map('map').setView([7.7667, -72.2250], 13); // San Cristóbal
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    async function triggerAirtable() {
        alert("Enviando comando de actualización a GitHub Actions...");

    }

    // Función para guardar la configuración en GitHub
    async function saveConfig() {
        // Lógica para escribir en config.json
    }
</script>
</body>
</html>
