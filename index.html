<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Censo Fiscal Ayacucho - Sistema Unificado</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        #contenedor { display: flex; height: 100vh; width: 100vw; }
        
        /* Panel Lateral estilo My Maps */
        #sidebar { 
            width: 320px; background: white; display: flex; flex-direction: column; 
            border-right: 1px solid #ccc; z-index: 1001; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        .header { background: #4285F4; color: white; padding: 15px; border-bottom: 2px solid #3367d6; }
        .controles { padding: 15px; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #bbb; border-radius: 4px; box-sizing: border-box; font-size: 13px; }
        button { width: 100%; background: #34a853; color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 4px; text-transform: uppercase; }
        button:hover { background: #2d8e47; }
        
        /* Lista de Comercios */
        #lista { flex-grow: 1; overflow-y: auto; background: #fff; }
        .item { padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .item:hover { background: #e8f0fe; }
        .item b { color: #1a73e8; display: block; font-size: 14px; text-transform: uppercase; }
        .item span { font-size: 12px; color: #555; }

        /* Mapa */
        #map { flex-grow: 1; background: #222; }
        
        /* Pincheta Azul */
        .pin { 
            width: 20px; height: 20px; background: #4285F4; 
            border: 2px solid white; border-radius: 50% 50% 50% 0; 
            transform: rotate(-45deg); box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="contenedor">
    <div id="sidebar">
        <div class="header">
            <h3 style="margin:0">Censo Ayacucho</h3>
            <small>San Juan de Colón</small>
        </div>
        <div class="controles">
            <input type="text" id="csv-url" placeholder="Pega el link CSV de Google Sheets aquí...">
            <button onclick="sincronizar()">Sincronizar Mapa</button>
            <input type="text" id="buscador" placeholder="Buscar por nombre..." style="margin-top:10px;">
        </div>
        <div id="lista">
            <p style="padding:20px; color:#888; text-align:center;">Esperando datos...</p>
        </div>
    </div>
    <div id="map"></div>
</div>

<script>
    // 1. Iniciar el mapa
    var map = L.map('map', { zoomControl: false }).setView([8.038, -72.261], 15);
    
    // 2. CAPAS DE CALLES Y SATÉLITE (Híbrido que no se bloquea)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { opacity: 0.8 }).addTo(map);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', { opacity: 0.5 }).addTo(map);

    L.control.zoom({ position: 'bottomright' }).addTo(map);
    var markersLayer = L.layerGroup().addTo(map);
    var datosOriginales = [];

    function sincronizar() {
        var url = document.getElementById('csv-url').value;
        if(!url) return alert("Pega el enlace CSV");

        Papa.parse(url, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                datosOriginales = res.data;
                dibujar(datosOriginales);
            }
        });
    }

    function dibujar(data) {
        markersLayer.clearLayers();
        var listHtml = "";
        var bounds = [];

        data.forEach((row, i) => {
            // LEER COLUMNA ESPECÍFICA: Coordenadas GPS (Oficina)
            var coords = row["Coordenadas GPS (Oficina)"];
            
            if(coords && coords.includes(",")) {
                var partes = coords.split(",");
                var lat = parseFloat(partes[0].trim());
                var lon = parseFloat(partes[1].trim());

                if(!isNaN(lat) && !isNaN(lon)) {
                    // Marcador
                    var icon = L.divIcon({ className: 'p', html: '<div class="pin"></div>', iconSize: [20, 20], iconAnchor: [10, 20] });
                    var info = "<b>DETALLES:</b><br><hr>";
                    for(var k in row){ info += "<b>"+k+":</b> "+row[k]+"<br>"; }
                    
                    var m = L.marker([lat, lon], {icon: icon}).bindPopup(info);
                    m.id_ref = i;
                    m.addTo(markersLayer);
                    bounds.push([lat, lon]);

                    // Lista lateral
                    listHtml += `<div class="item" onclick="irA(${lat}, ${lon}, ${i})">
                                    <b>${row.Nombre || 'Comercio'}</b>
                                    <span>RIF: ${row.RIF || 'N/P'}</span>
                                 </div>`;
                }
            }
        });

        document.getElementById('lista').innerHTML = listHtml || "<p style='padding:15px;'>Sin coordenadas válidas.</p>";
        if(bounds.length > 0) map.fitBounds(bounds);
    }

    function irA(lat, lon, id) {
        map.flyTo([lat, lon], 18);
        markersLayer.eachLayer(l => { if(l.id_ref === id) l.openPopup(); });
    }

    // Buscador
    document.getElementById('buscador').oninput = function(e) {
        var busq = e.target.value.toLowerCase();
        var filtrados = datosOriginales.filter(r => JSON.stringify(r).toLowerCase().includes(busq));
        dibujar(filtrados);
    };

    window.onload = function() { setTimeout(() => map.invalidateSize(), 500); };
</script>
</body>
</html>
