<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGF | Inteligencia Fiscal Ayacucho</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --panel: rgba(255,255,255,0.85); --accent: #3b82f6; --text: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body, html { height: 100%; margin: 0; font-family: 'Poppins', sans-serif; overflow: hidden; background: var(--bg); }
        
        /* EL MAPA (FONDO) */
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }

        /* --- INTERFAZ JEFA (FLOTANTE) --- */
        
        /* Barra de Herramientas Izquierda */
        #toolbar {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: var(--panel); backdrop-filter: blur(10px);
            padding: 10px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 10px;
        }
        .tool-btn {
            width: 45px; height: 45px; border-radius: 12px; border: none; background: none;
            color: var(--text); font-size: 18px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .tool-btn:hover { background: rgba(0,0,0,0.05); color: var(--accent); }
        .tool-btn.active { background: var(--accent); color: white; }

        /* Panel Lateral Redondeado (Ficha del Local) */
        #side-panel {
            position: absolute; top: 20px; right: -420px; bottom: 20px; width: 380px; z-index: 1000;
            background: var(--panel); backdrop-filter: blur(15px);
            border-radius: 20px; box-shadow: -10px 0 30px rgba(0,0,0,0.15);
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            overflow-y: auto; display: flex; flex-direction: column; color: var(--text);
        }
        .panel-content { padding: 30px; }
        .foto-header { width: 100%; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); margin-bottom: 25px; object-fit: cover; height: 200px; }
        .status-badge { display: inline-block; padding: 6px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Controles de Zoom Modernos */
        .leaflet-control-zoom { border: none !important; margin: 20px !important; }
        .leaflet-control-zoom-in, .leaflet-control-zoom-out { 
            background: var(--panel) !important; color: var(--text) !important; 
            border: none !important; border-radius: 10px !important; margin-bottom: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.1) !important; 
        }

        /* --- INTERFAZ AURA MASTER (OCULTA) --- */
        
        /* El "Puntito" Invisible de Entrada */
        #admin-trigger { position: fixed; bottom: 5px; left: 5px; z-index: 9999; width: 10px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 50%; cursor: pointer; }

        /* Modal Glassmorphism */
        #admin-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            z-index: 10000; color: white; justify-content: center; align-items: center; 
        }
        .admin-box { 
            width: 380px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            padding: 35px; border-radius: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }
        .admin-box h3 { margin-top: 0; color: white; }
        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 5px; opacity: 0.8; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; }
        input[type="color"] { padding: 0; height: 40px; cursor: pointer; background: none; border: none; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-save:hover { background: #2563eb; transform: translateY(-2px); }

    </style>
</head>
<body>

<div id="toolbar">
    <button class="tool-btn active" title="Mapa de Recaudación"><i class="fas fa-map-marked-alt"></i></button>
    <button class="tool-btn" title="Buscar Comercio"><i class="fas fa-search"></i></button>
    <button class="tool-btn" title="Resumen Gerencial"><i class="fas fa-chart-pie"></i></button>
</div>

<div id="map"></div>

<div id="side-panel">
    <div class="panel-content">
        <button onclick="cerrarPanel()" style="float:right; background:none; border:none; color:#999; font-size:20px; cursor:pointer;">&times;</button>
        <h2 id="view-nombre" style="margin-top:0; font-weight:600; color:var(--text);">Nombre del Local</h2>
        <div id="view-status"></div>
        <img id="view-foto" src="" class="foto-header" alt="Foto Fachada">
        <div id="view-detalles" style="font-size: 14px; line-height: 1.8; color: #555;"></div>
    </div>
</div>

<div id="admin-trigger" onclick="abrirLogin()"></div>

<div id="admin-modal">
    <div id="login-screen" class="admin-box">
        <i class="fas fa-lock" style="font-size: 40px; color: var(--accent); margin-bottom: 20px;"></i>
        <h3>Panel Aura Master</h3>
        <input type="text" id="user-in" placeholder="Usuario">
        <input type="password" id="pass-in" placeholder="Contraseña" style="margin-top:10px;">
        <button class="btn-save" onclick="validarAcceso()">Entrar</button>
        <button onclick="cerrarAdmin()" style="background:none; border:none; color:rgba(255,255,255,0.5); margin-top:20px; cursor:pointer;">Cancelar</button>
    </div>

    <div id="editor-screen" class="admin-box" style="display:none; text-align: left;">
        <h3 style="text-align:center;">⚙️ Configuración Maestra</h3>
        <div class="input-group">
            <label>Link del CSV (Google Sheets):</label>
            <input type="text" id="cfg-csv" placeholder="URL export?format=csv">
        </div>
        <div style="display:flex; gap:15px; margin-bottom:18px;">
            <div class="input-group" style="flex:1;">
                <label>Color Solvente:</label>
                <input type="color" id="cfg-col1" value="#22c55e">
            </div>
            <div class="input-group" style="flex:1;">
                <label>Color Mora:</label>
                <input type="color" id="cfg-col2" value="#ef4444">
            </div>
        </div>
        <button class="btn-save" onclick="guardarCambios()">Guardar y Reiniciar</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    // CONFIGURACIÓN POR DEFECTO
    let config = {
        user: "AuraMaster",
        pass: "Colón2026",
        csv: "TU_LINK_AQUÍ", // Pon tu link aquí para la prueba
        col1: "#22c55e",
        col2: "#ef4444"
    };

    var map, markersLayer;

    window.onload = function() {
        const saved = localStorage.getItem('sgf_config_v5');
        if(saved) config = JSON.parse(saved);
        initApp();
    };

    function initApp() {
        if(map) map.remove();
        // Zoom Control TRUE pero elegante
        map = L.map('map', { zoomControl: true }).setView([8.038, -72.261], 15);
        
        // Satélite Híbrido Google
        L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}').addTo(map);
        
        markersLayer = L.layerGroup().addTo(map);
        cargarCSV();
        
        // Mover controles de zoom a abajo a la derecha
        map.zoomControl.setPosition('bottomright');
    }

    function cargarCSV() {
        if(!config.csv || config.csv === "TU_LINK_AQUÍ") return;
        Papa.parse(config.csv, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                res.data.forEach(row => {
                    const gps = row["Coordenadas GPS (Oficina)"];
                    if(gps && gps.includes(",")) {
                        const [lat, lon] = gps.split(",").map(c => parseFloat(c.trim()));
                        let est = (row["Estado"] || "").toLowerCase();
                        let color = est.includes("solvente") ? config.col1 : config.col2;
                        
                        L.circleMarker([lat, lon], { radius: 11, fillColor: color, color: "white", weight: 3, fillOpacity: 0.95, className: 'marker-shadow' })
                        .on('click', () => abrirPanel(row, est))
                        .addTo(markersLayer);
                    }
                });
            }
        });
    }

    function abrirPanel(data, est) {
        document.getElementById("side-panel").style.right = "20px"; // Entra suave
        document.getElementById("view-nombre").innerText = data.Nombre;
        document.getElementById("view-foto").src = data.Foto || "https://via.placeholder.com/400x200?text=Sin+Foto";
        
        let colorBadg = est.includes("solvente") ? config.col1 : config.col2;
        document.getElementById("view-status").innerHTML = `<span class="status-badge" style="background:${colorBadg}20; color:${colorBadg};">${est.toUpperCase()}</span>`;
        
        document.getElementById("view-detalles").innerHTML = `
            <p><i class="fas fa-id-card" style="width:20px;"></i> <b>RIF:</b> ${data.RIF}</p>
            <p><i class="fas fa-map-marker-alt" style="width:20px;"></i> <b>Dirección:</b> ${data.Dirección || 'S/D'}</p>
            <p><i class="fas fa-calendar-check" style="width:20px;"></i> <b>Última Inspección:</b> ${data.Fecha || 'N/P'}</p>
        `;
        map.flyTo([parseFloat(data["Coordenadas GPS (Oficina)"].split(",")[0]), parseFloat(data["Coordenadas GPS (Oficina)"].split(",")[1])], 19, { duration: 1 });
    }

    function cerrarPanel() { document.getElementById("side-panel").style.right = "-420px"; }

    // FUNCIONES ADMIN (AURA MASTER)
    function abrirLogin() { 
        document.getElementById("admin-modal").style.display = "flex"; 
        document.getElementById("login-screen").style.display = "block";
        document.getElementById("editor-screen").style.display = "none";
    }
    function cerrarAdmin() { document.getElementById("admin-modal").style.display = "none"; }

    function validarAcceso() {
        const u = document.getElementById("user-in").value;
        const p = document.getElementById("pass-in").value;
        if(u === config.user && p === config.pass) {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("editor-screen").style.display = "block";
            // Cargar valores actuales
            document.getElementById("cfg-csv").value = config.csv;
            document.getElementById("cfg-col1").value = config.col1;
            document.getElementById("cfg-col2").value = config.col2;
        } else {
            alert("Acceso denegado, Aura.");
        }
    }

    function guardarCambios() {
        config.csv = document.getElementById("cfg-csv").value;
        config.col1 = document.getElementById("cfg-col1").value;
        config.col2 = document.getElementById("cfg-col2").value;
        localStorage.setItem('sgf_config_v5', JSON.stringify(config));
        alert("Configuración Master guardada. Reiniciando...");
        location.reload();
    }
</script>
</body>
</html>
