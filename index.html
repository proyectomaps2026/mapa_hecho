<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGF Elite - Control Total</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* Panel Master Estilo Softr */
        #admin-panel {
            position: fixed; top: 10px; right: 10px; z-index: 2000;
            background: #ffffff; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); width: 320px;
            display: none; max-height: 85vh; overflow-y: auto;
        }
        .btn-master {
            position: fixed; bottom: 25px; right: 25px; z-index: 2001;
            background: #1e293b; color: white; border: none;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 20px;
        }
        h3 { margin-top: 0; color: #1e293b; font-size: 18px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .save-btn { background: #059669; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; margin-top: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .save-btn:hover { background: #047857; }
        .status-msg { font-size: 11px; margin-top: 10px; text-align: center; font-weight: 500; }
        
        /* Popups del Mapa */
        .leaflet-popup-content-wrapper { border-radius: 8px; padding: 5px; }
        .popup-title { font-weight: bold; color: #1e293b; border-bottom: 1px solid #eee; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="map"></div>
    <button class="btn-master" onclick="togglePanel()"><i class="fas fa-sliders-h"></i></button>

    <div id="admin-panel">
        <h3>Panel de Control Aura</h3>
        
        <label>Link CSV de Google Sheets:</label>
        <input type="text" id="sheet-url" placeholder="Paste .csv link here">
        
        <label>Columna del Nombre:</label>
        <input type="text" id="col-nombre" placeholder="Ej: Razon Social">

        <label>Columna de Estado (Semáforo):</label>
        <input type="text" id="col-estado" placeholder="Ej: Status">

        <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 20px 0;">
        
        <button class="save-btn" onclick="saveToGithub()">ACTUALIZAR SERVIDOR</button>
        <div id="status" class="status-msg"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        const GITHUB_TOKEN = "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";
        const REPO = "proyectomaps2026/mapa_hecho";
        const CONFIG_PATH = "config.json";

        let map = L.map('map').setView([7.767, -72.224], 13);
        L.tileLayer('https://{s}.tile.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        let configData = {};

        // CARGAR CONFIGURACIÓN Y LUEGO DATOS
        async function init() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/${CONFIG_PATH}?t=${Date.now()}`);
                configData = await res.json();
                
                // Llenar inputs
                document.getElementById('sheet-url').value = configData.sheets_link || "";
                document.getElementById('col-nombre').value = configData.columna_nombre || "Nombre";
                document.getElementById('col-estado').value = configData.columna_estado || "Estado";

                if (configData.sheets_link) {
                    cargarPuntos(configData.sheets_link);
                }
            } catch (e) { console.error("Error cargando config", e); }
        }

        function cargarPuntos(url) {
            Papa.parse(url, {
                download: true,
                header: true,
                complete: function(results) {
                    results.data.forEach(row => {
                        if (row.lat && row.lng) {
                            const lat = parseFloat(row.lat.replace(',', '.'));
                            const lng = parseFloat(row.lng.replace(',', '.'));
                            
                            // Lógica de Colores (Semáforo)
                            let color = "#64748b"; // Gris por defecto
                            const estado = row[configData.columna_estado]?.toLowerCase();
                            
                            if (estado === "solvente") color = "#22c55e";
                            if (estado === "mora") color = "#ef4444";
                            if (estado === "proceso") color = "#f59e0b";

                            L.circleMarker([lat, lng], {
                                radius: 8,
                                fillBackgroundColor: color,
                                color: "#fff",
                                weight: 2,
                                fillOpacity: 0.9,
                                fillColor: color
                            }).addTo(map).bindPopup(`
                                <div class="popup-title">${row[configData.columna_nombre]}</div>
                                <b>Estado:</b> ${row[configData.columna_estado]}<br>
                                <b>RIF:</b> ${row.RIF || 'N/A'}<br>
                                <b>Dirección:</b> ${row.Dirección || ''}
                            `);
                        }
                    });
                }
            });
        }

        async function saveToGithub() {
            const status = document.getElementById('status');
            status.style.color = "#2563eb";
            status.innerText = "Subiendo cambios al servidor GitHub...";

            configData.sheets_link = document.getElementById('sheet-url').value;
            configData.columna_nombre = document.getElementById('col-nombre').value;
            configData.columna_estado = document.getElementById('col-estado').value;

            try {
                const getFile = await fetch(`https://api.github.com/repos/${REPO}/contents/${CONFIG_PATH}`, {
                    headers: { "Authorization": `token ${GITHUB_TOKEN}` }
                });
                const fileData = await getFile.json();
                
                const response = await fetch(`https://api.github.com/repos/${REPO}/contents/${CONFIG_PATH}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Aura actualizó el mapa 🚀",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(configData, null, 2)))),
                        sha: fileData.sha
                    })
                });

                if (response.ok) {
                    status.style.color = "#059669";
                    status.innerText = "✅ ¡Servidor actualizado! Recargando...";
                    setTimeout(() => location.reload(), 1500);
                }
            } catch (err) { status.innerText = "❌ Error de conexión."; }
        }

        function togglePanel() {
            const p = document.getElementById('admin-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        init();
    </script>
</body>
</html>
