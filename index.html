<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROYECTO HACIENDA 2026</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        /* ==========================================================================
           1. VARIABLES MAESTRAS Y RESETEO (UI CORPORATIVA MUNICIPAL)
           ========================================================================== */
        :root { 
            --cyan-neon: #00f2ff; 
            --bg-dark: #07090d; 
            --panel-bg: rgba(18, 22, 29, 0.95); 
            --text-main: #f0f3f6; 
            --border-color: #2a313a; 
            --color-vigente: #238636;
            --color-vencida: #da3633;
            --color-temporal: #fbbc04;
            --color-censo: #00f2ff;
            --color-nulo: #6e7681;
            --shadow-heavy: 0 12px 48px rgba(0,0,0,0.7);
        }

        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            overflow: hidden; 
        }
        
        #map { 
            position: absolute; 
            top: 0; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            z-index: 1; 
        }

        /* ==========================================================================
           2. COMPONENTES DE INTERFAZ (UI)
           ========================================================================== */
        .ui-layer { 
            position: absolute; 
            z-index: 1000; 
            pointer-events: auto; 
        }
        
        .glass-panel { 
            background: var(--panel-bg); 
            backdrop-filter: blur(16px); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            box-shadow: var(--shadow-heavy); 
        }
        
        .btn { 
            border: none; 
            font-family: 'Inter', sans-serif; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.2s; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        
        .btn:hover { 
            filter: brightness(1.2); 
            transform: translateY(-1px); 
        }

        /* CONTROL DE CAPAS LEAFLET AISLADO Y VISIBLE A 100px */
        .leaflet-top.leaflet-right {
            margin-top: 100px !important;
            z-index: 10001 !important;
            margin-right: 15px !important;
        }

        /* BARRA SUPERIOR */
        .top-nav { 
            top: 15px; 
            left: 15px; 
            right: 15px; 
            height: 64px; 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            gap: 15px; 
            justify-content: space-between; 
        }
        
        .search-container { 
            flex: 0 1 500px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            background: rgba(0,0,0,0.4); 
            padding: 12px 18px; 
            border-radius: 8px; 
            border: 1px solid var(--border-color); 
            transition: 0.3s; 
        }
        
        .search-container:focus-within { 
            border-color: var(--cyan-neon); 
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); 
        }
        
        .search-container input { 
            background: transparent; 
            border: none; 
            color: white; 
            outline: none; 
            width: 100%; 
            font-size: 14px; 
            font-weight: 600; 
        }
        
        .tools-container { 
            display: flex; 
            gap: 10px; 
            align-items: center; 
        }
        
        .tool-btn { 
            width: 44px; 
            height: 44px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 18px; 
            background: rgba(0,0,0,0.4); 
            border: 1px solid var(--border-color); 
            color: var(--text-main); 
            cursor: pointer; 
            transition: 0.2s; 
        }
        
        .tool-btn:hover, .tool-btn.active { 
            border-color: var(--cyan-neon); 
            color: var(--cyan-neon); 
            background: rgba(0, 242, 255, 0.1); 
        }

        /* REGLA DE ORO: OCULTAR BOTÓN DE GUARDAR EN LA NUBE PARA LA ALCALDESA */
        #btn-save-server { 
            display: none !important; 
        }

        /* ESTILOS PARA LA IMPRESIÓN DEL REPORTE EXACTO (CENTRO DE VISIÓN) */
        @media print {
            @page { size: landscape; margin: 0; }
            body, html { width: 100%; height: 100%; margin: 0; padding: 0; background: white; }
            .ui-layer, .leaflet-control-container, .modal-overlay { display: none !important; }
            #map { 
                position: absolute; 
                width: 100vw !important; 
                height: 100vh !important; 
                top: 0; 
                left: 0; 
                right: 0; 
                bottom: 0; 
                z-index: 9999; 
            }
        }
        
        /* TOGGLE MODO LECTURA */
        .toggle-container { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 11px; 
            font-weight: 800; 
            color: #a5b0bf; 
            background: rgba(0,0,0,0.3); 
            padding: 8px 15px; 
            border-radius: 20px; 
            border: 1px solid var(--border-color); 
        }
        
        .switch { 
            position: relative; 
            display: inline-block; 
            width: 34px; 
            height: 18px; 
        }
        
        .switch input { 
            opacity: 0; 
            width: 0; 
            height: 0; 
        }
        
        .slider { 
            position: absolute; 
            cursor: pointer; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background-color: #da3633; 
            transition: .4s; 
            border-radius: 34px; 
        }
        
        .slider:before { 
            position: absolute; 
            content: ""; 
            height: 12px; 
            width: 12px; 
            left: 3px; 
            bottom: 3px; 
            background-color: white; 
            transition: .4s; 
            border-radius: 50%; 
        }
        
        input:checked + .slider { 
            background-color: var(--color-vigente); 
        }
        
        input:checked + .slider:before { 
            transform: translateX(16px); 
        }

        /* SIDEBAR (PANEL MAESTRO) */
        #sidebar { 
            top: 95px; 
            left: 15px; 
            bottom: 20px; 
            width: 420px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }
        
        .sidebar-header { 
            padding: 25px 20px; 
            border-bottom: 1px solid var(--border-color); 
            background: rgba(255,255,255,0.02); 
        }
        
        /* IDENTIDAD CORPORATIVA: Sidebar Header */
        .sidebar-header h1 { 
            margin: 0; 
            font-size: 17px; 
            font-weight: 900; 
            letter-spacing: 1px; 
            color: white; 
        }
        
        .sidebar-header p { 
            margin: 6px 0 0; 
            font-size: 11px; 
            color: var(--cyan-neon); 
            font-weight: 800; 
            letter-spacing: 0.5px; 
        }
        
        .layers-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
        }
        
        .layers-container::-webkit-scrollbar { 
            width: 6px; 
        }
        
        .layers-container::-webkit-scrollbar-thumb { 
            background: var(--border-color); 
            border-radius: 4px; 
        }

        /* TARJETAS DE SECTOR Y CONTROLES DUALES */
        .sector-card { 
            margin-bottom: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            background: rgba(0,0,0,0.3); 
            overflow: hidden; 
            transition: all 0.3s ease; 
        }
        
        .sector-card.is-active { 
            border-color: var(--cyan-neon); 
            background: rgba(0, 242, 255, 0.03); 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.05); 
        }
        
        .sector-header { 
            padding: 12px 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid transparent; 
        }
        
        .sector-header:hover { 
            background: rgba(255,255,255,0.05); 
        }
        
        .sector-title-group { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        
        /* Controles Visuales del Sector */
        .sector-controls { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        
        .radio-active { 
            appearance: none; 
            width: 16px; 
            height: 16px; 
            border: 2px solid #6e7681; 
            border-radius: 50%; 
            outline: none; 
            cursor: pointer; 
            position: relative; 
        }
        
        .radio-active:checked { 
            border-color: var(--cyan-neon); 
        }
        
        .radio-active:checked::after { 
            content: ''; 
            position: absolute; 
            top: 3px; 
            left: 3px; 
            width: 6px; 
            height: 6px; 
            background: var(--cyan-neon); 
            border-radius: 50%; 
        }
        
        .check-visible { 
            appearance: none; 
            width: 16px; 
            height: 16px; 
            border: 2px solid #6e7681; 
            border-radius: 4px; 
            outline: none; 
            cursor: pointer; 
            position: relative; 
        }
        
        .check-visible:checked { 
            background: var(--color-vigente); 
            border-color: var(--color-vigente); 
        }
        
        .check-visible:checked::after { 
            content: '✔'; 
            position: absolute; 
            color: white; 
            font-size: 10px; 
            top: -1px; 
            left: 2px; 
        }

        .sector-title { 
            font-size: 13px; 
            font-weight: 800; 
            color: var(--text-main); 
            cursor: pointer; 
        }
        
        .sector-trash { 
            padding: 5px; 
            font-size: 13px; 
            color: #6e7681; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        
        .sector-trash:hover { 
            color: var(--color-vencida); 
            text-shadow: 0 0 10px var(--color-vencida); 
        }

        /* ACORDEÓN DE ESTATUS Y LISTA */
        .status-group { 
            border-top: 1px solid var(--border-color); 
            background: rgba(255,255,255,0.01); 
        }
        
        .status-header { 
            padding: 10px 16px; 
            font-size: 11px; 
            font-weight: 800; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            cursor: pointer; 
        }
        
        .status-header:hover { 
            background: rgba(255,255,255,0.04); 
        }
        
        .status-info { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        
        .status-dot { 
            width: 10px; 
            height: 10px; 
            border-radius: 50%; 
            box-shadow: 0 0 8px currentColor; 
        }
        
        .status-count { 
            background: rgba(255,255,255,0.1); 
            padding: 2px 8px; 
            border-radius: 12px; 
            font-size: 10px; 
        }

        .local-list { 
            background: rgba(0,0,0,0.5); 
            max-height: 250px; 
            overflow-y: auto; 
        }
        
        .local-row { 
            padding: 8px 16px 8px 24px; 
            font-size: 11px; 
            color: #a5b0bfff; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            cursor: pointer; 
            border-bottom: 1px solid rgba(255,255,255,0.02); 
        }
        
        .local-row:hover { 
            color: white; 
            background: rgba(255,255,255,0.08); 
        }

        .sidebar-footer { 
            padding: 20px; 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
            border-top: 1px solid var(--border-color); 
            background: rgba(0,0,0,0.2); 
        }
        
        .btn-outline { 
            background: transparent; 
            border: 1px solid var(--border-color); 
            color: white; 
            padding: 14px; 
            border-radius: 8px; 
            font-size: 11px; 
        }
        
        .btn-outline:hover { 
            border-color: white; 
            background: rgba(255,255,255,0.05); 
        }

        /* ==========================================================================
           3. POPUPS INMORTALES (VISTA LECTURA Y EDICIÓN DOBLE CONTENEDOR)
           ========================================================================== */
        .leaflet-popup-content-wrapper { 
            padding: 0; 
            overflow: hidden; 
            border-radius: 12px; 
            background: #fff; 
            width: 340px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
        }
        
        .leaflet-popup-tip { 
            background: #fff; 
        }
        
        .leaflet-popup-content { 
            margin: 0; 
        } 
        
        .pop-cover { 
            width: 100%; 
            height: 160px; 
            background: #111; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
        }
        
        .pop-cover img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.9; 
        }
        
        .pop-badge { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 10px; 
            font-weight: 900; 
            color: white; 
            text-transform: uppercase; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); 
            border: 2px solid rgba(255,255,255,0.5); 
        }
        
        .pop-content { 
            padding: 20px; 
            color: #111; 
            max-height: 400px; 
            overflow-y: auto; 
        }
        
        /* Estilos Vista Lectura Profesional */
        .read-field { 
            margin-bottom: 12px; 
            border-bottom: 1px solid #eaeaea; 
            padding-bottom: 8px; 
        }
        
        .read-label { 
            display: block; 
            font-size: 9px; 
            font-weight: 900; 
            color: #888; 
            text-transform: uppercase; 
            margin-bottom: 4px; 
        }
        
        .read-value { 
            font-size: 13px; 
            font-weight: 700; 
            color: #111; 
            word-break: break-word; 
        }

        /* Estilos Vista Edición */
        .form-group { 
            margin-bottom: 12px; 
            border-bottom: 1px solid #eaeaea; 
            padding-bottom: 6px; 
            position: relative; 
        }
        
        .form-label { 
            display: block; 
            font-size: 9px; 
            font-weight: 900; 
            color: #888; 
            text-transform: uppercase; 
            margin-bottom: 4px; 
        }
        
        .form-input { 
            width: 85%; 
            border: none; 
            font-family: 'Inter', sans-serif; 
            font-size: 13px; 
            font-weight: 700; 
            color: #000; 
            background: transparent; 
            outline: none; 
        }
        
        .form-input:focus { 
            color: var(--color-vigente); 
        }
        
        /* PRIVACIDAD DE URls */
        .input-oculto { 
            opacity: 0.6; 
            font-family: monospace; 
            letter-spacing: 1px; 
        }

        .form-select { 
            width: 100%; 
            padding: 8px; 
            font-family: 'Inter', sans-serif; 
            font-size: 12px; 
            font-weight: 800; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            margin-top: 5px; 
            outline: none; 
            cursor: pointer; 
        }
        
        .eye-btn { 
            position: absolute; 
            right: 5px; 
            top: 20px; 
            color: #ccc; 
            cursor: pointer; 
            font-size: 14px; 
            transition: 0.2s; 
            z-index: 10; 
            padding: 5px; 
        }
        
        .eye-btn:hover, .eye-btn.is-hidden { 
            color: var(--color-vencida); 
        }

        .btn-popup-action { 
            width: 100%; 
            padding: 14px; 
            font-size: 12px; 
            border-radius: 8px; 
            margin-top: 10px; 
            font-weight: 900; 
            cursor: pointer; 
            border: none; 
            text-transform: uppercase; 
            color: white; 
            transition: 0.2s; 
        }
        
        .btn-popup-action:hover { 
            filter: brightness(1.1); 
        }
        
        .btn-save { 
            background: var(--color-vigente); 
            box-shadow: 0 4px 15px rgba(35, 134, 54, 0.3); 
        }
        
        .btn-edit { 
            background: var(--cyan-neon); 
            color: #000; 
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3); 
        }
        
        .btn-del { 
            background: var(--color-vencida); 
            margin-top: 15px; 
        }

        /* MODO LECTURA CSS MAESTRO */
        .readonly-mode .form-input { pointer-events: none; color: #555; }
        .readonly-mode .form-select { pointer-events: none; background: #eee; }
        .readonly-mode .eye-btn { display: none; }
        .readonly-mode input[type="color"] { pointer-events: none; opacity: 0.6; }

        /* ==========================================================================
           5. ESTÉTICA PROFESIONAL DE VÉRTICES (PUNTOS BLANCOS EN EDICIÓN)
           ========================================================================== */
        .leaflet-editing-icon {
            border-radius: 50% !important;
            border: 2px solid var(--border-color) !important;
            background-color: #fff !important;
            width: 12px !important;
            height: 12px !important;
            margin-left: -6px !important;
            margin-top: -6px !important;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* ==========================================================================
           6. MODALES Y REPORTES
           ========================================================================== */
        .audit-report { background: #f8f9fa; padding: 20px; }
        .audit-title { margin: 0 0 15px; font-size: 14px; font-weight: 900; color: #111; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .audit-stat { display: flex; justify-content: space-between; font-size: 12px; font-weight: 800; margin-bottom: 8px; padding: 4px 0; }
    </style>
</head>
<body>

<div id="map"></div>

<nav class="ui-layer glass-panel top-nav">
    <div class="search-container">
        <i class="fas fa-search" style="color: var(--cyan-neon);"></i>
        <input type="text" id="buscador-global" placeholder="Filtrado Profundo: Buscar por Contribuyente, RIF o Estatus..." oninput="ejecutarMotorBusqueda()">
    </div>
    
    <div class="tools-container">
        <div class="toggle-container" title="Bloquea la edición para evitar cambios accidentales">
            <label class="switch">
                <input type="checkbox" id="toggle-readonly" onchange="alternarModoLectura()">
                <span class="slider"></span>
            </label>
            SOLO LECTURA
        </div>

        <button class="btn tool-btn" id="btn-draw-marker" title="Nuevo Contribuyente" onclick="activarHerramienta('punto')">
            <i class="fas fa-map-marker-alt"></i>
        </button>
        <button class="btn tool-btn" id="btn-draw-poly" title="Auditar Área" onclick="activarHerramienta('poligono')">
            <i class="fas fa-draw-polygon"></i>
        </button>
        
        <!-- NUEVO BOTÓN: GPS DE ALTA PRECISIÓN -->
        <button class="btn tool-btn" id="btn-gps" title="Mi Ubicación Exacta (GPS)" onclick="marcarUbicacionGPS()">
            <i class="fas fa-crosshairs"></i>
        </button>

        <!-- BOTÓN GENERAR REPORTE FOTOGRÁFICO CON FUNCIÓN DE CENTRADO EXACTO -->
        <button class="btn tool-btn" title="Generar Reporte Fotográfico" onclick="generarReporteCentrado()" style="width: auto; padding: 0 20px; font-size: 12px; font-weight: 900; color: white; background: #6e7681;">
            <svg style="margin-right: 8px; width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg> GENERAR REPORTE
        </button>

        <!-- BOTÓN GUARDAR NUBE (OCULTO POR CSS PARA LA VERSIÓN ALCALDESA) -->
        <button class="btn tool-btn" id="btn-save-server" title="Guardar Sincronización en Nube" onclick="guardarEnServidor()" style="width: auto; padding: 0 20px; font-size: 12px; font-weight: 900; color: white; background: var(--color-vigente);">
            <i class="fas fa-cloud-upload-alt" style="margin-right: 8px;"></i> GUARDAR NUBE
        </button>
    </div>
</nav>

<aside id="sidebar" class="ui-layer glass-panel" style="overflow: hidden;">
    <!-- FRANJA TRICOLOR INSTITUCIONAL -->
    <div style="height: 5px; width: 100%; display: flex;">
        <div style="flex: 1; background: #008000;"></div> 
        <div style="flex: 1; background: #FF0000;"></div> 
        <div style="flex: 1; background: #FFFF00;"></div> 
    </div>

    <div class="sidebar-header">
        <!-- IDENTIDAD CORPORATIVA: Sidebar Títulos -->
        <h1>PANEL DE CONTROL</h1>
        <p style="font-size: 11px; color: var(--cyan-neon); font-weight: 800; letter-spacing: 0.5px; margin-top: 5px;">Alcaldía Bolivariana de Ayacucho</p>
        <p id="indicador-capa-activa" style="margin-top: 10px;">HACIENDA MUNICIPAL - SELECCIONE CAPA</p>
    </div>
    
    <div class="layers-container" id="arbol-datos">
        </div>

    <div class="sidebar-footer">
        <button class="btn btn-outline" onclick="crearNuevoSector()" style="grid-column: span 1;">
            <i class="fas fa-folder-plus"></i> CREAR SECTOR
        </button>
    </div>
</aside>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    /* ==========================================================================
       FASE 0: VARIABLES GITHUB API Y SEGURIDAD OFUSCADA (MÉTODO REVERSO)
       ========================================================================== */
    const GITHUB_USER = 'proyectomaps2026';
    const GITHUB_REPO = 'mapa_hecho'; 
    const FILE_PATH = 'config.json';
    let fileSha = null;
    
    // TOKEN OFUSCADO AL REVÉS PARA ENGAÑAR A GITHUB (ACCESO LIBRE DE LECTURA)
    const _tk_rev = "b4fSw2drdIhc4cIUL91Lew1Ou7C8GdYYhvw4_phg";
    const _getAuth = () => _tk_rev.split('').reverse().join('');

    let SYSTEM_AUTH = { user: 'admin', pass: 'admin' }; 

    /* ==========================================================================
       FASE 1: NÚCLEO DE MEMORIA Y CONFIGURACIÓN BASE
       ========================================================================== */
    const mapa = L.map('map', { center: [8.02611, -72.25244], zoom: 16, zoomControl: false });
    mapa.attributionControl.setPrefix('PROYECTO HACIENDA 2026'); 

    // INTEGRACIÓN NATIVA DE CAPAS LEAFLET (DOBLE CAPA)
    const googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'], maxZoom: 21 });
    const googleStreets = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'], maxZoom: 21 });
    
    googleSat.addTo(mapa); // Capa por defecto
    
    // CAPA MAESTRA SUPERPUESTA PARA LOS SECTORES
    const capaMaestraSectores = L.featureGroup().addTo(mapa);
    
    // CONTROL DE CAPAS VISIBLE EN ESQUINA SUPERIOR DERECHA (CONECTADO A LA DOBLE CAPA)
    const baseMaps = {
        "Vista Satélite (Híbrido)": googleSat,
        "Vista Mapa Urbano": googleStreets
    };
    const overlayMaps = {
        "Sectores Digitalizados": capaMaestraSectores
    };
    L.control.layers(baseMaps, overlayMaps, {position: 'topright'}).addTo(mapa);

    // OBJETO GLOBAL DE CAPAS INDEPENDIENTES
    const capasSectores = {};

    // BASE DE DATOS MAESTRA ESTADO-DIRIGIDA
    let STORE = {}; 
    let capaActivaId = null; 
    let modoLecturaGlobal = false;
    let textoFiltroGlobal = "";

    const DICCIONARIO_ESTATUS = {
        "VIGENTE": { color: "#238636" },
        "VENCIDA": { color: "#da3633" },
        "TEMPORAL": { color: "#fbbc04" },
        "CENSO / NUEVO": { color: "#00f2ff" },
        "SIN LICENCIA": { color: "#da3633" },
        "SIN CATEGORÍA": { color: "#6e7681" }
    };

    const crearPinFiscal = (color) => L.divIcon({ 
        html: `<i class="fas fa-map-marker-alt" style="color:${color}; font-size:32px; text-shadow: 0 4px 10px rgba(0,0,0,0.8);"></i>`, 
        className: 'pin-fiscal-ayacucho', iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -30] 
    });

    // Herramientas Leaflet Draw - Inicializando polígonos con un fondo translúcido estético
    const herramientaPunto = new L.Draw.Marker(mapa, { icon: crearPinFiscal(DICCIONARIO_ESTATUS["CENSO / NUEVO"].color) });
    const herramientaPoligono = new L.Draw.Polygon(mapa, { 
        shapeOptions: { color: DICCIONARIO_ESTATUS["CENSO / NUEVO"].color, fillColor: DICCIONARIO_ESTATUS["CENSO / NUEVO"].color, fillOpacity: 0.2, weight: 3, dashArray: '5, 5' }
    });

    function activarHerramienta(tipo) {
        if(modoLecturaGlobal) return alert("⚠️ MODO LECTURA ACTIVO: Desactive el candado arriba para dibujar.");
        if(!capaActivaId) return alert("⚠️ SELECCIÓN REQUERIDA: Marque el círculo de la Capa Activa en el panel izquierdo antes de registrar un punto.");
        if(!STORE[capaActivaId].visible) return alert("⚠️ CAPA OCULTA: La capa activa está apagada. Encienda el Checkbox para dibujar.");
        
        tipo === 'punto' ? herramientaPunto.enable() : herramientaPoligono.enable();
    }

    // EVENTO DE CREACIÓN MANUAL (DIBUJO DE POLÍGONOS Y MARCADORES)
    mapa.on(L.Draw.Event.CREATED, (evento) => {
        const idFisico = L.stamp(evento.layer);
        
        // Configuración estética y de edición al nacer
        if(evento.layer instanceof L.Marker) {
            if (!modoLecturaGlobal) evento.layer.options.draggable = true;
            evento.layer.on('dragend', () => actualizarUIYMapa());
        } else if (evento.layer instanceof L.Polygon || evento.layer instanceof L.Rectangle) {
            evento.layer.setStyle({ color: DICCIONARIO_ESTATUS["CENSO / NUEVO"].color, fillColor: DICCIONARIO_ESTATUS["CENSO / NUEVO"].color, fillOpacity: 0.2 });
            if (!modoLecturaGlobal) evento.layer.editing.enable();
            evento.layer.on('edit', () => actualizarUIYMapa());
        }

        const nuevoRegistro = {
            idFisico: idFisico,
            tipoGeometria: evento.layerType,
            capaLeaflet: evento.layer,
            colorPersonalizado: null, 
            visibleIndividual: true,
            datosGenerales: { 
                "Contribuyente": "NUEVO ESTABLECIMIENTO", 
                "RIF": "J-00000000-0",
                "Teléfono": "0414-0000000",
                "Metros Cuadrados": "0 m2",
                "Fecha Fiscalización": new Date().toISOString().split('T')[0],
                "Estatus": "CENSO / NUEVO",
                "Link Fotografía": ""
            },
            camposOcultos: []
        };

        STORE[capaActivaId].registros.push(nuevoRegistro);
        vincularEventosCapa(evento.layer, capaActivaId, idFisico);
        
        actualizarUIYMapa();
        
        // Abrir popup inmediatamente en un registro nuevo
        setTimeout(() => abrirPopupDinamico(capaActivaId, idFisico), 200);
        
        // Forzamos abrir en modo edición automáticamente por ser nuevo
        setTimeout(() => toggleModoPopup(idFisico, 'edit'), 300);
    });

    // SISTEMA GPS DE ALTA PRECISIÓN (PINCHETA EXACTA)
    function marcarUbicacionGPS() {
        if(modoLecturaGlobal) return alert("⚠️ MODO LECTURA ACTIVO: Desactive el candado arriba para registrar con GPS.");
        if(!capaActivaId) return alert("⚠️ SELECCIÓN REQUERIDA: Marque el círculo de la Capa Activa en el panel izquierdo.");
        if(!STORE[capaActivaId].visible) return alert("⚠️ CAPA OCULTA: La capa activa está apagada.");
        
        if (!navigator.geolocation) {
            return alert("Su navegador o dispositivo no soporta geolocalización satelital.");
        }

        const btn = document.getElementById('btn-gps');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                btn.innerHTML = '<i class="fas fa-crosshairs"></i>';
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                
                // Mover mapa a la posición del fiscal
                mapa.setView([lat, lng], 19);
                
                const colorCenso = DICCIONARIO_ESTATUS["CENSO / NUEVO"].color;
                const marcadorGPS = L.marker([lat, lng], { icon: crearPinFiscal(colorCenso), draggable: true });
                
                // Si la capa maestra no tiene la capa actual, no pasará nada grave, pero aseguramos la inyección
                const idFisico = L.stamp(marcadorGPS);
                marcadorGPS.on('dragend', () => actualizarUIYMapa());
                
                const nuevoRegistro = {
                    idFisico: idFisico,
                    tipoGeometria: 'marker',
                    capaLeaflet: marcadorGPS,
                    colorPersonalizado: null, 
                    visibleIndividual: true,
                    datosGenerales: { 
                        "Contribuyente": "NUEVO ESTABLECIMIENTO (GPS)", 
                        "RIF": "J-00000000-0",
                        "Teléfono": "0414-0000000",
                        "Metros Cuadrados": "0 m2",
                        "Fecha Fiscalización": new Date().toISOString().split('T')[0],
                        "Estatus": "CENSO / NUEVO",
                        "Link Fotografía": ""
                    },
                    camposOcultos: []
                };

                STORE[capaActivaId].registros.push(nuevoRegistro);
                vincularEventosCapa(marcadorGPS, capaActivaId, idFisico);
                
                actualizarUIYMapa();
                
                setTimeout(() => abrirPopupDinamico(capaActivaId, idFisico, true), 200);
                setTimeout(() => toggleModoPopup(idFisico, 'edit'), 300);
            },
            (err) => {
                btn.innerHTML = '<i class="fas fa-crosshairs"></i>';
                alert("Error obteniendo el GPS (Asegúrese de dar permisos de Ubicación): " + err.message);
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    }

    // FUNCIÓN IMPRESIÓN CENTRO DE VISIÓN EXACTA
    function generarReporteCentrado() {
        const centroActual = mapa.getCenter();
        const zoomActual = mapa.getZoom();
        
        // Forzar a Leaflet a recalcular el tamaño antes de invocar la impresora web
        mapa.invalidateSize();
        mapa.setView(centroActual, zoomActual, {animate: false});
        
        setTimeout(() => {
            window.print();
        }, 500);
    }

    // FUNCIÓN DE ÁRBOL: Apagar/Encender contribuyentes individuales usando Ojitos
    function toggleVisibilidadIndividual(idSector, idFisico, isVisible) {
        const reg = STORE[idSector].registros.find(r => String(r.idFisico) === String(idFisico));
        if(reg) {
            reg.visibleIndividual = isVisible;
            actualizarUIYMapa();
        }
    }

    // VISIBILIDAD POR CATEGORÍA COMPLETA (Polígonos y Marcadores mediante Ojito)
    function toggleVisibilidadEstatus(idSector, estatus, isVisible) {
        if (!STORE[idSector]) return;
        if (!STORE[idSector].visibilidadPorEstatus) STORE[idSector].visibilidadPorEstatus = {};
        STORE[idSector].visibilidadPorEstatus[estatus] = isVisible;
        actualizarUIYMapa();
    }

    // Funciones Maestras Sector
    function actualizarNombreSector(id, valor) {
        if(!STORE[id]) return;
        STORE[id].nombreSector = valor.toUpperCase();
        actualizarUIYMapa();
    }

    // SINCRONIZACIÓN DE COLOR TOTAL (Afecta Marcadores y Polígonos de una Categoría)
    function cambiarColorEstatusSector(idSector, estatus, colorHex) {
        if (modoLecturaGlobal) return alert("Modo lectura activo.");
        if (!STORE[idSector]) return;
        
        if(!STORE[idSector].coloresPorEstatus) STORE[idSector].coloresPorEstatus = {};
        STORE[idSector].coloresPorEstatus[estatus] = colorHex;
        
        STORE[idSector].registros.forEach(reg => {
            const estActual = reg.datosGenerales["Estatus"] || "SIN CATEGORÍA";
            if (estActual === estatus) {
                reg.colorPersonalizado = colorHex;
                // Diferenciar entre Marcador y Polígono para aplicar la estética correcta
                if (reg.tipoGeometria === 'marker') {
                    reg.capaLeaflet.setIcon(crearPinFiscal(colorHex));
                } else if (reg.tipoGeometria === 'polygon' || reg.tipoGeometria === 'rectangle') {
                    reg.capaLeaflet.setStyle({ color: colorHex, fillColor: colorHex, fillOpacity: 0.2 });
                }
            }
        });
        
        actualizarUIYMapa();
    }

    // Cambiar Color a nivel Sector General
    function cambiarColorSector(idSector, colorHex) {
        if (modoLecturaGlobal) return alert("Modo lectura activo.");
        if (!STORE[idSector]) return;
        
        STORE[idSector].colorPrincipal = colorHex;
        
        STORE[idSector].registros.forEach(reg => {
            reg.colorPersonalizado = colorHex;
            if (reg.tipoGeometria === 'marker') {
                reg.capaLeaflet.setIcon(crearPinFiscal(colorHex));
            } else if (reg.tipoGeometria === 'polygon' || reg.tipoGeometria === 'rectangle') {
                reg.capaLeaflet.setStyle({ color: colorHex, fillColor: colorHex, fillOpacity: 0.2 });
            }
        });
        
        actualizarUIYMapa();
    }


    /* ==========================================================================
       FASE 2: EL MOTOR STATE-DRIVEN (INDEPENDENCIA ABSOLUTA DE CAPAS)
       ========================================================================== */
    function actualizarUIYMapa() {
        const contenedor = document.getElementById('arbol-datos');
        contenedor.innerHTML = "";
        
        for(let idSector in STORE) {
            const sectorData = STORE[idSector];

            // 1. INICIALIZAR GRUPO DE CAPA INDEPENDIENTE SI NO EXISTE
            if (!capasSectores[idSector]) {
                capasSectores[idSector] = new L.FeatureGroup();
            }

            // Vaciamos temporalmente ESTA capa exclusiva para reconstruirla con el filtro
            capasSectores[idSector].clearLayers();

            const gruposPorEstatus = {};
            let hayResultadosBusqueda = false;

            sectorData.registros.forEach(reg => {
                if(reg.visibleIndividual === undefined) reg.visibleIndividual = true;
                
                const estatus = reg.datosGenerales["Estatus"] || "SIN CATEGORÍA";
                
                // Chequear visibilidad de la categoría completa (Ojito de sub-menú)
                if(!sectorData.visibilidadPorEstatus) sectorData.visibilidadPorEstatus = {};
                const estatusVisible = sectorData.visibilidadPorEstatus[estatus] !== false; 

                const searchString = Object.values(reg.datosGenerales).join(" ").toLowerCase();
                const cumpleFiltro = textoFiltroGlobal === "" || searchString.includes(textoFiltroGlobal);

                // GESTIÓN INDEPENDIENTE: Si pasa los filtros de Ojitos, se añade a su grupo
                const isPhysicallyVisible = sectorData.visible && reg.visibleIndividual && estatusVisible && cumpleFiltro;
                const hasLayer = capasSectores[idSector].hasLayer(reg.capaLeaflet);

                if (isPhysicallyVisible && !hasLayer) {
                    capasSectores[idSector].addLayer(reg.capaLeaflet);
                } else if (!isPhysicallyVisible && hasLayer) {
                    capasSectores[idSector].removeLayer(reg.capaLeaflet);
                }

                if(cumpleFiltro) {
                    hayResultadosBusqueda = true;
                    if(!gruposPorEstatus[estatus]) gruposPorEstatus[estatus] = { conteo: 0, lista: [] };
                    gruposPorEstatus[estatus].conteo++;
                    gruposPorEstatus[estatus].lista.push(reg);
                }
            });

            // CONTROL DE CAPA EN EL MAPA Y AGRUPACIÓN EN CAPA MAESTRA (DOBLE CAPA)
            if (sectorData.visible) {
                if (!capaMaestraSectores.hasLayer(capasSectores[idSector])) {
                    capaMaestraSectores.addLayer(capasSectores[idSector]);
                }
            } else {
                if (capaMaestraSectores.hasLayer(capasSectores[idSector])) {
                    capaMaestraSectores.removeLayer(capasSectores[idSector]);
                }
            }

            // Omitir pintar en UI si el buscador lo vació
            if(textoFiltroGlobal !== "" && !hayResultadosBusqueda) continue;

            // RENDERIZADO DEL PANEL DEL SECTOR
            const colorGlobalActual = sectorData.colorPrincipal || '#00f2ff';
            
            let htmlSector = `
            <div class="sector-card ${idSector === capaActivaId ? 'is-active' : ''}">
                <div class="sector-header">
                    <div class="sector-title-group">
                        <input type="radio" class="radio-active" name="capaActiva" title="Marcar como Capa de Trabajo" 
                               ${idSector === capaActivaId ? 'checked' : ''} onchange="setCapaActiva('${idSector}')">
                        
                        <!-- OJITO DE SECTOR COMPLETO -->
                        <i class="fas ${sectorData.visible ? 'fa-eye' : 'fa-eye-slash'}" 
                           title="Mostrar/Ocultar todo el Sector" 
                           style="cursor: pointer; width: 16px; text-align: center; color: ${sectorData.visible ? 'var(--cyan-neon)' : '#6e7681'}; font-size: 14px;"
                           onclick="toggleVisibilidadCapa('${idSector}', ${!sectorData.visible})"></i>
                        
                        <input type="text" value="${sectorData.nombreSector}" 
                               title="Doble clic para enfocar sector en el mapa"
                               ondblclick="enfocarSector('${idSector}')"
                               onchange="actualizarNombreSector('${idSector}', this.value)" 
                               style="background:transparent; border:none; border-bottom: 1px dashed rgba(255,255,255,0.2); color:var(--text-main); font-size:13px; font-weight:800; font-family:inherit; width: 140px; outline:none; text-transform:uppercase;">
                    </div>
                    
                    <div class="sector-controls">
                        <i class="fas fa-trash-alt sector-trash" onclick="eliminarSectorDefinitivo('${idSector}')"></i>
                    </div>
                </div>
                <div class="sector-body" style="display: ${idSector === capaActivaId || textoFiltroGlobal !== '' ? 'block' : 'none'};">`;

            // ITERACIÓN DE CATEGORÍAS DENTRO DEL SECTOR
            for(let estatus in gruposPorEstatus) {
                const confEst = DICCIONARIO_ESTATUS[estatus] || DICCIONARIO_ESTATUS["SIN CATEGORÍA"];
                
                if(!STORE[idSector].coloresPorEstatus) STORE[idSector].coloresPorEstatus = {};
                if(!STORE[idSector].visibilidadPorEstatus) STORE[idSector].visibilidadPorEstatus = {};
                
                const colorActual = STORE[idSector].coloresPorEstatus[estatus] || confEst.color;
                const estatusVisible = STORE[idSector].visibilidadPorEstatus[estatus] !== false; 

                const idAcordeon = `lista-${idSector}-${estatus.replace(/\s+/g, '')}`;

                htmlSector += `
                <div class="status-group">
                    <div class="status-header">
                        <div class="status-info" style="display:flex; align-items:center; gap:8px;">
                            
                            <!-- OJITO DE CATEGORÍA INTERNA -->
                            <i class="fas ${estatusVisible ? 'fa-eye' : 'fa-eye-slash'}" 
                               title="Mostrar/Ocultar Categoría" 
                               style="cursor: pointer; width: 16px; text-align: center; color: ${estatusVisible ? 'white' : '#6e7681'}; margin-right: 5px;"
                               onclick="event.stopPropagation(); toggleVisibilidadEstatus('${idSector}', '${estatus}', ${!estatusVisible})"></i>
                            
                            <!-- SELECTOR DE COLOR POR SUB-MENÚ (Afecta a polígonos y pines de esta categoría) -->
                            <input type="color" title="Color de esta Categoría" value="${colorActual}"
                                   onclick="event.stopPropagation();"
                                   onchange="cambiarColorEstatusSector('${idSector}', '${estatus}', this.value)" 
                                   style="width: 16px; height: 16px; border: none; cursor: pointer; background: transparent; padding: 0;">
                            
                            <div onclick="document.getElementById('${idAcordeon}').style.display = document.getElementById('${idAcordeon}').style.display === 'none' ? 'block' : 'none'" style="cursor: pointer; padding: 2px 0; flex:1;">
                                ${estatus}
                            </div>
                        </div>
                        <span class="status-count">${gruposPorEstatus[estatus].conteo}</span>
                    </div>
                    <div class="local-list" id="${idAcordeon}" style="display: ${textoFiltroGlobal !== '' ? 'block' : 'none'};">`;

                gruposPorEstatus[estatus].lista.forEach(local => {
                    htmlSector += `
                        <div class="local-row" onclick="abrirPopupDinamico('${idSector}', '${local.idFisico}', true)">
                            <div style="flex:1; display:flex; align-items:center; gap:8px;">
                                <!-- OJITO INDIVIDUAL DE CONTRIBUYENTE -->
                                <i class="fas ${local.visibleIndividual ? 'fa-eye' : 'fa-eye-slash'}" 
                                   title="Ocultar individualmente" 
                                   style="cursor: pointer; width: 16px; text-align: center; color: ${local.visibleIndividual ? '#a5b0bf' : '#6e7681'};"
                                   onclick="event.stopPropagation(); toggleVisibilidadIndividual('${idSector}', '${local.idFisico}', ${!local.visibleIndividual})"></i>
                                   
                                <i class="fas fa-caret-right" style="opacity:0.5"></i> 
                                ${local.datosGenerales["Contribuyente"] || 'SIN NOMBRE'}
                            </div>
                            <i class="fas fa-trash sector-trash" style="font-size:11px;" title="Borrar Registro" onclick="event.stopPropagation(); borrarRegistroIndividual('${idSector}', '${local.idFisico}')"></i>
                        </div>`;
                });
                htmlSector += `</div></div>`;
            }
            htmlSector += `</div></div>`;
            contenedor.insertAdjacentHTML('beforeend', htmlSector);
        }

        const indicador = document.getElementById('indicador-capa-activa');
        if(capaActivaId && STORE[capaActivaId]) {
            indicador.innerText = "CAPA DE TRABAJO: " + STORE[capaActivaId].nombreSector;
            indicador.style.color = varCSS('--cyan-neon');
        } else {
            indicador.innerText = "HACIENDA MUNICIPAL - MODO LECTURA";
            indicador.style.color = "#6e7681";
        }
    }


    /* ==========================================================================
       FASE 3: DOBLE VISTA EN POPUP (REPARACIÓN DE APERTURA ANTI-BLOQUEOS)
       ========================================================================== */
    
    function vincularEventosCapa(capaFisica, idSector, idFisico) {
        capaFisica.on('click', () => {
            const reg = STORE[idSector].registros.find(r => String(r.idFisico) === String(idFisico));
            if(reg) reg._modoPopup = 'lectura';
            abrirPopupDinamico(idSector, idFisico, false);
        });
    }

    function abrirPopupDinamico(idSector, idFisico, centrarMapa = false) {
        const registro = STORE[idSector].registros.find(r => String(r.idFisico) === String(idFisico));
        if(!registro) return;

        const capaMapa = registro.capaLeaflet;
        
        if(centrarMapa) {
            const destino = capaMapa.getLatLng ? capaMapa.getLatLng() : capaMapa.getBounds().getCenter();
            mapa.flyTo(destino, 19, { duration: 0.5 });
            registro._modoPopup = 'lectura';
        }

        const htmlContenido = generarContenidoHTMLPopup(idSector, idFisico);

        // REPARACIÓN MAESTRA: Evita bloqueos forzando a Leaflet a desligar y reenganchar el Popup fresco
        capaMapa.unbindPopup();
        capaMapa.bindPopup(htmlContenido, { 
            minWidth: 320, 
            closeButton: true, 
            className: modoLecturaGlobal ? 'readonly-mode' : '' 
        }).openPopup();
        
        mapa._popup = capaMapa.getPopup();
        mapa._popup._source = capaMapa; 
    }

    // ALTERNADOR LIGERO DOM (Evita recargar Leaflet y bloqueos de setContent)
    function toggleModoPopup(idFisico, modo) {
        const divRead = document.getElementById(`view-mode-${idFisico}`);
        const divEdit = document.getElementById(`edit-mode-${idFisico}`);
        
        if (!divRead || !divEdit) return;

        if (modo === 'edit') {
            divRead.style.display = 'none';
            divEdit.style.display = 'block';
        } else {
            divRead.style.display = 'block';
            divEdit.style.display = 'none';
        }
    }

    // EL GENERADOR DE STRINGS HTML CON LA TÉCNICA DE DOBLE CONTENEDOR (DOM ESTÁTICO)
    function generarContenidoHTMLPopup(idSector, idFisico, forzarEdicion = false) {
        const registro = STORE[idSector].registros.find(r => String(r.idFisico) === String(idFisico));
        let html = `<div class="pop-wrapper">`;

        // SI ES POLÍGONO (AUDITORÍA MUNICIPAL)
        if(registro.tipoGeometria === 'polygon' || registro.tipoGeometria === 'rectangle') {
            const rep = calcularAuditoria(registro.capaLeaflet);
            html += `
            <div class="audit-report">
                <h3 class="audit-title"><i class="fas fa-chart-area"></i> HACIENDA MUNICIPAL - AUDITORÍA</h3>
                <div class="audit-stat" style="color:${DICCIONARIO_ESTATUS['VIGENTE'].color}"><span>Vigentes:</span> <span>${rep.v}</span></div>
                <div class="audit-stat" style="color:${DICCIONARIO_ESTATUS['VENCIDA'].color}"><span>Vencidas:</span> <span>${rep.x}</span></div>
                <div class="audit-stat" style="color:${DICCIONARIO_ESTATUS['TEMPORAL'].color}"><span>Temporales:</span> <span>${rep.t}</span></div>
                <div class="audit-stat" style="color:#000; border-top:1px dashed #ccc; padding-top:10px; margin-top:10px;"><span>TOTAL LOCALES:</span> <span>${rep.total}</span></div>
            </div>`;
        } 
        // SI ES MARCADOR (FICHA DE CONTRIBUYENTE)
        else {
            const estActual = registro.datosGenerales["Estatus"];
            const confEst = DICCIONARIO_ESTATUS[estActual] || DICCIONARIO_ESTATUS["SIN CATEGORÍA"];
            
            // Evaluar de dónde hereda el color (Personalizado > Sector > Estatus Global)
            const colorSector = (STORE[idSector].coloresPorEstatus && STORE[idSector].coloresPorEstatus[estActual]) ? STORE[idSector].coloresPorEstatus[estActual] : confEst.color;
            const colorFinal = registro.colorPersonalizado || colorSector;
            
            const imgUrl = registro.datosGenerales["Link Fotografía"];
            
            // Verificamos si la foto está oculta (CASCADA)
            const isFotoOculta = registro.camposOcultos.includes("Link Fotografía");
            
            // PORTADA UNIVERSAL HACIENDA MUNICIPAL (Respeta el Ojito de Link Fotografía)
            html += `
            <div class="pop-cover">
                ${(!isFotoOculta && imgUrl && imgUrl.length > 10) ? `<img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/400x160/111/fff?text=IMAGEN+ROTA'">` : `<i class="fas fa-store" style="font-size: 50px; color: #333;"></i>`}
                <div class="pop-badge" id="badge-estatus-${idFisico}" style="background: ${colorFinal};">${estActual}</div>
            </div>
            <div class="pop-content">`;

            // ==========================================
            // CONTENEDOR 1: LECTURA PROFESIONAL ESTÁTICA
            // ==========================================
            html += `<div id="view-mode-${idFisico}" style="display: ${forzarEdicion ? 'none' : 'block'};">`;
            for(let clave in registro.datosGenerales) {
                if(clave === "Estatus" || clave === "Link Fotografía") continue;
                const isOculto = registro.camposOcultos.includes(clave);
                if(isOculto) continue; 
                
                html += `
                <div class="read-field">
                    <span class="read-label">${clave}</span>
                    <div class="read-value" id="view-val-${idFisico}-${clave.replace(/\s/g,'')}">${registro.datosGenerales[clave] || '-'}</div>
                </div>`;
            }
            if(!modoLecturaGlobal) {
                html += `<button class="btn-popup-action btn-edit" onclick="toggleModoPopup('${idFisico}', 'edit')"><i class="fas fa-pen"></i> MODO EDICIÓN</button>`;
            }
            html += `</div>`;

            // ==========================================
            // CONTENEDOR 2: EDICIÓN PROFUNDA (INPUTS)
            // ==========================================
            html += `<div id="edit-mode-${idFisico}" style="display: ${forzarEdicion ? 'block' : 'none'};">`;
            for(let clave in registro.datosGenerales) {
                if(clave === "Estatus" || clave === "Link Fotografía") continue;
                const isOculto = registro.camposOcultos.includes(clave);
                
                // Actualizamos el STORE y también inyectamos directamente al Contenedor 1 para que al volver se vea el cambio sin recargar
                html += `
                <div class="form-group">
                    <i class="fas ${isOculto ? 'fa-eye-slash is-hidden' : 'fa-eye'} eye-btn" onclick="ejecutarToggleOjo(event, '${idSector}', '${idFisico}', '${clave}')"></i>
                    <span class="form-label">${clave}</span>
                    <input type="text" class="form-input" value="${registro.datosGenerales[clave]}" 
                           ${isOculto ? 'type="password"' : ''} 
                           onchange="actualizarDatoCampo('${idSector}', '${idFisico}', '${clave}', this.value); document.getElementById('view-val-${idFisico}-${clave.replace(/\s/g,'')}').innerText = this.value;">
                </div>`;
            }

            html += `
            <div class="form-group" style="background: #f4f6f8; padding: 10px; border-radius: 8px;">
                <span class="form-label" style="color: #111;">ESTADO FISCAL</span>
                <select class="form-select" onchange="cambiarEstatusFisico('${idSector}', '${idFisico}', this.value)">
                    ${Object.keys(DICCIONARIO_ESTATUS).map(k => `<option value="${k}" ${estActual === k ? 'selected' : ''}>${k}</option>`).join('')}
                </select>
            </div>
            
            <div class="form-group" style="background: rgba(0,0,0,0.02); padding: 10px; border-radius: 8px; margin-top: 10px;">
                <span class="form-label" style="color: #111;">COLOR DE PINCHETA (PERSONALIZADO)</span>
                <input type="color" style="width: 100%; height: 32px; border: none; cursor: pointer; border-radius: 6px; background: transparent; padding: 0;" value="${colorFinal}" onchange="cambiarColorPin('${idSector}', '${idFisico}', this.value)">
            </div>

            <div class="form-group">
                <i class="fas ${isFotoOculta ? 'fa-eye-slash is-hidden' : 'fa-eye'} eye-btn" onclick="ejecutarToggleOjo(event, '${idSector}', '${idFisico}', 'Link Fotografía')"></i>
                <span class="form-label">URL FOTOGRAFÍA O DRIVE</span>
                <input type="password" class="form-input input-oculto" value="${imgUrl || ''}" onchange="actualizarDatoCampo('${idSector}', '${idFisico}', 'Link Fotografía', this.value)">
            </div>
            
            <button class="btn-popup-action btn-save" onclick="toggleModoPopup('${idFisico}', 'view')"><i class="fas fa-save"></i> GUARDAR Y VOLVER</button>
            <button class="btn-popup-action btn-del" onclick="borrarRegistroIndividual('${idSector}', '${idFisico}')">ELIMINAR REGISTRO</button>
            </div>`;
        }
        
        html += `</div></div>`;
        return html;
    }

    // --- Controladores de Interacción del Popup ---
    
    function cambiarColorPin(idSector, idFisico, colorHex) {
        if(modoLecturaGlobal) return;
        const regOrigen = STORE[idSector].registros.find(r => String(r.idFisico) === String(idFisico));
        if(!regOrigen) return;

        const estatusTarget = regOrigen.datosGenerales["Estatus"] || "SIN CATEGORÍA";

        // SINCRONIZACIÓN EN CASCADA: Guardar en la configuración del sector
        if(!STORE[idSector].coloresPorEstatus) STORE[idSector].coloresPorEstatus = {};
        STORE[idSector].coloresPorEstatus[estatusTarget] = colorHex;

        // Aplicar a todos los registros de la misma categoría en este sector
        STORE[idSector].registros.forEach(reg => {
            const estActual = reg.datosGenerales["Estatus"] || "SIN CATEGORÍA";
            if (estActual === estatusTarget) {
                reg.colorPersonalizado = colorHex;
                if (reg.tipoGeometria === 'marker') {
                    reg.capaLeaflet.setIcon(crearPinFiscal(colorHex));
                } else if (reg.tipoGeometria === 'polygon' || reg.tipoGeometria === 'rectangle') {
                    reg.capaLeaflet.setStyle({ color: colorHex, fillColor: colorHex, fillOpacity: 0.2 });
                }
            }
        });

        // Refresco visual y HTML estático
        actualizarUIYMapa();
        const badge = document.getElementById(`badge-estatus-${idFisico}`);
        if (badge) badge.style.background = colorHex;
    }

    function ejecutarToggleOjo(eventoClick, idSector, idFisico, claveCampo) {
        eventoClick.stopPropagation(); 
        if(modoLecturaGlobal) return;

        const regOrigen = STORE[idSector].registros.find(r => String(r.idFisico) === String(idFisico));
        if(!regOrigen) return;

        const estatusTarget = regOrigen.datosGenerales["Estatus"] || "SIN CATEGORÍA";
        const isCurrentlyHidden = regOrigen.camposOcultos.includes(claveCampo);

        // SINCRONIZACIÓN EN CASCADA: Aplicar a todos los de la misma categoría
        STORE[idSector].registros.forEach(reg => {
            const estActual = reg.datosGenerales["Estatus"] || "SIN CATEGORÍA";
            if (estActual === estatusTarget) {
                if (isCurrentlyHidden) {
                    // Lo mostramos (lo quitamos de camposOcultos)
                    const idx = reg.camposOcultos.indexOf(claveCampo);
                    if (idx > -1) reg.camposOcultos.splice(idx, 1);
                } else {
                    // Lo ocultamos (lo agregamos a camposOcultos)
                    if (!reg.camposOcultos.includes(claveCampo)) {
                        reg.camposOcultos.push(claveCampo);
                    }
                }
            }
        });

        actualizarUIYMapa(); // Asegura consistencia en UI

        // Refrescamos rápido el popup y volvemos a vista de edición para no interrumpir
        if(mapa._popup) {
            const capaMapa = regOrigen.capaLeaflet;
            capaMapa.unbindPopup().bindPopup(generarContenidoHTMLPopup(idSector, idFisico, true), { minWidth: 320, closeButton: true, className: modoLecturaGlobal ? 'readonly-mode' : '' }).openPopup();
        }
    }

    function actualizarDatoCampo(idSector, idFisico, clave, valor) {
        STORE[idSector].registros.find(r => String(r.idFisico) === String(idFisico)).datosGenerales[clave] = valor;
        actualizarUIYMapa(); 
        // Cero recargas de Leaflet aquí. Todo es DOM fluido.
    }

    function cambiarEstatusFisico(idSector, idFisico, nuevoEst) {
        const reg = STORE[idSector].registros.find(r => String(r.idFisico) === String(idFisico));
        reg.datosGenerales["Estatus"] = nuevoEst;
        
        const conf = DICCIONARIO_ESTATUS[nuevoEst] || DICCIONARIO_ESTATUS["SIN CATEGORÍA"];
        const colorSector = (STORE[idSector].coloresPorEstatus && STORE[idSector].coloresPorEstatus[nuevoEst]) ? STORE[idSector].coloresPorEstatus[nuevoEst] : conf.color;
        
        reg.colorPersonalizado = colorSector; // Adopta el color de su nueva categoría
        
        if (reg.tipoGeometria === 'marker') {
            reg.capaLeaflet.setIcon(crearPinFiscal(colorSector));
        } else if (reg.tipoGeometria === 'polygon' || reg.tipoGeometria === 'rectangle') {
            reg.capaLeaflet.setStyle({ color: colorSector, fillColor: colorSector, fillOpacity: 0.2 });
        }
        
        actualizarUIYMapa();

        // Actualizar etiqueta en vivo
        const badge = document.getElementById(`badge-estatus-${idFisico}`);
        if (badge) {
            badge.innerText = nuevoEst;
            badge.style.background = colorSector;
        }
    }


    /* ==========================================================================
       FASE 4: FUNCIONES DE SISTEMA Y VÉRTICES DE EDICIÓN
       ========================================================================== */
    
    function varCSS(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

    function alternarModoLectura() {
        modoLecturaGlobal = document.getElementById('toggle-readonly').checked;
        const bMarker = document.getElementById('btn-draw-marker');
        const bPoly = document.getElementById('btn-draw-poly');
        
        if(modoLecturaGlobal) {
            bMarker.style.opacity = "0.3"; bMarker.style.pointerEvents = "none";
            bPoly.style.opacity = "0.3"; bPoly.style.pointerEvents = "none";
            if(mapa._popup) mapa.closePopup(); 
        } else {
            bMarker.style.opacity = "1"; bMarker.style.pointerEvents = "auto";
            bPoly.style.opacity = "1"; bPoly.style.pointerEvents = "auto";
        }

        // Habilitar/Deshabilitar Puntos Blancos Profesionales de Vértices en Polígonos
        for(let id in STORE) {
            STORE[id].registros.forEach(reg => {
                if (reg.tipoGeometria === 'polygon' || reg.tipoGeometria === 'rectangle') {
                    if (modoLecturaGlobal) {
                        if(reg.capaLeaflet.editing) reg.capaLeaflet.editing.disable();
                    } else {
                        if(reg.capaLeaflet.editing) reg.capaLeaflet.editing.enable();
                    }
                } else if (reg.tipoGeometria === 'marker') {
                    if (modoLecturaGlobal) {
                        if(reg.capaLeaflet.dragging) reg.capaLeaflet.dragging.disable();
                    } else {
                        if(reg.capaLeaflet.dragging) reg.capaLeaflet.dragging.enable();
                    }
                }
            });
        }
    }

    function ejecutarMotorBusqueda() {
        textoFiltroGlobal = document.getElementById('buscador-global').value.toLowerCase();
        actualizarUIYMapa();
    }

    function setCapaActiva(idSector) { capaActivaId = idSector; actualizarUIYMapa(); }
    
    function toggleVisibilidadCapa(idSector, isVisible) { 
        STORE[idSector].visible = isVisible;
        if(isVisible) capaMaestraSectores.addLayer(capasSectores[idSector]);
        else capaMaestraSectores.removeLayer(capasSectores[idSector]);
        actualizarUIYMapa(); 
    }

    function crearNuevoSector() {
        if(modoLecturaGlobal) return alert("Desactive el Modo Lectura");
        const nombre = prompt("Nombre del Nuevo Sector/Capa:");
        if(!nombre) return;
        const id = 'sec_' + Date.now();
        
        capasSectores[id] = new L.FeatureGroup();
        STORE[id] = { nombreSector: nombre.toUpperCase(), visible: true, visibilidadPorEstatus: {}, coloresPorEstatus: {}, registros: [] };
        capaActivaId = id;
        actualizarUIYMapa();
    }

    function eliminarSectorDefinitivo(idSector) {
        if(modoLecturaGlobal) return alert("Desactive el Modo Lectura");
        if(!confirm(`⚠️ PELIGRO:\n¿Borrar el sector "${STORE[idSector].nombreSector}" y todos sus marcadores? Esta acción purga los datos de la memoria.`)) return;
        
        if (capasSectores[idSector]) {
            capaMaestraSectores.removeLayer(capasSectores[idSector]);
            delete capasSectores[idSector];
        }
        delete STORE[idSector]; 
        if(capaActivaId === idSector) capaActivaId = null;
        actualizarUIYMapa();
    }

    function borrarRegistroIndividual(idSector, idFisico) {
        if(modoLecturaGlobal) return;
        if(!confirm("¿Eliminar este contribuyente del mapa y del censo?")) return;
        
        const reg = STORE[idSector].registros.find(r => String(r.idFisico) === String(idFisico));
        if(reg && capasSectores[idSector].hasLayer(reg.capaLeaflet)) {
            capasSectores[idSector].removeLayer(reg.capaLeaflet);
        }
        
        STORE[idSector].registros = STORE[idSector].registros.filter(r => String(r.idFisico) !== String(idFisico));
        
        mapa.closePopup();
        actualizarUIYMapa();
    }

    function enfocarSector(idSector) {
        if(!STORE[idSector].visible) return alert("La capa está oculta. Enciéndala primero.");
        const limites = capasSectores[idSector].getBounds();
        if(limites.isValid()) mapa.fitBounds(limites, { padding: [50, 50] });
    }

    function calcularAuditoria(poligonoActivo) {
        let count = { v: 0, x: 0, t: 0, total: 0 };
        const box = poligonoActivo.getBounds();
        for(let id in STORE) {
            STORE[id].registros.forEach(r => {
                if(r.tipoGeometria === 'marker' && box.contains(r.capaLeaflet.getLatLng())) {
                    count.total++;
                    const e = r.datosGenerales["Estatus"];
                    if(e === "VIGENTE") count.v++;
                    else if(e === "VENCIDA" || e === "SIN LICENCIA") count.x++;
                    else if(e === "TEMPORAL") count.t++;
                }
            });
        }
        return count;
    }

    /* ==========================================================================
       FASE 6: EXPORTACIÓN Y BACKUP DATA CON EXTRACCIÓN DE COORDENADAS
       ========================================================================== */
    function extraerDatosGeometria() {
        const storeCopia = JSON.parse(JSON.stringify(STORE, (key, val) => {
            if (key === 'capaLeaflet' || key === 'grupoFisico') return undefined;
            return val;
        }));

        for (let idSec in STORE) {
            STORE[idSec].registros.forEach((reg, i) => {
                if (reg.tipoGeometria === 'marker') {
                    const ll = reg.capaLeaflet.getLatLng();
                    storeCopia[idSec].registros[i].coords = { lat: ll.lat, lng: ll.lng };
                } else {
                    const lls = reg.capaLeaflet.getLatLngs();
                    storeCopia[idSec].registros[i].coords = lls;
                }
            });
        }
        return storeCopia;
    }

    /* ==========================================================================
       FASE 7: CARGA DESDE LA NUBE DE FORMA DIRECTA (VERSIÓN ALCALDESA)
       ========================================================================== */
    async function guardarEnServidor() {
        // Función mantenida pero el botón está oculto por seguridad
        const token = _getAuth();
        if(!token) return alert("No se puede guardar. Falta configuración.");

        const btn = document.getElementById('btn-save-server');
        const btnOriginalText = btn.innerHTML;
        btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> GUARDANDO...";
        btn.disabled = true;

        try {
            let currentSha = null;
            try {
                const getRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                    method: 'GET',
                    headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (getRes.ok) {
                    const getData = await getRes.json();
                    currentSha = getData.sha;
                }
            } catch (err) {}

            const datosLimpios = extraerDatosGeometria();
            const objetoMaestro = { credentials: SYSTEM_AUTH, store: datosLimpios };
            const jsonStr = JSON.stringify(objetoMaestro, null, 2);
            const contentEncoded = btoa(unescape(encodeURIComponent(jsonStr)));
            
            const payload = {
                message: "Backup Censo Fiscal Municipal " + new Date().toISOString(),
                content: contentEncoded,
                branch: "main"
            };
            if (currentSha) payload.sha = currentSha;

            const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                method: 'PUT',
                headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify(payload)
            });

            if(!res.ok) throw new Error(await res.text());
            
            const data = await res.json();
            fileSha = data.content.sha;
            alert("✅ Datos de Hacienda guardados correctamente en la Nube.");
        } catch(e) {
            console.error(e);
            alert("❌ Error crítico al guardar en GitHub: " + e.message);
        } finally {
            btn.innerHTML = btnOriginalText;
            btn.disabled = false;
        }
    }
    
    async function cargarDatosNube() {
        const token = _getAuth();
        if (!token) return;

        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                headers: { 'Authorization': 'token ' + token }
            });
            if (res.ok) {
                const data = await res.json();
                fileSha = data.sha;
                const decodedContent = decodeURIComponent(escape(atob(data.content)));
                const jsonParsed = JSON.parse(decodedContent);
                if (jsonParsed.credentials) SYSTEM_AUTH = jsonParsed.credentials;
                reconstruirDesdeJSON(jsonParsed.store || {});
            } else {
                actualizarUIYMapa();
            }
        } catch (e) {
            actualizarUIYMapa();
        }
    }
    
    function reconstruirDesdeJSON(datosCargados) {
        STORE = {};
        for(let id in capasSectores) {
            if(capaMaestraSectores.hasLayer(capasSectores[id])) capaMaestraSectores.removeLayer(capasSectores[id]);
        }
        
        for(let idSector in datosCargados) {
            const sec = datosCargados[idSector];
            capasSectores[idSector] = new L.FeatureGroup();
            
            STORE[idSector] = {
                nombreSector: sec.nombreSector,
                visible: sec.visible !== false,
                visibilidadPorEstatus: sec.visibilidadPorEstatus || {},
                coloresPorEstatus: sec.coloresPorEstatus || {},
                colorPrincipal: sec.colorPrincipal || '#00f2ff',
                registros: []
            };

            sec.registros.forEach(reg => {
                let capa;
                const estActual = reg.datosGenerales["Estatus"] || "SIN CATEGORÍA";
                const confEst = DICCIONARIO_ESTATUS[estActual] || DICCIONARIO_ESTATUS["SIN CATEGORÍA"];
                
                let colorBase = confEst.color;
                if (STORE[idSector].coloresPorEstatus && STORE[idSector].coloresPorEstatus[estActual]) {
                    colorBase = STORE[idSector].coloresPorEstatus[estActual];
                }
                const colorAUsar = reg.colorPersonalizado || colorBase;
                
                if (reg.tipoGeometria === 'marker' && reg.coords) {
                    capa = L.marker([reg.coords.lat, reg.coords.lng], { 
                        icon: crearPinFiscal(colorAUsar), 
                        draggable: !modoLecturaGlobal 
                    });
                    capa.on('dragend', () => actualizarUIYMapa());
                } else if ((reg.tipoGeometria === 'polygon' || reg.tipoGeometria === 'rectangle') && reg.coords) {
                    capa = L.polygon(reg.coords, { 
                        color: colorAUsar, 
                        fillColor: colorAUsar, 
                        fillOpacity: 0.2, 
                        weight: 3, 
                        dashArray: '5, 5' 
                    });
                    if (!modoLecturaGlobal) capa.editing.enable();
                    capa.on('edit', () => actualizarUIYMapa());
                }

                if(capa) {
                    const newIdFisico = L.stamp(capa);
                    const nuevoReg = {
                        idFisico: newIdFisico,
                        tipoGeometria: reg.tipoGeometria,
                        capaLeaflet: capa,
                        colorPersonalizado: reg.colorPersonalizado,
                        visibleIndividual: reg.visibleIndividual !== false,
                        _modoPopup: 'lectura',
                        datosGenerales: reg.datosGenerales,
                        camposOcultos: reg.camposOcultos || []
                    };
                    STORE[idSector].registros.push(nuevoReg);
                    vincularEventosCapa(capa, idSector, newIdFisico);
                }
            });
        }
        actualizarUIYMapa();
    }

    // ARRANQUE DIRECTO SIN LOGIN PARA LA ALCALDESA
    window.onload = () => {
        cargarDatosNube();
    };

</script>
