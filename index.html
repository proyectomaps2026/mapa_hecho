<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Censo Ayacucho</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; background: #e5e3df; }
        .sidebar {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            width: 280px; background: white; border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-family: sans-serif;
        }
        .header { background: #4285F4; color: white; padding: 15px; border-radius: 8px 8px 0 0; }
        .content { padding: 15px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #34a853; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .my-pin {
            width: 22px; height: 22px; background: #4285F4;
            border: 2px solid white; border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg); box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }
        .leaflet-control-layers { border-radius: 8px !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header"><h3 style="margin:0">Censo Fiscal</h3></div>
        <div class="content">
            <input type="text" id="url" placeholder="Pega el link CSV aquí...">
            <button onclick="cargar()">CARGAR</button>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // Capas básicas de Google: m = Mapa, s = Satélite
        var capas = {
            "Mapa": L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}'),
            "Satélite": L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}')
        };

        var map = L.map('map', { zoomControl: false, layers: [capas["Mapa"]] }).setView([8.038, -72.261], 15);
        L.control.layers(capas, null, { position: 'bottomleft', collapsed: false }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        var group = L.layerGroup().addTo(map);

        function cargar() {
            Papa.parse(document.getElementById('url').value, {
                download: true, header: true,
                complete: function(res) {
                    group.clearLayers();
                    res.data.forEach(row => {
                        var lat = parseFloat(row.latitud  row.Latitud  row.lat);
                        var lon = parseFloat(row.longitud  row.Longitud  row.lon);
                        if(!isNaN(lat)) {
                            var icon = L.divIcon({ className: 'div-pin', html: '<div class="my-pin"></div>', iconSize: [22, 22], iconAnchor: [11, 22] });
                            var t = ""; for(var k in row){ t += "<b>"+k+":</b> "+row[k]+"<br>"; }
                            L.marker([lat, lon], {icon: icon}).bindPopup(t).addTo(group);
                        }
                    });
                    if(group.getLayers().length > 0) map.fitBounds(L.featureGroup(group.getLayers()).getBounds());
                }
            });
        }
        window.onload = function() { setTimeout(function(){ map.invalidateSize(); }, 500); };
    </script>
</body>
</html>
