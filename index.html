<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Fiscal Directo - Alcaldía SC</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        /* Panel para pegar el link del Sheets como en My Maps */
        #import-panel {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: white; padding: 20px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 300px;
        }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0F9D58; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .ficha-img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="import-panel">
        <h3 style="margin:0; color:#444;">Importar de Google Sheets</h3>
        <p style="font-size:12px; color:#777;">Pega el link de "Publicar en la web" (CSV):</p>
        <input type="text" id="sheet-url" placeholder="https://docs.google.com/spreadsheets/d/...">
        <button onclick="importarDeGoogle()">Cargar Capa</button>
    </div>

    <div id="map"></div>

    <script>
        // 1. Iniciar Mapa (Google Maps Style)
        var map = L.map('map').setView([7.766, -72.225], 14);
        L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
        }).addTo(map);

        var marcadores = L.layerGroup().addTo(map);

        // 2. Función de Importación "Tipo My Maps"
        function importarDeGoogle() {
            const url = document.getElementById('sheet-url').value;
            if(!url.includes("docs.google.com")) return alert("Link de Google Sheets inválido");

            marcadores.clearLayers();

            Papa.parse(url, {
                download: true,
                header: true,
                complete: function(results) {
                    results.data.forEach(row => {
                        // Buscamos latitud y longitud (flexibles)
                        let lat = row.latitud  row.Latitud  row.lat;
                        let lon = row.longitud  row.Longitud  row.lng;

                        if(lat && lon) {
                            // Limpieza de fotos de Cloudinary
                            let foto = row.Imagen ? row.Imagen.replace(/[\[\]]/g, "") : "";
                            
                            let marker = L.marker([lat, lon]);
                            marker.bindPopup(
                                <div style="width:230px">
                                    ${foto ? <img src="${foto}" class="ficha-img">` : ''}
                                    <h4 style="margin:8px 0">${row.Nombre_Comercio || 'Local'}</h4>
                                    <p style="font-size:13px"><b>RIF:</b> ${row.RIF || 'N/A'}<br>
                                    <b>Estatus:</b> ${row.Estatus || 'Censado'}</p>
                                    <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}" target="_blank" 
                                       style="display:block; text-align:center; background:#4285F4; color:white; padding:8px; border-radius:5px; text-decoration:none;">
                                       ¿Cómo llegar?</a>
                                </div>
                            `);
                            marcadores.addLayer(marker);
                        }
                    });
                    
                    // Zoom automático
                    if (marcadores.getLayers().length > 0) {
                        map.fitBounds(L.featureGroup(marcadores.getLayers()).getBounds());
                        localStorage.setItem("ultima_hoja", url);
                    }
                }
            });
        }

        // Carga automática si ya lo usaste antes
        window.onload = () => {
            const lastUrl = localStorage.getItem("ultima_hoja");
            if(lastUrl) {
                document.getElementById('sheet-url').value = lastUrl;
                importarDeGoogle();
            }
        };
    </script>
</body>
</html>
