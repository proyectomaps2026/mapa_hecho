<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Censo Ayacucho - Sistema Estable</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { height: 100%; margin: 0; font-family: sans-serif; overflow: hidden; }
        #wrapper { display: flex; height: 100vh; }
        
        /* Panel Lateral */
        #sidebar { 
            width: 300px; background: white; display: flex; flex-direction: column; 
            border-right: 1px solid #ddd; z-index: 1001; 
        }
        .header { background: #4285F4; color: white; padding: 15px; }
        .controls { padding: 10px; border-bottom: 1px solid #eee; background: #f8f9fa; }
        
        input { width: 100%; padding: 8px; margin-bottom: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background: #34a853; color: white; border: none; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        
        #list { flex-grow: 1; overflow-y: auto; }
        .item { padding: 10px 15px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
        .item:hover { background: #e8f0fe; }
        .item b { color: #1a73e8; display: block; }

        /* Mapa */
        #map { flex-grow: 1; background: #222; }
        
        /* Pincheta */
        .pin { width: 18px; height: 18px; background: #4285F4; border: 2px solid white; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="sidebar">
        <div class="header"><h3 style="margin:0">Censo Ayacucho</h3></div>
        <div class="controls">
            <input type="text" id="url" placeholder="Enlace CSV (Publicar en la web)">
            <button onclick="cargar()">CARGAR DATOS</button>
        </div>
        <div id="list"></div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    // USAMOS SATÉLITE DE ESRI: No se bloquea, es gratis y muy nítido
    var map = L.map('map', { zoomControl: false }).setView([8.038, -72.261], 15);
    
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Esri World Imagery'
    }).addTo(map);

    L.control.zoom({ position: 'bottomright' }).addTo(map);
    var markers = L.layerGroup().addTo(map);
    var rawData = [];

    function cargar() {
        var url = document.getElementById('url').value;
        Papa.parse(url, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                rawData = res.data;
                render(rawData);
            }
        });
    }

    function render(data) {
        markers.clearLayers();
        var html = "";
        var points = [];

        data.forEach((row, i) => {
            var lat = parseFloat(row.latitud || row.Latitud || row.lat);
            var lon = parseFloat(row.longitud || row.Longitud || row.lon);

            if(!isNaN(lat)) {
                var icon = L.divIcon({ className: 'p', html: '<div class="pin"></div>', iconSize: [18, 18], iconAnchor: [9, 18] });
                var popup = "<b>DATOS:</b><br>";
                for(var k in row){ popup += "<b>"+k+":</b> "+row[k]+"<br>"; }
                
                var m = L.marker([lat, lon], {icon: icon}).bindPopup(popup);
                m.id = i;
                m.addTo(markers);
                points.push([lat, lon]);

                html += `<div class="item" onclick="go(${lat}, ${lon}, ${i})">
                            <b>${row.Nombre || row.nombre || 'Sin Nombre'}</b>
                            <span>${row.RIF || row.rif || ''}</span>
                         </div>`;
            }
        });

        document.getElementById('list').innerHTML = html;
        if(points.length > 0) map.fitBounds(points);
    }

    function go(lat, lon, id) {
        map.flyTo([lat, lon], 18);
        markers.eachLayer(layer => { if(layer.id === id) layer.openPopup(); });
    }

    window.onload = function() { setTimeout(() => map.invalidateSize(), 500); };
</script>
</body>
</html>
