<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF MASTER v2.0 - HACIENDA AYACUCHO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    
    <style>
        :root { --amarillo: #ffcc00; --fondo: #0f172a; --card: #1e293b; --azul: #3b82f6; --rojo: #ef4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #000; color: white; overflow: hidden; }
        #map { flex: 1; z-index: 1; background: #000; }

        /* HEADER Y BUSCADOR (Recopilado de Fotos 1, 6, 9) */
        .brand-header { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: rgba(15, 23, 42, 0.95); padding: 15px 25px; border-radius: 10px;
            border-left: 6px solid var(--amarillo); backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .top-search-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 400px; }
        .top-search { width: 100%; padding: 14px 20px; border-radius: 25px; border: none; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.5); outline: none; }

        /* BARRA DE HERRAMIENTAS (Foto 7, 8, 9) */
        .drawing-toolbar {
            position: absolute; top: 85px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: white; display: flex; padding: 6px; border-radius: 6px; box-shadow: 0 2px 15px rgba(0,0,0,0.3);
        }
        .tool-btn { padding: 8px 15px; color: #333; cursor: pointer; border-right: 1px solid #ddd; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .tool-btn:hover { background: #f0f4f8; color: var(--azul); }
        .active-tool { background: #e2e8f0; color: var(--azul); }

        /* ESTILO DE TRAZADO NEGRO/BLANCO (Foto 8) */
        .leaflet-draw-draw-polygon { stroke: #000 !important; stroke-width: 5px !important; stroke-opacity: 1 !important; }
        .leaflet-draw-guide-marker { background: #fff !important; border: 2px solid #000 !important; border-radius: 50% !important; width: 12px !important; height: 12px !important; }

        /* SIDEBAR DE GESTIÓN (Foto 5, 9) */
        #sidebar { width: 420px; background: var(--fondo); border-left: 1px solid #334155; display: flex; flex-direction: column; }
        .side-title { padding: 30px; text-align: center; border-bottom: 5px solid var(--amarillo); background: var(--card); }
        .side-content { flex: 1; overflow-y: auto; padding: 20px; }

        .layer-card { 
            background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; 
            border: 2px solid transparent; transition: 0.3s; cursor: pointer;
        }
        .layer-card.active { border-color: var(--amarillo); background: #2d3748; }
        .layer-header { display: flex; justify-content: space-between; align-items: center; }
        .layer-stats { font-size: 11px; color: var(--amarillo); margin-top: 5px; font-weight: 800; }
        
        .btn-main { width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 800; margin-top: 10px; }
        .btn-create { background: transparent; color: var(--azul); border: 2px dashed var(--azul); }

        /* MODAL (Foto 4) */
        #layer-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; background: white; color: #333; width: 380px; padding: 30px;
            border-radius: 15px; display: none; box-shadow: 0 25px 70px rgba(0,0,0,0.9);
        }
        .modal-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="brand-header">
    <b>HACIENDA AYACUCHO</b>
    <span style="color:var(--amarillo); font-size:10px; font-weight:800; display:block;">SGF MASTER - CONTROL FISCAL</span>
</div>

<div class="top-search-container">
    <input type="text" class="top-search" placeholder="🔍 Buscar RIF o Censo...">
</div>

<div class="drawing-toolbar">
    <div class="tool-btn" id="btn-poly">📐 Trazar Bloque</div>
    <div class="tool-btn" id="btn-marker">📍 Punto Censo</div>
    <div class="tool-btn" onclick="exportData()">💾 Exportar Todo</div>
</div>

<div id="layer-modal">
    <b style="font-size: 18px;">Configurar Nueva Capa</b>
    <input type="text" id="layer-name-in" class="modal-input" placeholder="Nombre de la capa">
    <input type="text" id="layer-url-in" class="modal-input" placeholder="URL CSV de Google Sheets">
    <div style="display:flex; gap:10px;">
        <button onclick="closeModal()" style="flex:1; padding:10px;">Cancelar</button>
        <button onclick="createNewLayer()" style="flex:1; padding:10px; background:var(--azul); color:white; border:none; border-radius:6px; font-weight:bold;">CREAR E IMPORTAR</button>
    </div>
</div>

<aside id="sidebar">
    <div class="side-title">
        <h2 style="margin:0; color:white;">SGF MASTER</h2>
        <small style="color:var(--amarillo); font-weight:800;">GESTIÓN DE CAPAS DINÁMICAS</small>
    </div>
    <div class="side-content">
        <div id="dynamic-layers"></div>
        <button class="btn-main btn-create" onclick="openModal()">✚ AÑADIR NUEVA CAPA</button>
    </div>
</aside>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false });
    L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}').addTo(map);

    let capasDB = {}; // Almacena { id: { name: str, group: L.FeatureGroup, url: str } }
    let capaActivaId = null;

    // LÓGICA DE DIBUJO
    const polyDrawer = new L.Draw.Polygon(map, { shapeOptions: { color: '#000', weight: 5, fillOpacity: 0.3 } });
    const markerDrawer = new L.Draw.Marker(map);

    document.getElementById('btn-poly').onclick = () => { if(validaCapa()) polyDrawer.enable(); };
    document.getElementById('btn-marker').onclick = () => { if(validaCapa()) markerDrawer.enable(); };

    function validaCapa() {
        if(!capaActivaId) { alert("¡Error! Seleccione una capa en el sidebar antes de dibujar."); return false; }
        return true;
    }

    map.on(L.Draw.Event.CREATED, (e) => {
        const layer = e.layer;
        const nombre = prompt("Nombre/Censo del elemento:");
        if(nombre) {
            layer.bindPopup(`<b>${nombre}</b><br>Capa: ${capasDB[capaActivaId].name}`);
            capasDB[capaActivaId].group.addLayer(layer);
            updateStats(capaActivaId);
        }
    });

    // GESTIÓN DE CAPAS
    function openModal() { document.getElementById('layer-modal').style.display = 'block'; }
    function closeModal() { document.getElementById('layer-modal').style.display = 'none'; }

    function createNewLayer() {
        const name = document.getElementById('layer-name-in').value;
        const url = document.getElementById('layer-url-in').value;
        if(!name) return;

        const id = 'layer_' + Date.now();
        const group = new L.FeatureGroup().addTo(map);
        
        capasDB[id] = { name: name, url: url, group: group };
        
        renderLayerCard(id);
        selectLayer(id);
        
        if(url) importCSV(id, url);
        
        closeModal();
        document.getElementById('layer-name-in').value = "";
        document.getElementById('layer-url-in').value = "";
    }

    function renderLayerCard(id) {
        const html = `
            <div class="layer-card" id="card-${id}" onclick="selectLayer('${id}')">
                <div class="layer-header">
                    <span class="layer-name">📁 ${capasDB[id].name}</span>
                    <span style="color:var(--rojo)" onclick="deleteLayer(event, '${id}')">🗑️</span>
                </div>
                <div class="layer-stats" id="stats-${id}">Elementos: 0</div>
            </div>`;
        document.getElementById('dynamic-layers').insertAdjacentHTML('beforeend', html);
    }

    function selectLayer(id) {
        capaActivaId = id;
        document.querySelectorAll('.layer-card').forEach(c => c.classList.remove('active'));
        document.getElementById('card-' + id).classList.add('active');
    }

    function updateStats(id) {
        const count = capasDB[id].group.getLayers().length;
        document.getElementById('stats-' + id).innerText = `Elementos: ${count}`;
    }

    function deleteLayer(e, id) {
        e.stopPropagation();
        if(confirm("¿Eliminar capa y todos sus bloques/puntos?")) {
            map.removeLayer(capasDB[id].group);
            delete capasDB[id];
            document.getElementById('card-' + id).remove();
            if(capaActivaId === id) capaActivaId = null;
        }
    }

    // MOTOR DE IMPORTACIÓN CSV (Procesa la URL)
    function importCSV(id, url) {
        // Ajuste para Google Sheets directo
        if(url.includes('docs.google.com')) url = url.replace('/edit?usp=sharing', '/export?format=csv').replace('/edit#gid=', '/export?format=csv&gid=');
        
        Papa.parse(url, {
            download: true,
            header: true,
            complete: function(results) {
                results.data.forEach(row => {
                    const lat = parseFloat(row.Latitud || row.lat || row.latitude);
                    const lon = parseFloat(row.Longitud || row.lng || row.longitude);
                    if(!isNaN(lat) && !isNaN(lon)) {
                        const m = L.marker([lat, lon]);
                        m.bindPopup(`<b>${row.Nombre || 'Punto CSV'}</b><br>Censo: ${row.Censo || 'N/A'}`);
                        capasDB[id].group.addLayer(m);
                    }
                });
                updateStats(id);
                alert(`Capa "${capasDB[id].name}" importada: ${results.data.length} filas procesadas.`);
            },
            error: function() { alert("Error al leer el CSV. Verifique que la URL sea pública."); }
        });
    }

    function exportData() {
        alert("Función para exportar GeoJSON de todas las capas activada.");
        // Aquí iría la lógica de JSON.stringify de los FeatureGroups
    }
</script>
</body>
</html>
