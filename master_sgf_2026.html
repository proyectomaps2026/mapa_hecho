<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF AYACUCHO v11.0 - CONTROL TOTAL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0b0e14; --panel: #161b22; --text: #f0f3f6; --border: #30363d; --yellow: #fbbc04; --safe: #238636; --danger: #da3633; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; background: #000; }
        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: rgba(22, 27, 34, 0.98); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 12px; }
        
        /* Top Nav & Search */
        .top-nav { top: 15px; left: 15px; right: 15px; display: flex; gap: 10px; height: 55px; align-items: center; padding: 0 15px; }
        .search-box { flex: 1; max-width: 400px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border); }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
        
        .tool-dock { display: flex; gap: 5px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 10px; border: 1px solid var(--border); }
        .t-btn { background: transparent; border: none; color: #8b949e; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .t-btn.active { color: var(--accent); background: rgba(0,242,255,0.1); border: 1px solid var(--accent); }
        .btn-save { background: var(--safe); color: white; border: none; padding: 0 20px; height: 42px; border-radius: 8px; font-weight: 800; cursor: pointer; margin-left: auto; }

        /* Sidebar */
        #sidebar { top: 85px; left: 15px; bottom: 20px; width: 360px; display: flex; flex-direction: column; }
        .side-head { padding: 15px; border-bottom: 1px solid var(--border); border-top: 4px solid var(--yellow); }
        .layer-zone { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* Cards & Layers */
        .b-card { background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 10px; border: 1px solid transparent; overflow: hidden; }
        .b-card.active-b { border-color: var(--accent); }
        .b-head { padding: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; background: rgba(255,255,255,0.02); }
        .b-head span { flex: 1; font-weight: 800; font-size: 13px; }
        .item-row { padding: 8px 15px 8px 45px; font-size: 11px; color: #8b949e; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .item-row:hover { color: white; background: rgba(255,255,255,0.08); }

        /* Popups con Visor */
        .pop-card { min-width: 240px; padding: 5px; color: #222; }
        .img-visor { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background: #eee; border: 1px solid #ddd; }
        .pop-card input, .pop-card textarea, .pop-card select { width: 100%; border: 1px solid #ccc; padding: 8px; border-radius: 6px; margin-top: 5px; box-sizing: border-box; }
        .pop-btn { background: #1a73e8; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: 800; margin-top: 10px; cursor: pointer; }

        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5000; width: 340px; padding: 25px; display: none; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui top-nav glass">
    <div class="search-box">
        <i class="fas fa-search" style="color:var(--accent)"></i>
        <input type="text" id="main-search" placeholder="Buscar RIF o Nombre..." oninput="filtrarTodo()">
    </div>
    
    <div class="tool-dock">
        <button class="t-btn active" id="btn-select" onclick="resetTool()"><i class="fas fa-mouse-pointer"></i></button>
        <button class="t-btn" id="btn-mark" onclick="enableTool('marker')"><i class="fas fa-map-marker-alt"></i></button>
        <button class="t-btn" id="btn-poly" onclick="enableTool('poly')"><i class="fas fa-draw-polygon"></i></button>
    </div>

    <button class="btn-save" onclick="exportarConfig()"><i class="fas fa-download"></i> EXPORTAR CONFIG.JSON</button>
</div>

<aside id="sidebar" class="glass ui">
    <div class="side-head">
        <h2 style="margin:0; font-size:15px; letter-spacing:1px">HACIENDA MUNICIPAL</h2>
        <span style="font-size:10px; color:var(--accent); font-weight:bold">SGF AYACUCHO v11.0</span>
    </div>
    <div class="layer-zone" id="list-container"></div>
    <div style="padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid var(--border)">
        <button class="pop-btn" style="margin:0; background: #30363d" onclick="abrir('m-capa')">+ Bloque</button>
        <button class="pop-btn" style="margin:0; background: var(--accent); color:#000" onclick="abrir('m-csv')">CONEXIÓN RAW</button>
    </div>
</aside>

<div id="m-csv" class="modal glass ui">
    <h3 style="margin:0 0 15px 0">Importación Fiscal RAW</h3>
    <input type="text" id="csv-url" style="width:100%; padding:10px; background:#0d1117; color:white; border:1px solid var(--border)" placeholder="URL de Google Sheets">
    <button id="btn-raw" class="pop-btn" style="background:var(--safe)" onclick="procesoRaw()">1. CARGAR DATOS</button>
    
    <div id="raw-map" style="display:none; margin-top:15px">
        <select id="s-coo" style="width:100%; padding:10px; margin-bottom:8px; background:#0d1117; color:white; border:1px solid var(--border)"></select>
        <select id="s-nom" style="width:100%; padding:10px; margin-bottom:8px; background:#0d1117; color:white; border:1px solid var(--border)"></select>
        <select id="s-img" style="width:100%; padding:10px; margin-bottom:15px; background:#0d1117; color:white; border:1px solid var(--border)"></select>
        <button class="pop-btn" onclick="inyectarDatos()">2. INYECTAR AL MAPA</button>
    </div>
    <button class="pop-btn" style="background:var(--danger); margin-top:10px" onclick="cerrar('m-csv')">Cerrar</button>
</div>

<div id="m-capa" class="modal glass ui">
    <h3>Nuevo Sector</h3>
    <input type="text" id="n-capa" style="width:100%; padding:10px; background:#0d1117; color:white; border:1px solid var(--border)" placeholder="Nombre del bloque">
    <button class="pop-btn" onclick="crearBloque()">Crear</button>
    <button class="pop-btn" style="background:#333; margin-top:10px" onclick="cerrar('m-capa')">Cancelar</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    
    let STORE = {}; let activeId = null; let rawData = [];

    const getIcon = (c) => L.divIcon({ html: `<i class="fas fa-map-marker-alt" style="color:${c}; font-size:26px; text-shadow: 0 0 3px #000"></i>`, className: 'c-pin', iconSize: [26, 26], iconAnchor: [13, 26], popupAnchor: [0, -20] });
    const drawM = new L.Draw.Marker(map, { icon: getIcon('#00f2ff') });
    const drawP = new L.Draw.Polygon(map, { shapeOptions: { color: '#00f2ff' } });

    function enableTool(t) { resetTool(); if(!activeId) return alert("Crea un Bloque primero"); t==='marker'?drawM.enable():drawP.enable(); document.getElementById('btn-'+(t==='marker'?'mark':'poly')).classList.add('active'); }
    function resetTool() { drawM.disable(); drawP.disable(); document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-select').classList.add('active'); }

    map.on(L.Draw.Event.CREATED, (e) => {
        const l = e.layer; STORE[activeId].group.addLayer(l);
        const it = { id: l._leaflet_id, name: "Nuevo Contribuyente", desc: "", color: "#00f2ff", type: e.layerType, img: "" };
        STORE[activeId].items.push(it); configIt(activeId, it.id); renderSide(); resetTool();
    });

    function configIt(bid, iid) {
        const it = STORE[bid].items.find(x => x.id === iid);
        const l = STORE[bid].group.getLayer(iid);
        if(l.setIcon) l.setIcon(getIcon(it.color)); else l.setStyle({ color: it.color, fillColor: it.color });
        
        const imgTag = it.img ? `<img src="${it.img}" class="img-visor" onerror="this.style.display='none'">` : "";
        l.bindPopup(`
            <div class="pop-card">
                ${imgTag}
                <label>NOMBRE / RIF:</label><input type="text" id="en-${iid}" value="${it.name}">
                <label>OBSERVACIONES:</label><textarea id="ed-${iid}" rows="2">${it.desc || ""}</textarea>
                <label>ESTADO (COLOR):</label><input type="color" id="ec-${iid}" value="${it.color}">
                <button class="pop-btn" onclick="saveIt('${bid}', ${iid})">ACTUALIZAR DATOS</button>
            </div>
        `);
    }

    window.saveIt = (bid, iid) => {
        const it = STORE[bid].items.find(x => x.id === iid);
        it.name = document.getElementById(`en-${iid}`).value;
        it.desc = document.getElementById(`ed-${iid}`).value;
        it.color = document.getElementById(`ec-${iid}`).value;
        configIt(bid, iid); renderSide(); STORE[bid].group.getLayer(iid).closePopup();
    };

    async function procesoRaw() {
        let url = document.getElementById('csv-url').value;
        if(url.includes('/edit')) url = url.replace(/\/edit.*$/, '/export?format=csv');
        try {
            const res = await fetch(url);
            const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
            const headers = rows[0];
            rawData = [];
            for(let i=1; i<rows.length; i++) { if(rows[i].length >= headers.length) { let obj = {}; headers.forEach((h, idx) => obj[h] = rows[i][idx]); rawData.push(obj); } }
            let opts = ""; headers.forEach(h => opts += `<option value="${h}">${h}</option>`);
            document.getElementById('s-coo').innerHTML = `<option>-- Columna GPS --</option>` + opts;
            document.getElementById('s-nom').innerHTML = `<option>-- Columna Nombre --</option>` + opts;
            document.getElementById('s-img').innerHTML = `<option value="">-- Sin Foto --</option>` + opts;
            document.getElementById('raw-map').style.display = 'block';
        } catch (e) { alert("Error RAW."); }
    }

    function inyectarDatos() {
        const bid = 'b'+Date.now(); const grp = new L.FeatureGroup().addTo(map);
        const cCol = document.getElementById('s-coo').value; const nCol = document.getElementById('s-nom').value; const iCol = document.getElementById('s-img').value;
        const its = [];
        rawData.forEach(row => {
            if(row[cCol]) {
                let p = row[cCol].replace(/[A-Za-z()]/g, '').trim().split(/[, ]+/);
                let lat = parseFloat(p[0]), lon = parseFloat(p[1]);
                if(!isNaN(lat)) {
                    const m = L.marker([lat, lon]); grp.addLayer(m);
                    its.push({ id: m._leaflet_id, name: row[nCol] || "Local", desc: "Cargado RAW", color: "#fbbc04", img: row[iCol] || "", type: 'marker' });
                }
            }
        });
        STORE[bid] = { name: "Sector " + new Date().toLocaleTimeString(), items: its, group: grp, visible: true };
        activeId = bid; its.forEach(it => configIt(bid, it.id));
        renderSide(); cerrar('m-csv');
    }

    function toggleCapa(id) {
        STORE[id].visible = !STORE[id].visible;
        if(STORE[id].visible) map.addLayer(STORE[id].group); else map.removeLayer(STORE[id].group);
        renderSide();
    }

    function borrarCapa(id) {
        if(confirm("¿Eliminar este bloque completo?")) {
            map.removeLayer(STORE[id].group);
            delete STORE[id];
            if(activeId === id) activeId = null;
            renderSide();
        }
    }

    function renderSide() {
        const box = document.getElementById('list-container'); box.innerHTML = "";
        for(let id in STORE) {
            let h = `<div class="b-card ${id===activeId?'active-b':''}">
                <div class="b-head">
                    <input type="checkbox" ${STORE[id].visible?'checked':''} onclick="toggleCapa('${id}')">
                    <span onclick="activeId='${id}';renderSide()">📁 ${STORE[id].name}</span>
                    <i class="fas fa-trash" style="color:var(--danger); cursor:pointer; font-size:12px" onclick="borrarCapa('${id}')"></i>
                </div>
                <div style="display:${id===activeId?'block':'none'}">`;
            STORE[id].items.forEach(it => {
                h += `<div class="item-row" onclick="foc('${id}',${it.id})">
                    <div style="width:8px; height:8px; border-radius:50%; background:${it.color}"></div>
                    <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${it.name}</span>
                </div>`;
            });
            box.insertAdjacentHTML('beforeend', h+'</div></div>');
        }
    }

    function filtrarTodo() {
        const q = document.getElementById('main-search').value.toLowerCase();
        document.querySelectorAll('.item-row').forEach(el => {
            el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
        });
    }

    function foc(bid, iid) { const l = STORE[bid].group.getLayer(iid); map.setView(l.getLatLng ? l.getLatLng() : l.getBounds().getCenter(), 19); l.openPopup(); }
    function exportarConfig() { /* Lógica de descarga JSON estándar */ }
    function abrir(id) { document.getElementById(id).style.display = 'block'; }
    function cerrar(id) { document.getElementById(id).style.display = 'none'; }
    function crearBloque() { 
        const n = document.getElementById('n-capa').value; if(!n) return;
        const id = 'b'+Date.now(); STORE[id] = { name: n, items: [], group: new L.FeatureGroup().addTo(map), visible: true };
        activeId = id; renderSide(); cerrar('m-capa');
    }
</script>
</body>
</html>
