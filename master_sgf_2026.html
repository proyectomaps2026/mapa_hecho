<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGF HACIENDA AYACUCHO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        :root { --am: #ffcc00; --rj: #e60000; --vd: #007a33; --dk: #0f172a; }
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #020617; color: white; }
        #map { flex: 1; z-index: 1; }
        .leaflet-control-attribution { display: none !important; }

        /* REPARO IDENTIDAD */
        .brand { 
            position: absolute; top: 15px; right: 60px; z-index: 1000; 
            background: rgba(15,23,42,0.9); padding: 12px 20px; border-radius: 5px;
            border-right: 5px solid var(--am); color: var(--am); font-weight: 900;
        }

        /* SIDEBAR CON TRICOLOR */
        #sidebar { width: 420px; background: var(--dk); display: flex; flex-direction: column; border-left: 1px solid #334155; }
        .header { padding: 30px; text-align: center; border-bottom: 5px solid; border-image: linear-gradient(to right, var(--am) 33%, var(--rj) 33% 66%, var(--vd) 66%) 1; }
        .content { flex: 1; overflow-y: auto; padding: 20px; }

        .layer-card { background: #1e293b; border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px solid #334155; }
        .cloud-input { width: 100%; padding: 10px; background: #020617; border: 1px solid #475569; color: white; border-radius: 5px; margin: 10px 0; font-size: 11px; }
        
        .btn { cursor: pointer; border: none; font-weight: bold; border-radius: 5px; padding: 10px; }
        .btn-main { width: 100%; background: var(--am); color: black; margin-bottom: 15px; }
        .btn-tool { background: #334155; color: white; font-size: 10px; width: 48%; }
        .btn-draw { width: 100%; margin-top: 10px; border: 1px solid var(--am); background: transparent; color: var(--am); }
        .btn-draw.active { background: var(--rj); color: white; }

        .pop-h { background: #f1f5f9; padding: 8px; font-weight: bold; border-bottom: 3px solid var(--vd); color: black; }
        .pop-b { padding: 8px; color: black; font-size: 11px; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="brand">HACIENDA MUNICIPAL AYACUCHO</div>

<aside id="sidebar">
    <div class="header">
        <h2 style="margin:0; font-size:18px">GESTIÓN FISCAL MASTER</h2>
        <small style="color:var(--am)">ADMINISTRACIÓN DE CAPAS</small>
    </div>
    <div class="content">
        <button class="btn btn-main" onclick="addLayer()">+ VINCULAR GOOGLE SHEETS</button>
        <div id="layers"></div>
    </div>
</aside>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
    let DB = {}; let DRAW_TOOL = null; let ACTIVE_LID = null;

    // MAPAS REPARADOS (ACCESO DIRECTO)
    const sat = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20 });
    const str = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20 });

    const map = L.map('map', { center: [8.033, -72.256], zoom: 15, layers: [sat], zoomControl: false });
    L.control.layers({ "Satélite": sat, "Calles": str }, null, { position: 'topright' }).addTo(map);

    function addLayer() {
        const n = prompt("Nombre:"); if(!n) return;
        const id = 'L'+Date.now();
        DB[id] = { name: n, group: L.featureGroup().addTo(map), url: '', data: [], drawing: false };
        render();
    }

    function render() {
        const div = document.getElementById('layers'); div.innerHTML = "";
        Object.keys(DB).forEach(id => {
            const l = DB[id];
            div.innerHTML += `<div class="layer-card">
                <div style="display:flex; justify-content:space-between"><b>${l.name}</b><i onclick="del('${id}')" style="cursor:pointer">✕</i></div>
                <input type="text" class="cloud-input" placeholder="Pegar URL..." onchange="updUrl('${id}', this.value)" value="${l.url}">
                <div style="display:flex; justify-content:space-between">
                    <button class="btn btn-tool" onclick="load('${id}')">CARGAR</button>
                    <button class="btn btn-tool" onclick="alert('Config Ficha Proximamente')">FICHA</button>
                </div>
                <button class="btn btn-draw ${l.drawing?'active':''}" onclick="draw('${id}')">${l.drawing?'LISTO':'DIBUJAR SECTOR'}</button>
            </div>`;
        });
    }

    function updUrl(id, u) { if(u.includes('/edit')) u = u.split('/edit')[0]+'/export?format=csv'; DB[id].url = u; }

    function load(id) {
        Papa.parse(DB[id].url, { download: true, header: true, complete: r => {
            DB[id].data = r.data; plot(id);
        }});
    }

    function plot(id) {
        const l = DB[id]; l.group.clearLayers();
        l.data.forEach(row => {
            const lat = parseFloat(row.Latitud || row.lat);
            const lon = parseFloat(row.Longitud || row.lon);
            if(!isNaN(lat)) {
                const c = (row.Estatus||"").toUpperCase().includes("MORA") ? "#e60000" : "#007a33";
                const p = L.circleMarker([lat, lon], { radius: 6, color: '#fff', weight: 1, fillColor: c, fillOpacity: 0.9 });
                p.bindPopup(`<div class="pop-h">${row.Nombre||'Local'}</div><div class="pop-b">RIF: ${row.RIF||'N/A'}<br>Estado: ${row.Estatus||'S/D'}</div>`);
                l.group.addLayer(p);
            }
        });
    }

    function draw(id) {
        if(DB[id].drawing) { map.removeControl(DRAW_TOOL); DB[id].drawing = false; }
        else { 
            ACTIVE_LID = id; DB[id].drawing = true;
            DRAW_TOOL = new L.Control.Draw({ draw: { polyline: false, circle: false, marker: false, circlemarker: false } });
            map.addControl(DRAW_TOOL);
        }
        render();
    }

    map.on(L.Draw.Event.CREATED, e => {
        const n = prompt("Nombre Sector:"); if(!n) return;
        const ly = e.layer; ly.options.name = n; ly.options.color = "#ffcc00";
        DB[ACTIVE_LID].group.addLayer(ly);
        const poly = ly.toGeoJSON(); let count = 0;
        Object.keys(DB).forEach(id => {
            DB[id].group.eachLayer(m => { if(m instanceof L.CircleMarker && turf.booleanPointInPolygon(m.toGeoJSON(), poly)) count++; });
        });
        ly.bindPopup("<b>"+n+"</b><br>Censo: "+count);
        draw(ACTIVE_LID);
    });

    function del(id) { map.removeLayer(DB[id].group); delete DB[id]; render(); }
</script>
</body>
</html>
