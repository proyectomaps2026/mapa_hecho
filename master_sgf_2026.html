<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGF - PRUEBA 1: IMÁGENES LOCALES</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: sans-serif; background: #0b0e14; color: white; }
        #map { height: 100vh; width: 100%; }
        .pop-card { color: #333; min-width: 200px; }
        .img-preview { width: 100%; max-height: 150px; object-fit: cover; border-radius: 5px; margin-top: 10px; border: 1px solid #ccc; display: none; }
        .btn-upload { background: #1a73e8; color: white; border: none; padding: 8px; width: 100%; border-radius: 4px; cursor: pointer; margin-top: 5px; font-weight: bold; }
        .ui-info { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid #00f2ff; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="ui-info">
    <b>PRUEBA 1:</b> Cargue una foto en la pincheta <br>
    y verifique que se mantenga al recargar.
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([8.02611, -72.25244], 17);
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {subdomains:['mt0','mt1','mt2','mt3']}).addTo(map);

    let DATA = JSON.parse(localStorage.getItem('PRUEBA_FOTOS')) || {};

    // Pincheta de prueba
    const marker = L.marker([8.02611, -72.25244]).addTo(map);
    
    function updatePopup() {
        const stored = DATA["test_local"] || { name: "Local de Prueba", img: "" };
        const displayImg = stored.img ? `display:block` : `display:none`;
        
        marker.bindPopup(`
            <div class="pop-card">
                <b>${stored.name}</b><br>
                <img src="${stored.img}" id="prev" class="img-preview" style="${displayImg}">
                <label style="font-size:10px; display:block; margin-top:10px">FOTO DEL LOCAL:</label>
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="processFile(this)">
                <button class="btn-upload" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-camera"></i> SELECCIONAR FOTO
                </button>
            </div>
        `).openPopup();
    }

    window.processFile = function(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result;
                // Guardar en nuestra "base de datos" temporal
                DATA["test_local"] = { name: "Local de Prueba", img: base64 };
                localStorage.setItem('PRUEBA_FOTOS', JSON.stringify(DATA));
                
                // Actualizar la vista previa al momento
                const img = document.getElementById('prev');
                img.src = base64;
                img.style.display = 'block';
                alert("¡Imagen guardada localmente!");
            };
            reader.readAsDataURL(input.files[0]);
        }
    };

    marker.on('click', updatePopup);
    updatePopup();

</script>
</body>
</html>
