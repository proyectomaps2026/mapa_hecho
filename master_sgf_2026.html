<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF MASTER V9 | AYACUCHO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --amarillo: #ffcc00; --rojo: #e60000; --verde: #007a33;
            --dark: #020617; --panel: #0f172a; --accent: #fbbf24;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: #fff; height: 100vh; overflow: hidden; }

        .layout { display: flex; height: 100vh; width: 100vw; position: relative; }
        #map { flex: 1; z-index: 1; background: #000; }

        /* Cuadro de Identidad Limpio */
        .brand-box { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: rgba(15, 23, 42, 0.9); padding: 15px 25px; border-radius: 8px;
            border-left: 6px solid var(--amarillo); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .brand-box b { font-size: 18px; display: block; }
        .brand-box span { font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase; }

        .search-engine { 
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; 
            width: 400px; background: #fff; border-radius: 50px; padding: 10px 25px;
            display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .search-engine input { border: none; outline: none; flex: 1; font-weight: 700; color: #000; }

        #sidebar { 
            width: 420px; background: var(--panel); border-left: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; z-index: 100;
        }
        .sidebar-header { 
            padding: 30px; text-align: center; border-bottom: 4px solid transparent;
            border-image: linear-gradient(to right, var(--amarillo) 33%, var(--rojo) 33% 66%, var(--verde) 66%) 1;
        }

        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; }

        .btn { 
            width: 100%; padding: 15px; border-radius: 10px; border: none; cursor: pointer;
            font-weight: 800; font-size: 11px; text-transform: uppercase; margin-bottom: 20px;
        }
        .btn-gold { background: var(--accent); color: #000; }

        .layer-card { background: #1e293b; border-radius: 15px; margin-bottom: 20px; overflow: hidden; }
        .layer-head { padding: 15px; background: rgba(0,0,0,0.2); display: flex; justify-content: space-between; font-weight: 800; color: var(--accent); }
        .layer-ops { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-tool { padding: 10px; font-size: 9px; background: #334155; color: #fff; border-radius: 5px; font-weight: 700; }
        .btn-draw-active { grid-column: span 2; border: 1px solid var(--accent); background: transparent; color: var(--accent); }
        .btn-draw-active.active { background: var(--rojo); color: #fff; }

        /* Ficha Técnica (REPARADA) */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; display: none; }
        .modal-panel { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--panel); width: 400px; padding: 30px; border-radius: 20px; 
            z-index: 1000; border: 1px solid var(--accent); display: none;
        }
        .field-row { display: flex; align-items: center; background: #020617; padding: 12px; margin: 8px 0; border-radius: 8px; }
        .field-row input { margin-right: 15px; }

        /* Popup */
        .pop-box { width: 280px; color: #000; }
        .pop-title { background: #f1f5f9; padding: 12px; font-weight: 900; border-bottom: 3px solid var(--verde); }
        .pop-data { padding: 12px; font-size: 12px; }
        .pop-line { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 4px 0; }
    </style>
</head>
<body>

<div class="layout">
    <div id="map"></div>

    <div class="brand-box">
        <b>HACIENDA AYACUCHO</b>
        <span>MONITOREO FISCAL</span>
    </div>

    <div class="search-engine">
        <span style="margin-right:10px">🔍</span>
        <input type="text" id="omni-search" placeholder="Buscar RIF o Nombre..." onkeyup="runSearch()">
    </div>

    <aside id="sidebar">
        <header class="sidebar-header">
            <h1 style="font-weight:900; font-size:22px">SGF MASTER</h1>
            <p style="font-size:10px; color:var(--accent); letter-spacing:2px">SAN JUAN DE COLÓN</p>
        </header>
        <div class="scroll-area">
            <button class="btn btn-gold" onclick="addLayer()">+ NUEVA CAPA FISCAL</button>
            <div id="layer-list"></div>
        </div>
    </aside>
</div>

<div class="modal-overlay" id="overlay" onclick="closeModals()"></div>
<div class="modal-panel" id="modal-ficha">
    <h3>Configurar Ficha</h3>
    <div id="ficha-list" style="max-height:300px; overflow-y:auto; margin-top:15px"></div>
    <button class="btn btn-gold" style="margin-top:20px" onclick="saveFicha()">APLICAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
    let DB = {};
    let STATE = { lid: null, drawCtrl: null };

    // 1. Mapa (Google Hybrid Directo)
    const map = L.map('map', { center: [8.03317, -72.25693], zoom: 16, zoomControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3']
    }).addTo(map);

    function addLayer() {
        const name = prompt("Nombre de la Capa:");
        if(!name) return;
        const id = 'L' + Date.now();
        DB[id] = { name: name, group: L.featureGroup().addTo(map), csv: [], config: [], drawing: false };
        renderUI();
    }

    function renderUI() {
        const box = document.getElementById('layer-list');
        box.innerHTML = "";
        Object.keys(DB).forEach(id => {
            const l = DB[id];
            box.innerHTML += `
                <div class="layer-card">
                    <div class="layer-head"><span>${l.name}</span><b onclick="deleteLayer('${id}')" style="cursor:pointer">✕</b></div>
                    <div class="layer-ops">
                        <button class="btn-tool" onclick="importCSV('${id}')">CARGAR CSV</button>
                        <button class="btn-tool" onclick="openFicha('${id}')">CONFIG. FICHA</button>
                        <button class="btn-tool btn-draw-active ${l.drawing?'active':''}" onclick="toggleDraw('${id}')">
                            ${l.drawing ? 'FINALIZAR' : 'DIBUJAR SECTOR'}
                        </button>
                    </div>
                </div>`;
        });
    }

    function importCSV(lid) {
        const input = document.createElement('input'); input.type = 'file'; input.accept = ".csv";
        input.onchange = e => {
            Papa.parse(e.target.files[0], {
                header: true, skipEmptyLines: true,
                complete: r => {
                    DB[lid].csv = r.data;
                    // REPARACIÓN: Mapeo forzado de cabeceras
                    DB[lid].config = Object.keys(r.data[0]).map(f => ({ id: f, on: true }));
                    plotPoints(lid);
                    renderUI();
                }
            });
        };
        input.click();
    }

    function plotPoints(lid) {
        const l = DB[lid];
        l.group.eachLayer(layer => { if(layer instanceof L.CircleMarker) l.group.removeLayer(layer); });

        l.csv.forEach(row => {
            const lat = parseFloat(row.Latitud || row.lat);
            const lon = parseFloat(row.Longitud || row.lon);
            if(isNaN(lat) || isNaN(lon)) return;

            let col = "#3b82f6";
            const s = (row.Estatus || row.Estado || "").toUpperCase();
            if(s.includes("PAGO") || s.includes("VIGENTE")) col = "#10b981";
            if(s.includes("MORA") || s.includes("DEUDA")) col = "#ef4444";

            const p = L.circleMarker([lat, lon], { radius: 7, color: '#fff', weight: 2, fillColor: col, fillOpacity: 1 });
            
            let html = `<div class="pop-box"><div class="pop-title">${row.Nombre || 'Comercio'}</div><div class="pop-data">`;
            l.config.forEach(c => { if(c.on && row[c.id]) html += `<div class="pop-line"><b>${c.id}:</b><span>${row[c.id]}</span></div>`; });
            
            p.bindPopup(html + `</div></div>`);
            l.group.addLayer(p);
        });
    }

    function toggleDraw(lid) {
        if(DB[lid].drawing) {
            map.removeControl(STATE.drawCtrl);
            DB[lid].drawing = false;
        } else {
            STATE.lid = lid;
            DB[lid].drawing = true;
            STATE.drawCtrl = new L.Control.Draw({
                draw: { polygon: true, rectangle: true, circle: false, marker: false, polyline: false }
            });
            map.addControl(STATE.drawCtrl);
        }
        renderUI();
    }

    map.on(L.Draw.Event.CREATED, e => {
        const name = prompt("Nombre del Sector:");
        if(!name) return;
        const layer = e.layer;
        layer.options.name = name;
        DB[STATE.lid].group.addLayer(layer);
        
        // Conteo con Turf
        let count = 0;
        const poly = layer.toGeoJSON();
        DB[STATE.lid].group.eachLayer(l => {
            if(l instanceof L.CircleMarker && turf.booleanPointInPolygon(l.toGeoJSON(), poly)) count++;
        });
        layer.bindPopup(`<b>${name}</b><br>Comercios: ${count}`);
        toggleDraw(STATE.lid);
    });

    function openFicha(lid) {
        STATE.lid = lid;
        const list = document.getElementById('ficha-list');
        list.innerHTML = "";
        DB[lid].config.forEach((c, i) => {
            list.innerHTML += `<div class="field-row"><input type="checkbox" id="f-${i}" ${c.on?'checked':''}><span>${c.id}</span></div>`;
        });
        document.getElementById('overlay').style.display = "block";
        document.getElementById('modal-ficha').style.display = "block";
    }

    function saveFicha() {
        DB[STATE.lid].config.forEach((c, i) => { c.on = document.getElementById(`f-${i}`).checked; });
        plotPoints(STATE.lid);
        closeModals();
    }

    function closeModals() {
        document.getElementById('overlay').style.display = "none";
        document.querySelectorAll('.modal-panel').forEach(m => m.style.display = "none");
    }

    function runSearch() {
        const q = document.getElementById('omni-search').value.toLowerCase();
        Object.keys(DB).forEach(lid => {
            DB[lid].group.eachLayer(l => {
                if(l instanceof L.CircleMarker) {
                    const txt = JSON.stringify(l.getPopup().getContent()).toLowerCase();
                    l.setStyle({ opacity: txt.includes(q)?1:0.1, fillOpacity: txt.includes(q)?1:0.1 });
                }
            });
        });
    }

    function deleteLayer(id) { if(confirm("¿Eliminar capa?")) { map.removeLayer(DB[id].group); delete DB[id]; renderUI(); } }
</script>
</body>
</html>
