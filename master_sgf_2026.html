<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF AYACUCHO v12.8 - PROFESSIONAL EDITION</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0b0e14; --panel: #161b22; --text: #f0f3f6; --border: #30363d; --yellow: #fbbc04; --safe: #238636; --danger: #da3633; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }
        
        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: rgba(22, 27, 34, 0.96); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 12px; }
        
        .hacienda-attr { bottom: 15px; right: 15px; font-size: 11px; color: white; background: rgba(0,0,0,0.85); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border); font-weight: 900; }

        /* Top Nav con Buscador y Herramientas */
        .top-nav { top: 15px; left: 15px; right: 15px; display: flex; gap: 10px; height: 55px; align-items: center; padding: 0 15px; }
        .search-box { flex: 1; max-width: 350px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.4); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border); }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        
        .tool-dock { display: flex; gap: 5px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 10px; border: 1px solid var(--border); }
        .t-btn { background: transparent; border: none; color: #8b949e; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .t-btn.active { color: var(--accent); background: rgba(0,242,255,0.15); border: 1px solid var(--accent); }

        /* Sidebar */
        #sidebar { top: 85px; left: 15px; bottom: 20px; width: 380px; display: flex; flex-direction: column; }
        .side-head { padding: 15px; border-bottom: 1px solid var(--border); border-top: 4px solid var(--yellow); }
        .layer-zone { flex: 1; overflow-y: auto; padding: 10px; }
        .b-card { background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 12px; border: 1px solid var(--border); overflow: hidden; }
        .item-list { border-top: 1px solid var(--border); display: block; max-height: 250px; overflow-y: auto; }
        .item-row { padding: 10px 15px; font-size: 11px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer; }
        
        /* POPUP DOUBLE FACE */
        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 16px; background: white; width: 320px; }
        .pop-card { color: #333; }
        .pop-img-box { position: relative; width: 100%; height: 165px; background: #000; }
        .pop-img { width: 100%; height: 100%; object-fit: cover; }
        .mode-btn { position: absolute; bottom: -20px; right: 20px; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--accent); color: #000; border: 3px solid white; cursor: pointer; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .color-dot { position: absolute; top: 10px; left: 10px; width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; cursor: pointer; overflow: hidden; }
        .color-dot input { opacity: 0; cursor: pointer; }

        .pop-body { padding: 25px 15px 15px; max-height: 280px; overflow-y: auto; }
        .field-row { margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .v-lab { font-size: 9px; color: #999; font-weight: 800; text-transform: uppercase; flex: 1; }
        .v-val { font-size: 12px; color: #222; font-weight: 600; text-align: right; border: none; background: transparent; width: 60%; }
        .eye-btn { cursor: pointer; font-size: 12px; color: #ccc; }
        .eye-btn.active { color: var(--accent); }

        .pop-save { background: var(--safe); color: white; border: none; width: 100%; padding: 12px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="hacienda-attr ui"><i class="fas fa-landmark"></i> HACIENDA AYACUCHO 2026</div>

<div class="ui top-nav glass">
    <div class="search-box">
        <i class="fas fa-search" style="color:var(--accent)"></i>
        <input type="text" id="main-search" placeholder="Buscar contribuyente..." oninput="filtrarTodo()">
    </div>
    <div class="tool-dock">
        <button class="t-btn active" onclick="resetTool()"><i class="fas fa-mouse-pointer"></i></button>
        <button class="t-btn" onclick="enableTool('marker')"><i class="fas fa-map-marker-alt"></i></button>
        <button class="t-btn" onclick="enableTool('poly')"><i class="fas fa-draw-polygon"></i></button>
    </div>
    <button class="glass" style="color:var(--yellow); padding:0 15px; cursor:pointer; font-size:11px" onclick="abrirModal('m-csv')">IMPORTAR RAW</button>
</div>

<aside id="sidebar" class="glass ui">
    <div class="side-head">
        <h2 style="margin:0; font-size:13px; letter-spacing:1px">MOTOR FISCAL v12.8</h2>
    </div>
    <div class="layer-zone" id="list-container"></div>
</aside>

<div id="m-csv" class="glass ui" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:320px; padding:25px; display:none; z-index:2000">
    <h3 style="margin:0 0 15px">Cargar Excel</h3>
    <input type="text" id="csv-url" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:white; border:1px solid var(--border)" placeholder="URL Google Sheets">
    <button class="pop-save" onclick="analizarExcel()">ANALIZAR</button>
    <div id="config-raw" style="display:none; margin-top:15px">
        <label style="font-size:10px">Ubicación:</label><select id="sel-coo" style="width:100%; margin-bottom:10px"></select>
        <label style="font-size:10px">Foto:</label><select id="sel-img" style="width:100%; margin-bottom:15px"></select>
        <button class="pop-save" style="background:var(--accent); color:#000" onclick="inyectarTodo()">INYECTAR</button>
    </div>
    <button class="pop-save" style="background:var(--danger); margin-top:10px" onclick="cerrarModal('m-csv')">CERRAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false, attributionControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    let STORE = {}; let allCols = []; let activeId = null;

    const getIcon = (color) => L.divIcon({ 
        html: `<i class="fas fa-map-marker-alt" style="color:${color}; font-size:28px; text-shadow: 0 0 5px #000"></i>`, 
        className: 'c-pin', iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -25] 
    });

    // Herramientas
    const drawM = new L.Draw.Marker(map, { icon: getIcon('#00f2ff') });
    const drawP = new L.Draw.Polygon(map, { shapeOptions: { color: '#00f2ff' } });
    function enableTool(t) { resetTool(); if(!activeId) return; t==='marker'?drawM.enable():drawP.enable(); }
    function resetTool() { drawM.disable(); drawP.disable(); }

    map.on(L.Draw.Event.CREATED, (e) => {
        const l = e.layer; l.options.draggable = true;
        STORE[activeId].group.addLayer(l);
        const it = { lid: l._leaflet_id, data: {"Contribuyente": "Nuevo"}, ocultos: [], img: "", color: "#00f2ff" };
        STORE[activeId].items.push(it); renderPanel(); abrirPopup(activeId, it.lid, 'edicion');
    });

    // POPUP v12.8
    function abrirPopup(bid, lid, modo = 'vista') {
        const it = STORE[bid].items.find(x => x.lid === lid);
        const l = STORE[bid].group.getLayer(lid);
        const capa = STORE[bid];

        let pinColor = it.color || '#00f2ff';
        if(capa.semCol && it.data[capa.semCol] && !it.manualColor) {
            const v = it.data[capa.semCol].toUpperCase();
            if(v.includes('DEUDA') || v.includes('VENCID')) pinColor = '#da3633';
            else if(v.includes('DIA') || v.includes('PAGO')) pinColor = '#238636';
        }
        if(l.setIcon) l.setIcon(getIcon(pinColor));

        let html = `<div class="pop-card">
            <div class="pop-img-box">
                <img src="${it.img}" class="pop-img" onerror="this.src='https://via.placeholder.com/320x160?text=FOTO+HACIENDA'">
                <div class="color-dot" style="background:${pinColor}"><input type="color" onchange="upCol('${bid}',${lid},this.value)"></div>
                <div class="mode-btn" onclick="abrirPopup('${bid}',${lid},'${modo==='vista'?'edicion':'vista'}')"><i class="fas ${modo==='vista'?'fa-edit':'fa-eye'}"></i></div>
            </div>
            <div class="pop-body">`;

        for(let key in it.data) {
            const isHidden = it.ocultos && it.ocultos.includes(key);
            if(modo === 'vista') {
                if(!isHidden) html += `<div class="field-row"><span class="v-lab">${key}</span><span class="v-val">${it.data[key]}</span></div>`;
            } else {
                html += `<div class="field-row">
                    <i class="fas ${isHidden?'fa-eye-slash':'fa-eye'} eye-btn ${!isHidden?'active':''}" onclick="toggleOjo('${bid}',${lid},'${key}')"></i>
                    <span class="v-lab">${key}</span>
                    <input type="text" class="v-val" style="background:#f4f4f4; padding:2px 5px; border-radius:4px" value="${it.data[key]}" onchange="upData('${bid}',${lid},'${key}',this.value)">
                </div>`;
            }
        }
        
        // El link de la cámara (Cloudinary) solo aparece en edición para no exponerlo
        if(modo === 'edicion') {
            html += `<div class="field-row" style="background:#fff2cc; padding:5px"><i class="fas fa-camera"></i><input type="text" style="font-size:10px; width:100%; border:none; background:transparent" value="${it.img}" onchange="upImg('${bid}',${lid},this.value)" placeholder="Pegar Link Cloudinary"></div>`;
            html += `<button class="pop-save" style="background:var(--danger); margin-top:10px" onclick="eliminarPunto('${bid}',${lid})">ELIMINAR PUNTO</button>`;
        }

        html += `</div><button class="pop-save" onclick="STORE['${bid}'].group.getLayer(${lid}).closePopup()">CERRAR</button></div>`;
        l.bindPopup(html, { padding: [0,0] }).openPopup();
    }

    function upData(bid, lid, k, v) { STORE[bid].items.find(x => x.lid === lid).data[k] = v; renderPanel(); }
    function upImg(bid, lid, v) { STORE[bid].items.find(x => x.lid === lid).img = v; abrirPopup(bid, lid, 'edicion'); }
    function upCol(bid, lid, v) { const it = STORE[bid].items.find(x => x.lid === lid); it.color = v; it.manualColor = true; abrirPopup(bid, lid, 'vista'); }
    function toggleOjo(bid, lid, k) {
        const it = STORE[bid].items.find(x => x.lid === lid);
        if(!it.ocultos) it.ocultos = [];
        it.ocultos.includes(k) ? it.ocultos = it.ocultos.filter(x => x !== k) : it.ocultos.push(k);
        abrirPopup(bid, lid, 'edicion');
    }

    function renderPanel() {
        const cont = document.getElementById('list-container'); cont.innerHTML = "";
        for(let id in STORE) {
            const capa = STORE[id];
            let opts = allCols.map(c => `<option value="${c}" ${capa.viewCol===c?'selected':''}>Ver: ${c}</option>`).join('');
            let h = `<div class="b-card active-b">
                <div class="side-head" style="display:flex; justify-content:space-between; align-items:center">
                    <input type="text" value="${capa.name}" onchange="STORE['${id}'].name=this.value" style="background:transparent; border:none; color:white; font-weight:800; font-size:12px">
                    <i class="fas fa-trash-alt" style="color:var(--danger); cursor:pointer" onclick="borrarCapa('${id}')"></i>
                </div>
                <select onchange="STORE['${id}'].viewCol=this.value;renderPanel()" style="width:90%; margin:5px 5%">${opts}</select>
                <div class="item-list">`;
            capa.items.forEach(it => {
                h += `<div class="item-row" onclick="irA('${id}',${it.lid},'vista')">
                    <span>${it.data[capa.viewCol] || 'S/N'}</span>
                    <i class="fas fa-edit" style="color:var(--accent)" onclick="event.stopPropagation(); irA('${id}',${it.lid},'edicion')"></i>
                </div>`;
            });
            cont.insertAdjacentHTML('beforeend', h + `</div></div>`);
        }
    }

    async function analizarExcel() {
        let url = document.getElementById('csv-url').value;
        if(url.includes('/edit')) url = url.replace(/\/edit.*$/, '/export?format=csv');
        try {
            const res = await fetch(url); const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
            allCols = rows[0]; rawData = [];
            for(let i=1; i<rows.length; i++) { if(rows[i].length >= allCols.length) { let obj = {}; allCols.forEach((k, idx) => obj[k] = rows[i][idx]); rawData.push(obj); } }
            document.getElementById('sel-coo').innerHTML = allCols.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-img').innerHTML = allCols.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('config-raw').style.display = 'block';
        } catch (e) { alert("Error en Google Sheets"); }
    }

    function inyectarTodo() {
        const bid = 'b'+Date.now(); const grp = new L.FeatureGroup().addTo(map);
        const cCol = document.getElementById('sel-coo').value, iCol = document.getElementById('sel-img').value;
        const its = [];
        rawData.forEach(row => {
            const p = row[cCol].replace(/[A-Za-z()]/g, '').trim().split(/[, ]+/);
            const lat = parseFloat(p[0]), lng = parseFloat(p[1]);
            if(!isNaN(lat)) {
                const m = L.marker([lat, lng], { draggable: true });
                m.on('click', () => abrirPopup(bid, m._leaflet_id, 'vista'));
                grp.addLayer(m);
                its.push({ lid: m._leaflet_id, data: {...row}, ocultos: [], img: row[iCol], color: '#00f2ff' });
            }
        });
        STORE[bid] = { name: "Sector Nuevo", items: its, group: grp, viewCol: allCols[0], semCol: allCols[0] };
        activeId = bid; renderPanel(); cerrarModal('m-csv');
    }

    function irA(bid, lid, modo) { const l = STORE[bid].group.getLayer(lid); map.setView(l.getLatLng(), 19); abrirPopup(bid, lid, modo); }
    function eliminarPunto(bid, lid) { if(confirm("¿Eliminar punto?")) { STORE[bid].group.removeLayer(lid); STORE[bid].items = STORE[bid].items.filter(x => x.lid !== lid); renderPanel(); map.closePopup(); } }
    function borrarCapa(id) { if(confirm("¿Eliminar sector completo?")) { map.removeLayer(STORE[id].group); delete STORE[id]; renderPanel(); } }
    function filtrarTodo() { const q = document.getElementById('main-search').value.toLowerCase(); document.querySelectorAll('.item-row').forEach(el => el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none'); }
    function abrirModal(id) { document.getElementById(id).style.display = 'block'; }
    function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
