<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF MASTER PRO - Hacienda Ayacucho</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #1e40af; --dark: #0f172a; --panel: #1e293b; 
            --accent: #f59e0b; --text: #f8fafc; --success: #22c55e; --danger: #ef4444;
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* --- MAPA Y BUSCADOR (Punto 4 y 7) --- */
        #map { flex: 1; z-index: 1; outline: none; }

        .search-container { 
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; width: 450px; background: white; border-radius: 30px;
            display: flex; align-items: center; padding: 5px 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid #e2e8f0;
        }
        .search-container input { flex: 1; border: none; padding: 12px; outline: none; font-size: 15px; color: #1e293b; font-weight: 500; }
        .search-container span { color: #64748b; font-size: 18px; }

        /* --- SIDEBAR PROFESIONAL (Punto 1 y 4) --- */
        #sidebar { width: 420px; background: var(--panel); border-left: 1px solid #334155; display: flex; flex-direction: column; z-index: 2; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        
        .header-brand { padding: 20px; background: var(--primary); border-bottom: 4px solid #3b82f6; text-align: center; }
        .header-brand h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; }
        .header-brand p { margin: 5px 0 0; font-size: 11px; opacity: 0.9; font-weight: 400; letter-spacing: 2px; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }

        /* --- CAPAS Y ELEMENTOS (My Maps Style - Foto a228eaea) --- */
        .layer-card { background: #1e293b; border-radius: 12px; margin-bottom: 15px; border: 1px solid #475569; overflow: hidden; transition: 0.3s; }
        .layer-header { padding: 12px 18px; background: #0f172a; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .layer-header strong { font-size: 14px; color: var(--accent); }

        .layer-tools { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px; background: #2d3748; }
        .btn-tool { background: #475569; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-tool:hover { background: #64748b; }
        .btn-tool.active { background: var(--danger); animation: pulse 1.5s infinite; }

        .elements-list { list-style: none; padding: 0; margin: 0; background: #1e293b; }
        .group-title { padding: 8px 18px; font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: 700; background: #0f172a; border-top: 1px solid #334155; }
        .element-item { display: flex; align-items: center; padding: 10px 20px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #2d3748; }
        .element-item:hover { background: #334155; }
        .element-color { width: 14px; height: 14px; border-radius: 3px; border: 1px solid white; margin-right: 12px; }
        .element-name { font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- MODALES Y EDITORES (Punto 5 y 6) --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9998; display: none; backdrop-filter: blur(4px); }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel); z-index: 9999; width: 400px; padding: 25px; border-radius: 16px; border: 2px solid var(--accent); display: none; box-shadow: 0 0 50px rgba(0,0,0,1); }
        
        .field-row { display: flex; align-items: center; background: #0f172a; padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: grab; }
        .style-picker { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; }
        .color-opt { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; cursor: pointer; }

        /* --- LIMPIEZA DE CUADROS BLANCOS (Punto 2) --- */
        .leaflet-editing-icon { 
            width: 8px !important; height: 8px !important; 
            margin-left: -4px !important; margin-top: -4px !important; 
            border-radius: 50% !important; background: var(--accent) !important; 
            border: 2px solid white !important; box-shadow: 0 0 5px black;
        }
        .leaflet-draw-guide-dash { display: none; }

        /* --- POPUPS E IMÁGENES (Punto 8) --- */
        .pop-card { min-width: 280px; font-family: 'Inter', sans-serif; }
        .pop-img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px 12px 0 0; }
        .pop-content { padding: 15px; color: #1e293b; }
        .pop-title { font-size: 16px; font-weight: 800; color: var(--primary); margin-bottom: 8px; border-bottom: 2px solid var(--accent); padding-bottom: 4px; }
        .pop-stat { font-size: 12px; margin: 4px 0; display: flex; justify-content: space-between; }

        .btn-main { width: 100%; padding: 14px; background: var(--accent); color: var(--dark); border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="mapSearch" placeholder="Buscar comercios, RIF o Bloques de expansión...">
    <span>🔍</span>
</div>

<div id="map"></div>

<div id="sidebar">
    <div class="header-brand">
        <h1>SGF MASTER PRO</h1>
        <p>Hacienda Municipal Ayacucho • V. 2026.4</p>
    </div>
    
    <div class="scroll-area">
        <button class="btn-main" onclick="createNewLayer()">📂 NUEVA CAPA DE TRABAJO</button>
        <div id="layers-list" style="margin-top: 20px;"></div>

        <div class="layer-card" style="margin-top: 30px; border-color: var(--success);">
            <div class="layer-header" style="background: var(--success);">
                <strong style="color: white;">AIRTABLE BRIDGE</strong>
            </div>
            <div style="padding: 15px;">
                <input type="password" id="ghToken" placeholder="GitHub Personal Token" style="width:100%; background:#0f172a; border:none; color:white; padding:10px; margin-bottom:10px; border-radius:6px;">
                <button class="btn-main" style="background: var(--success); color: white;" onclick="triggerSync()">SINCRONIZAR SERVIDOR</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="overlay" onclick="closeModals()"></div>

<div id="ficha-modal" class="modal">
    <h3 style="margin:0 0 15px 0; color:var(--accent);">Configuración de Ficha</h3>
    <div id="sortable-fields"></div>
    <button class="btn-main" style="margin-top:20px" onclick="saveFichaConfig()">GUARDAR CAMBIOS</button>
</div>

<div id="element-modal" class="modal">
    <h3 style="margin:0 0 10px 0; color:var(--accent);">Editar Propiedades</h3>
    <label style="font-size:12px; color:#94a3b8;">Nombre del Elemento:</label>
    <input type="text" id="edit-name" style="width:100%; padding:10px; background:#0f172a; border:1px solid #475569; color:white; border-radius:6px; margin:8px 0 15px 0;">
    
    <label style="font-size:12px; color:#94a3b8;">Color de Identidad:</label>
    <div class="style-picker">
        <div class="color-opt" style="background:#f59e0b" onclick="setEditColor('#f59e0b')"></div>
        <div class="color-opt" style="background:#1e40af" onclick="setEditColor('#1e40af')"></div>
        <div class="color-opt" style="background:#ef4444" onclick="setEditColor('#ef4444')"></div>
        <div class="color-opt" style="background:#22c55e" onclick="setEditColor('#22c55e')"></div>
        <div class="color-opt" style="background:#9333ea" onclick="setEditColor('#9333ea')"></div>
    </div>
    
    <label style="font-size:12px; color:#94a3b8;">Opacidad de Relleno:</label>
    <input type="range" id="edit-opacity" min="0" max="1" step="0.1" style="width:100%; margin:15px 0;">
    
    <button class="btn-main" style="margin-top:10px" onclick="applyElementChanges()">APLICAR ESTILO</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
    // --- NÚCLEO DEL MAPA ---
    const map = L.map('map', { center: [8.03317, -72.25693], zoom: 16, attributionControl: false });
    const satLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { 
        maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] 
    }).addTo(map);

    let layersData = JSON.parse(localStorage.getItem('sgf_layers')) || {};
    let activeLid = null;
    let activeEid = null;
    let selectedColor = '#f59e0b';

    // --- MOTOR DE PERSISTENCIA ---
    function saveAll() {
        const exportData = {};
        Object.keys(layersData).forEach(lid => {
            const l = layersData[lid];
            exportData[lid] = {
                name: l.name,
                config: l.config,
                csvData: l.csvData,
                elements: l.elements.map(e => ({
                    id: e.id, name: e.name, type: e.type, color: e.color, opacity: e.opacity, 
                    geojson: layers[lid].group.getLayer(e.leafletId).toGeoJSON()
                }))
            };
        });
        localStorage.setItem('sgf_layers', JSON.stringify(exportData));
    }

    // --- GESTIÓN DE CAPAS ---
    let layers = {};

    function createNewLayer() {
        const name = prompt("Nombre de la nueva capa (ej: Lotes Plan Piloto):");
        if (!name) return;
        const id = 'layer_' + Date.now();
        layersData[id] = { name, config: [], csvData: [], elements: [] };
        initLayerObject(id);
        renderSidebar();
    }

    function initLayerObject(id) {
        layers[id] = { group: L.featureGroup().addTo(map), drawControl: null };
    }

    function renderSidebar() {
        const container = document.getElementById('layers-list');
        container.innerHTML = "";

        Object.keys(layersData).forEach(id => {
            const l = layersData[id];
            
            // Lógica de Categorización (Punto 7 - Foto 1bf3b621)
            let statusHTML = "";
            if(l.csvData.length > 0) {
                const stats = {};
                l.csvData.forEach(row => {
                    const st = row['Licencia Act. Econ.'] || "SIN LICENCIA";
                    stats[st] = (stats[st] || 0) + 1;
                });
                statusHTML += `<div class="group-title">Estilos por Estatus</div>`;
                Object.keys(stats).forEach(st => {
                    const color = st.includes("VIGENTE") ? "#22c55e" : (st.includes("VENCIDA") ? "#eab308" : "#3b82f6");
                    statusHTML += `<div class="element-item"><div class="element-color" style="background:${color}"></div><div class="element-name">${st} (${stats[st]})</div></div>`;
                });
            }

            // Lista de Polígonos (Foto a228eaea)
            let drawHTML = "";
            if(l.elements.length > 0) {
                drawHTML += `<div class="group-title">Elementos Dibujados</div>`;
                l.elements.forEach(e => {
                    drawHTML += `
                        <div class="element-item" onclick="openElementEditor('${id}', '${e.id}')">
                            <div class="element-color" style="background:${e.color}"></div>
                            <div class="element-name">${e.name}</div>
                            <span style="font-size:10px; color:#94a3b8;">EDITAR</span>
                        </div>`;
                });
            }

            container.innerHTML += `
                <div class="layer-card">
                    <div class="layer-header">
                        <strong>${l.name.toUpperCase()}</strong>
                        <button onclick="deleteLayer('${id}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">✕</button>
                    </div>
                    <div class="layer-tools">
                        <button class="btn-tool" onclick="importCSV('${id}')">📥 CSV</button>
                        <button class="btn-tool" onclick="openFichaConfig('${id}')">⚙️ FICHA</button>
                        <button class="btn-tool" id="btn-draw-${id}" onclick="toggleDrawing('${id}')">✏️ DIBUJAR</button>
                        <button class="btn-tool" onclick="importFromUrl('${id}')">🔗 URL</button>
                    </div>
                    <div class="elements-list">${statusHTML}${drawHTML}</div>
                </div>`;
        });
    }

    // --- DIBUJO Y MANEJADORES (Punto 2) ---
    function toggleDrawing(id) {
        if(layers[id].drawControl) {
            map.removeControl(layers[id].drawControl);
            layers[id].drawControl = null;
            document.getElementById(`btn-draw-${id}`).classList.remove('active');
            document.getElementById(`btn-draw-${id}`).innerText = "✏️ DIBUJAR";
        } else {
            activeLid = id;
            const drawControl = new L.Control.Draw({
                draw: {
                    polygon: { shapeOptions: { color: selectedColor, weight: 3, fillOpacity: 0.4 } },
                    rectangle: { shapeOptions: { color: selectedColor } },
                    circle: false, marker: false, polyline: false
                },
                edit: { featureGroup: layers[id].group, remove: true }
            });
            map.addControl(drawControl);
            layers[id].drawControl = drawControl;
            document.getElementById(`btn-draw-${id}`).classList.add('active');
            document.getElementById(`btn-draw-${id}`).innerText = "PARAR";
        }
    }

    map.on(L.Draw.Event.CREATED, function (e) {
        const type = e.layerType;
        const layer = e.layer;
        const id = 'el_' + Date.now();
        const name = prompt("Nombre para este elemento:", "Bloque Nuevo");
        
        layers[activeLid].group.addLayer(layer);
        
        layersData[activeLid].elements.push({
            id: id,
            name: name || "Elemento",
            type: type,
            color: selectedColor,
            opacity: 0.4,
            leafletId: L.Util.stamp(layer)
        });
        
        updatePolygonPopup(activeLid, layer, id);
        renderSidebar();
        saveAll();
    });

    // --- ANÁLISIS ESPACIAL (Punto 9 - Foto 13) ---
    function updatePolygonPopup(lid, layer, eid) {
        const element = layersData[lid].elements.find(x => x.id === eid);
        const polyGeo = layer.toGeoJSON();
        
        let total = 0, vigentes = 0, vencidas = 0;
        
        layers[lid].group.eachLayer(m => {
            if(m instanceof L.CircleMarker) {
                const pt = turf.point([m.getLatLng().lng, m.getLatLng().lat]);
                if(turf.booleanPointInPolygon(pt, polyGeo)) {
                    total++;
                    const st = m.options.status || "";
                    if(st.includes("VIGENTE")) vigentes++;
                    if(st.includes("VENCIDA")) vencidas++;
                }
            }
        });

        const area = (turf.area(polyGeo) / 10000).toFixed(2);
        
        layer.bindPopup(`
            <div class="pop-card">
                <div class="pop-content">
                    <div class="pop-title">${element.name}</div>
                    <div class="pop-stat"><strong>Área Estimada:</strong> <span>${area} ha</span></div>
                    <hr>
                    <div class="pop-stat"><strong>Total Comercios:</strong> <span>${total}</span></div>
                    <div class="pop-stat" style="color:var(--success)"><strong>Vigentes:</strong> <span>${vigentes}</span></div>
                    <div class="pop-stat" style="color:var(--accent)"><strong>Vencidas:</strong> <span>${vencidas}</span></div>
                </div>
            </div>
        `);
    }

    // --- CARGA DE DATOS Y FICHA (Punto 6 y 8) ---
    function importCSV(id) {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.csv';
        input.onchange = e => {
            Papa.parse(e.target.files[0], { header: true, complete: results => {
                layersData[id].csvData = results.data;
                layersData[id].config = results.meta.fields.map(f => ({ id: f, vis: true }));
                processPoints(id);
                renderSidebar();
            }});
        };
        input.click();
    }

    function processPoints(id) {
        const l = layersData[id];
        layers[id].group.eachLayer(layer => { if(layer instanceof L.CircleMarker) layers[id].group.removeLayer(layer); });

        l.csvData.forEach(row => {
            const lat = row.Latitud || row.lat; const lon = row.Longitud || row.lon;
            if(lat && lon) {
                const est = (row['Licencia Act. Econ.'] || "").toUpperCase();
                let color = est.includes("VIGENTE") ? "#22c55e" : (est.includes("VENCIDA") ? "#eab308" : "#3b82f6");
                
                const marker = L.circleMarker([lat, lon], { radius: 7, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.9, status: est });
                
                let html = `<div class="pop-card">`;
                if(row.Imagen) html += `<img src="${row.Imagen}" class="pop-img">`;
                html += `<div class="pop-content"><div class="pop-title">${row.Nombre || row['Razón Social']}</div>`;
                l.config.forEach(f => {
                    if(f.vis && row[f.id]) html += `<div class="pop-stat"><b>${f.id}:</b> <span>${row[f.id]}</span></div>`;
                });
                html += `</div></div>`;
                marker.bindPopup(html, { padding: [0,0] });
                layers[id].group.addLayer(marker);
            }
        });
    }

    // --- EDICIÓN POST-CREACIÓN (Punto 5) ---
    function openElementEditor(lid, eid) {
        activeLid = lid; activeEid = eid;
        const e = layersData[lid].elements.find(x => x.id === eid);
        document.getElementById('edit-name').value = e.name;
        document.getElementById('edit-opacity').value = e.opacity;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('element-modal').style.display = 'block';
    }

    function setEditColor(c) { selectedColor = c; }

    function applyElementChanges() {
        const e = layersData[activeLid].elements.find(x => x.id === activeEid);
        e.name = document.getElementById('edit-name').value;
        e.color = selectedColor;
        e.opacity = document.getElementById('edit-opacity').value;
        
        const layer = layers[activeLid].group.getLayer(e.leafletId);
        layer.setStyle({ color: e.color, fillColor: e.color, fillOpacity: e.opacity });
        
        updatePolygonPopup(activeLid, layer, activeEid);
        closeModals();
        renderSidebar();
        saveAll();
    }

    // --- UTILIDADES ---
    function closeModals() { 
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }

    function openFichaConfig(id) {
        activeLid = id;
        const container = document.getElementById('sortable-fields');
        container.innerHTML = "";
        layersData[id].config.forEach(f => {
            container.innerHTML += `
                <div class="field-row" data-id="${f.id}">
                    <input type="checkbox" ${f.vis ? 'checked' : ''}>
                    <span style="flex:1; margin-left:15px; color:white; font-size:13px;">${f.id}</span>
                    <span style="color:#64748b">☰</span>
                </div>`;
        });
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('ficha-modal').style.display = 'block';
        new Sortable(container, { animation: 150 });
    }

    function saveFichaConfig() {
        const rows = document.querySelectorAll('.field-row');
        const newConf = [];
        rows.forEach(r => {
            newConf.push({ id: r.dataset.id, vis: r.querySelector('input').checked });
        });
        layersData[activeLid].config = newConf;
        processPoints(activeLid);
        closeModals();
        saveAll();
    }

    function deleteLayer(id) {
        if(confirm("¿Seguro que deseas eliminar esta capa y todo su contenido?")) {
            map.removeLayer(layers[id].group);
            delete layersData[id];
            delete layers[id];
            renderSidebar();
            saveAll();
        }
    }

    async function triggerSync() {
        const token = document.getElementById('ghToken').value;
        if(!token) return alert("Ingresa tu Token de GitHub");
        alert("Iniciando Bridge con Servidor Hacienda...");
    }

    // --- RECONSTRUCCIÓN AL CARGAR ---
    window.onload = () => {
        Object.keys(layersData).forEach(lid => {
            initLayerObject(lid);
            // Re-dibujar elementos GeoJSON si existen... (Opcional para persistencia completa)
            processPoints(lid);
        });
        renderSidebar();
    };

</script>
</body>
</html>
