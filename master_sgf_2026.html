<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF AYACUCHO v13.3 - CONTROL TOTAL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0b0e14; --panel: #161b22; --text: #f0f3f6; --border: #30363d; --yellow: #fbbc04; --safe: #238636; --danger: #da3633; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }
        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: rgba(22, 27, 34, 0.96); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 12px; }

        /* Sidebar con Desglose */
        #sidebar { top: 85px; left: 15px; bottom: 20px; width: 380px; display: flex; flex-direction: column; }
        .side-head { padding: 15px; border-bottom: 1px solid var(--border); border-top: 4px solid var(--yellow); }
        .layer-zone { flex: 1; overflow-y: auto; padding: 10px; }
        .b-card { background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 12px; border: 1px solid var(--border); overflow: hidden; }
        .b-card.active-b { border-color: var(--accent); }
        
        /* Stats Dashboard */
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 10px; background: rgba(0,0,0,0.3); }
        .s-pill { padding: 5px; border-radius: 4px; font-size: 9px; font-weight: 900; text-align: center; color: white; }
        
        .item-list { border-top: 1px solid var(--border); max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.2); }
        .item-row { padding: 8px 12px; font-size: 11px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer; }

        /* Popup Double Face con Ojito */
        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 16px; background: white; width: 320px; }
        .pop-card { color: #333; }
        .pop-img-box { position: relative; width: 100%; height: 160px; background: #000; }
        .pop-img { width: 100%; height: 100%; object-fit: cover; }
        .mode-btn { position: absolute; bottom: -20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--accent); color: #000; border: 3px solid white; cursor: pointer; z-index: 10; }
        .color-dot { position: absolute; top: 10px; left: 10px; width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; cursor: pointer; overflow: hidden; }
        .color-dot input { opacity: 0; cursor: pointer; width: 100%; height: 100%; }

        .pop-body { padding: 25px 15px 15px; max-height: 250px; overflow-y: auto; }
        .f-row { margin-bottom: 6px; border-bottom: 1px solid #eee; padding-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .v-lab { font-size: 9px; color: #999; font-weight: 800; text-transform: uppercase; flex: 1; }
        .v-val { font-size: 12px; color: #222; font-weight: 600; text-align: right; border: none; background: transparent; width: 65%; outline: none; }
        .eye-btn { cursor: pointer; font-size: 13px; color: #ccc; }
        .eye-btn.active { color: var(--accent); }

        .pop-save { background: var(--safe); color: white; border: none; width: 100%; padding: 12px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui top-nav glass" style="top:15px; left:15px; right:15px; display:flex; gap:10px; padding:8px 15px; align-items:center;">
    <div style="flex:1; display:flex; gap:10px; background:rgba(0,0,0,0.4); padding:8px 15px; border-radius:8px; border:1px solid var(--border);">
        <i class="fas fa-search" style="color:var(--accent)"></i>
        <input type="text" id="main-search" placeholder="Buscar Contribuyente..." oninput="filtrarTodo()" style="background:transparent; border:none; color:white; width:100%; outline:none;">
    </div>
    <div style="display:flex; gap:5px; background:rgba(0,0,0,0.2); padding:5px; border-radius:10px;">
        <button class="glass" style="color:#8b949e; width:40px; height:40px;" onclick="enableTool('marker')"><i class="fas fa-map-marker-alt"></i></button>
        <button class="glass" style="color:#8b949e; width:40px; height:40px;" onclick="enableTool('poly')"><i class="fas fa-draw-polygon"></i></button>
    </div>
    <button class="glass" style="color:var(--yellow); padding:0 20px; height:40px; font-weight:900;" onclick="exportarJSON()">EXPORTAR JSON</button>
</div>

<aside id="sidebar" class="glass ui">
    <div class="side-head">
        <h2 style="margin:0; font-size:14px;">CONTROL FISCAL HACIENDA</h2>
        <span style="font-size:10px; color:var(--accent); font-weight:bold">MODO EDICIÓN AVANZADA</span>
    </div>
    <div class="layer-zone" id="list-container"></div>
    <div style="padding:15px; display:grid; grid-template-columns:1fr 1fr; gap:10px; border-top:1px solid var(--border);">
        <button class="glass" style="color:white; padding:12px; font-size:11px;" onclick="crearCapaManual()">+ SECTOR</button>
        <button class="glass" style="background:var(--yellow); color:#000; padding:12px; font-weight:900;" onclick="abrirModal('m-csv')">IMPORTAR RAW</button>
    </div>
</aside>

<div id="m-csv" class="glass ui" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:320px; padding:25px; display:none; z-index:2001">
    <h3 style="margin:0 0 15px">Importar desde Sheets</h3>
    <input type="text" id="csv-url" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:white; border:1px solid var(--border)" placeholder="URL de Google Sheets">
    <button class="pop-save" onclick="analizarExcel()">ANALIZAR</button>
    <div id="raw-ui" style="display:none; margin-top:15px">
        <label style="font-size:10px">Ubicación (Coords):</label><select id="sel-coo" style="width:100%; margin-bottom:10px"></select>
        <label style="font-size:10px">Foto (URL):</label><select id="sel-img" style="width:100%; margin-bottom:10px"></select>
        <label style="font-size:10px">Estatus inicial:</label><select id="sel-col" style="width:100%; margin-bottom:15px"></select>
        <button class="pop-save" style="background:var(--accent); color:black" onclick="inyectarDatos()">INYECTAR</button>
    </div>
    <button class="pop-save" style="background:var(--danger); margin-top:10px" onclick="cerrarModal('m-csv')">CERRAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false, attributionControl: false });
    const satLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    let STORE = {}; let activeId = null; let allCols = []; let rawData = [];

    const getIcon = (color) => L.divIcon({ 
        html: `<i class="fas fa-map-marker-alt" style="color:${color}; font-size:28px; text-shadow: 0 0 5px #000"></i>`, 
        className: 'c-pin', iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -25] 
    });

    const drawM = new L.Draw.Marker(map, { icon: getIcon('#00f2ff') });
    const drawP = new L.Draw.Polygon(map, { shapeOptions: { color: '#00f2ff', fillOpacity: 0.2, weight: 3 } });
    
    function enableTool(t) { if(!activeId) return alert("Selecciona un sector"); t==='marker'?drawM.enable():drawP.enable(); }

    map.on(L.Draw.Event.CREATED, (e) => {
        const l = e.layer;
        if(l instanceof L.Marker) l.options.draggable = true;
        STORE[activeId].group.addLayer(l);
        const it = { lid: l._leaflet_id, data: {"Contribuyente": "NUEVO"}, img: "", color: "#00f2ff", type: e.layerType, ocultos: [] };
        STORE[activeId].items.push(it);
        vincular(l, activeId, it.lid);
        renderPanel();
        abrirPopup(activeId, it.lid, 'edicion');
    });

    function vincular(l, bid, lid) { l.on('click', () => abrirPopup(bid, lid, 'vista')); l.on('dragend', renderPanel); }

    function abrirPopup(bid, lid, modo = 'vista') {
        const it = STORE[bid].items.find(x => x.lid === lid);
        const l = STORE[bid].group.getLayer(lid);
        
        let html = `<div class="pop-card">
            <div class="pop-img-box">
                <img src="${it.img}" class="pop-img" onerror="this.src='https://via.placeholder.com/320x160?text=FOTO+HACIENDA'">
                <div class="color-dot" style="background:${it.color}"><input type="color" value="${it.color}" onchange="upCol('${bid}',${lid},this.value)"></div>
                <div class="mode-btn" onclick="abrirPopup('${bid}',${lid},'${modo==='vista'?'edicion':'vista'}')"><i class="fas ${modo==='vista'?'fa-edit':'fa-eye'}"></i></div>
            </div>
            <div class="pop-body">`;

        for(let key in it.data) {
            const isHidden = it.ocultos && it.ocultos.includes(key);
            if(modo === 'vista') {
                if(!isHidden) html += `<div class="f-row"><span class="v-lab">${key}</span><span class="v-val">${it.data[key]}</span></div>`;
            } else {
                html += `<div class="f-row">
                    <i class="fas ${isHidden?'fa-eye-slash':'fa-eye'} eye-btn ${!isHidden?'active':''}" onclick="toggleOjo('${bid}',${lid},'${key}')"></i>
                    <input type="text" class="v-val" value="${it.data[key]}" onchange="upData('${bid}',${lid},'${key}',this.value)">
                </div>`;
            }
        }

        if(modo === 'edicion') {
            html += `<div class="f-row" style="background:#f9f9f9; padding:5px;"><i class="fas fa-camera"></i><input type="text" style="font-size:10px; flex:1; border:none;" value="${it.img}" onchange="upImg('${bid}',${lid},this.value)" placeholder="URL de la Foto"></div>`;
            html += `<button class="pop-save" style="background:var(--danger); margin-top:10px" onclick="borrarPunto('${bid}',${lid})">ELIMINAR</button>`;
        }

        html += `</div><button class="pop-save" onclick="STORE['${bid}'].group.getLayer(${lid}).closePopup()">GUARDAR</button></div>`;
        l.bindPopup(html, { padding: [0,0] }).openPopup();
    }

    function upData(bid, lid, k, v) { STORE[bid].items.find(x => x.lid === lid).data[k] = v; renderPanel(); }
    function upImg(bid, lid, v) { STORE[bid].items.find(x => x.lid === lid).img = v; abrirPopup(bid, lid, 'edicion'); }
    function upCol(bid, lid, v) { 
        const it = STORE[bid].items.find(x => x.lid === lid); it.color = v;
        const l = STORE[bid].group.getLayer(lid);
        if(l.setIcon) l.setIcon(getIcon(v)); else l.setStyle({color:v, fillColor:v});
        renderPanel(); abrirPopup(bid, lid, 'vista');
    }
    function toggleOjo(bid, lid, k) {
        const it = STORE[bid].items.find(x => x.lid === lid);
        it.ocultos.includes(k) ? it.ocultos = it.ocultos.filter(x => x !== k) : it.ocultos.push(k);
        abrirPopup(bid, lid, 'edicion');
    }

    function renderPanel() {
        const cont = document.getElementById('list-container'); cont.innerHTML = "";
        for(let id in STORE) {
            const capa = STORE[id];
            const v = capa.items.filter(i=>i.color==='#238636').length;
            const t = capa.items.filter(i=>i.color==='#fbbc04').length;
            const d = capa.items.filter(i=>i.color==='#da3633').length;

            let h = `<div class="b-card ${id===activeId?'active-b':''}" onclick="activeId='${id}';renderPanel()">
                <div style="padding:10px; display:flex; justify-content:space-between; align-items:center">
                    <input type="text" value="${capa.name}" onchange="STORE['${id}'].name=this.value" style="background:transparent; border:none; color:white; font-size:12px; font-weight:800; flex:1">
                    <i class="fas fa-trash-alt" style="color:var(--danger); cursor:pointer" onclick="borrarCapa('${id}')"></i>
                </div>
                <div class="stats-bar">
                    <div class="s-pill" style="background:var(--safe)">${v} VIG</div>
                    <div class="s-pill" style="background:var(--yellow); color:black">${t} TEMP</div>
                    <div class="s-pill" style="background:var(--danger)">${d} DEUDA</div>
                </div>
                <div class="item-list">`;
            
            capa.items.forEach(it => {
                h += `<div class="item-row" onclick="irA('${id}',${it.lid})">
                    <span style="color:${it.color}">●</span>
                    <span style="flex:1; margin-left:10px">${it.data["Contribuyente"] || it.data[Object.keys(it.data)[0]]}</span>
                    <i class="fas fa-edit" style="color:var(--accent)" onclick="event.stopPropagation(); abrirPopup('${id}',${it.lid},'edicion')"></i>
                </div>`;
            });
            cont.insertAdjacentHTML('beforeend', h + `</div></div>`);
        }
    }

    async function analizarExcel() {
        let url = document.getElementById('csv-url').value;
        if(url.includes('/edit')) url = url.replace(/\/edit.*$/, '/export?format=csv');
        try {
            const res = await fetch(url); const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
            allCols = rows[0]; rawData = [];
            for(let i=1; i<rows.length; i++) { if(rows[i].length >= allCols.length) { 
                let obj = {}; allCols.forEach((k, idx) => obj[k] = rows[i][idx]); rawData.push(obj); 
            }}
            document.getElementById('sel-coo').innerHTML = allCols.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-img').innerHTML = allCols.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-col').innerHTML = `<option value="">Default</option>` + allCols.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('raw-ui').style.display = 'block';
        } catch (e) { alert("Error en Google Sheets"); }
    }

    function inyectarDatos() {
        const bid = 'b'+Date.now(); const grp = new L.FeatureGroup().addTo(map);
        const cCol = document.getElementById('sel-coo').value, iCol = document.getElementById('sel-img').value, sCol = document.getElementById('sel-col').value;
        const its = [];
        rawData.forEach(row => {
            const p = row[cCol].replace(/[A-Za-z()]/g, '').trim().split(/[, ]+/);
            const lat = parseFloat(p[0]), lng = parseFloat(p[1]);
            if(!isNaN(lat)) {
                let col = '#00f2ff';
                const s = row[sCol]?.toUpperCase() || "";
                if(s.includes("VIGENTE") || s.includes("PAGO")) col = "#238636";
                else if(s.includes("TEMPORAL")) col = "#fbbc04";
                else if(s.includes("DEUDA") || s.includes("VENCIDA")) col = "#da3633";

                const m = L.marker([lat, lng], { icon: getIcon(col), draggable: true });
                vincular(m, bid, m._leaflet_id);
                grp.addLayer(m);
                its.push({ lid: m._leaflet_id, data: {...row}, ocultos: [], img: row[iCol] || "", color: col, type: 'marker' });
            }
        });
        STORE[bid] = { name: "Censo Hacienda", items: its, group: grp };
        activeId = bid; renderPanel(); cerrarModal('m-csv');
    }

    function irA(bid, lid) { const l = STORE[bid].group.getLayer(lid); map.setView(l.getLatLng(), 19); abrirPopup(bid, lid, 'vista'); }
    function borrarPunto(bid, lid) { if(confirm("¿Eliminar?")) { STORE[bid].group.removeLayer(lid); STORE[bid].items = STORE[bid].items.filter(x => x.lid !== lid); renderPanel(); map.closePopup(); } }
    function borrarCapa(id) { event.stopPropagation(); if(confirm("¿Borrar sector?")) { map.removeLayer(STORE[id].group); delete STORE[id]; renderPanel(); } }
    function crearCapaManual() { const bid = 'b'+Date.now(); STORE[bid] = { name: "Nuevo Sector", items: [], group: new L.FeatureGroup().addTo(map) }; activeId = bid; renderPanel(); }
    function exportarJSON() { const blob = new Blob([JSON.stringify(STORE)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'hacienda_final.json'; a.click(); }
    function abrirModal(id) { document.getElementById(id).style.display = 'block'; }
    function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
    function filtrarTodo() { const q = document.getElementById('main-search').value.toLowerCase(); document.querySelectorAll('.item-row').forEach(el => el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none'); }
</script>
</body>
</html>
