<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGF - HACIENDA MUNICIPAL AYACUCHO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        :root { --am: #ffcc00; --rj: #e60000; --vd: #007a33; --dk: #0f172a; --lt: #1e293b; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #020617; color: white; }
        
        #map { flex: 1; z-index: 1; background: #000; }
        .leaflet-control-attribution { display: none !important; }

        /* IDENTIDAD (FOTO 1-3) */
        .brand-panel { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: rgba(15, 23, 42, 0.9); padding: 15px 20px; border-radius: 8px;
            border-left: 6px solid var(--am); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        .brand-panel b { display: block; font-size: 17px; letter-spacing: 1px; color: #fff; }
        .brand-panel span { font-size: 11px; color: var(--am); font-weight: bold; text-transform: uppercase; }

        /* BUSCADOR (FOTO 11) */
        .search-box { 
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; 
            width: 400px; background: white; border-radius: 50px; padding: 10px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; align-items: center;
        }
        .search-box input { border: none; outline: none; width: 100%; font-size: 14px; font-weight: 600; color: #0f172a; }

        /* SIDEBAR (FOTO 6-10) */
        #sidebar { width: 440px; background: var(--dk); display: flex; flex-direction: column; border-left: 1px solid #334155; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        
        .header-admin { 
            padding: 40px 20px; text-align: center; position: relative;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
        }
        /* TRICOLOR MUNICIPAL */
        .header-admin::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(to right, var(--am) 33.3%, var(--rj) 33.3% 66.6%, var(--vd) 66.6%);
        }

        .scroller { flex: 1; overflow-y: auto; padding: 20px; }
        .btn { cursor: pointer; border: none; font-weight: 900; border-radius: 8px; transition: 0.2s; }
        .btn-add { width: 100%; padding: 15px; background: var(--am); color: black; margin-bottom: 20px; font-size: 12px; }
        
        /* CAPAS (FOTO 9) */
        .layer-item { background: var(--lt); border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .layer-top { padding: 12px 15px; background: rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; }
        .layer-top b { font-size: 13px; color: var(--am); }
        
        .eye { width: 34px; height: 18px; background: #475569; border-radius: 20px; position: relative; cursor: pointer; }
        .eye.active { background: var(--vd); }
        .eye::after { content: ''; position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.2s; }
        .eye.active::after { left: 18px; }

        .layer-content { padding: 15px; }
        .url-in { width: 100%; padding: 10px; background: #020617; border: 1px solid #475569; color: white; border-radius: 6px; font-size: 11px; margin-bottom: 10px; }
        
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-t { padding: 10px; font-size: 10px; background: #334155; color: white; border-radius: 5px; }
        .btn-draw { grid-column: span 2; border: 1px solid var(--am); background: transparent; color: var(--am); }
        .btn-draw.on { background: var(--rj); color: white; border-color: white; }

        /* POPUPS (FOTO 17-18) */
        .leaflet-popup-content-wrapper { border-radius: 8px; padding: 0; }
        .p-card { width: 280px; color: black; }
        .p-h { background: #f1f5f9; padding: 10px; font-weight: 800; border-bottom: 3px solid var(--vd); }
        .p-b { padding: 10px; font-size: 12px; }
        .p-r { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #eee; }
        .p-r b { color: #64748b; font-size: 9px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="brand-panel">
    <b>HACIENDA MUNICIPAL AYACUCHO</b>
    <span>SGF - GESTIÓN FISCAL MASTER</span>
</div>

<div class="search-box">
    <input type="text" id="global-search" placeholder="Buscar RIF o Comercio..." onkeyup="doSearch()">
</div>

<aside id="sidebar">
    <div class="header-admin">
        <h2 style="margin:0; font-size:20px">GESTIÓN FISCAL MASTER</h2>
        <small style="color:var(--am); letter-spacing:2px">SISTEMA INTEGRADO</small>
    </div>
    <div class="scroller">
        <button class="btn btn-add" onclick="createLayer()">+ VINCULAR GOOGLE SHEETS</button>
        <div id="layer-list"></div>
    </div>
</aside>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
    let DATA_STORE = {}; 
    let CURRENT_LID = null;
    let DRAW_MAN = null;

    // MAPAS DE GOOGLE (FOTO 4-5)
    const googleSat = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20 });
    const googleTer = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20 });

    const map = L.map('map', { 
        center: [8.033, -72.256], 
        zoom: 15, 
        layers: [googleSat],
        zoomControl: false 
    });

    L.control.layers({ "Satélite": googleSat, "Calles": googleTer }, null, { position: 'topright' }).addTo(map);

    function createLayer() {
        const name = prompt("Nombre de la Capa:");
        if(!name) return;
        const id = 'ID' + Date.now();
        DATA_STORE[id] = { name: name, group: L.featureGroup().addTo(map), url: '', data: [], visible: true, drawing: false };
        renderLayers();
    }

    function renderLayers() {
        const container = document.getElementById('layer-list');
        container.innerHTML = "";
        Object.keys(DATA_STORE).forEach(id => {
            const l = DATA_STORE[id];
            container.innerHTML += `
                <div class="layer-item">
                    <div class="layer-top">
                        <b>${l.name}</b>
                        <div style="display:flex; align-items:center; gap:10px">
                            <div class="eye ${l.visible?'active':''}" onclick="toggleViz('${id}')"></div>
                            <span onclick="killLayer('${id}')" style="cursor:pointer; color:var(--rj)">✕</span>
                        </div>
                    </div>
                    <div class="layer-content">
                        <input type="text" class="url-in" placeholder="Pegar Link /edit..." 
                               onchange="autoLoad('${id}', this.value)" value="${l.url}">
                        <div class="tool-grid">
                            <button class="btn btn-t" onclick="autoLoad('${id}', '')">🔄 ACTUALIZAR</button>
                            <button class="btn btn-t" onclick="alert('Ficha automática activada')">📋 FICHA</button>
                            <button class="btn btn-t btn-draw ${l.drawing?'on':''}" onclick="startDraw('${id}')">
                                ${l.drawing ? 'LISTO' : '✏️ DIBUJAR SECTOR'}
                            </button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function autoLoad(id, url) {
        if(url) {
            if(url.includes('/edit')) url = url.split('/edit')[0] + '/export?format=csv';
            DATA_STORE[id].url = url;
        }
        if(!DATA_STORE[id].url) return;

        Papa.parse(DATA_STORE[id].url, {
            download: true, header: true, skipEmptyLines: true,
            complete: r => {
                DATA_STORE[id].data = r.data;
                paintMarkers(id);
                renderLayers();
            }
        });
    }

    function paintMarkers(id) {
        const l = DATA_STORE[id];
        l.group.eachLayer(ly => { if(ly instanceof L.CircleMarker) l.group.removeLayer(ly); });

        l.data.forEach(row => {
            const lat = parseFloat(row.Latitud || row.lat || row.LAT);
            const lon = parseFloat(row.Longitud || row.lon || row.LON);
            if(isNaN(lat)) return;

            let color = "#3b82f6";
            const est = (row.Estatus || row.Estado || "").toUpperCase();
            if(est.includes("PAGO") || est.includes("DIA")) color = var(--vd);
            else if(est.includes("MORA")) color = var(--rj);

            const m = L.circleMarker([lat, lon], { radius: 7, color: '#fff', weight: 2, fillColor: color, fillOpacity: 1 });
            
            // Ficha automática 1:1 con My Maps
            let html = `<div class="p-card"><div class="p-h">${row.Nombre || row.RAZON_SOCIAL || 'Comercio'}</div><div class="p-b">`;
            Object.keys(row).forEach(k => {
                if(row[k] && k.length < 20) html += `<div class="p-r"><b>${k}</b><span>${row[k]}</span></div>`;
            });
            m.bindPopup(html + `</div></div>`);
            l.group.addLayer(m);
        });
    }

    function startDraw(id) {
        if(DATA_STORE[id].drawing) {
            map.removeControl(DRAW_MAN);
            DATA_STORE[id].drawing = false;
        } else {
            CURRENT_LID = id; DATA_STORE[id].drawing = true;
            DRAW_MAN = new L.Control.Draw({ draw: { polygon: true, rectangle: true, circle: false, marker: false, polyline: false } });
            map.addControl(DRAW_MAN);
        }
        renderLayers();
    }

    map.on(L.Draw.Event.CREATED, e => {
        const name = prompt("Nombre del Sector:");
        if(!name) return;
        const ly = e.layer; ly.options.name = name; ly.options.color = '#ffcc00';
        DATA_STORE[CURRENT_LID].group.addLayer(ly);
        
        // Censo automático
        const geo = ly.toGeoJSON();
        let total = 0;
        Object.keys(DATA_STORE).forEach(id => {
            if(DATA_STORE[id].visible) {
                DATA_STORE[id].group.eachLayer(m => {
                    if(m instanceof L.CircleMarker && turf.booleanPointInPolygon(m.toGeoJSON(), geo)) total++;
                });
            }
        });
        ly.bindPopup(`<b>${name}</b><br>Comercios detectados: ${total}`);
        startDraw(CURRENT_LID);
    });

    function toggleViz(id) {
        DATA_STORE[id].visible = !DATA_STORE[id].visible;
        if(DATA_STORE[id].visible) map.addLayer(DATA_STORE[id].group);
        else map.removeLayer(DATA_STORE[id].group);
        renderLayers();
    }

    function killLayer(id) { if(confirm("¿Borrar capa?")) { map.removeLayer(DATA_STORE[id].group); delete DATA_STORE[id]; renderLayers(); } }

    function doSearch() {
        const q = document.getElementById('global-search').value.toLowerCase();
        Object.keys(DATA_STORE).forEach(id => {
            DATA_STORE[id].group.eachLayer(m => {
                if(m instanceof L.CircleMarker) {
                    const txt = JSON.stringify(m.getPopup().getContent()).toLowerCase();
                    m.setStyle({ opacity: txt.includes(q)?1:0.1, fillOpacity: txt.includes(q)?1:0.1 });
                }
            });
        });
    }
</script>
</body>
</html>
