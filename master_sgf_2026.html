<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF AYACUCHO v10.0 - FINAL PROFESIONAL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0b0e14; --panel: #161b22; --text: #e6edf3; --border: #30363d; --yellow: #fbbc04; --safe: #238636; --danger: #da3633; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; background: #111; }
        .map-bright { filter: brightness(0.85) contrast(1.1); }

        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: rgba(22, 27, 34, 0.98); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }

        /* Barra Superior */
        .top-nav { top: 15px; left: 15px; right: 15px; display: flex; gap: 10px; height: 55px; align-items: center; padding: 0 15px; }
        .search-box { flex: 1; max-width: 350px; display: flex; align-items: center; gap: 10px; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
        
        .tool-dock { display: flex; gap: 5px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 10px; border: 1px solid var(--border); }
        .t-btn { background: transparent; border: none; color: #8b949e; width: 42px; height: 42px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .t-btn:hover { color: var(--accent); background: rgba(0,242,255,0.1); }
        .t-btn.active { color: var(--accent); background: rgba(0,242,255,0.15); border: 1px solid var(--accent); }

        .btn-save { background: var(--safe); color: white; border: none; padding: 0 20px; height: 42px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 11px; display: flex; align-items: center; gap: 8px; margin-left: auto; }

        /* Sidebar */
        #sidebar { top: 85px; left: 15px; bottom: 20px; width: 380px; display: flex; flex-direction: column; }
        .side-head { padding: 20px; border-bottom: 1px solid var(--border); border-top: 4px solid var(--yellow); }
        .side-head h1 { margin: 0; font-size: 16px; font-weight: 900; }
        
        .layer-zone { flex: 1; overflow-y: auto; padding: 15px; }
        .b-card { background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 10px; border: 1px solid transparent; transition: 0.3s; }
        .b-card.active-b { border-color: var(--accent); background: rgba(0,242,255,0.05); }
        .b-head { padding: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .badge { background: var(--border); color: var(--accent); padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; margin-left: auto; }
        
        .item-row { padding: 8px 15px 8px 45px; font-size: 12px; color: #8b949e; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .item-row:hover { color: white; background: rgba(255,255,255,0.1); }

        /* Popups */
        .pop-card { min-width: 260px; padding: 5px; }
        .pop-card label { font-size: 10px; font-weight: 800; color: #888; display: block; margin-top: 10px; }
        .pop-card input, .pop-card textarea { width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 6px; box-sizing: border-box; margin-top: 5px; font-family: inherit; }
        .pop-img { width: 100%; border-radius: 8px; margin-top: 12px; max-height: 180px; object-fit: cover; border: 1px solid #eee; }
        .pop-btn { background: #1a73e8; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: 800; margin-top: 15px; cursor: pointer; }

        /* Modales */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5000; width: 360px; padding: 30px; display: none; }
        .modal h3 { margin-top: 0; color: white; }
        .modal input, .modal select { width: 100%; padding: 12px; background: #0d1117; border: 1px solid var(--border); color: white; margin: 12px 0; border-radius: 6px; box-sizing: border-box; }

        /* Selector Capas Mapa */
        .map-ctrl { bottom: 25px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m-btn { width: 55px; height: 55px; border-radius: 12px; cursor: pointer; border: 2px solid var(--border); overflow: hidden; transition: 0.2s; background: #000; }
        .m-btn.active { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 0 15px rgba(0,242,255,0.4); }
        .m-btn img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .m-btn.active img { opacity: 1; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui top-nav glass">
    <div class="search-box">
        <i class="fas fa-search" style="color: var(--accent)"></i>
        <input type="text" id="main-search" placeholder="Buscar local..." oninput="filtrarLista()">
    </div>
    
    <div class="tool-dock">
        <button class="t-btn active" id="btn-select" title="Puntero (ESC)" onclick="resetTool()"><i class="fas fa-mouse-pointer"></i></button>
        <button class="t-btn" id="btn-mark" title="Pincheta" onclick="enableTool('marker')"><i class="fas fa-map-pin"></i></button>
        <button class="t-btn" id="btn-poly" title="Área" onclick="enableTool('poly')"><i class="fas fa-draw-polygon"></i></button>
        <div style="width:1px; height:20px; background:var(--border); margin:10px 5px;"></div>
        <button class="t-btn" title="Borrar Bloque" onclick="borrarCapa()"><i class="fas fa-trash" style="color:var(--danger)"></i></button>
    </div>

    <button class="btn-save" onclick="guardarBackup()">
        <i class="fas fa-cloud-upload-alt"></i> GUARDAR CONFIG
    </button>
</div>

<aside id="sidebar" class="glass ui">
    <div class="side-head">
        <h1>SGF AYACUCHO v10</h1>
        <span style="font-family:'JetBrains Mono'; font-size:10px; color:var(--accent)">CATASTRO MUNICIPAL DIGITAL</span>
    </div>
    
    <div class="layer-zone" id="list-container"></div>

    <div style="padding: 15px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="pop-btn" style="margin:0; background: var(--panel); border:1px solid var(--border)" onclick="abrir('m-capa')">+ Bloque</button>
        <button class="pop-btn" style="margin:0; background: var(--panel); border:1px solid var(--border)" onclick="abrir('m-csv')"><i class="fas fa-file-csv"></i> CSV</button>
    </div>
</aside>

<div class="ui map-ctrl">
    <div class="m-btn active" id="m-sat" onclick="setMap('y')"><img src="https://mt1.google.com/vt/lyrs=y&x=1194&y=1646&z=12"></div>
    <div class="m-btn" id="m-str" onclick="setMap('m')"><img src="https://mt1.google.com/vt/lyrs=m&x=1194&y=1646&z=12"></div>
</div>

<div id="m-capa" class="modal glass">
    <h3>Nuevo Bloque</h3>
    <input type="text" id="n-capa" placeholder="Nombre del Sector">
    <button class="pop-btn" onclick="crearBloque()">Confirmar</button>
    <button class="t-btn" style="width:100%; margin-top:10px" onclick="cerrar('m-capa')">Cancelar</button>
</div>

<div id="m-csv" class="modal glass">
    <h3>Importar Google Sheets</h3>
    <input type="text" id="csv-url" placeholder="Pegue el enlace CSV">
    <div id="csv-map" style="display:none">
        <label>Columna Coordenadas:</label>
        <select id="s-coo"></select>
        <label>Columna Nombre:</label>
        <select id="s-nom"></select>
    </div>
    <button id="btn-import-act" class="pop-btn" onclick="analizarCSV()">Procesar Archivo</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    // 1. INICIALIZACIÓN
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false });
    const sat = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'], className: 'map-bright' }).addTo(map);
    const str = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] });

    let STORE = {}; 
    let activeId = null;
    let csvCache = null;

    // Bloqueo de UI
    const side = document.getElementById('sidebar');
    L.DomEvent.disableClickPropagation(side);
    L.DomEvent.disableScrollPropagation(side);

    // 2. HERRAMIENTAS DE DIBUJO
    const getIcon = (color) => L.divIcon({
        html: `<i class="fas fa-map-pin" style="color:${color}; font-size:30px; text-shadow:0 2px 4px #000"></i>`,
        className: 'custom-p', iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -25]
    });

    const drawMarker = new L.Draw.Marker(map, { icon: getIcon('#00f2ff') });
    const drawPoly = new L.Draw.Polygon(map, { shapeOptions: { color: '#00f2ff', fillOpacity: 0.3 } });

    function enableTool(type) {
        resetTool();
        if(!activeId) return alert("Crea/Selecciona un Bloque primero");
        if(type === 'marker') { drawMarker.enable(); document.getElementById('btn-mark').classList.add('active'); }
        else { drawPoly.enable(); document.getElementById('btn-poly').classList.add('active'); }
        document.getElementById('btn-select').classList.remove('active');
    }

    function resetTool() {
        drawMarker.disable(); drawPoly.disable();
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-select').classList.add('active');
    }

    // Tecla ESC para soltar herramientas
    window.addEventListener('keydown', (e) => { if(e.key === "Escape") resetTool(); });

    map.on(L.Draw.Event.CREATED, (e) => {
        const lyr = e.layer;
        STORE[activeId].group.addLayer(lyr);
        STORE[activeId].items.push({ id: lyr._leaflet_id, name: "Local Nuevo", desc: "", color: "#00f2ff", type: e.layerType });
        configItem(activeId, lyr._leaflet_id);
        renderSide();
        resetTool(); // <-- LIBERA LA PINCHETA AL TERMINAR
    });

    // 3. EDICIÓN Y POPUPS
    function configItem(bid, iid) {
        const it = STORE[bid].items.find(x => x.id === iid);
        const lyr = STORE[bid].group.getLayer(iid);

        if(lyr.setIcon) lyr.setIcon(getIcon(it.color));
        else lyr.setStyle({ color: it.color, fillColor: it.color });

        const isImg = (u) => (u && u.startsWith('http') && /\.(jpg|jpeg|png|webp)$/i.test(u));
        const img = isImg(it.desc) ? `<img src="${it.desc}" class="pop-img">` : '';

        const html = `<div class="pop-card" onmousedown="L.DomEvent.stopPropagation(event)">
            <label>NOMBRE / RIF:</label>
            <input type="text" id="in-${iid}" value="${it.name}">
            <label>DESCRIPCIÓN / LINK FOTO:</label>
            <textarea id="id-${iid}" rows="2">${it.desc}</textarea>
            <label>COLOR CATEGORÍA:</label>
            <input type="color" id="ic-${iid}" value="${it.color}" style="height:35px">
            ${img}
            <button class="pop-btn" onclick="savePop('${bid}', ${iid})">ACTUALIZAR DATOS</button>
        </div>`;
        lyr.bindPopup(html, { maxWidth: 280 });
    }

    window.savePop = (bid, iid) => {
        const it = STORE[bid].items.find(x => x.id === iid);
        it.name = document.getElementById(`in-${iid}`).value;
        it.desc = document.getElementById(`id-${iid}`).value;
        it.color = document.getElementById(`ic-${iid}`).value;
        configItem(bid, iid);
        renderSide();
        STORE[bid].group.getLayer(iid).closePopup();
    };

    // 4. CAPAS Y BLOQUES
    function crearBloque() {
        const n = document.getElementById('n-capa').value;
        if(!n) return;
        const id = 'b' + Date.now();
        STORE[id] = { name: n, items: [], visible: true, group: new L.FeatureGroup().addTo(map) };
        activeId = id;
        renderSide();
        cerrar('m-capa');
    }

    function renderSide() {
        const box = document.getElementById('list-container');
        box.innerHTML = "";
        for(let id in STORE) {
            const isA = (id === activeId);
            let h = `<div class="b-card ${isA?'active-b':''}">
                <div class="b-head" onclick="selB('${id}')">
                    <input type="checkbox" ${STORE[id].visible?'checked':''} onclick="togV(event, '${id}')">
                    <span style="font-weight:800; color:white">📁 ${STORE[id].name}</span>
                    <span class="badge">${STORE[id].items.length}</span>
                </div>
                <div style="display:${isA?'block':'none'}">`;
            STORE[id].items.forEach(it => {
                h += `<div class="item-row" onclick="focusL('${id}', ${it.id})">
                        <div style="width:8px; height:8px; border-radius:50%; background:${it.color}"></div>
                        ${it.name}
                      </div>`;
            });
            h += `</div></div>`;
            box.insertAdjacentHTML('beforeend', h);
        }
    }

    // 5. IMPORTACIÓN CSV MEJORADA (Se cierra sola y limpia coordenadas)
    function analizarCSV() {
        const url = document.getElementById('csv-url').value.replace('/edit?usp=sharing', '/export?format=csv');
        Papa.parse(url, { download: true, header: true, skipEmptyLines: true, complete: (r) => {
            csvCache = r.data;
            let o = ""; r.meta.fields.forEach(f => o += `<option value="${f}">${f}</option>`);
            document.getElementById('s-coo').innerHTML = o;
            document.getElementById('s-nom').innerHTML = o;
            document.getElementById('csv-map').style.display = 'block';
            document.getElementById('btn-import-act').innerText = "VINCULAR E IMPORTAR";
            document.getElementById('btn-import-act').onclick = importNow;
        }});
    }

    function importNow() {
        const cCol = document.getElementById('s-coo').value;
        const nCol = document.getElementById('s-nom').value;
        const bid = 'b' + Date.now();
        const grp = new L.FeatureGroup().addTo(map);
        const its = [];

        csvCache.forEach(row => {
            if(row[cCol]) {
                // Limpiador de coordenadas: elimina paréntesis, letras o espacios extra
                let raw = row[cCol].replace(/[A-Za-z()]/g, '').trim();
                let pts = raw.split(/[, ]+/);
                let lat = parseFloat(pts[0]), lon = parseFloat(pts[1]);
                if(!isNaN(lat)) {
                    const m = L.marker([lat, lon]);
                    const iid = grp.addLayer(m)._leaflet_id;
                    its.push({ id: iid, name: row[nCol] || "Censo", desc: "Importado", color: "#da3633", type: 'marker' });
                }
            }
        });

        STORE[bid] = { name: "Importado " + new Date().toLocaleTimeString(), items: its, visible: true, group: grp };
        activeId = bid;
        its.forEach(it => configItem(bid, it.id));
        renderSide();
        cerrar('m-csv'); // <-- CIERRA EL MODAL AUTOMÁTICAMENTE
        if(its.length > 0) map.fitBounds(grp.getBounds());
    }

    // 6. PERSISTENCIA
    function guardarBackup() {
        const raw = {};
        for(let id in STORE) {
            raw[id] = { name: STORE[id].name, visible: STORE[id].visible, 
                items: STORE[id].items.map(it => {
                    const l = STORE[id].group.getLayer(it.id);
                    return { ...it, pos: l.getLatLng ? l.getLatLng() : l.getLatLngs() };
                })
            };
        }
        localStorage.setItem('HACIENDA_AYACUCHO_FINAL', JSON.stringify(raw));
        alert("SISTEMA GUARDADO: Los datos están protegidos en este navegador.");
    }

    window.onload = () => {
        const s = JSON.parse(localStorage.getItem('HACIENDA_AYACUCHO_FINAL'));
        if(!s) return;
        for(let id in s) {
            const g = new L.FeatureGroup();
            if(s[id].visible) g.addTo(map);
            s[id].items.forEach(it => {
                let l = it.type === 'marker' ? L.marker(it.pos) : L.polygon(it.pos);
                g.addLayer(l);
                it.id = l._leaflet_id;
            });
            STORE[id] = { ...s[id], group: g };
            s[id].items.forEach(it => configItem(id, it.id));
        }
        renderSide();
    };

    // AUXILIARES
    function setMap(t) {
        if(t === 'y') { sat.addTo(map); map.removeLayer(str); document.getElementById('m-sat').classList.add('active'); document.getElementById('m-str').classList.remove('active'); }
        else { str.addTo(map); map.removeLayer(sat); document.getElementById('m-str').classList.add('active'); document.getElementById('m-sat').classList.remove('active'); }
    }
    function selB(id) { activeId = id; renderSide(); }
    function togV(e, id) { e.stopPropagation(); STORE[id].visible ? map.removeLayer(STORE[id].group) : map.addLayer(STORE[id].group); STORE[id].visible = !STORE[id].visible; }
    function focusL(bid, iid) { const l = STORE[bid].group.getLayer(iid); map.setView(l.getBounds ? l.getBounds().getCenter() : l.getLatLng(), 19); l.openPopup(); }
    function abrir(id) { document.getElementById(id).style.display = 'block'; }
    function cerrar(id) { document.getElementById(id).style.display = 'none'; }
    function borrarCapa() { if(activeId && confirm("¿Eliminar bloque seleccionado?")) { map.removeLayer(STORE[activeId].group); delete STORE[activeId]; activeId = null; renderSide(); } }
    function filtrarLista() { const q = document.getElementById('main-search').value.toLowerCase(); document.querySelectorAll('.item-row').forEach(el => el.style.display = el.innerText.toLowerCase().includes(q)?'flex':'none'); }
</script>
</body>
</html>
