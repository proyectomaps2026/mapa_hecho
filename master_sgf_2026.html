<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerebro Fiscal v13.1 - Gestión Municipal</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #d4af37;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #app-container { display: flex; height: 100vh; width: 100vw; }

        /* Panel Lateral - Punto 3 Reparado */
        #sidebar {
            width: 350px;
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--accent);
            z-index: 1000;
        }

        .search-container { padding: 15px; background: #262626; }
        #search-box { width: 100%; padding: 8px; border-radius: 4px; border: none; }

        #data-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .list-card {
            background: #333;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            border-left: 4px solid var(--info);
        }
        .list-card:hover { background: #444; transform: translateX(5px); }
        .list-card span { display: block; font-size: 0.8em; color: #bbb; }

        /* Mapa */
        #map { flex-grow: 1; background: #eee; }

        /* Popups - Punto 4 Reparado (Diferenciación) */
        .popup-custom { min-width: 200px; }
        .popup-sector { background: #000; color: #fff; border-radius: 8px; padding: 10px; }
        .popup-business { color: #333; }
        
        .img-preview { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; margin-top: 5px; cursor: pointer; }
        
        /* Botones y Controles */
        .btn-action { width: 100%; padding: 8px; margin-top: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--success); color: white; }
        
        .edit-mode-indicator { 
            position: absolute; top: 10px; right: 10px; z-index: 1001; 
            background: rgba(255,0,0,0.8); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="sidebar">
        <div class="search-container">
            <h2 style="color:var(--accent); margin:0 0 10px 0;">Fiscalización v13.1</h2>
            <input type="text" id="search-box" placeholder="Buscar contribuyente o sector..." onkeyup="filtrarLista()">
        </div>
        <div id="data-list">
            </div>
    </div>
    
    <div id="map"></div>
    <div id="edit-mode-tag" class="edit-mode-indicator">MODO EDICIÓN ACTIVO</div>
</div>

<script>
// --- CONFIGURACIÓN DE NÚCLEO ---
const CONFIG = {
    airtableToken: 'TU_TOKEN_AQUI',
    baseId: 'TU_BASE_ID',
    tableName: 'Contribuyentes',
    cloudinaryCloud: 'TU_CLOUD_NAME'
};

let map, markersGroup, sectorsGroup;
let allData = [];
let isEditMode = false;

// --- 1. INICIALIZACIÓN DEL MAPA ---
function initMap() {
    map = L.map('map').setView([7.7667, -72.2250], 14); // San Cristóbal base
    
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
    
    osm.addTo(map);
    L.control.layers({"Calle": osm, "Satélite": satellite}).addTo(map);

    markersGroup = L.layerGroup().addTo(map);
    sectorsGroup = L.layerGroup().addTo(map);

    loadAirtableData();
}

// --- 2. CEREBRO MATEMÁTICO (Contar puntos en polígonos) ---
function runCerebro(polygon) {
    let stats = { total: 0, activos: 0, deuda: 0, temporal: 0 };
    
    markersGroup.eachLayer(marker => {
        if (polygon.getBounds().contains(marker.getLatLng())) {
            stats.total++;
            const status = marker.options.status;
            if (status === 'Activo') stats.activos++;
            else if (status === 'Deuda') stats.deuda++;
            else stats.temporal++;
        }
    });
    return stats;
}

// --- 3. GESTIÓN DE MARCADORES (Punto 1 y 5 Reparados) ---
function createBusinessMarker(record) {
    const fields = record.fields;
    const color = getStatusColor(fields.Estatus);
    
    const customIcon = L.divIcon({
        className: 'custom-pin',
        html: `<div id="pin-${record.id}" style="background-color:${color}; width:16px; height:16px; border-radius:50%; border:2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5);"></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8]
    });

    const marker = L.marker([fields.Latitud, fields.Longitud], {
        icon: customIcon,
        id: record.id,
        status: fields.Estatus
    });

    // Evento persistente (Punto 1)
    marker.on('click', function() {
        showBusinessPopup(marker, record);
    });

    markersGroup.addLayer(marker);
}

// --- 4. POPUPS DIFERENCIADOS (Punto 4 Reparado) ---
function showBusinessPopup(marker, record) {
    const f = record.fields;
    // Privacidad: Solo mostramos la miniatura si existe Cloudinary
    const imgHtml = f.Foto_URL ? `<img src="${f.Foto_URL}" class="img-preview" onclick="window.open('${f.Foto_URL}', '_blank')">` : '';

    const content = `
        <div class="popup-business">
            <strong>${f.RazonSocial || 'Sin Nombre'}</strong><br>
            <small>${f.RIF || 'Sin RIF'}</small><br>
            ${imgHtml}
            <hr>
            <label>Estatus Fiscal:</label>
            <select id="pop-status-${record.id}" onchange="upCol('${record.id}', this.value)">
                <option value="Activo" ${f.Estatus === 'Activo' ? 'selected' : ''}>Activo (Verde)</option>
                <option value="Deuda" ${f.Estatus === 'Deuda' ? 'selected' : ''}>Deuda (Rojo)</option>
                <option value="Temporal" ${f.Estatus === 'Temporal' ? 'selected' : ''}>Temporal (Amarillo)</option>
            </select>
            <button class="btn-action btn-save" onclick="saveData('${record.id}')">GUARDAR CAMBIOS</button>
        </div>
    `;
    marker.bindPopup(content).openPopup();
}

function showSectorPopup(layer) {
    const stats = runCerebro(layer);
    const content = `
        <div class="popup-sector">
            <h3 style="margin:0; color:var(--accent);">Resumen de Sector</h3>
            <hr>
            <p>Total Locales: <b>${stats.total}</b></p>
            <p>✅ Activos: ${stats.activos}</p>
            <p>❌ Deuda: ${stats.deuda}</p>
            <hr>
            <label>Color de Área:</label>
            <input type="color" onchange="updatePolygonStyle(this.value, '${layer._leaflet_id}')">
        </div>
    `;
    layer.bindPopup(content).openPopup();
}

// --- 5. FUNCIONES DE ACTUALIZACIÓN (Punto 5 Reparado: upCol) ---
function upCol(id, newStatus) {
    const newColor = getStatusColor(newStatus);
    const pinElement = document.getElementById(`pin-${id}`);
    if (pinElement) {
        pinElement.style.backgroundColor = newColor; // Refresco instantáneo UI
    }
    console.log(`Pre-ajuste de color para ${id}: ${newStatus}`);
}

async function saveData(id) {
    const newStatus = document.getElementById(`pop-status-${id}`).value;
    
    // Aquí iría la llamada a Axios para Airtable
    console.log(`Enviando a Airtable... ID: ${id}, Status: ${newStatus}`);
    
    map.closePopup();
    // No destruimos el marcador, solo actualizamos su metadata interna
    const marker = getMarkerById(id);
    if(marker) marker.options.status = newStatus;
    
    actualizarPanelLateral(); // Refrescar lista lateral
}

// --- 6. IMPORTACIÓN Y PANEL (Punto 2 y 3 Reparados) ---
function processExcelImport(data) {
    data.forEach(row => {
        // Punto 2: Capturar Semáforo desde Excel
        const statusImported = row.Semaforo || row.Estatus || 'Activo';
        const record = {
            id: 'new_' + Math.random().toString(36).substr(2, 9),
            fields: {
                RazonSocial: row.Nombre,
                Latitud: row.Lat,
                Longitud: row.Lng,
                Estatus: statusImported
            }
        };
        createBusinessMarker(record);
        allData.push(record);
    });
    actualizarPanelLateral();
}

function actualizarPanelLateral() {
    const listContainer = document.getElementById('data-list');
    listContainer.innerHTML = '';

    allData.forEach(item => {
        const card = document.createElement('div');
        card.className = 'list-card';
        card.innerHTML = `
            <strong>${item.fields.RazonSocial}</strong>
            <span>RIF: ${item.fields.RIF || 'N/A'} | Estatus: ${item.fields.Estatus}</span>
        `;
        card.onclick = () => {
            const marker = getMarkerById(item.id);
            if(marker) {
                map.setView(marker.getLatLng(), 19);
                marker.openPopup();
            }
        };
        listContainer.appendChild(card);
    });
}

// --- HELPERS ---
function getStatusColor(status) {
    switch(status) {
        case 'Activo': return '#28a745';
        case 'Deuda': return '#dc3545';
        case 'Temporal': return '#ffc107';
        default: return '#007bff';
    }
}

function getMarkerById(id) {
    let found = null;
    markersGroup.eachLayer(layer => {
        if (layer.options.id === id) found = layer;
    });
    return found;
}

function updatePolygonStyle(color, leafletId) {
    const layer = sectorsGroup.getLayer(leafletId);
    if (layer) {
        layer.setStyle({ fillColor: color, color: color });
    }
}

// Iniciar sistema
window.onload = initMap;

</script>
</body>
</html>
