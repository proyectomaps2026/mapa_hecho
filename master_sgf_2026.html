<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF AYACUCHO v12.4 - ELASTIC ENGINE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0b0e14; --panel: #161b22; --text: #f0f3f6; --border: #30363d; --yellow: #fbbc04; --safe: #238636; --danger: #da3633; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }
        
        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: rgba(22, 27, 34, 0.96); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 12px; }
        
        /* Top Nav */
        .top-nav { top: 15px; left: 15px; right: 15px; display: flex; gap: 10px; height: 55px; align-items: center; padding: 0 15px; }
        .search-box { flex: 1; max-width: 350px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.4); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border); }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        
        .tool-dock { display: flex; gap: 5px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 10px; border: 1px solid var(--border); }
        .t-btn { background: transparent; border: none; color: #8b949e; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .t-btn.active { color: var(--accent); background: rgba(0,242,255,0.15); border: 1px solid var(--accent); }

        /* Sidebar Multi-Capa */
        #sidebar { top: 85px; left: 15px; bottom: 20px; width: 380px; display: flex; flex-direction: column; }
        .side-head { padding: 15px; border-bottom: 1px solid var(--border); border-top: 4px solid var(--yellow); }
        .layer-zone { flex: 1; overflow-y: auto; padding: 10px; }
        
        .b-card { background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--border); overflow: hidden; }
        .b-card.active-b { border-color: var(--accent); }
        .b-head { padding: 12px; display: flex; flex-direction: column; gap: 8px; cursor: pointer; }
        .b-title-row { display: flex; align-items: center; gap: 10px; width: 100%; }
        
        /* Selectores de Visualización por Capa */
        .config-row { display: flex; gap: 5px; width: 100%; padding-top: 5px; border-top: 1px solid rgba(255,255,255,0.05); }
        .mini-sel { background: #0d1117; color: var(--accent); border: 1px solid var(--border); font-size: 9px; padding: 2px; border-radius: 4px; flex: 1; }

        .item-list { border-top: 1px solid var(--border); display: none; max-height: 250px; overflow-y: auto; }
        .active-b .item-list { display: block; }
        .item-row { padding: 10px 15px 10px 45px; font-size: 11px; color: #8b949e; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        /* Popup Dinámico Superado */
        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 14px; background: white; }
        .pop-card { width: 300px; color: #333; }
        .pop-img { width: 100%; height: 160px; object-fit: cover; background: #000; }
        .pop-body { padding: 15px; max-height: 300px; overflow-y: auto; }
        .pop-data-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 6px 0; align-items: center; }
        .pop-label { font-size: 9px; font-weight: 800; color: #999; text-transform: uppercase; width: 40%; }
        .pop-val { font-size: 11px; font-weight: 600; width: 60%; border: none; background: transparent; text-align: right; }
        .pop-val:focus { background: #f0faff; outline: none; }
        .pop-save { background: var(--safe); color: white; border: none; width: 100%; padding: 10px; border-radius: 0 0 14px 14px; font-weight: 900; cursor: pointer; }

        .m-ctrl { bottom: 50px; right: 15px; display: flex; flex-direction: column; gap: 8px; }
        .m-btn { width: 48px; height: 48px; border-radius: 12px; cursor: pointer; border: 2px solid var(--border); overflow: hidden; opacity: 0.8; }
        .m-btn.active { opacity: 1; border-color: var(--accent); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui top-nav glass">
    <div class="search-box">
        <i class="fas fa-search" style="color:var(--accent)"></i>
        <input type="text" id="main-search" placeholder="Buscar en Hacienda..." oninput="filtrarTodo()">
    </div>
    <div class="tool-dock">
        <button class="t-btn active" onclick="resetTool()"><i class="fas fa-mouse-pointer"></i></button>
        <button class="t-btn" onclick="enableTool('marker')"><i class="fas fa-map-marker-alt"></i></button>
        <button class="t-btn" onclick="enableTool('poly')"><i class="fas fa-draw-polygon"></i></button>
    </div>
    <button class="glass" style="color:white; border:1px solid var(--safe); padding:0 15px; cursor:pointer" onclick="exportarConfig()">GUARDAR</button>
</div>

<aside id="sidebar" class="glass ui">
    <div class="side-head">
        <h2 style="margin:0; font-size:14px;">MOTOR AYACUCHO v12.4</h2>
        <span style="font-size:10px; color:var(--accent); font-weight:bold">HACIENDA MUNICIPAL</span>
    </div>
    <div class="layer-zone" id="list-container"></div>
    <div style="padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <button class="glass" style="color:white; padding:10px; font-size:11px" onclick="crearBloqueManual()">+ SECTOR</button>
        <button class="glass" style="background:var(--yellow); color:#000; padding:10px; font-size:11px; font-weight:800" onclick="abrirModal('m-csv')">IMPORTAR RAW</button>
    </div>
</aside>

<div id="m-csv" class="glass ui" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:340px; padding:25px; display:none; z-index:2000">
    <h3 style="margin-top:0">Importación Elástica</h3>
    <input type="text" id="csv-url" style="width:100%; padding:10px; margin-bottom:10px" placeholder="URL Google Sheets">
    <button class="pop-save" style="border-radius:8px" onclick="procesoRaw()">CARGAR COLUMNAS</button>
    <div id="raw-config" style="display:none; margin-top:15px; max-height:250px; overflow-y:auto">
        <label style="font-size:10px">Columna Coordenadas:</label><select id="s-coo" style="width:100%; margin-bottom:10px"></select>
        <label style="font-size:10px">Columna Foto URL:</label><select id="s-img" style="width:100%; margin-bottom:10px"></select>
        <div style="font-size:10px; color:var(--accent); margin-bottom:5px">Se leerán todas las columnas detectadas.</div>
        <button class="pop-save" style="border-radius:8px; background:var(--accent); color:black" onclick="inyectarDatos()">INYECTAR DATOS</button>
    </div>
    <button class="pop-save" style="border-radius:8px; background:var(--danger); margin-top:10px" onclick="cerrarModal('m-csv')">CANCELAR</button>
</div>

<div class="ui m-ctrl">
    <div class="m-btn active" id="m-sat" onclick="setLayer('y')"><img src="https://mt1.google.com/vt/lyrs=y&x=1194&y=1646&z=12" width="100%"></div>
    <div class="m-btn" id="m-str" onclick="setLayer('m')"><img src="https://mt1.google.com/vt/lyrs=m&x=1194&y=1646&z=12" width="100%"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false, attributionControl: false });
    const satLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    const strLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] });

    let STORE = {}; let activeId = null; let rawData = []; let allCols = [];

    const getIcon = (color) => L.divIcon({ html: `<i class="fas fa-map-marker-alt" style="color:${color}; font-size:26px; text-shadow: 0 0 4px #000"></i>`, className: 'c-pin', iconSize: [26, 26], iconAnchor: [13, 26], popupAnchor: [0, -22] });

    // Herramientas
    const drawM = new L.Draw.Marker(map, { icon: getIcon('#00f2ff') });
    const drawP = new L.Draw.Polygon(map, { shapeOptions: { color: '#00f2ff' } });
    function enableTool(t) { resetTool(); if(!activeId) return; t==='marker'?drawM.enable():drawP.enable(); }
    function resetTool() { drawM.disable(); drawP.disable(); }

    map.on(L.Draw.Event.CREATED, (e) => {
        const l = e.layer; l.options.draggable = true;
        STORE[activeId].group.addLayer(l);
        const it = { lid: l._leaflet_id, data: { "Nombre": "Nuevo Registro" }, img: "", color: "#00f2ff" };
        STORE[activeId].items.push(it); renderSide(); configPopup(activeId, it.lid);
    });

    // MOTOR ELÁSTICO DE POPUP
    function configPopup(bid, lid) {
        const it = STORE[bid].items.find(x => x.lid === lid);
        const l = STORE[bid].group.getLayer(lid);
        const capa = STORE[bid];
        
        // Determinar color por columna de semáforo
        let color = it.color || '#00f2ff';
        if(capa.semCol && it.data[capa.semCol]) {
            const val = it.data[capa.semCol].toUpperCase();
            if(val.includes('VENCID') || val.includes('DEUDA')) color = '#da3633';
            else if(val.includes('DIA') || val.includes('ACTIVO')) color = '#238636';
            else if(val.includes('PROCESO')) color = '#fbbc04';
        }
        if(l.setIcon) l.setIcon(getIcon(color));

        let rowsHtml = "";
        for(let key in it.data) {
            rowsHtml += `<div class="pop-data-row">
                <span class="pop-label">${key}</span>
                <input type="text" class="pop-val" value="${it.data[key]}" onchange="updateData('${bid}',${lid},'${key}',this.value)">
            </div>`;
        }

        l.bindPopup(`
            <div class="pop-card">
                <img src="${it.img}" class="pop-img" onerror="this.src='https://via.placeholder.com/300x160?text=SIN+FOTO'">
                <div class="pop-body">${rowsHtml}</div>
                <button class="pop-save" onclick="STORE['${bid}'].group.getLayer(${lid}).closePopup()">CERRAR Y GUARDAR</button>
            </div>
        `, { padding: [0,0] });
    }

    function updateData(bid, lid, key, val) {
        const it = STORE[bid].items.find(x => x.lid === lid);
        it.data[key] = val;
        renderSide();
    }

    // PANEL LATERAL DINÁMICO
    function renderSide() {
        const box = document.getElementById('list-container'); box.innerHTML = "";
        for(let id in STORE) {
            const capa = STORE[id];
            const isActive = (id === activeId);
            let options = allCols.map(c => `<option value="${c}" ${capa.viewCol===c?'selected':''}>Ver ${c}</option>`).join('');
            let semOptions = allCols.map(c => `<option value="${c}" ${capa.semCol===c?'selected':''}>Semáforo: ${c}</option>`).join('');

            let h = `<div class="b-card ${isActive?'active-b':''}">
                <div class="b-head" onclick="activeId='${id}';renderSide()">
                    <div class="b-title-row">
                        <input type="checkbox" ${capa.visible?'checked':''} onclick="event.stopPropagation(); toggleVis('${id}')">
                        <input type="text" class="capa-rename" value="${capa.name}" onchange="STORE['${id}'].name=this.value">
                        <i class="fas fa-trash" style="color:var(--danger); font-size:10px" onclick="event.stopPropagation(); borrarCapa('${id}')"></i>
                    </div>
                    <div class="config-row">
                        <select class="mini-sel" onclick="event.stopPropagation()" onchange="STORE['${id}'].viewCol=this.value;renderSide()">${options}</select>
                        <select class="mini-sel" onclick="event.stopPropagation()" onchange="STORE['${id}'].semCol=this.value;recolor('${id}')">${semOptions}</select>
                    </div>
                </div>
                <div class="item-list">`;
            capa.items.forEach(it => {
                const label = it.data[capa.viewCol] || "S/N";
                h += `<div class="item-row" onclick="foc('${id}',${it.lid})">
                    <i class="fas fa-store" style="color:var(--accent)"></i>
                    <span style="flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${label}</span>
                </div>`;
            });
            box.insertAdjacentHTML('beforeend', h+'</div></div>');
        }
    }

    // PROCESO RAW ELÁSTICO
    async function procesoRaw() {
        let url = document.getElementById('csv-url').value;
        if(url.includes('/edit')) url = url.replace(/\/edit.*$/, '/export?format=csv');
        try {
            const res = await fetch(url); const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
            allCols = rows[0]; rawData = [];
            for(let i=1; i<rows.length; i++) { if(rows[i].length >= allCols.length) { let obj = {}; allCols.forEach((k, idx) => obj[k] = rows[i][idx]); rawData.push(obj); } }
            let opts = allCols.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('s-coo').innerHTML = opts;
            document.getElementById('s-img').innerHTML = opts;
            document.getElementById('raw-config').style.display = 'block';
        } catch (e) { alert("Error al leer Excel"); }
    }

    function inyectarDatos() {
        const bid = 'b'+Date.now(); const grp = new L.FeatureGroup().addTo(map);
        const its = [];
        const cCol = document.getElementById('s-coo').value;
        const iCol = document.getElementById('s-img').value;

        rawData.forEach(row => {
            const p = row[cCol].replace(/[A-Za-z()]/g, '').trim().split(/[, ]+/);
            const lat = parseFloat(p[0]), lng = parseFloat(p[1]);
            if(!isNaN(lat)) {
                const m = L.marker([lat, lng], { draggable: true });
                grp.addLayer(m);
                // Copiamos TODOS los datos del Excel al objeto
                const it = { lid: m._leaflet_id, data: {...row}, img: row[iCol], color: '#00f2ff' };
                its.push(it);
            }
        });
        STORE[bid] = { name: "Sector Importado", items: its, group: grp, visible: true, viewCol: allCols[0], semCol: allCols[0] };
        activeId = bid;
        its.forEach(it => configPopup(bid, it.lid));
        renderSide(); cerrarModal('m-csv');
    }

    function recolor(bid) { STORE[bid].items.forEach(it => configPopup(bid, it.lid)); }
    function toggleVis(id) { STORE[id].visible = !STORE[id].visible; if(STORE[id].visible) map.addLayer(STORE[id].group); else map.removeLayer(STORE[id].group); renderSide(); }
    function borrarCapa(id) { if(confirm("Borrar?")) { map.removeLayer(STORE[id].group); delete STORE[id]; renderSide(); } }
    function foc(bid, lid) { const l = STORE[bid].group.getLayer(lid); map.setView(l.getLatLng(), 19); l.openPopup(); }
    function crearBloqueManual() { const bid = 'b'+Date.now(); STORE[bid] = { name: "Nuevo Sector", items: [], group: new L.FeatureGroup().addTo(map), visible: true, viewCol: 'Nombre' }; activeId = bid; renderSide(); }
    function abrirModal(id) { document.getElementById(id).style.display = 'block'; }
    function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
    function setLayer(t) { if(t==='y') { satLayer.addTo(map); map.removeLayer(strLayer); } else { strLayer.addTo(map); map.removeLayer(satLayer); } 
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active')); document.getElementById('m-'+(t==='y'?'sat':'str')).classList.add('active'); }
    function filtrarTodo() { const q = document.getElementById('main-search').value.toLowerCase(); document.querySelectorAll('.item-row').forEach(el => el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none'); }
    function exportarConfig() { const blob = new Blob([JSON.stringify(STORE)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'hacienda_ayacucho_v12.json'; a.click(); }
</script>
</body>
</html>
