<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF AYACUCHO v12.1 - MULTI-CAPA REAL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0b0e14; --panel: #161b22; --text: #f0f3f6; --border: #30363d; --yellow: #fbbc04; --safe: #238636; --danger: #da3633; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; background: #000; }
        
        /* UI y Atribución */
        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: rgba(22, 27, 34, 0.95); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 12px; }
        .hacienda-attr { bottom: 10px; right: 10px; font-size: 10px; color: white; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-weight: 800; letter-spacing: 0.5px; }
        
        /* Nav Superior */
        .top-nav { top: 15px; left: 15px; right: 15px; display: flex; gap: 10px; height: 55px; align-items: center; padding: 0 15px; }
        .search-box { flex: 1; max-width: 400px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.4); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border); }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
        
        /* Sidebar Multi-Capa */
        #sidebar { top: 85px; left: 15px; bottom: 20px; width: 360px; display: flex; flex-direction: column; }
        .side-head { padding: 15px; border-bottom: 1px solid var(--border); border-top: 4px solid var(--yellow); }
        .layer-zone { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* Acordeón de Capas Corregido */
        .b-card { background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--border); overflow: hidden; }
        .b-card.active-b { border-color: var(--accent); background: rgba(0,242,255,0.05); }
        .b-head { padding: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; background: rgba(255,255,255,0.02); }
        .b-head:hover { background: rgba(255,255,255,0.05); }
        .capa-rename { background: transparent; border: none; color: white; font-weight: 800; font-size: 13px; flex: 1; outline: none; padding: 2px 5px; border-radius: 4px; }
        .capa-rename:focus { background: rgba(0,0,0,0.3); border: 1px solid var(--accent); }
        
        .item-list { border-top: 1px solid var(--border); max-height: 300px; overflow-y: auto; display: none; }
        .active-b .item-list { display: block; }
        .item-row { padding: 10px 15px 10px 45px; font-size: 11px; color: #8b949e; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .item-row:hover { color: white; background: rgba(255,255,255,0.1); }

        /* Popup Ayacucho Style */
        .leaflet-popup-content-wrapper { background: white; border-radius: 14px; padding: 0; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .pop-container { width: 280px; }
        .pop-img { width: 100%; height: 160px; object-fit: cover; background: #222; }
        .pop-body { padding: 15px; color: #111; }
        .pop-title { font-size: 18px; font-weight: 900; margin-bottom: 12px; color: #000; display: flex; align-items: center; justify-content: space-between; }
        .pop-row { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid #eee; }
        .pop-label { font-weight: 700; color: #666; }
        .status-pill { display: flex; align-items: center; gap: 6px; font-weight: 800; font-size: 10px; padding: 3px 10px; border-radius: 20px; background: #f0f0f0; border: 1px solid #ddd; }
        
        /* Controles */
        .m-ctrl { bottom: 50px; right: 15px; display: flex; flex-direction: column; gap: 8px; }
        .m-btn { width: 48px; height: 48px; border-radius: 12px; cursor: pointer; border: 2px solid var(--border); overflow: hidden; }
        .m-btn.active { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5000; width: 340px; padding: 25px; display: none; }
        .pop-btn { background: #1a73e8; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: 800; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="hacienda-attr ui">
    <div style="width:12px; height:8px; background:#ffcc00; position:relative;"></div>
    HACIENDA AYACUCHO 2026
</div>

<div class="ui top-nav glass">
    <div class="search-box">
        <i class="fas fa-search" style="color:var(--accent)"></i>
        <input type="text" id="main-search" placeholder="Buscar RIF o Contribuyente..." oninput="filtrarTodo()">
    </div>
    <button class="pop-btn" style="width:auto; margin:0; padding: 0 20px; background:var(--safe)" onclick="exportarConfig()"><i class="fas fa-save"></i> GUARDAR TODO</button>
</div>

<aside id="sidebar" class="glass ui">
    <div class="side-head">
        <h2 style="margin:0; font-size:15px; letter-spacing:1px">CONTROL FISCAL</h2>
        <span style="font-size:10px; color:var(--accent); font-weight:bold">SGF AYACUCHO v12.1</span>
    </div>
    <div class="layer-zone" id="list-container">
        </div>
    <div style="padding: 15px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="pop-btn" style="background:#30363d; margin:0" onclick="crearBloqueManual()"><i class="fas fa-plus"></i> Sector</button>
        <button class="pop-btn" style="background:var(--yellow); color:#000; margin:0" onclick="abrir('m-csv')"><i class="fas fa-database"></i> RAW</button>
    </div>
</aside>

<div class="ui m-ctrl">
    <div class="m-btn active" id="m-sat" onclick="setLayer('y')"><img src="https://mt1.google.com/vt/lyrs=y&x=1194&y=1646&z=12" width="100%"></div>
    <div class="m-btn" id="m-str" onclick="setLayer('m')"><img src="https://mt1.google.com/vt/lyrs=m&x=1194&y=1646&z=12" width="100%"></div>
</div>

<div id="m-csv" class="modal glass ui">
    <h3 style="margin:0 0 15px 0">Importación Fiscal RAW</h3>
    <input type="text" id="csv-url" style="width:100%; padding:10px; background:#0d1117; color:white; border:1px solid var(--border)" placeholder="URL de Google Sheets">
    <button class="pop-btn" style="background:var(--safe)" onclick="procesoRaw()">1. CARGAR COLUMNAS</button>
    
    <div id="raw-map" style="display:none; margin-top:15px; max-height: 250px; overflow-y:auto; padding-right:5px">
        <label style="font-size:10px; color:#aaa">Nombre:</label><select id="s-nom" style="width:100%; margin-bottom:5px"></select>
        <label style="font-size:10px; color:#aaa">Coordenadas:</label><select id="s-coo" style="width:100%; margin-bottom:5px"></select>
        <label style="font-size:10px; color:#aaa">Censo N°:</label><select id="s-cen" style="width:100%; margin-bottom:5px"></select>
        <label style="font-size:10px; color:#aaa">Fiscal:</label><select id="s-fis" style="width:100%; margin-bottom:5px"></select>
        <label style="font-size:10px; color:#aaa">Estatus:</label><select id="s-est" style="width:100%; margin-bottom:5px"></select>
        <label style="font-size:10px; color:#aaa">Foto URL:</label><select id="s-img" style="width:100%; margin-bottom:10px"></select>
        <button class="pop-btn" onclick="inyectarDatos()">2. INYECTAR DATOS</button>
    </div>
    <button class="pop-btn" style="background:var(--danger); margin-top:10px" onclick="cerrar('m-csv')">Cerrar</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false, attributionControl: false });
    const satLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    const strLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] });

    let STORE = {}; // Objeto maestro de datos
    let activeId = null; // ID de la capa abierta en el panel
    let rawData = [];

    const getIcon = (c) => L.divIcon({ html: `<i class="fas fa-map-marker-alt" style="color:${c}; font-size:26px; text-shadow: 0 0 4px #000"></i>`, className: 'c-pin', iconSize: [26, 26], iconAnchor: [13, 26], popupAnchor: [0, -22] });

    function createPopupContent(it) {
        const estColor = it.estatus && it.estatus.toUpperCase().includes('VENCIDA') ? '#fbbc04' : '#238636';
        return `
            <div class="pop-container">
                <img src="${it.img}" class="pop-img" onerror="this.src='https://via.placeholder.com/300x160?text=SIN+FOTO+FACHADA'">
                <div class="pop-body">
                    <div class="pop-title">
                        ${it.name} 
                        <i class="fas fa-edit" style="font-size:14px; color:#1a73e8; cursor:pointer" title="Editar datos"></i>
                    </div>
                    <div class="pop-row"><span class="pop-label">Censo N°</span><span>${it.censo || '-'}</span></div>
                    <div class="pop-row"><span class="pop-label">Fiscal</span><span>${it.fiscal || '-'}</span></div>
                    <div class="pop-row"><span class="pop-label">Licencia</span>
                        <span class="status-pill"><div style="width:10px; height:10px; border-radius:50%; background:${estColor}"></div> ${it.estatus || 'ACTIVA'}</span>
                    </div>
                    <div style="font-size:9px; color:#999; margin-top:10px; text-align:center">Fiscalización Municipal 2026</div>
                </div>
            </div>
        `;
    }

    async function procesoRaw() {
        let url = document.getElementById('csv-url').value;
        if(url.includes('/edit')) url = url.replace(/\/edit.*$/, '/export?format=csv');
        try {
            const res = await fetch(url);
            const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
            const h = rows[0]; rawData = [];
            for(let i=1; i<rows.length; i++) { if(rows[i].length >= h.length) { let obj = {}; h.forEach((k, idx) => obj[k] = rows[i][idx]); rawData.push(obj); } }
            let opts = ""; h.forEach(k => opts += `<option value="${k}">${k}</option>`);
            ['s-nom','s-coo','s-cen','s-fis','s-est','s-img'].forEach(id => document.getElementById(id).innerHTML = opts);
            document.getElementById('raw-map').style.display = 'block';
        } catch (e) { alert("Error al conectar con RAW."); }
    }

    function inyectarDatos() {
        const bid = 'b' + Date.now();
        const grp = new L.FeatureGroup().addTo(map);
        const mapIds = { n:'s-nom', c:'s-coo', ce:'s-cen', f:'s-fis', e:'s-est', i:'s-img' };
        const its = [];
        
        rawData.forEach(row => {
            const coords = row[document.getElementById(mapIds.c).value].replace(/[A-Za-z()]/g, '').trim().split(/[, ]+/);
            const lat = parseFloat(coords[0]), lng = parseFloat(coords[1]);
            if(!isNaN(lat)) {
                const it = {
                    name: row[document.getElementById(mapIds.n).value] || "S/N",
                    censo: row[document.getElementById(mapIds.ce).value] || "-",
                    fiscal: row[document.getElementById(mapIds.f).value] || "-",
                    estatus: row[document.getElementById(mapIds.e).value] || "ACTIVA",
                    img: row[document.getElementById(mapIds.i).value] || "",
                    lat, lng, color: '#00f2ff'
                };
                const m = L.marker([lat, lng], { draggable: true });
                m.bindPopup(createPopupContent(it), { padding: [0,0] });
                grp.addLayer(m);
                it.leafletId = m._leaflet_id;
                its.push(it);
            }
        });
        
        STORE[bid] = { name: "Sector RAW " + Object.keys(STORE).length, items: its, group: grp, visible: true };
        activeId = bid; // Abrir automáticamente la nueva capa
        renderSide();
        cerrar('m-csv');
    }

    function renderSide() {
        const box = document.getElementById('list-container');
        box.innerHTML = "";
        
        for (let id in STORE) {
            const capa = STORE[id];
            const isActive = (id === activeId);
            
            const card = document.createElement('div');
            card.className = `b-card ${isActive ? 'active-b' : ''}`;
            
            card.innerHTML = `
                <div class="b-head" onclick="toggleAccordion('${id}')">
                    <input type="checkbox" ${capa.visible ? 'checked' : ''} onclick="event.stopPropagation(); toggleCapaVisibility('${id}')">
                    <input type="text" class="capa-rename" value="${capa.name}" 
                           onclick="event.stopPropagation()" 
                           onchange="STORE['${id}'].name=this.value" 
                           onkeydown="if(event.key==='Enter') this.blur()">
                    <span style="font-size:10px; color:var(--accent); font-weight:bold">${capa.items.length}</span>
                    <i class="fas fa-trash" style="color:var(--danger); cursor:pointer; font-size:12px; margin-left:5px" 
                       onclick="event.stopPropagation(); borrarCapa('${id}')"></i>
                </div>
                <div class="item-list">
                    ${capa.items.map(it => `
                        <div class="item-row" onclick="foc('${id}', ${it.leafletId})">
                            <i class="fas fa-store" style="color:var(--accent)"></i>
                            <span style="flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${it.name}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            box.appendChild(card);
        }
    }

    function toggleAccordion(id) {
        activeId = (activeId === id) ? null : id;
        renderSide();
    }

    function toggleCapaVisibility(id) {
        STORE[id].visible = !STORE[id].visible;
        if(STORE[id].visible) map.addLayer(STORE[id].group); else map.removeLayer(STORE[id].group);
        renderSide();
    }

    function borrarCapa(id) {
        if(confirm(`¿Eliminar el sector "${STORE[id].name}"?`)) {
            map.removeLayer(STORE[id].group);
            delete STORE[id];
            if(activeId === id) activeId = null;
            renderSide();
        }
    }

    function crearBloqueManual() {
        const bid = 'b' + Date.now();
        STORE[bid] = { name: "Nuevo Sector", items: [], group: new L.FeatureGroup().addTo(map), visible: true };
        activeId = bid;
        renderSide();
    }

    function foc(bid, lid) {
        const layer = STORE[bid].group.getLayer(lid);
        if(layer) {
            map.setView(layer.getLatLng(), 19);
            layer.openPopup();
        }
    }

    function setLayer(t) {
        if(t==='y') { satLayer.addTo(map); map.removeLayer(strLayer); } 
        else { strLayer.addTo(map); map.removeLayer(satLayer); } 
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('m-'+(t==='y'?'sat':'str')).classList.add('active');
    }

    function filtrarTodo() {
        const q = document.getElementById('main-search').value.toLowerCase();
        document.querySelectorAll('.item-row').forEach(el => {
            el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
        });
    }

    function abrir(id) { document.getElementById(id).style.display = 'block'; }
    function cerrar(id) { document.getElementById(id).style.display = 'none'; }
    function exportarConfig() { 
        localStorage.setItem('SGF_AYACUCHO_SAVE', JSON.stringify(STORE)); 
        alert("¡Todo guardado en la memoria del navegador!"); 
    }
</script>
</body>
</html>
