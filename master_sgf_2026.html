<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGF - AYACUCHO FINAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        :root { --am: #ffcc00; --rj: #e60000; --vd: #007a33; --dk: #0f172a; }
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #000; overflow: hidden; }
        #map { flex: 1; z-index: 1; background: #000; }
        .leaflet-control-attribution { display: none !important; }

        .brand-header { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: rgba(15, 23, 42, 0.95); padding: 15px; border-radius: 8px;
            border-left: 5px solid var(--am); color: white; backdrop-filter: blur(10px);
        }

        #sidebar { width: 400px; background: var(--dk); border-left: 1px solid #334155; display: flex; flex-direction: column; }
        .side-header { padding: 30px 20px; text-align: center; position: relative; background: #1e293b; color: white; }
        .side-header::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(to right, var(--am) 33.3%, var(--rj) 33.3% 66.6%, var(--vd) 66.6%);
        }
        
        .side-content { flex: 1; overflow-y: auto; padding: 20px; }
        .btn-add { width: 100%; padding: 15px; background: var(--am); border: none; border-radius: 8px; font-weight: 900; cursor: pointer; margin-bottom: 20px; }

        .layer-box { background: #1e293b; border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; color: white; }
        .url-in { width: 100%; padding: 8px; background: #020617; border: 1px solid #475569; color: white; border-radius: 4px; font-size: 11px; margin: 10px 0; }
        
        .btn-s { padding: 10px; border: none; border-radius: 4px; background: #334155; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 5px; }
        .btn-draw { background: transparent; border: 1px solid var(--am); color: var(--am); }
    </style>
</head>
<body>

<div id="map"></div>
<div class="brand-header"><b>HACIENDA MUNICIPAL AYACUCHO</b><br><small style="color:var(--am)">SGF MASTER - 2026</small></div>

<aside id="sidebar">
    <div class="side-header"><h3 style="margin:0;">GESTIÓN FISCAL</h3></div>
    <div class="side-content">
        <button class="btn-add" onclick="createLayer()">+ VINCULAR HOJA DE CÁLCULO</button>
        <div id="layer-list"></div>
    </div>
</aside>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    let LAYERS = {}; 

    const sat = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20 });
    const map = L.map('map', { center: [8.033, -72.256], zoom: 16, layers: [sat], zoomControl: false });

    function createLayer() {
        const n = prompt("Nombre Capa:"); if(!n) return;
        const id = 'L'+Date.now();
        LAYERS[id] = { name: n, group: L.featureGroup().addTo(map), url: '' };
        render();
    }

    function render() {
        const list = document.getElementById('layer-list'); list.innerHTML = "";
        Object.keys(LAYERS).forEach(id => {
            const l = LAYERS[id];
            list.innerHTML += `<div class="layer-box">
                <b>${l.name}</b>
                <input type="text" class="url-in" placeholder="Link de Google Sheets..." onchange="updUrl('${id}', this.value)" value="${l.url}">
                <button class="btn-s" onclick="sync('${id}')">🔄 CARGAR COMERCIOS</button>
            </div>`;
        });
    }

    function updUrl(id, u) { 
        if(u.includes('/edit')) u = u.split('/edit')[0] + '/export?format=csv'; 
        LAYERS[id].url = u; 
    }

    function sync(id) {
        if(!LAYERS[id].url) return alert("Pega el link primero.");
        
        Papa.parse(LAYERS[id].url, {
            download: true, 
            header: true, 
            skipEmptyLines: true,
            complete: r => {
                const group = LAYERS[id].group; 
                group.clearLayers();
                let contador = 0;

                r.data.forEach(row => {
                    // --- MOTOR DE BÚSQUEDA DE COORDINADAS (REPARADO) ---
                    let raw = "";
                    
                    // Buscamos la columna por nombre exacto o parcial (insensible a mayúsculas/minúsculas)
                    Object.keys(row).forEach(key => {
                        let k = key.toLowerCase().trim();
                        if(k.includes('coordenadas') || k.includes('gps')) {
                            raw = row[key];
                        }
                    });

                    if(raw) {
                        // Limpiamos la cadena de paréntesis, corchetes y espacios extra
                        let limpio = raw.replace(/[()\[\]]/g, '').replace(/\s+/g, ' ').trim();
                        let partes = limpio.split(/[\s,]+/); 
                        
                        let lat = parseFloat(partes[0]);
                        let lon = parseFloat(partes[1]);

                        if(!isNaN(lat) && !isNaN(lon)) {
                            // Definimos color por estatus
                            let estatus = (row.Estatus || row.Estado || "").toUpperCase();
                            let color = estatus.includes("MORA") ? "#ef4444" : "#10b981";

                            const m = L.circleMarker([lat, lon], { 
                                radius: 8, color: '#fff', weight: 2, fillColor: color, fillOpacity: 1 
                            });

                            // Popup automático con todos los datos del Excel
                            let info = `<div style="color:black"><b>${row.Nombre || 'Comercio'}</b><br>`;
                            Object.keys(row).forEach(k => { 
                                if(row[k] && k.length < 25) info += `<small><b>${k}:</b> ${row[k]}</small><br>`; 
                            });
                            m.bindPopup(info + `</div>`);
                            
                            group.addLayer(m);
                            contador++;
                        }
                    }
                });

                if(contador > 0) {
                    map.fitBounds(group.getBounds());
                    alert(`Capa '${LAYERS[id].name}' cargada con ${contador} comercios.`);
                } else {
                    alert("Error: No se encontraron coordenadas válidas. Verifique que la columna se llame 'coordenadas gps (oficina)'");
                }
            }
        });
    }
</script>
</body>
</html>
