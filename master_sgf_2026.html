<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGF Master - Hacienda Ayacucho</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #1e40af; --dark: #0f172a; --panel: #1e293b; }
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: var(--dark); color: white; overflow: hidden; }
        #map { flex: 1; background: #000; }
        #sidebar { width: 350px; background: var(--panel); border-left: 2px solid #334155; display: flex; flex-direction: column; }
        .header { padding: 20px; background: var(--primary); text-align: center; font-weight: bold; border-bottom: 4px solid #3b82f6; }
        .card { background: #334155; padding: 15px; margin: 15px; border-radius: 10px; border: 1px solid #475569; }
        input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: none; background: #1e293b; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; background: #f59e0b; color: #1e293b; }
        #log { margin-top: 10px; font-size: 11px; color: #94a3b8; text-align: center; }
        /* Estilo para que los créditos se vean profesionales */
        .leaflet-control-attribution { background: rgba(0,0,0,0.7) !important; color: #ccc !important; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
    <div class="header">SGF MASTER: AYACUCHO</div>
    <div class="content">
        <div class="card">
            <h3>Control de Sincronización</h3>
            <button class="btn" onclick="triggerBridge()">⚡ ACTUALIZAR AIRTABLE</button>
            <div id="log">SISTEMA AYACUCHO LISTO</div>
        </div>
        <div class="card">
            <h3>Seguridad</h3>
            <input type="password" id="ghToken" placeholder="Token de GitHub">
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- EL SATÉLITE QUE TE GUSTABA (GOOGLE HYBRID) ---
    const googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 20,
        subdomains:['mt0','mt1','mt2','mt3']
    });

    const streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

    // --- INICIALIZACIÓN LIMPIA (SIN BANDERA) ---
    const map = L.map('map', {
        center: [8.0378, -72.2647], // San Juan de Colón
        zoom: 16,
        layers: [googleHybrid],
        attributionControl: false // AQUÍ ELIMINAMOS LA BANDERA DE UCRANIA
    });

    // --- NUEVOS CRÉDITOS PERSONALIZADOS ---
    L.control.attribution({
        prefix: '<b>Hacienda Ayacucho</b>' 
    }).addAttribution('SGF 2026 | Municipio Ayacucho').addTo(map);

    const baseMaps = { "Vista Satelital": googleHybrid, "Mapa Calles": streets };
    L.control.layers(baseMaps).addTo(map);

    async function triggerBridge() {
        const token = document.getElementById('ghToken').value;
        if(!token) return alert("Falta el Token");
        document.getElementById('log').innerText = "CONECTANDO...";
        const res = await fetch('https://api.github.com/repos/proyectomaps2026/mapa-censo/actions/workflows/actualizar.yml/dispatches', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' },
            body: JSON.stringify({ ref: 'main' })
        });
        document.getElementById('log').innerText = res.ok ? "¡ÉXITO!" : "ERROR";
    }
</script>
</body>
</html>
