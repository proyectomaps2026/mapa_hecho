<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF CORE v6.0 - HACIENDA AYACUCHO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --accent: #00f2ff; --bg-dark: #0b0e14; --panel: #161b22; 
            --text: #e6edf3; --border: #30363d; --google-yellow: #fbbc04;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text); overflow: hidden; }

        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; filter: brightness(0.8) contrast(1.2); }

        /* INTERFAZ TECNOLÓGICA (GLASSMORPHISM) */
        .glass-panel { 
            background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(12px); 
            border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .top-nav { position: absolute; top: 15px; left: 15px; z-index: 1000; display: flex; gap: 15px; }
        .search-engine { width: 380px; height: 50px; display: flex; align-items: center; padding: 0 15px; }
        .search-engine input { background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 15px; }

        .tools-box { height: 50px; display: flex; align-items: center; padding: 0 10px; gap: 5px; }
        .t-btn { 
            background: transparent; border: none; color: #8b949e; width: 38px; height: 38px; 
            border-radius: 8px; cursor: pointer; font-size: 18px; transition: 0.3s;
        }
        .t-btn:hover { color: var(--accent); background: rgba(0, 242, 255, 0.1); }
        .t-btn.active { color: var(--accent); border: 1px solid var(--accent); }

        /* SIDEBAR PROFESIONAL */
        #sidebar { 
            position: absolute; top: 80px; left: 15px; bottom: 20px; z-index: 1000; 
            width: 380px; display: flex; flex-direction: column; overflow: hidden;
        }
        .side-header { padding: 20px; border-bottom: 1px solid var(--border); border-top: 4px solid var(--google-yellow); }
        .side-header h1 { margin: 0; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; }
        .side-header span { font-size: 10px; color: var(--accent); font-weight: 800; }

        .layer-scroll { flex: 1; overflow-y: auto; padding: 10px; }
        
        .layer-card { background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 10px; border: 1px solid transparent; }
        .layer-card.active-l { border-color: var(--accent); background: rgba(0, 242, 255, 0.05); }
        
        .layer-head { padding: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .item-row { 
            padding: 8px 15px 8px 45px; font-size: 13px; color: #8b949e; display: flex; 
            align-items: center; gap: 10px; cursor: pointer;
        }
        .item-row:hover { color: white; background: rgba(255,255,255,0.05); }

        /* POPUPS EDITABLES (FOTO 16) */
        .edit-popup { min-width: 280px; color: #333; }
        .edit-popup input, .edit-popup textarea { 
            width: 100%; border: 1px solid #ddd; padding: 8px; border-radius: 4px; margin-bottom: 8px; font-family: inherit;
        }
        .popup-img { width: 100%; border-radius: 4px; margin-top: 5px; display: block; max-height: 150px; object-fit: cover; }
        .save-btn { background: #1a73e8; color: white; border: none; padding: 8px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* MODALES */
        .modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 2000; width: 400px; padding: 30px; display: none;
        }
        .modal input { background: #0d1117; border: 1px solid var(--border); color: white; padding: 12px; width: 100%; margin: 10px 0; border-radius: 6px; }

        /* COLORES DINÁMICOS */
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="top-nav">
    <div class="search-engine glass-panel">
        <i class="fas fa-microchip" style="color: var(--accent); margin-right: 12px;"></i>
        <input type="text" id="master-search" placeholder="Rastrear entidad fiscal..." oninput="filtrarTodo()">
    </div>
    <div class="tools-box glass-panel">
        <button class="t-btn" id="t-marker" title="Marcador"><i class="fas fa-location-dot"></i></button>
        <button class="t-btn" id="t-poly" title="Área Fiscual"><i class="fas fa-vector-square"></i></button>
        <button class="t-btn" id="t-line" title="Ruta"><i class="fas fa-route"></i></button>
        <div style="width: 1px; height: 25px; background: var(--border); margin: 0 10px;"></div>
        <button class="t-btn" onclick="exportar()" title="Backup"><i class="fas fa-cloud-arrow-down"></i></button>
    </div>
</div>

<aside id="sidebar" class="glass-panel">
    <div class="side-header">
        <h1>SGF CORE SYSTEM</h1>
        <span>AYACUCHO V6.0 // CONTROL TOTAL</span>
    </div>
    <div class="layer-scroll" id="layer-list"></div>
    <div style="padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="save-btn" style="background:#238636" onclick="abrirModal('m-new-layer')">+ Capa</button>
        <button class="save-btn" onclick="abrirModal('m-import')">Importar</button>
    </div>
</aside>

<div id="m-new-layer" class="modal glass-panel">
    <h3 style="margin-top:0">Nueva Capa de Control</h3>
    <input type="text" id="new-l-name" placeholder="Ej: Licorerías Sector A">
    <div style="text-align:right">
        <button class="t-btn" onclick="cerrarModal('m-new-layer')">Cerrar</button>
        <button class="save-btn" style="width:auto; padding: 10px 20px" onclick="crearCapaManual()">Crear</button>
    </div>
</div>

<div id="m-import" class="modal glass-panel">
    <h3>Sincronizar Google Sheets</h3>
    <input type="text" id="imp-name" placeholder="Nombre de la capa">
    <input type="text" id="imp-url" placeholder="URL del CSV">
    <div id="mapping-zone" style="display:none; margin-top:15px; font-size:12px;">
        Coord (Lat,Lon): <select id="sel-c" class="modal-input" style="width:100%"></select><br><br>
        Título: <select id="sel-t" class="modal-input" style="width:100%"></select>
    </div>
    <div style="text-align:right; margin-top:20px;">
        <button class="t-btn" onclick="cerrarModal('m-import')">Cerrar</button>
        <button id="btn-imp-next" class="save-btn" style="width:auto; padding: 10px 20px" onclick="prepararCSV()">Siguiente</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    // 1. CONFIGURACIÓN DEL MAPA
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    let db = {}; 
    let activeId = null;
    let tempCSV = null;

    // 2. DIBUJO AVANZADO
    const drawers = {
        m: new L.Draw.Marker(map),
        p: new L.Draw.Polygon(map, { shapeOptions: { color: '#00f2ff', weight: 3 } }),
        l: new L.Draw.Polyline(map)
    };

    document.getElementById('t-marker').onclick = () => { if(activeId) drawers.m.enable(); else alert("Selecciona una capa"); };
    document.getElementById('t-poly').onclick = () => { if(activeId) drawers.p.enable(); else alert("Selecciona una capa"); };

    map.on(L.Draw.Event.CREATED, (e) => {
        const lyr = e.layer;
        const nombre = "Nuevo Elemento";
        const color = "#00f2ff";
        
        const id = db[activeId].group.addLayer(lyr)._leaflet_id;
        db[activeId].items.push({ 
            id: id, name: nombre, desc: "Sin descripción", 
            img: "", color: color, type: e.layerType 
        });
        
        actualizarElemento(activeId, id);
        renderSidebar();
    });

    // 3. LOGICA DE CAPAS Y EDICIÓN
    function abrirModal(id) { document.getElementById(id).style.display = 'block'; }
    function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }

    function crearCapaManual() {
        const nombre = document.getElementById('new-l-name').value;
        if(!nombre) return;
        const id = 'l_' + Date.now();
        db[id] = { name: nombre, group: new L.FeatureGroup().addTo(map), items: [], visible: true };
        activeId = id;
        renderSidebar();
        cerrarModal('m-new-layer');
    }

    function renderSidebar() {
        const cont = document.getElementById('layer-list');
        cont.innerHTML = "";
        for(let id in db) {
            const activeClass = id === activeId ? 'active-l' : '';
            let h = `
                <div class="layer-card ${activeClass}">
                    <div class="layer-head" onclick="setActive('${id}')">
                        <input type="checkbox" ${db[id].visible ? 'checked' : ''} onclick="toggleV(event, '${id}')">
                        <span style="flex:1">📁 ${db[id].name}</span>
                        <input type="color" value="#00f2ff" onchange="cambiarColorCapa('${id}', this.value)" style="width:20px; border:none; background:none;">
                    </div>
                    <div id="items-${id}">`;
            
            db[id].items.forEach(it => {
                h += `
                <div class="item-row" onclick="foco('${id}', ${it.id})">
                    <div class="dot" style="background:${it.color}"></div>
                    <span>${it.name}</span>
                </div>`;
            });
            h += `</div></div>`;
            cont.insertAdjacentHTML('beforeend', h);
        }
    }

    // 4. POPUP DINÁMICO (EDICIÓN REAL Y FOTOS)
    function actualizarElemento(lid, iid) {
        const item = db[lid].items.find(x => x.id === iid);
        const lyr = db[lid].group.getLayer(iid);

        if(lyr.setStyle) lyr.setStyle({ color: item.color, fillColor: item.color });

        const isImg = (str) => /\.(jpg|jpeg|png|webp|avif|gif)$/.test(str);
        const imgHtml = isImg(item.img) ? `<img src="${item.img}" class="popup-img">` : '';

        const content = `
            <div class="edit-popup">
                <div style="background:var(--google-yellow); padding:10px; margin:-14px -14px 10px; font-weight:bold;">FICHA DE REGISTRO</div>
                <label>Nombre:</label>
                <input type="text" id="e-n-${iid}" value="${item.name}">
                <label>Descripción / Foto URL:</label>
                <textarea id="e-d-${iid}">${item.img || item.desc}</textarea>
                ${imgHtml}
                <button class="save-btn" onclick="guardarPopup('${lid}', ${iid})">GUARDAR CAMBIOS</button>
            </div>`;
        
        lyr.bindPopup(content);
    }

    function guardarPopup(lid, iid) {
        const item = db[lid].items.find(x => x.id === iid);
        const newN = document.getElementById(`e-n-${iid}`).value;
        const newD = document.getElementById(`e-d-${iid}`).value;

        item.name = newN;
        if(newD.startsWith('http')) { item.img = newD; } else { item.desc = newD; }

        actualizarElemento(lid, iid);
        renderSidebar();
        db[lid].group.getLayer(iid).closePopup();
    }

    // 5. IMPORTACIÓN
    function prepararCSV() {
        const url = document.getElementById('imp-url').value.replace('/edit?usp=sharing', '/export?format=csv');
        Papa.parse(url, {
            download: true, header: true,
            complete: (r) => {
                tempCSV = r.data;
                const h = r.meta.fields;
                let o = ""; h.forEach(f => o += `<option value="${f}">${f}</option>`);
                document.getElementById('sel-c').innerHTML = o;
                document.getElementById('sel-t').innerHTML = o;
                document.getElementById('mapping-zone').style.display = 'block';
                document.getElementById('btn-imp-next').onclick = finalizarCSV;
            }
        });
    }

    function finalizarCSV() {
        const colC = document.getElementById('sel-c').value;
        const colT = document.getElementById('sel-t').value;
        const name = document.getElementById('imp-name').value;
        const group = new L.FeatureGroup().addTo(map);
        const items = [];

        tempCSV.forEach(row => {
            let val = row[colC];
            if(val) {
                let p = val.replace(/[()]/g, '').split(/[, ]+/);
                let lat = parseFloat(p[0]), lon = parseFloat(p[1]);
                if(!isNaN(lat)) {
                    const m = L.marker([lat, lon]);
                    const id = group.addLayer(m)._leaflet_id;
                    const it = { id, name: row[colT] || "Censo", desc: "Importado", img: "", color: "#00f2ff" };
                    items.push(it);
                }
            }
        });

        const id = 'l_' + Date.now();
        db[id] = { name, group, items, visible: true };
        activeId = id;
        renderSidebar();
        items.forEach(it => actualizarElemento(id, it.id));
        cerrarModal('m-import');
    }

    // UTILIDADES
    function setActive(id) { activeId = id; renderSidebar(); }
    function toggleV(e, id) { e.stopPropagation(); db[id].visible ? map.removeLayer(db[id].group) : map.addLayer(db[id].group); db[id].visible = !db[id].visible; }
    function foco(lid, iid) {
        const l = db[lid].group.getLayer(iid);
        map.setView(l.getBounds ? l.getBounds().getCenter() : l.getLatLng(), 18);
        l.openPopup();
    }
    function cambiarColorCapa(id, color) {
        db[id].items.forEach(it => {
            it.color = color;
            actualizarElemento(id, it.id);
        });
    }
</script>
</body>
</html>
