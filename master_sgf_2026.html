<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF Master - Municipio Ayacucho</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #1e40af; --dark: #0f172a; --panel: #1e293b; --success: #10b981; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Inter', sans-serif; background: var(--dark); color: white; overflow: hidden; }
        #map { flex: 1; z-index: 1; }
        #sidebar { width: 380px; background: var(--panel); border-left: 1px solid #334155; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.3); z-index: 10; }
        .header { padding: 20px; background: var(--primary); text-align: center; font-weight: bold; border-bottom: 3px solid #3b82f6; }
        .content { padding: 20px; flex: 1; overflow-y: auto; }
        .card { background: #334155; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #475569; }
        .card h3 { margin: 0 0 10px 0; font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; }
        input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #475569; background: #1e293b; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn-sync { background: #f59e0b; color: #1e293b; }
        .btn-save { background: var(--success); color: white; }
        #log { margin-top: 8px; font-size: 11px; color: #94a3b8; font-family: monospace; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
    <div class="header">SGF MASTER: AYACUCHO</div>
    <div class="content">
        <div class="card">
            <h3>Centro de Sincronización</h3>
            <button class="btn btn-sync" onclick="triggerBridge()">⚡ ACTUALIZAR DESDE AIRTABLE</button>
            <div id="log">SGF: Esperando orden...</div>
        </div>

        <div class="card">
            <h3>Seguridad y Red</h3>
            <label style="font-size: 12px;">GitHub Token:</label>
            <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
            <button class="btn btn-save" onclick="saveSettings()">GUARDAR CONFIGURACIÓN</button>
        </div>

        <div class="card" id="census-list">
            <h3>Comercios en Colón</h3>
            <p style="font-size: 12px; color: #94a3b8;">Mapa listo para el despliegue.</p>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- MOTOR HÍBRIDO GEM PARA AYACUCHO ---
    
    // Satélite con nombres (Google)
    const googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 20,
        subdomains:['mt0','mt1','mt2','mt3'],
        attribution: 'Google Hybrid'
    });

    const streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

    // Coordenadas exactas de San Juan de Colón
    const map = L.map('map', {
        center: [8.0381, -72.2619], 
        zoom: 15,
        layers: [googleHybrid]
    });

    const baseMaps = { "Satélite + Calles": googleHybrid, "Mapa Plano": streets };
    L.control.layers(baseMaps).addTo(map);

    // --- FUNCIONALIDAD ---
    async function triggerBridge() {
        const token = document.getElementById('ghToken').value;
        const log = document.getElementById('log');
        if(!token) return alert("Gem necesita el Token.");

        log.innerText = "Contactando repositorio puente...";
        
        try {
            const res = await fetch('https://api.github.com/repos/proyectomaps2026/mapa-censo/actions/workflows/actualizar.yml/dispatches', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify({ ref: 'main' })
            });
            if(res.ok) {
                log.innerText = "¡Orden recibida! Sincronizando...";
                log.style.color = "#10b981";
            } else { log.innerText = "Fallo: Revisa Token."; log.style.color = "#fb7185"; }
        } catch (e) { log.innerText = "Error de red."; }
    }

    function saveSettings() {
        alert("Configuración de Gem guardada localmente.");
    }
</script>
</body>
</html>
