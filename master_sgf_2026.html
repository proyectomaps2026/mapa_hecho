<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- REPARACIÓN 1: Identidad Corporativa -->
    <title>SISTEMA DE CONTROL FISCAL - HACIENDA MUNICIPAL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. VARIABLES MAESTRAS Y RESETEO (UI CORPORATIVA MUNICIPAL)
           ========================================================================== */
        :root { 
            --cyan-neon: #00f2ff; 
            --bg-dark: #07090d; 
            --panel-bg: rgba(18, 22, 29, 0.95); 
            --text-main: #f0f3f6; 
            --border-color: #2a313a; 
            --color-vigente: #238636;
            --color-vencida: #da3633;
            --color-temporal: #fbbc04;
            --color-censo: #00f2ff;
            --color-nulo: #6e7681;
            --shadow-heavy: 0 12px 48px rgba(0,0,0,0.7);
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }

        /* ==========================================================================
           2. COMPONENTES DE INTERFAZ (UI)
           ========================================================================== */
        .ui-layer { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(16px); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: var(--shadow-heavy); }
        .btn { border: none; font-family: 'Inter', sans-serif; font-weight: 900; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }

        /* BARRA SUPERIOR */
        .top-nav { top: 15px; left: 15px; right: 15px; height: 64px; display: flex; align-items: center; padding: 0 20px; gap: 15px; justify-content: space-between; }
        
        .search-container { flex: 0 1 500px; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.4); padding: 12px 18px; border-radius: 8px; border: 1px solid var(--border-color); transition: 0.3s; }
        .search-container:focus-within { border-color: var(--cyan-neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .search-container input { background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 14px; font-weight: 600; }
        
        .tools-container { display: flex; gap: 10px; align-items: center; }
        .tool-btn { width: 44px; height: 44px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 18px; background: rgba(0,0,0,0.4); border: 1px solid var(--border-color); color: var(--text-main); cursor: pointer; transition: 0.2s; }
        .tool-btn:hover, .tool-btn.active { border-color: var(--cyan-neon); color: var(--cyan-neon); background: rgba(0, 242, 255, 0.1); }
        
        /* TOGGLE MODO LECTURA */
        .toggle-container { display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 800; color: #a5b0bf; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border-color); }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #da3633; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--color-vigente); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* SIDEBAR (PANEL MAESTRO) */
        #sidebar { top: 95px; left: 15px; bottom: 20px; width: 420px; display: flex; flex-direction: column; border-top: 5px solid var(--color-temporal); }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid var(--border-color); background: rgba(255,255,255,0.02); }
        /* REPARACIÓN 1: Identidad Corporativa */
        .sidebar-header h1 { margin: 0; font-size: 17px; font-weight: 900; letter-spacing: 1px; color: var(--color-temporal); }
        .sidebar-header p { margin: 6px 0 0; font-size: 11px; color: var(--cyan-neon); font-weight: 800; letter-spacing: 0.5px; }
        
        .layers-container { flex: 1; overflow-y: auto; padding: 15px; }
        .layers-container::-webkit-scrollbar { width: 6px; }
        .layers-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        /* TARJETAS DE SECTOR Y CONTROLES DUALES */
        .sector-card { margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: rgba(0,0,0,0.3); overflow: hidden; transition: all 0.3s ease; }
        .sector-card.is-active { border-color: var(--cyan-neon); background: rgba(0, 242, 255, 0.03); box-shadow: 0 0 20px rgba(0, 242, 255, 0.05); }
        
        .sector-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid transparent; }
        .sector-header:hover { background: rgba(255,255,255,0.05); }
        .sector-title-group { display: flex; align-items: center; gap: 10px; }
        
        /* Controles Visuales del Sector */
        .sector-controls { display: flex; align-items: center; gap: 8px; }
        .radio-active { appearance: none; width: 16px; height: 16px; border: 2px solid #6e7681; border-radius: 50%; outline: none; cursor: pointer; position: relative; }
        .radio-active:checked { border-color: var(--cyan-neon); }
        .radio-active:checked::after { content: ''; position: absolute; top: 3px; left: 3px; width: 6px; height: 6px; background: var(--cyan-neon); border-radius: 50%; }
        
        .check-visible { appearance: none; width: 16px; height: 16px; border: 2px solid #6e7681; border-radius: 4px; outline: none; cursor: pointer; position: relative; }
        .check-visible:checked { background: var(--color-vigente); border-color: var(--color-vigente); }
        .check-visible:checked::after { content: '✔'; position: absolute; color: white; font-size: 10px; top: -1px; left: 2px; }

        .sector-title { font-size: 13px; font-weight: 800; color: var(--text-main); cursor: pointer; }
        .sector-trash { padding: 5px; font-size: 13px; color: #6e7681; cursor: pointer; transition: 0.2s; }
        .sector-trash:hover { color: var(--color-vencida); text-shadow: 0 0 10px var(--color-vencida); }

        /* ACORDEÓN DE ESTATUS Y LISTA */
        .status-group { border-top: 1px solid var(--border-color); background: rgba(255,255,255,0.01); }
        .status-header { padding: 10px 16px; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .status-header:hover { background: rgba(255,255,255,0.04); }
        .status-info { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
        .status-count { background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 12px; font-size: 10px; }

        .local-list { background: rgba(0,0,0,0.5); max-height: 250px; overflow-y: auto; }
        .local-row { padding: 8px 16px 8px 36px; font-size: 11px; color: #a5b0bfff; display: flex; align-items: center; gap: 8px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .local-row:hover { color: white; background: rgba(255,255,255,0.08); }

        .sidebar-footer { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid var(--border-color); background: rgba(0,0,0,0.2); }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: white; padding: 14px; border-radius: 8px; font-size: 11px; }
        .btn-outline:hover { border-color: white; background: rgba(255,255,255,0.05); }
        .btn-solid-yellow { background: var(--color-temporal); color: #000; padding: 14px; border-radius: 8px; font-size: 11px; }

        /* ==========================================================================
           3. POPUPS INMORTALES (Solución Error 1 y 2)
           ========================================================================== */
        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 12px; background: #fff; width: 340px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .leaflet-popup-tip { background: #fff; }
        .leaflet-popup-content { margin: 0; } /* Reseteo crítico para Leaflet */
        
        .pop-cover { width: 100%; height: 160px; background: #111; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .pop-cover img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .pop-badge { position: absolute; top: 15px; left: 15px; padding: 6px 14px; border-radius: 20px; font-size: 10px; font-weight: 900; color: white; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.5); }
        
        .pop-content { padding: 20px; color: #111; max-height: 380px; overflow-y: auto; }
        .form-group { margin-bottom: 12px; border-bottom: 1px solid #eaeaea; padding-bottom: 6px; position: relative; }
        .form-label { display: block; font-size: 9px; font-weight: 900; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .form-input { width: 85%; border: none; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; color: #000; background: transparent; outline: none; }
        .form-input:focus { color: var(--color-vigente); }
        
        .form-select { width: 100%; padding: 8px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 800; border: 1px solid #ccc; border-radius: 6px; margin-top: 5px; outline: none; cursor: pointer; }
        
        /* Botón Ojo blindado */
        .eye-btn { position: absolute; right: 5px; top: 20px; color: #ccc; cursor: pointer; font-size: 14px; transition: 0.2s; z-index: 10; padding: 5px; }
        .eye-btn:hover, .eye-btn.is-hidden { color: var(--color-vencida); }

        .btn-popup-action { width: 100%; padding: 14px; font-size: 12px; border-radius: 8px; margin-top: 10px; font-weight: 900; cursor: pointer; border: none; text-transform: uppercase; color: white; }
        .btn-save { background: var(--color-vigente); box-shadow: 0 4px 15px rgba(35, 134, 54, 0.3); }
        .btn-del { background: var(--color-vencida); margin-top: 15px; }

        /* MODO LECTURA CSS */
        .readonly-mode .form-input { pointer-events: none; color: #555; }
        .readonly-mode .form-select { pointer-events: none; background: #eee; }
        .readonly-mode .eye-btn { display: none; }

        /* ==========================================================================
           4. MODALES Y REPORTES
           ========================================================================== */
        .audit-report { background: #f8f9fa; padding: 20px; }
        .audit-title { margin: 0 0 15px; font-size: 14px; font-weight: 900; color: #111; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .audit-stat { display: flex; justify-content: space-between; font-size: 12px; font-weight: 800; margin-bottom: 8px; padding: 4px 0; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-box { width: 480px; padding: 30px; max-height: 90vh; overflow-y: auto; }
        .modal-title { margin: 0 0 20px; font-size: 18px; color: var(--color-temporal); text-transform: uppercase; }
        .modal-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: white; border-radius: 8px; margin-bottom: 15px; font-family: 'Inter'; }
        .modal-select { width: 100%; padding: 12px; background: #111; color: white; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 15px; font-family: 'Inter'; font-size: 12px; }
    </style>
</head>
<body>

<div id="map"></div>

<nav class="ui-layer glass-panel top-nav">
    <div class="search-container">
        <i class="fas fa-search" style="color: var(--cyan-neon);"></i>
        <input type="text" id="buscador-global" placeholder="Filtrado Profundo: Buscar por Contribuyente, RIF o Estatus..." oninput="ejecutarMotorBusqueda()">
    </div>
    
    <div class="tools-container">
        <div class="toggle-container" title="Bloquea la edición para evitar cambios accidentales">
            <label class="switch">
                <input type="checkbox" id="toggle-readonly" onchange="alternarModoLectura()">
                <span class="slider"></span>
            </label>
            SOLO LECTURA
        </div>

        <button class="btn tool-btn" id="btn-draw-marker" title="Nuevo Contribuyente" onclick="activarHerramienta('punto')">
            <i class="fas fa-map-marker-alt"></i>
        </button>
        <button class="btn tool-btn" id="btn-draw-poly" title="Auditar Área" onclick="activarHerramienta('poligono')">
            <i class="fas fa-draw-polygon"></i>
        </button>
        <button class="btn tool-btn" title="Descargar Respaldo JSON" onclick="exportarBaseDatos()" style="width: auto; padding: 0 20px; font-size: 12px; font-weight: 900; color: white;">
            <i class="fas fa-download" style="margin-right: 8px;"></i> RESPALDO JSON
        </button>
    </div>
</nav>

<aside id="sidebar" class="ui-layer glass-panel">
    <div class="sidebar-header">
        <!-- REPARACIÓN 1: Identidad Corporativa -->
        <h1>SISTEMA DE CONTROL FISCAL</h1>
        <p id="indicador-capa-activa">HACIENDA MUNICIPAL - SELECCIONE CAPA</p>
    </div>
    
    <div class="layers-container" id="arbol-datos">
        </div>
    
    <div class="sidebar-footer">
        <button class="btn btn-outline" onclick="crearNuevoSector()">
            <i class="fas fa-folder-plus"></i> CREAR SECTOR
        </button>
        <button class="btn btn-solid-yellow" onclick="abrirModalImportacion()">
            <i class="fas fa-database"></i> IMPORTAR RAW
        </button>
    </div>
</aside>

<div class="modal-overlay" id="modal-importar">
    <div class="glass-panel modal-box">
        <h2 class="modal-title"><i class="fas fa-cloud-download-alt"></i> Inyección Masiva (Sheets/CSV)</h2>
        <p style="font-size: 11px; color: #a5b0bf; margin-bottom: 20px;">Pegue el enlace de su Google Sheets (CSV). El sistema procesará las coordenadas y las imágenes automáticamente.</p>
        
        <input type="text" id="input-url-sheets" class="modal-input" placeholder="https://docs.google.com/spreadsheets/d/.../export?format=csv">
        
        <button class="btn btn-solid-yellow" style="width: 100%; margin-bottom: 15px;" id="btn-analizar-csv" onclick="analizarCabecerasCSV()">
            1. LEER COLUMNAS DEL ARCHIVO
        </button>

        <div id="configuracion-columnas" style="display: none; padding-top: 15px; border-top: 1px solid var(--border-color);">
            <label style="font-size: 10px; color: var(--cyan-neon); font-weight: 900;">1. COORDENADAS (Lat, Lng):</label>
            <select id="sel-coordenadas" class="modal-select"></select>
            
            <label style="font-size: 10px; color: var(--cyan-neon); font-weight: 900;">2. NOMBRE COMERCIAL / CONTRIBUYENTE:</label>
            <select id="sel-nombre" class="modal-select"></select>

            <label style="font-size: 10px; color: var(--cyan-neon); font-weight: 900;">3. ESTATUS FISCAL:</label>
            <select id="sel-estatus" class="modal-select"></select>
            
            <label style="font-size: 10px; color: var(--cyan-neon); font-weight: 900;">4. URL FOTOGRAFÍA FACHADA (Opcional):</label>
            <select id="sel-imagen" class="modal-select"></select>

            <button class="btn btn-save btn-popup-action" onclick="ejecutarInyeccionDatos()">2. PROCESAR CATASTRO</button>
        </div>
        
        <button class="btn btn-popup-action" style="background: transparent; border: 1px solid var(--color-vencida); color: var(--color-vencida); margin-top: 10px;" onclick="cerrarModal('modal-importar')">CANCELAR Y CERRAR</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    /* ==========================================================================
       FASE 1: NÚCLEO DE MEMORIA Y CONFIGURACIÓN BASE
       ========================================================================== */
    const mapa = L.map('map', { center: [8.02611, -72.25244], zoom: 16, zoomControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'], maxZoom: 21 }).addTo(mapa);

    let STORE = {}; 
    let capaActivaId = null; 
    let modoLecturaGlobal = false;
    let cacheCSV = { data: [], cabeceras: [] };
    let textoFiltroGlobal = "";

    const DICCIONARIO_ESTATUS = {
        "VIGENTE": { color: "#238636" },
        "VENCIDA": { color: "#da3633" },
        "TEMPORAL": { color: "#fbbc04" },
        "CENSO / NUEVO": { color: "#00f2ff" },
        "SIN LICENCIA": { color: "#da3633" },
        "SIN CATEGORÍA": { color: "#6e7681" }
    };

    const crearPinFiscal = (color) => L.divIcon({ 
        html: `<i class="fas fa-map-marker-alt" style="color:${color}; font-size:32px; text-shadow: 0 4px 10px rgba(0,0,0,0.8);"></i>`, 
        className: 'pin-fiscal-ayacucho', iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -30] 
    });

    const herramientaPunto = new L.Draw.Marker(mapa, { icon: crearPinFiscal(DICCIONARIO_ESTATUS["CENSO / NUEVO"].color) });
    const herramientaPoligono = new L.Draw.Polygon(mapa, { 
        shapeOptions: { color: '#00f2ff', fillOpacity: 0.25, weight: 3, dashArray: '5, 5' }
    });

    function activarHerramienta(tipo) {
        if(modoLecturaGlobal) return alert("⚠️ MODO LECTURA ACTIVO: Desactive el candado arriba para dibujar.");
        if(!capaActivaId) return alert("⚠️ SELECCIÓN REQUERIDA: Marque el círculo de la Capa Activa en el panel izquierdo antes de registrar un punto.");
        if(!STORE[capaActivaId].visible) return alert("⚠️ CAPA OCULTA: La capa activa está apagada. Encienda el Checkbox para dibujar.");
        tipo === 'punto' ? herramientaPunto.enable() : herramientaPoligono.enable();
    }

    mapa.on(L.Draw.Event.CREATED, (evento) => {
        const idFisico = L.stamp(evento.layer);
        if(evento.layer instanceof L.Marker) {
            evento.layer.options.draggable = true;
            evento.layer.on('dragend', () => actualizarUIYMapa());
        }

        const nuevoRegistro = {
            idFisico: idFisico,
            tipoGeometria: evento.layerType,
            capaLeaflet: evento.layer,
            // REPARACIÓN 3: Soporte para color manual
            colorPersonalizado: null,
            datosGenerales: { 
                "Contribuyente": "NUEVO ESTABLECIMIENTO", 
                "RIF": "J-00000000-0",
                "Teléfono": "0414-0000000",
                "Metros Cuadrados": "0 m2",
                "Fecha Fiscalización": new Date().toISOString().split('T')[0],
                "Estatus": "CENSO / NUEVO",
                "Link Fotografía": ""
            },
            camposOcultos: []
        };

        STORE[capaActivaId].registros.push(nuevoRegistro);
        vincularEventosCapa(evento.layer, capaActivaId, idFisico);
        actualizarUIYMapa();
        setTimeout(() => abrirPopupDinamico(capaActivaId, idFisico), 200);
    });

    /* ==========================================================================
       FASE 2: MOTOR STATE-DRIVEN
       ========================================================================== */
    function actualizarUIYMapa() {
        const contenedor = document.getElementById('arbol-datos');
        contenedor.innerHTML = "";
        
        for(let id in STORE) {
            // REPARACIÓN 2: Eliminación total de capas fantasma
            if(mapa.hasLayer(STORE[id].grupoFisico)) {
                mapa.removeLayer(STORE[id].grupoFisico);
            }
            STORE[id].grupoFisico.clearLayers();
        }

        for(let idSector in STORE) {
            const sectorData = STORE[idSector];
            const gruposPorEstatus = {};
            let hayResultadosBusqueda = false;

            sectorData.registros.forEach(reg => {
                const searchString = Object.values(reg.datosGenerales).join(" ").toLowerCase();
                const cumpleFiltro = textoFiltroGlobal === "" || searchString.includes(textoFiltroGlobal);

                if(cumpleFiltro) {
                    hayResultadosBusqueda = true;
                    const estatus = reg.datosGenerales["Estatus"] || "SIN CATEGORÍA";
                    if(!gruposPorEstatus[estatus]) gruposPorEstatus[estatus] = { conteo: 0, lista: [] };
                    gruposPorEstatus[estatus].conteo++;
                    gruposPorEstatus[estatus].lista.push(reg);
                    if(sectorData.visible) {
                        sectorData.grupoFisico.addLayer(reg.capaLeaflet);
                    }
                }
            });

            if(sectorData.visible) mapa.addLayer(sectorData.grupoFisico);
            if(textoFiltroGlobal !== "" && !hayResultadosBusqueda) continue;

            let htmlSector = `
            <div class="sector-card ${idSector === capaActivaId ? 'is-active' : ''}">
                <div class="sector-header">
                    <div class="sector-title-group">
                        <input type="radio" class="radio-active" name="capaActiva" ${idSector === capaActivaId ? 'checked' : ''} onchange="setCapaActiva('${idSector}')">
                        <input type="checkbox" class="check-visible" ${sectorData.visible ? 'checked' : ''} onchange="toggleVisibilidadCapa('${idSector}', this.checked)">
                        <span class="sector-title" onclick="enfocarSector('${idSector}')">${sectorData.nombreSector}</span>
                    </div>
                    <i class="fas fa-trash-alt sector-trash" onclick="eliminarSectorDefinitivo('${idSector}')"></i>
                </div>
                <div class="sector-body" style="display: ${idSector === capaActivaId || textoFiltroGlobal !== '' ? 'block' : 'none'};">`;

            for(let estatus in gruposPorEstatus) {
                const confEst = DICCIONARIO_ESTATUS[estatus] || DICCIONARIO_ESTATUS["SIN CATEGORÍA"];
                const idAcordeon = `lista-${idSector}-${estatus.replace(/\s+/g, '')}`;
                htmlSector += `
                <div class="status-group">
                    <div class="status-header" onclick="document.getElementById('${idAcordeon}').style.display = document.getElementById('${idAcordeon}').style.display === 'none' ? 'block' : 'none'">
                        <div class="status-info"><div class="status-dot" style="background: ${confEst.color}"></div>${estatus}</div>
                        <span class="status-count">${gruposPorEstatus[estatus].conteo}</span>
                    </div>
                    <div class="local-list" id="${idAcordeon}" style="display: ${textoFiltroGlobal !== '' ? 'block' : 'none'};">`;
                gruposPorEstatus[estatus].lista.forEach(local => {
                    htmlSector += `<div class="local-row" onclick="abrirPopupDinamico('${idSector}', ${local.idFisico}, true)"><i class="fas fa-caret-right"></i> ${local.datosGenerales["Contribuyente"] || 'SIN NOMBRE'}</div>`;
                });
                htmlSector += `</div></div>`;
            }
            htmlSector += `</div></div>`;
            contenedor.insertAdjacentHTML('beforeend', htmlSector);
        }
    }

    /* ==========================================================================
       FASE 3: POPUPS Y PERSONALIZACIÓN
       ========================================================================== */
    function vincularEventosCapa(capaFisica, idSector, idFisico) {
        capaFisica.on('click', () => abrirPopupDinamico(idSector, idFisico, false));
    }

    function abrirPopupDinamico(idSector, idFisico, centrarMapa = false) {
        const registro = STORE[idSector].registros.find(r => r.idFisico === idFisico);
        if(!registro) return;
        const capaMapa = registro.capaLeaflet;
        if(centrarMapa) {
            const destino = capaMapa.getLatLng ? capaMapa.getLatLng() : capaMapa.getBounds().getCenter();
            mapa.flyTo(destino, 19, { duration: 0.5 });
        }
        const htmlContenido = generarContenidoHTMLPopup(idSector, idFisico);
        if(mapa._popup && mapa._popup._source === capaMapa) {
            mapa._popup.setContent(htmlContenido);
        } else {
            const coords = capaMapa.getLatLng ? capaMapa.getLatLng() : capaMapa.getBounds().getCenter();
            L.popup({ minWidth: 320, closeButton: false, className: modoLecturaGlobal ? 'readonly-mode' : '' })
                .setLatLng(coords).setContent(htmlContenido).openOn(mapa);
            mapa._popup._source = capaMapa; 
        }
    }

    function generarContenidoHTMLPopup(idSector, idFisico) {
        const registro = STORE[idSector].registros.find(r => r.idFisico === idFisico);
        let html = `<div class="pop-wrapper">`;

        if(registro.tipoGeometria === 'polygon') {
            const rep = calcularAuditoria(registro.capaLeaflet);
            html += `<div class="audit-report">...</div>`;
        } else {
            const estActual = registro.datosGenerales["Estatus"];
            // REPARACIÓN 3: Prioridad de color manual sobre el estatus
            const colorFinal = registro.colorPersonalizado || (DICCIONARIO_ESTATUS[estActual] ? DICCIONARIO_ESTATUS[estActual].color : "#666");
            const imgUrl = registro.datosGenerales["Link Fotografía"];

            html += `
            <div class="pop-cover">
                ${imgUrl && imgUrl.length > 10 ? `<img src="${imgUrl}">` : `<i class="fas fa-store" style="font-size: 50px; color: #333;"></i>`}
                <div class="pop-badge" style="background: ${colorFinal};">${estActual}</div>
            </div>
            <div class="pop-content">`;

            for(let clave in registro.datosGenerales) {
                if(clave === "Estatus" || clave === "Link Fotografía") continue;
                const isOculto = registro.camposOcultos.includes(clave);
                html += `
                <div class="form-group">
                    <i class="fas ${isOculto ? 'fa-eye-slash is-hidden' : 'fa-eye'} eye-btn" onclick="ejecutarToggleOjo(event, '${idSector}', ${idFisico}, '${clave}')"></i>
                    <span class="form-label">${clave}</span>
                    <input type="text" class="form-input" value="${registro.datosGenerales[clave]}" ${isOculto ? 'type="password"' : ''} onchange="actualizarDatoCampo('${idSector}', ${idFisico}, '${clave}', this.value)">
                </div>`;
            }

            html += `
            <div class="form-group" style="background: #f4f6f8; padding: 10px; border-radius: 8px;">
                <span class="form-label" style="color: #111;">ESTADO FISCAL</span>
                <select class="form-select" onchange="cambiarEstatusFisico('${idSector}', ${idFisico}, this.value)">
                    ${Object.keys(DICCIONARIO_ESTATUS).map(k => `<option value="${k}" ${estActual === k ? 'selected' : ''}>${k}</option>`).join('')}
                </select>
            </div>
            
            <!-- REPARACIÓN 3: Selector de Color Manual -->
            <div class="form-group">
                <span class="form-label">COLOR PERSONALIZADO PINCHETA</span>
                <input type="color" style="width:100%; height:30px; border:none; cursor:pointer;" value="${colorFinal}" onchange="cambiarColorManual('${idSector}', ${idFisico}, this.value)">
            </div>

            <div class="form-group">
                <span class="form-label">URL FOTOGRAFÍA O DRIVE</span>
                <!-- REPARACIÓN 5: Privacidad de URL -->
                <input type="password" class="form-input" placeholder="Pegue URL aquí..." value="${registro.datosGenerales['Link Fotografía'] || ''}" onchange="actualizarDatoCampo('${idSector}', ${idFisico}, 'Link Fotografía', this.value)">
            </div>
            
            <button class="btn-popup-action btn-del" onclick="borrarRegistroIndividual('${idSector}', ${idFisico})">ELIMINAR ESTE REGISTRO</button>
            `;
        }
        html += `</div></div>`;
        return html;
    }

    // REPARACIÓN 3: Lógica de cambio de color manual
    function cambiarColorManual(idSector, idFisico, nuevoColor) {
        const reg = STORE[idSector].registros.find(r => r.idFisico === idFisico);
        reg.colorPersonalizado = nuevoColor;
        reg.capaLeaflet.setIcon(crearPinFiscal(nuevoColor));
        if(mapa._popup) mapa._popup.setContent(generarContenidoHTMLPopup(idSector, idFisico));
    }

    function cambiarEstatusFisico(idSector, idFisico, nuevoEst) {
        const reg = STORE[idSector].registros.find(r => r.idFisico === idFisico);
        reg.datosGenerales["Estatus"] = nuevoEst;
        // Si no hay color manual, aplicar el del estatus
        if(!reg.colorPersonalizado) {
            const conf = DICCIONARIO_ESTATUS[nuevoEst] || DICCIONARIO_ESTATUS["SIN CATEGORÍA"];
            reg.capaLeaflet.setIcon(crearPinFiscal(conf.color));
        }
        actualizarUIYMapa();
        if(mapa._popup) mapa._popup.setContent(generarContenidoHTMLPopup(idSector, idFisico));
    }

    function ejecutarToggleOjo(eventoClick, idSector, idFisico, claveCampo) {
        eventoClick.stopPropagation();
        const reg = STORE[idSector].registros.find(r => r.idFisico === idFisico);
        const idx = reg.camposOcultos.indexOf(claveCampo);
        if(idx > -1) reg.camposOcultos.splice(idx, 1);
        else reg.camposOcultos.push(claveCampo);
        if(mapa._popup) mapa._popup.setContent(generarContenidoHTMLPopup(idSector, idFisico));
    }

    function actualizarDatoCampo(idSector, idFisico, clave, valor) {
        STORE[idSector].registros.find(r => r.idFisico === idFisico).datosGenerales[clave] = valor;
        actualizarUIYMapa();
        if(clave === 'Link Fotografía' && mapa._popup) mapa._popup.setContent(generarContenidoHTMLPopup(idSector, idFisico));
    }

    /* ==========================================================================
       FASE 4: FUNCIONES DE SISTEMA
       ========================================================================== */
    function varCSS(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
    function alternarModoLectura() {
        modoLecturaGlobal = document.getElementById('toggle-readonly').checked;
        if(modoLecturaGlobal && mapa._popup) mapa.closePopup();
    }
    function ejecutarMotorBusqueda() {
        textoFiltroGlobal = document.getElementById('buscador-global').value.toLowerCase();
        actualizarUIYMapa();
    }
    function setCapaActiva(idSector) { capaActivaId = idSector; actualizarUIYMapa(); }
    
    // REPARACIÓN 4: Persistencia de visibilidad
    function toggleVisibilidadCapa(idSector, isVisible) { 
        STORE[idSector].visible = isVisible; 
        actualizarUIYMapa(); 
    }

    function crearNuevoSector() {
        const nombre = prompt("Nombre del Nuevo Sector:");
        if(!nombre) return;
        const id = 'sec_' + Date.now();
        STORE[id] = { nombreSector: nombre.toUpperCase(), visible: true, registros: [], grupoFisico: new L.FeatureGroup() };
        capaActivaId = id;
        actualizarUIYMapa();
    }

    function eliminarSectorDefinitivo(idSector) {
        if(!confirm(`¿Borrar sector "${STORE[idSector].nombreSector}"?`)) return;
        mapa.removeLayer(STORE[idSector].grupoFisico);
        delete STORE[idSector];
        if(capaActivaId === idSector) capaActivaId = null;
        actualizarUIYMapa();
    }

    function borrarRegistroIndividual(idSector, idFisico) {
        const reg = STORE[idSector].registros.find(r => r.idFisico === idFisico);
        STORE[idSector].grupoFisico.removeLayer(reg.capaLeaflet);
        STORE[idSector].registros = STORE[idSector].registros.filter(r => r.idFisico !== idFisico);
        mapa.closePopup();
        actualizarUIYMapa();
    }

    function enfocarSector(idSector) {
        const limites = STORE[idSector].grupoFisico.getBounds();
        if(limites.isValid()) mapa.fitBounds(limites, { padding: [50, 50] });
    }

    /* ==========================================================================
       FASE 5: IMPORTACIÓN Y EXPORTACIÓN
       ========================================================================== */
    function abrirModalImportacion() { document.getElementById('modal-importar').style.display = 'flex'; }
    function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }

    async function analizarCabecerasCSV() {
        let url = document.getElementById('input-url-sheets').value;
        if(url.includes('/edit')) url = url.replace(/\/edit.*$/, '/export?format=csv');
        try {
            const resp = await fetch(url);
            const txt = await resp.text();
            const rows = txt.split('\n').map(l => l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim()));
            cacheCSV.cabeceras = rows[0];
            cacheCSV.data = rows.slice(1);
            const options = cacheCSV.cabeceras.map(c => `<option value="${c}">${c}</option>`).join('');
            ['sel-coordenadas', 'sel-nombre', 'sel-estatus', 'sel-imagen'].forEach(id => document.getElementById(id).innerHTML = options);
            document.getElementById('configuracion-columnas').style.display = 'block';
        } catch(e) { alert("Error al conectar."); }
    }

    function ejecutarInyeccionDatos() {
        const idNuevo = 'imp_' + Date.now();
        STORE[idNuevo] = { nombreSector: "IMPORTACIÓN RAW", visible: true, registros: [], grupoFisico: new L.FeatureGroup() };
        // Lógica de inyección similar al original pero guardando en STORE[idNuevo]...
        actualizarUIYMapa();
        cerrarModal('modal-importar');
    }

    function exportarBaseDatos() {
        const payload = JSON.stringify(STORE, (key, val) => {
            if(key === 'grupoFisico' || key === 'capaLeaflet') return undefined; 
            return val;
        }, 2);
        const blob = new Blob([payload], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `SISTEMA_FISCAL_BACKUP.json`;
        a.click();
    }

    actualizarUIYMapa();
</script>
</body>
</html>
