<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE CONTROL FISCAL - HACIENDA MUNICIPAL (V17.0 PRO)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. VARIABLES Y ESTILOS BASE
           ========================================================================== */
        :root { 
            --cyan-neon: #00f2ff; --bg-dark: #07090d; --panel-bg: rgba(18, 22, 29, 0.95); 
            --text-main: #f0f3f6; --border-color: #2a313a; --color-vigente: #238636;
            --color-vencida: #da3633; --color-temporal: #fbbc04; --color-censo: #00f2ff;
            --color-nulo: #6e7681; --shadow-heavy: 0 12px 48px rgba(0,0,0,0.7);
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }

        .ui-layer { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(16px); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: var(--shadow-heavy); }
        .btn { border: none; font-family: 'Inter', sans-serif; font-weight: 900; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* BARRA SUPERIOR */
        .top-nav { top: 15px; left: 15px; right: 15px; height: 64px; display: flex; align-items: center; padding: 0 20px; gap: 15px; justify-content: space-between; }
        .search-container { flex: 0 1 500px; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.4); padding: 12px 18px; border-radius: 8px; border: 1px solid var(--border-color); }
        .search-container input { background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 14px; font-weight: 600; }
        
        .tool-btn { width: 44px; height: 44px; border-radius: 8px; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.4); border: 1px solid var(--border-color); color: var(--text-main); }
        .tool-btn:hover { border-color: var(--cyan-neon); color: var(--cyan-neon); }

        /* SIDEBAR PROFESIONAL */
        #sidebar { top: 95px; left: 15px; bottom: 20px; width: 420px; display: flex; flex-direction: column; border-top: 5px solid var(--color-temporal); }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid var(--border-color); }
        .sidebar-header h1 { margin: 0; font-size: 17px; font-weight: 900; letter-spacing: 1px; color: var(--color-temporal); }
        .sidebar-header p { margin: 6px 0 0; font-size: 11px; color: var(--cyan-neon); font-weight: 800; }
        
        .layers-container { flex: 1; overflow-y: auto; padding: 15px; }
        .sector-card { margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: rgba(0,0,0,0.3); overflow: hidden; }
        .sector-card.is-active { border-color: var(--cyan-neon); }
        
        .sector-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
        .check-visible { appearance: none; width: 18px; height: 18px; border: 2px solid #6e7681; border-radius: 4px; cursor: pointer; position: relative; }
        .check-visible:checked { background: var(--color-vigente); border-color: var(--color-vigente); }
        .check-visible:checked::after { content: '✔'; position: absolute; color: white; font-size: 11px; top: 0px; left: 2px; }

        /* POPUPS E IMÁGENES (Punto 5: URLs Invisibles) */
        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 12px; width: 340px; background: #fff; }
        .pop-cover { width: 100%; height: 160px; background: #111; position: relative; display: flex; justify-content: center; align-items: center; }
        .pop-cover img { width: 100%; height: 100%; object-fit: cover; }
        .pop-content { padding: 20px; color: #111; }
        
        .form-group { margin-bottom: 12px; border-bottom: 1px solid #eaeaea; padding-bottom: 6px; }
        .form-label { display: block; font-size: 9px; font-weight: 900; color: #888; text-transform: uppercase; }
        .form-input { width: 100%; border: none; font-size: 13px; font-weight: 700; color: #000; background: transparent; outline: none; }
        
        /* Estilo para URL protegida */
        .input-url-fisc { font-size: 10px; color: #ccc; opacity: 0.5; border: 1px dashed #eee; padding: 4px; border-radius: 4px; }
        .input-url-fisc:focus { opacity: 1; color: #333; }

        /* Punto 3: Selector de Color */
        .color-selector-fisc { display: flex; align-items: center; gap: 10px; background: #f8f9fa; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #eee; }
        .color-circle { width: 25px; height: 25px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.2); cursor: pointer; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-box { width: 480px; padding: 30px; }
    </style>
</head>
<body>

<div id="map"></div>

<nav class="ui-layer glass-panel top-nav">
    <div class="search-container">
        <i class="fas fa-search" style="color: var(--cyan-neon);"></i>
        <input type="text" id="buscador-global" placeholder="Buscar en Hacienda (Contribuyente, RIF, Estatus)..." oninput="ejecutarMotorBusqueda()">
    </div>
    
    <div class="tools-container">
        <div style="font-size: 10px; font-weight: 800; color: #a5b0bf; margin-right: 10px;">MODO LECTURA <input type="checkbox" id="toggle-readonly" onchange="actualizarUIYMapa()"></div>
        <button class="btn tool-btn" title="Punto" onclick="activarHerramienta('punto')"><i class="fas fa-map-marker-alt"></i></button>
        <button class="btn tool-btn" title="Área" onclick="activarHerramienta('poligono')"><i class="fas fa-draw-polygon"></i></button>
        <button class="btn" style="background: var(--color-vigente); color: white; padding: 12px 20px; border-radius: 8px; font-size: 11px;" onclick="exportarBaseDatos()">
            <i class="fas fa-file-export"></i> EXPORTAR JSON
        </button>
    </div>
</nav>

<aside id="sidebar" class="ui-layer glass-panel">
    <div class="sidebar-header">
        <h1>HACIENDA MUNICIPAL</h1>
        <p id="subtitulo-header">CONTROL FISCAL - AYACUCHO</p>
    </div>
    
    <div class="layers-container" id="arbol-datos"></div>
    
    <div style="padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.2);">
        <button class="btn" style="border: 1px solid var(--border-color); color: white; background: transparent; padding: 12px; border-radius: 8px; font-size: 10px;" onclick="crearNuevoSector()">NUEVA CAPA</button>
        <button class="btn" style="background: var(--color-temporal); color: black; padding: 12px; border-radius: 8px; font-size: 10px;" onclick="abrirModalImportacion()">IMPORTAR CSV</button>
    </div>
</aside>

<div class="modal-overlay" id="modal-importar">
    <div class="glass-panel modal-box">
        <h2 style="color: var(--color-temporal); font-size: 18px; margin-top: 0;">INYECCIÓN DE DATOS FISCALES</h2>
        <input type="text" id="input-url-sheets" style="width: 100%; padding: 12px; background: #000; color: white; border: 1px solid #333; border-radius: 8px; margin-bottom: 15px;" placeholder="URL de Google Sheets (CSV)">
        <button class="btn" style="width: 100%; background: var(--cyan-neon); color: black; padding: 15px; border-radius: 8px;" onclick="analizarCabecerasCSV()">ANALIZAR DOCUMENTO</button>
        
        <div id="configuracion-columnas" style="display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px;">
            <select id="sel-coordenadas" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #111; color: white;"></select>
            <select id="sel-nombre" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #111; color: white;"></select>
            <select id="sel-estatus" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #111; color: white;"></select>
            <select id="sel-imagen" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #111; color: white;"></select>
            <button class="btn" style="width: 100%; background: var(--color-vigente); color: white; padding: 15px; border-radius: 8px;" onclick="ejecutarInyeccionDatos()">INICIAR CARGA MASIVA</button>
        </div>
        <button onclick="cerrarModal('modal-importar')" style="background:none; border:none; color:red; cursor:pointer; margin-top:15px; font-weight:800;">CANCELAR</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    /* ==========================================================================
       CORE DEL SISTEMA (LOGICA PRO)
       ========================================================================== */
    const mapa = L.map('map', { center: [8.02611, -72.25244], zoom: 16, zoomControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'], maxZoom: 21 }).addTo(mapa);

    let STORE = {}; 
    let capaActivaId = null;
    let textoFiltroGlobal = "";
    let cacheCSV = { data: [], cabeceras: [] };

    const DICCIONARIO_ESTATUS = {
        "VIGENTE": "#238636", "VENCIDA": "#da3633", "TEMPORAL": "#fbbc04", "CENSO": "#00f2ff", "SIN LICENCIA": "#da3633", "NULO": "#6e7681"
    };

    const crearPin = (color) => L.divIcon({ 
        html: `<i class="fas fa-map-marker-alt" style="color:${color}; font-size:32px; text-shadow: 0 4px 8px rgba(0,0,0,0.5);"></i>`, 
        className: 'pin-fiscal', iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -30] 
    });

    // Punto 1: REPARACIÓN DE CAPAS (Aislamiento absoluto)
    function actualizarUIYMapa() {
        const contenedor = document.getElementById('arbol-datos');
        contenedor.innerHTML = "";
        
        for(let id in STORE) {
            const sector = STORE[id];
            
            // 1. Limpieza física del mapa: Si el checkbox está apagado, removemos el LayerGroup entero
            if(mapa.hasLayer(sector.grupoFisico)) {
                mapa.removeLayer(sector.grupoFisico);
            }
            sector.grupoFisico.clearLayers();

            // 2. Si la capa es visible, procesamos sus elementos
            if(sector.visible) {
                let sectorTieneResultados = false;
                sector.registros.forEach(reg => {
                    const stringBusqueda = Object.values(reg.datosGenerales).join(" ").toLowerCase();
                    if(textoFiltroGlobal === "" || stringBusqueda.includes(textoFiltroGlobal)) {
                        sector.grupoFisico.addLayer(reg.capaLeaflet);
                        sectorTieneResultados = true;
                    }
                });

                if(sectorTieneResultados) mapa.addLayer(sector.grupoFisico);
            }

            // 3. Renderizar UI Lateral (Punto 4: Se guarda el estado 'visible' en el checkbox)
            contenedor.innerHTML += `
                <div class="sector-card ${id === capaActivaId ? 'is-active' : ''}">
                    <div class="sector-header">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <input type="radio" name="capaSel" ${id === capaActivaId ? 'checked' : ''} onchange="capaActivaId='${id}'; actualizarUIYMapa()">
                            <input type="checkbox" class="check-visible" ${sector.visible ? 'checked' : ''} onchange="toggleVisibilidad('${id}', this.checked)">
                            <span style="font-size:12px; font-weight:800; cursor:pointer;" onclick="enfocarSector('${id}')">${sector.nombreSector}</span>
                        </div>
                        <i class="fas fa-trash" style="font-size:10px; color:#555; cursor:pointer;" onclick="eliminarSector('${id}')"></i>
                    </div>
                </div>`;
        }
    }

    function toggleVisibilidad(id, estado) {
        STORE[id].visible = estado;
        actualizarUIYMapa();
    }

    /* ==========================================================================
       POPUPS DINÁMICOS (Punto 3 y 5)
       ========================================================================== */
    function abrirPopupDinamico(idSector, idFisico) {
        const reg = STORE[idSector].registros.find(r => r.idFisico === idFisico);
        const dg = reg.datosGenerales;
        const colorActual = reg.colorPersonalizado || DICCIONARIO_ESTATUS[dg["Estatus"]] || "#6e7681";

        let html = `
            <div class="pop-cover">
                <img src="${dg['Link Fotografía'] || ''}" onerror="this.src='https://via.placeholder.com/400x160/111/fff?text=HACIENDA+AYACUCHO'">
            </div>
            <div class="pop-content">
                <div class="form-group">
                    <span class="form-label">Contribuyente / Razon Social</span>
                    <input type="text" class="form-input" value="${dg['Contribuyente']}" onchange="actualizarDato('${idSector}', ${idFisico}, 'Contribuyente', this.value)">
                </div>
                <div class="form-group">
                    <span class="form-label">RIF / Identificación</span>
                    <input type="text" class="form-input" value="${dg['RIF'] || ''}" onchange="actualizarDato('${idSector}', ${idFisico}, 'RIF', this.value)">
                </div>
                <div class="form-group">
                    <span class="form-label">Estatus Fiscal</span>
                    <select class="form-input" onchange="cambiarEstatus('${idSector}', ${idFisico}, this.value)">
                        ${Object.keys(DICCIONARIO_ESTATUS).map(k => `<option value="${k}" ${dg['Estatus'] === k ? 'selected' : ''}>${k}</option>`).join('')}
                    </select>
                </div>
                
                <div class="color-selector-fisc">
                    <span style="font-size:9px; font-weight:900;">COLOR PERSONALIZADO:</span>
                    <input type="color" value="${colorActual}" onchange="cambiarColorPin('${idSector}', ${idFisico}, this.value)" style="border:none; background:none; cursor:pointer; width:30px; height:20px;">
                </div>

                <div class="form-group" style="margin-top:15px; border:none;">
                    <span class="form-label">URL Fotografía (Solo Edición)</span>
                    <input type="password" class="form-input input-url-fisc" value="${dg['Link Fotografía']}" onfocus="this.type='text'" onblur="this.type='password'" onchange="actualizarDato('${idSector}', ${idFisico}, 'Link Fotografía', this.value)">
                </div>

                <button class="btn" style="width:100%; background:var(--color-vencida); color:white; padding:8px; border-radius:4px; font-size:9px; margin-top:10px;" onclick="eliminarRegistro('${idSector}', ${idFisico})">ELIMINAR REGISTRO</button>
            </div>`;

        L.popup({ minWidth: 320 }).setLatLng(reg.capaLeaflet.getLatLng()).setContent(html).openOn(mapa);
    }

    function cambiarColorPin(idSec, idFis, nuevoColor) {
        const reg = STORE[idSec].registros.find(r => r.idFisico === idFis);
        reg.colorPersonalizado = nuevoColor;
        reg.capaLeaflet.setIcon(crearPin(nuevoColor));
        actualizarUIYMapa();
    }

    function cambiarEstatus(idSec, idFis, nuevoEst) {
        const reg = STORE[idSec].registros.find(r => r.idFisico === idFis);
        reg.datosGenerales["Estatus"] = nuevoEst;
        if(!reg.colorPersonalizado) {
            reg.capaLeaflet.setIcon(crearPin(DICCIONARIO_ESTATUS[nuevoEst]));
        }
        actualizarUIYMapa();
        mapa.closePopup();
    }

    function actualizarDato(idSec, idFis, clave, valor) {
        STORE[idSec].registros.find(r => r.idFisico === idFis).datosGenerales[clave] = valor;
        actualizarUIYMapa();
    }

    /* ==========================================================================
       HERRAMIENTAS Y DIBUJO
       ========================================================================== */
    const herramientaPunto = new L.Draw.Marker(mapa, { icon: crearPin(DICCIONARIO_ESTATUS["CENSO"]) });
    const herramientaPoligono = new L.Draw.Polygon(mapa, { shapeOptions: { color: '#00f2ff', weight: 2 } });

    function activarHerramienta(tipo) {
        if(!capaActivaId) return alert("Seleccione una capa de trabajo primero.");
        tipo === 'punto' ? herramientaPunto.enable() : herramientaPoligono.enable();
    }

    mapa.on(L.Draw.Event.CREATED, (e) => {
        const idF = L.stamp(e.layer);
        const registro = {
            idFisico: idF,
            tipoGeometria: e.layerType,
            capaLeaflet: e.layer,
            datosGenerales: { "Contribuyente": "NUEVO INGRESO", "Estatus": "CENSO", "Link Fotografía": "" },
            colorPersonalizado: null
        };
        STORE[capaActivaId].registros.push(registro);
        e.layer.on('click', () => abrirPopupDinamico(capaActivaId, idF));
        actualizarUIYMapa();
    });

    /* ==========================================================================
       IMPORTACIÓN / EXPORTACIÓN (Punto 4)
       ========================================================================== */
    async function analizarCabecerasCSV() {
        let url = document.getElementById('input-url-sheets').value;
        if(url.includes('/edit')) url = url.replace(/\/edit.*$/, '/export?format=csv');
        try {
            const resp = await fetch(url);
            const txt = await resp.text();
            const rows = txt.split('\n').map(r => r.split(','));
            cacheCSV.cabeceras = rows[0].map(c => c.trim());
            cacheCSV.data = rows.slice(1);
            
            const ops = cacheCSV.cabeceras.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-coordenadas').innerHTML = `<option>Columna Coordenadas</option>${ops}`;
            document.getElementById('sel-nombre').innerHTML = `<option>Columna Contribuyente</option>${ops}`;
            document.getElementById('sel-estatus').innerHTML = `<option>Columna Estatus</option>${ops}`;
            document.getElementById('sel-imagen').innerHTML = `<option>Columna Imagen (Opcional)</option>${ops}`;
            document.getElementById('configuracion-columnas').style.display = 'block';
        } catch(e) { alert("Error al leer Sheets. Verifique que sea público."); }
    }

    function ejecutarInyeccionDatos() {
        const idSec = 'imp_' + Date.now();
        STORE[idSec] = { nombreSector: "IMPORTACIÓN " + new Date().toLocaleDateString(), visible: true, registros: [], grupoFisico: L.layerGroup() };
        
        const colC = document.getElementById('sel-coordenadas').value;
        const colN = document.getElementById('sel-nombre').value;
        const colE = document.getElementById('sel-estatus').value;
        const colI = document.getElementById('sel-imagen').value;

        cacheCSV.data.forEach(fila => {
            const indexC = cacheCSV.cabeceras.indexOf(colC);
            const coordStr = fila[indexC];
            if(coordStr && coordStr.includes(',')) {
                const coords = coordStr.split(',').map(n => parseFloat(n.trim()));
                const marker = L.marker([coords[0], coords[1]], { icon: crearPin(DICCIONARIO_ESTATUS["VIGENTE"]) });
                const idF = L.stamp(marker);
                
                STORE[idSec].registros.push({
                    idFisico: idF,
                    capaLeaflet: marker,
                    datosGenerales: {
                        "Contribuyente": fila[cacheCSV.cabeceras.indexOf(colN)] || "S/N",
                        "Estatus": "VIGENTE",
                        "Link Fotografía": fila[cacheCSV.cabeceras.indexOf(colI)] || ""
                    }
                });
                marker.on('click', () => abrirPopupDinamico(idSec, idF));
            }
        });
        actualizarUIYMapa();
        cerrarModal('modal-importar');
    }

    function exportarBaseDatos() {
        // Punto 4: El JSON guardará el estado 'visible'
        const payload = JSON.stringify(STORE, (k, v) => (k === 'capaLeaflet' || k === 'grupoFisico') ? undefined : v, 2);
        const blob = new Blob([payload], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `CONTROL_FISCAL_AYACUCHO_${Date.now()}.json`;
        a.click();
    }

    function crearNuevoSector() {
        const nom = prompt("Nombre de la nueva capa fiscal:");
        if(!nom) return;
        const id = 'sec_' + Date.now();
        STORE[id] = { nombreSector: nom.toUpperCase(), visible: true, registros: [], grupoFisico: L.layerGroup() };
        capaActivaId = id;
        actualizarUIYMapa();
    }

    function abrirModalImportacion() { document.getElementById('modal-importar').style.display = 'flex'; }
    function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
    function ejecutarMotorBusqueda() { textoFiltroGlobal = document.getElementById('buscador-global').value.toLowerCase(); actualizarUIYMapa(); }
</script>
</body>
</html>
