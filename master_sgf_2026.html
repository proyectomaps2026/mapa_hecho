<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACIENDA MUNICIPAL AYACUCHO 2026 - CATASTRO DIGITAL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #0b0e14; 
            --panel: #161b22; 
            --text: #f0f3f6; 
            --border: #30363d; 
            --yellow: #fbbc04; 
            --safe: #238636; 
            --danger: #da3633;
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }

        /* INTERFAZ GENERAL */
        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: rgba(22, 27, 34, 0.98); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); }

        /* BARRA SUPERIOR INSTITUCIONAL */
        .top-bar { 
            top: 15px; left: 15px; right: 15px; height: 60px; 
            display: flex; align-items: center; padding: 0 20px; gap: 15px;
        }

        .search-box { 
            flex: 1; display: flex; align-items: center; gap: 12px; 
            background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border);
        }
        .search-box input { 
            background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 14px;
        }

        /* SIDEBAR HACIENDA MUNICIPAL */
        #sidebar { 
            top: 90px; left: 15px; bottom: 20px; width: 390px; 
            display: flex; flex-direction: column; 
            border-top: 6px solid var(--yellow);
        }

        .side-head { padding: 25px 20px; border-bottom: 1px solid var(--border); }
        .side-head h1 { margin: 0; font-size: 16px; font-weight: 900; letter-spacing: 1.5px; color: var(--yellow); text-transform: uppercase; }
        .side-head p { margin: 5px 0 0; font-size: 11px; color: var(--accent); font-weight: 700; opacity: 0.8; }

        .layer-zone { flex: 1; overflow-y: auto; padding: 15px; }

        /* ACORDEÓN DE CAPAS TIPO GOOGLE */
        .capa-group { margin-bottom: 15px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.02); }
        .capa-header { padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.3s; }
        .capa-header:hover { background: rgba(255,255,255,0.05); }
        .capa-name { font-size: 12px; font-weight: 900; display: flex; align-items: center; gap: 10px; color: var(--yellow); }
        
        .sub-leyenda { display: none; background: rgba(0,0,0,0.3); padding: 5px 0; }
        .estatus-row { padding: 8px 20px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 10px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .estatus-row:hover { background: rgba(0,242,255,0.05); }
        .estatus-dot { width: 10px; height: 10px; border-radius: 50%; }
        
        .item-list { display: none; max-height: 200px; overflow-y: auto; }
        .item-row { padding: 6px 40px; font-size: 10px; color: #8b949e; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .item-row:hover { color: white; background: rgba(255,255,255,0.05); }

        /* POPUPS PROFESIONALES */
        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 16px; background: #fff; width: 340px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        .leaflet-popup-tip { background: #fff; }
        
        .pop-img-box { width: 100%; height: 170px; background: #000; position: relative; overflow: hidden; }
        .pop-img { width: 100%; height: 100%; object-fit: cover; }
        .pop-badge { position: absolute; top: 15px; left: 15px; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 900; color: white; text-transform: uppercase; border: 2px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        
        .pop-mode-toggle { 
            position: absolute; bottom: -22px; right: 20px; width: 45px; height: 45px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            background: var(--accent); color: #000; border: 4px solid white; cursor: pointer; z-index: 10;
        }

        .pop-body { padding: 30px 20px 20px; color: #1a1d21; max-height: 300px; overflow-y: auto; }
        .data-field { margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; display: flex; flex-direction: column; padding-bottom: 5px; position: relative; }
        .data-label { font-size: 9px; font-weight: 900; color: #a0a0a0; text-transform: uppercase; margin-bottom: 2px; }
        .data-value { font-size: 13px; font-weight: 600; color: #111; border: none; background: transparent; outline: none; width: 85%; }
        
        .eye-toggle { position: absolute; right: 0; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 14px; color: #ddd; }
        .eye-toggle.visible { color: var(--accent); }

        .btn-action { background: var(--safe); color: white; border: none; width: 100%; padding: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        /* MODAL RAW */
        #modal-raw { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 360px; padding: 30px; display: none; z-index: 3000; }
        .raw-input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid var(--border); color: white; border-radius: 8px; }
        select { width: 100%; padding: 10px; margin-bottom: 15px; background: #161b22; color: white; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; }

        .sector-stats { padding: 15px; background: #f8f9fa; border-radius: 12px; border-left: 5px solid var(--accent); }
        .stat-item { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; font-weight: 700; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui glass top-bar">
    <div class="search-box">
        <i class="fas fa-search" style="color:var(--accent)"></i>
        <input type="text" id="global-search" placeholder="Buscar contribuyente en Ayacucho..." oninput="busquedaGlobal()">
    </div>
    <div style="display:flex; gap:8px;">
        <button title="Punto de Inspección" class="glass" style="width:45px; height:45px; color:var(--accent)" onclick="toggleDraw('marker')"><i class="fas fa-map-marker-alt"></i></button>
        <button title="Dibujar Sector" class="glass" style="width:45px; height:45px; color:var(--yellow)" onclick="toggleDraw('poly')"><i class="fas fa-draw-polygon"></i></button>
    </div>
    <button class="glass" style="padding:0 20px; color:var(--yellow); font-weight:900;" onclick="exportarBackup()">RESPALDO JSON</button>
</div>

<aside id="sidebar" class="glass ui">
    <div class="side-head">
        <h1>Hacienda Municipal Ayacucho 2026</h1>
        <p id="active-context">CATASTRO DIGITAL | SAN JUAN DE COLÓN</p>
    </div>

    <div class="layer-zone" id="master-panel">
        </div>

    <div style="padding:20px; display:grid; grid-template-columns: 1fr 1fr; gap:12px; border-top:1px solid var(--border);">
        <button class="glass" style="padding:15px; font-size:11px; font-weight:900" onclick="nuevaCapaManual()">+ NUEVO SECTOR</button>
        <button class="glass" style="background:var(--yellow); color:#000; font-weight:900;" onclick="showModal('modal-raw')">IMPORTAR RAW</button>
    </div>
</aside>

<div id="modal-raw" class="glass ui">
    <h2 style="margin:0 0 20px; font-size:18px; color:var(--yellow)">Inyección de Datos RAW</h2>
    <input type="text" id="input-url" class="raw-input" placeholder="URL de Google Sheets (Exportable CSV)">
    <button class="btn-action" onclick="validarURL()">Analizar Columnas</button>
    
    <div id="config-raw" style="display:none; margin-top:20px;">
        <label style="font-size:10px; opacity:0.7">Coordenadas (Lat, Lng):</label>
        <select id="sel-coo"></select>
        
        <label style="font-size:10px; opacity:0.7">Estatus de Licencia:</label>
        <select id="sel-est"></select>
        
        <label style="font-size:10px; opacity:0.7">Columna de Imágenes:</label>
        <select id="sel-img"></select>
        
        <button class="btn-action" style="background:var(--accent); color:#000" onclick="ejecutarInyeccion()">Generar Catastro</button>
    </div>
    <button class="btn-action" style="background:var(--danger); margin-top:10px" onclick="hideModal('modal-raw')">Cancelar</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    // CONFIGURACIÓN INICIAL DEL MAPA
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    // BASE DE DATOS DEL SISTEMA (STORE)
    let STORE = {}; 
    let activeId = null; 
    let tempRawData = []; 
    let tempCols = [];

    // DISEÑO DE ICONOS
    const createPin = (color) => L.divIcon({ 
        html: `<i class="fas fa-map-marker-alt" style="color:${color}; font-size:28px; text-shadow: 0 0 4px #000"></i>`, 
        className: 'marker-hacienda', iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -25] 
    });

    // REPARACIÓN HERRAMIENTAS DE DIBUJO (POLÍGONO Y MARCADOR)
    const drawMarker = new L.Draw.Marker(map, { icon: createPin('#00f2ff') });
    const drawPolygon = new L.Draw.Polygon(map, { 
        shapeOptions: { color: '#00f2ff', fillOpacity: 0.2, weight: 3, clickable: true },
        showArea: true,
        allowIntersection: false 
    });

    function toggleDraw(tool) {
        if(!activeId) return alert("Primero selecciona una Capa o crea un Nuevo Sector");
        tool === 'marker' ? drawMarker.enable() : drawPolygon.enable();
    }

    // EVENTO: CIERRE DE POLÍGONO Y CREACIÓN DE MARCADOR
    map.on(L.Draw.Event.CREATED, (e) => {
        const layer = e.layer;
        if(layer instanceof L.Marker) layer.options.draggable = true;

        STORE[activeId].group.addLayer(layer);
        const lid = layer._leaflet_id;
        
        const newItem = {
            lid: lid,
            data: {"Contribuyente": "NUEVO INGRESO", "Estatus": "SIN CATEGORÍA"},
            img: "",
            color: "#00f2ff",
            type: e.layerType,
            ocultos: []
        };

        STORE[activeId].items.push(newItem);
        attachEvents(layer, activeId, lid);
        updateUI();
        triggerPopup(activeId, lid, 'edicion');
    });

    function attachEvents(layer, bid, lid) {
        layer.on('click', () => triggerPopup(bid, lid, 'vista'));
        layer.on('dragend', () => updateUI());
    }

    // LÓGICA DE AUDITORÍA: INTERSECCIÓN GEOGRÁFICA
    function auditSector(poly) {
        let report = { vigentes: 0, vencidas: 0, sinlicencia: 0, total: 0 };
        for (let b in STORE) {
            STORE[b].items.forEach(it => {
                const layer = STORE[b].group.getLayer(it.lid);
                if(layer instanceof L.Marker) {
                    if(poly.getBounds().contains(layer.getLatLng())) {
                        report.total++;
                        const s = (it.data["Estatus"] || "").toUpperCase();
                        if(s.includes("VIGENTE")) report.vigentes++;
                        else if(s.includes("VENCIDA")) report.vencidas++;
                        else report.sinlicencia++;
                    }
                }
            });
        }
        return report;
    }

    // POPUP MAESTRO (MODO VISTA / EDICIÓN) - REPARADO SIN ESPACIOS VACÍOS
    function triggerPopup(bid, lid, mode = 'vista') {
        const it = STORE[bid].items.find(x => x.lid === lid);
        const l = STORE[bid].group.getLayer(lid);
        if(!l) return;

        let content = `<div class="pop-wrapper">`;

        // Si es Polígono, mostramos Dashboard Estadístico
        if(l instanceof L.Polygon) {
            const stats = auditSector(l);
            content += `<div class="pop-body">
                <div class="sector-stats">
                    <h3 style="margin:0 0 10px; font-size:14px; color:#111">REPORTE DE SECTOR</h3>
                    <div class="stat-item"><span>Establecimientos:</span> <span>${stats.total}</span></div>
                    <div class="stat-item" style="color:var(--safe)"><span>Vigentes:</span> <span>${stats.vigentes}</span></div>
                    <div class="stat-item" style="color:var(--yellow)"><span>Vencidas:</span> <span>${stats.vencidas}</span></div>
                    <div class="stat-item" style="color:var(--danger)"><span>Sin Licencia:</span> <span>${stats.sinlicencia}</span></div>
                </div>`;
        } else {
            // Si es Marcador, mostramos Ficha de Contribuyente
            content += `
                <div class="pop-img-box">
                    <img src="${it.img}" class="pop-img" onerror="this.src='https://via.placeholder.com/400x200?text=SIN+IMAGEN+PROCESADA'">
                    <div class="pop-badge" style="background:${it.color}">${it.data["Estatus"] || "CENSO"}</div>
                    <div class="pop-mode-toggle" onclick="triggerPopup('${bid}',${lid},'${mode==='vista'?'edicion':'vista'}')">
                        <i class="fas ${mode==='vista'?'fa-pen':'fa-eye'}"></i>
                    </div>
                </div>
                <div class="pop-body">`;

            for(let key in it.data) {
                const hidden = it.ocultos?.includes(key);
                if(mode === 'vista' && hidden) continue;
                
                content += `
                    <div class="data-field">
                        ${mode === 'edicion' ? `<i class="fas ${hidden?'fa-eye-slash':'fa-eye'} eye-toggle ${!hidden?'visible':''}" onclick="togglePrivacy('${bid}',${lid},'${key}')"></i>` : ''}
                        <span class="data-label">${key}</span>
                        <input type="text" class="data-value" value="${it.data[key]}" ${mode==='vista'?'readonly':''} onchange="syncData('${bid}',${lid},'${key}',this.value)">
                    </div>`;
            }

            if(mode === 'edicion') {
                content += `
                <div class="data-field" style="background:#f9f9f9; padding:8px; border-radius:5px">
                    <span class="data-label">Color de Marcador</span>
                    <input type="color" value="${it.color}" onchange="changeColor('${bid}',${lid},this.value)" style="width:100%; height:25px; cursor:pointer">
                </div>
                <div class="data-field">
                    <span class="data-label">Link de Imagen</span>
                    <input type="text" class="data-value" value="${it.img}" placeholder="Pegar URL de Google Drive..." onchange="syncImg('${bid}',${lid},this.value)">
                </div>`;
            }
        }

        content += `</div><button class="btn-action" onclick="forceClose(${bid},${lid})">Finalizar Revisión</button></div>`;
        
        l.bindPopup(content, { closeButton: false }).openPopup();
    }

    // RENDERIZADO DEL PANEL TIPO GOOGLE (LECCIONES DE LA FOTO 1 Y 2)
    function updateUI() {
        const panel = document.getElementById('master-panel');
        panel.innerHTML = "";

        for(let id in STORE) {
            const capa = STORE[id];
            const groups = {}; // Para agrupar por estatus
            
            capa.items.forEach(it => {
                const cat = it.data["Estatus"] || "SIN CATEGORÍA";
                if(!groups[cat]) groups[cat] = { total: 0, color: it.color, items: [] };
                groups[cat].total++;
                groups[cat].items.push(it);
            });

            let capaHTML = `
                <div class="capa-group">
                    <div class="capa-header" onclick="selectCapa('${id}')">
                        <div class="capa-name">
                            <i class="fas ${id === activeId ? 'fa-folder-open' : 'fa-folder'}"></i>
                            ${capa.name}
                        </div>
                        <i class="fas fa-trash-alt" style="color:var(--danger); font-size:12px" onclick="eliminarCapa('${id}')"></i>
                    </div>
                    <div class="sub-leyenda" id="sub-${id}" style="display:${id===activeId?'block':'none'}">`;
            
            for(let status in groups) {
                capaHTML += `
                    <div class="estatus-row" onclick="toggleItems('${id}','${status}')">
                        <div class="estatus-dot" style="background:${groups[status].color}"></div>
                        ${status} (${groups[status].total})
                    </div>
                    <div class="item-list" id="list-${id}-${status.replace(/\s/g,'')}">`;
                
                groups[status].items.forEach(it => {
                    capaHTML += `<div class="item-row" onclick="focusItem('${id}',${it.lid})">
                        <i class="fas fa-caret-right"></i> ${it.data["Contribuyente"] || "Local Sin Nombre"}
                    </div>`;
                });

                capaHTML += `</div>`;
            }
            
            panel.insertAdjacentHTML('beforeend', capaHTML + `</div></div>`);
        }
        if(activeId) document.getElementById('active-context').innerText = "CAPA ACTIVA: " + STORE[activeId].name;
    }

    // FUNCIONES DE SINCRONIZACIÓN Y EDICIÓN
    function syncData(bid, lid, k, v) { 
        const it = STORE[bid].items.find(x => x.lid === lid);
        it.data[k] = v;
        updateUI(); 
    }

    function syncImg(bid, lid, v) {
        const it = STORE[bid].items.find(x => x.lid === lid);
        it.img = v;
        triggerPopup(bid, lid, 'edicion');
    }

    function changeColor(bid, lid, v) {
        const it = STORE[bid].items.find(x => x.lid === lid);
        it.color = v;
        const layer = STORE[bid].group.getLayer(lid);
        if(layer.setIcon) layer.setIcon(createPin(v));
        updateUI();
        triggerPopup(bid, lid, 'vista');
    }

    function togglePrivacy(bid, lid, k) {
        const it = STORE[bid].items.find(x => x.lid === lid);
        if(it.ocultos.includes(k)) it.ocultos = it.ocultos.filter(x => x !== k);
        else it.ocultos.push(k);
        triggerPopup(bid, lid, 'edicion');
    }

    // MANEJO DEL RAW (GOOGLE SHEETS)
    async function validarURL() {
        let url = document.getElementById('input-url').value;
        if(url.includes('/edit')) url = url.replace(/\/edit.*$/, '/export?format=csv');
        
        try {
            const resp = await fetch(url);
            const csv = await resp.text();
            const lines = csv.split('\n').map(l => l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
            
            tempCols = lines[0];
            tempRawData = lines.slice(1).filter(l => l.length >= tempCols.length);

            const selectores = ['sel-coo', 'sel-est', 'sel-img'];
            selectores.forEach(s => {
                const el = document.getElementById(s);
                el.innerHTML = tempCols.map(c => `<option value="${c}">${c}</option>`).join('');
            });

            document.getElementById('config-raw').style.display = 'block';
        } catch(err) {
            alert("Error: Asegúrese de que el enlace de Google Sheets tenga acceso público.");
        }
    }

    function ejecutarInyeccion() {
        const bid = 'raw_' + Date.now();
        const grp = new L.FeatureGroup().addTo(map);
        const colCoord = document.getElementById('sel-coo').value;
        const colEst = document.getElementById('sel-est').value;
        const colImg = document.getElementById('sel-img').value;

        const items = [];
        tempRawData.forEach(row => {
            let rData = {};
            tempCols.forEach((c, i) => rData[c] = row[i]);

            const coordsRaw = rData[colCoord]?.replace(/[()]/g, '').split(/[, ]+/);
            if(coordsRaw && coordsRaw.length >= 2) {
                const lat = parseFloat(coordsRaw[0]);
                const lng = parseFloat(coordsRaw[1]);

                if(!isNaN(lat)) {
                    let markerColor = "#da3633"; // Rojo default
                    const estatus = (rData[colEst] || "").toUpperCase();
                    if(estatus.includes("VIGENTE")) markerColor = "#238636";
                    else if(estatus.includes("TEMPORAL")) markerColor = "#fbbc04";

                    const m = L.marker([lat, lng], { icon: createPin(markerColor), draggable: true });
                    grp.addLayer(m);
                    attachEvents(m, bid, m._leaflet_id);
                    
                    items.push({
                        lid: m._leaflet_id,
                        data: rData,
                        img: rData[colImg] || "",
                        color: markerColor,
                        ocultos: []
                    });
                }
            }
        });

        STORE[bid] = { name: "CENSO IMPORTADO", items: items, group: grp };
        activeId = bid;
        updateUI();
        hideModal('modal-raw');
    }

    // UTILIDADES DE INTERFAZ
    function selectCapa(id) { activeId = id; updateUI(); }
    function nuevaCapaManual() {
        const id = 'layer_' + Date.now();
        STORE[id] = { name: "NUEVO SECTOR", items: [], group: new L.FeatureGroup().addTo(map) };
        activeId = id;
        updateUI();
    }
    function toggleItems(bid, status) {
        const el = document.getElementById(`list-${bid}-${status.replace(/\s/g,'')}`);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }
    function focusItem(bid, lid) {
        const l = STORE[bid].group.getLayer(lid);
        map.setView(l instanceof L.Marker ? l.getLatLng() : l.getBounds().getCenter(), 19);
        triggerPopup(bid, lid, 'vista');
    }
    function forceClose(bid, lid) { STORE[bid].group.getLayer(lid).closePopup(); }
    function showModal(id) { document.getElementById(id).style.display = 'block'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }
    function exportarBackup() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(STORE));
        const dlAnchorElem = document.createElement('a');
        dlAnchorElem.setAttribute("href", dataStr);
        dlAnchorElem.setAttribute("download", "catastro_hacienda_2026.json");
        dlAnchorElem.click();
    }
</script>
</body>
</html>
