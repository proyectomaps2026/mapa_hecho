<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF HACIENDA MUNICIPAL AYACUCHO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --amarillo: #ffcc00; --rojo: #e60000; --verde: #007a33;
            --dark: #020617; --panel: #0f172a; --accent: #fbbf24;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: #fff; height: 100vh; overflow: hidden; }

        .layout { display: flex; height: 100vh; width: 100vw; position: relative; }
        #map { flex: 1; z-index: 1; background: #000; }

        /* ELIMINAR ATRIBUCIÓN LEAFLET */
        .leaflet-control-attribution { display: none !important; }

        /* IDENTIDAD INSTITUCIONAL (FOTOS 1-3) */
        .brand-box { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: rgba(15, 23, 42, 0.95); padding: 18px 25px; border-radius: 10px;
            border-left: 6px solid var(--amarillo); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .brand-box b { font-size: 18px; display: block; letter-spacing: 0.5px; color: #fff; }
        .brand-box span { font-size: 11px; color: var(--accent); font-weight: 800; text-transform: uppercase; }

        /* BUSCADOR OMNI (FOTOS 11-12) */
        .search-container { 
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; 
            width: 480px; background: #fff; border-radius: 50px; padding: 12px 25px;
            display: flex; align-items: center; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .search-container input { border: none; outline: none; flex: 1; font-weight: 700; color: #0f172a; font-size: 15px; }

        /* SIDEBAR (FOTOS 6-10) */
        #sidebar { 
            width: 440px; background: var(--panel); border-left: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; z-index: 100;
        }
        .sidebar-header { padding: 40px 30px; text-align: center; border-bottom: 5px solid var(--amarillo); }
        .scroll-area { flex: 1; overflow-y: auto; padding: 25px; }

        .cloud-input {
            background: #020617; border: 1px solid #334155; color: #fff;
            padding: 14px; border-radius: 10px; width: 100%; margin-bottom: 12px; font-size: 12px;
        }

        .btn { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; cursor: pointer;
            font-weight: 900; font-size: 12px; text-transform: uppercase; margin-bottom: 25px;
            transition: 0.2s;
        }
        .btn-gold { background: var(--accent); color: #000; }
        .btn-gold:hover { background: #fff; }

        /* MULTICAPAS SELECCIONABLES (FOTO 9) */
        .layer-card { background: #1e293b; border-radius: 20px; margin-bottom: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .layer-head { padding: 15px 20px; background: rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; }
        .layer-head span { font-weight: 800; color: var(--accent); }
        .toggle-switch { width: 40px; height: 20px; background: #475569; border-radius: 20px; position: relative; cursor: pointer; }
        .toggle-switch.on { background: var(--verde); }
        .toggle-switch::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .toggle-switch.on::after { left: 22px; }

        .layer-grid { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-tool { padding: 10px; font-size: 10px; background: #334155; color: #fff; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; }
        .btn-draw-tool { grid-column: span 2; border: 2px solid var(--accent); background: transparent; color: var(--accent); }
        .btn-draw-tool.active { background: var(--rojo); color: #fff; border-color: #fff; }

        /* MODALES (FOTOS 15-16) */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; display: none; backdrop-filter: blur(10px); }
        .modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--panel); width: 480px; padding: 40px; border-radius: 25px; 
            z-index: 1000; border: 1px solid var(--accent); display: none;
        }
        .field-row { display: flex; align-items: center; background: #020617; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; }
        .field-row input { margin-right: 15px; width: 18px; height: 18px; }

        /* POPUPS (FOTOS 17-18) */
        .pop-card { width: 300px; color: #000; }
        .pop-header { background: #f8fafc; padding: 15px; font-weight: 900; font-size: 16px; border-bottom: 4px solid var(--verde); }
        .pop-body { padding: 15px; font-size: 13px; }
        .pop-line { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; }
        .pop-line b { color: #94a3b8; font-size: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="layout">
    <div id="map"></div>

    <div class="brand-box">
        <b>HACIENDA MUNICIPAL AYACUCHO</b>
        <span>SGF - GESTIÓN FISCAL MASTER</span>
    </div>

    <div class="search-container">
        <span style="margin-right:15px">🔍</span>
        <input type="text" id="omni-search" placeholder="Buscar RIF, Nombre o Estatus..." onkeyup="globalSearch()">
    </div>

    <aside id="sidebar">
        <header class="sidebar-header">
            <h1 style="font-weight:900; font-size:24px">SGF MASTER</h1>
            <p style="font-size:10px; color:var(--accent); letter-spacing:2px">NUCLEO TÁCHIRA</p>
        </header>
        <div class="scroll-area">
            <button class="btn btn-gold" onclick="createNewLayer()">+ VINCULAR HOJA GOOGLE SHEETS</button>
            <div id="layer-list"></div>
        </div>
    </aside>
</div>

<div class="overlay" id="overlay" onclick="closeModals()"></div>
<div class="modal" id="modal-ficha">
    <h3 style="color:var(--accent); margin-bottom:10px">Configuración de Ficha</h3>
    <button class="btn-tool" onclick="toggleAllFields(true)" style="margin-bottom:10px">Seleccionar Todo</button>
    <div id="ficha-fields" style="max-height:300px; overflow-y:auto"></div>
    <button class="btn btn-gold" style="margin-top:20px" onclick="applyFicha()">GUARDAR CAMBIOS</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
    let STORE = {};
    let ACTIVE_LID = null;
    let DRAW_CONTROL = null;

    // 1. INICIALIZAR MAPA Y CAPAS BASE (FOTOS 4-5)
    const googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'], maxZoom: 22 });
    const googleStreets = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'], maxZoom: 22 });

    const map = L.map('map', { 
        center: [8.03317, -72.25693], 
        zoom: 16, 
        layers: [googleSat],
        zoomControl: false 
    });

    L.control.layers({ "Vista Satelital": googleSat, "Vista Calles": googleStreets }, null, { position: 'topright' }).addTo(map);

    function createNewLayer() {
        const name = prompt("Nombre de la Capa (Ej: Licorerías):");
        if(!name) return;
        const id = 'ID' + Date.now();
        STORE[id] = { name: name, group: L.featureGroup().addTo(map), url: '', config: [], data: [], visible: true, drawing: false };
        renderSidebar();
    }

    function renderSidebar() {
        const container = document.getElementById('layer-list');
        container.innerHTML = "";
        Object.keys(STORE).forEach(id => {
            const l = STORE[id];
            container.innerHTML += `
                <div class="layer-card">
                    <div class="layer-head">
                        <span>${l.name}</span>
                        <div class="toggle-switch ${l.visible?'on':''}" onclick="toggleVisibility('${id}')"></div>
                    </div>
                    <div style="padding:15px">
                        <input type="text" class="cloud-input" placeholder="Pegar URL de Google Sheets..." 
                               onchange="processUrl('${id}', this.value)" value="${l.url}">
                        <div class="layer-grid">
                            <button class="btn-tool" onclick="syncLayer('${id}')">🔄 SINCRONIZAR</button>
                            <button class="btn-tool" onclick="openFichaConfig('${id}')">📋 FICHA TÉCNICA</button>
                            <button class="btn-tool btn-draw-tool ${l.drawing?'active':''}" onclick="startDrawing('${id}')">
                                ${l.drawing ? 'FINALIZAR DIBUJO' : '✏️ DIBUJAR SECTOR'}
                            </button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function processUrl(id, url) {
        if(url.includes('/edit')) url = url.split('/edit')[0] + '/export?format=csv';
        STORE[id].url = url;
    }

    function syncLayer(id) {
        if(!STORE[id].url) return alert("Pegue el URL primero.");
        Papa.parse(STORE[id].url, {
            download: true, header: true, skipEmptyLines: true,
            complete: r => {
                STORE[id].data = r.data;
                const cols = Object.keys(r.data[0]).filter(c => c.trim() !== "");
                STORE[id].config = cols.map(c => ({ name: c, active: true }));
                plotData(id);
                alert("Capa Sincronizada con Google Cloud");
            }
        });
    }

    function plotData(id) {
        const l = STORE[id];
        l.group.eachLayer(layer => { if(layer instanceof L.CircleMarker) l.group.removeLayer(layer); });

        l.data.forEach(row => {
            const lat = parseFloat(row.Latitud || row.lat);
            const lon = parseFloat(row.Longitud || row.lon);
            if(isNaN(lat) || isNaN(lon)) return;

            let color = "#3b82f6";
            const s = (row.Estatus || row.Estado || "").toUpperCase();
            if(s.includes("PAGO") || s.includes("AL DIA")) color = "#10b981";
            else if(s.includes("MORA") || s.includes("DEUDA")) color = "#ef4444";

            const p = L.circleMarker([lat, lon], { radius: 8, color: '#fff', weight: 2, fillColor: color, fillOpacity: 1 });
            
            let html = `<div class="pop-card"><div class="pop-header">${row.Nombre || 'Local'}</div><div class="pop-body">`;
            l.config.forEach(c => {
                if(c.active && row[c.name]) html += `<div class="pop-line"><b>${c.name}</b><span>${row[c.name]}</span></div>`;
            });
            p.bindPopup(html + `</div></div>`, { maxWidth: 320 });
            l.group.addLayer(p);
        });
    }

    function startDrawing(id) {
        if(STORE[id].drawing) {
            map.removeControl(DRAW_CONTROL);
            STORE[id].drawing = false;
        } else {
            ACTIVE_LID = id; STORE[id].drawing = true;
            DRAW_CONTROL = new L.Control.Draw({
                draw: { polygon: { shapeOptions: { color: '#fbbf24' } }, rectangle: true, circle: false, marker: false, polyline: false }
            });
            map.addControl(DRAW_CONTROL);
        }
        renderSidebar();
    }

    map.on(L.Draw.Event.CREATED, e => {
        const name = prompt("Nombre del Sector:");
        if(!name) return;
        const layer = e.layer;
        layer.options.name = name;
        layer.options.color = '#fbbf24';
        STORE[ACTIVE_LID].group.addLayer(layer);

        // CENSO MULTICAPA (FOTOS 13-14)
        const poly = layer.toGeoJSON();
        let totalCenso = 0;
        Object.keys(STORE).forEach(lid => {
            if(STORE[lid].visible) {
                STORE[lid].group.eachLayer(p => {
                    if(p instanceof L.CircleMarker && turf.booleanPointInPolygon(p.toGeoJSON(), poly)) totalCenso++;
                });
            }
        });

        layer.bindPopup(`<div style="text-align:center"><b>${name}</b><br><small>Censo Visible:</small><br><span style="font-size:22px; color:var(--verde); font-weight:900">${totalCenso}</span></div>`);
        startDrawing(ACTIVE_LID);
    });

    function openFichaConfig(id) {
        ACTIVE_LID = id;
        const box = document.getElementById('ficha-fields');
        box.innerHTML = "";
        STORE[id].config.forEach((c, i) => {
            box.innerHTML += `<div class="field-row"><input type="checkbox" id="field-${i}" ${c.active?'checked':''}><span>${c.name}</span></div>`;
        });
        document.getElementById('overlay').style.display = "block";
        document.getElementById('modal-ficha').style.display = "block";
    }

    function applyFicha() {
        STORE[ACTIVE_LID].config.forEach((c, i) => {
            c.active = document.getElementById(`field-${i}`).checked;
        });
        plotData(ACTIVE_LID);
        closeModals();
    }

    function toggleVisibility(id) {
        STORE[id].visible = !STORE[id].visible;
        if(STORE[id].visible) map.addLayer(STORE[id].group);
        else map.removeLayer(STORE[id].group);
        renderSidebar();
    }

    function toggleAllFields(state) {
        document.querySelectorAll('#ficha-fields input').forEach(i => i.checked = state);
    }

    function closeModals() {
        document.getElementById('overlay').style.display = "none";
        document.getElementById('modal-ficha').style.display = "none";
    }

    function globalSearch() {
        const q = document.getElementById('omni-search').value.toLowerCase();
        Object.keys(STORE).forEach(id => {
            STORE[id].group.eachLayer(l => {
                if(l instanceof L.CircleMarker) {
                    const content = JSON.stringify(l.getPopup().getContent()).toLowerCase();
                    l.setStyle({ opacity: content.includes(q)?1:0.1, fillOpacity: content.includes(q)?1:0.1 });
                }
            });
        });
    }
</script>
</body>
</html>
