<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF MASTER PRO | MUNICIPIO AYACUCHO v4.0</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* SGF MASTER PRO - FRAMEWORK DE ESTILOS 
           DISEÑADO PARA: HACIENDA MUNICIPIO AYACUCHO
           AUTOR: GEMINI AI PARA EL INGENIERO
        */
        :root { 
            --verde: #008f39; --rojo: #cf0000; --amarillo: #ffe600;
            --bg-dark: #020617; --bg-panel: #0f172a; --bg-card: #1e293b;
            --accent: #f59e0b; --text: #f8fafc; --text-muted: #94a3b8;
            --success: #22c55e; --danger: #ef4444; --info: #3b82f6;
            --glass: rgba(15, 23, 42, 0.85);
        }

        * { box-sizing: border-box; transition: background 0.3s, transform 0.2s; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text); height: 100vh; overflow: hidden; }

        /* -----------------------------------------------------------------
           LAYOUT PRINCIPAL 
        ----------------------------------------------------------------- */
        .master-wrapper { display: flex; height: 100vh; width: 100vw; }

        /* SECCIÓN MAPA */
        #map { flex: 1; z-index: 1; background: #0b0f1a; outline: none; }
        
        /* OCULTAR CONTROLES NATIVOS PARA LIMPIEZA VISUAL */
        .leaflet-draw-toolbar { display: none !important; }

        /* -----------------------------------------------------------------
           COMPONENTES DE IDENTIDAD (GLASSMORPHISM)
        ----------------------------------------------------------------- */
        .brand-floating-badge { 
            position: absolute; top: 25px; left: 75px; z-index: 1000; 
            background: var(--glass); padding: 14px 24px; 
            border-radius: 18px; border-left: 6px solid var(--amarillo); 
            backdrop-filter: blur(12px); display: flex; align-items: center; gap: 18px; 
            border-top: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        .mini-flag { display: flex; flex-direction: column; width: 22px; height: 44px; border-radius: 4px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .stripe { flex: 1; width: 100%; }
        .badge-content b { font-size: 17px; font-weight: 900; color: #fff; display: block; letter-spacing: 0.8px; }
        .badge-content small { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 2px; }

        /* BUSCADOR INTELIGENTE */
        .omni-search { 
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; 
            width: 480px; background: rgba(255,255,255,0.98); border-radius: 60px; display: flex; 
            align-items: center; padding: 6px 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 2px solid transparent; transition: 0.4s;
        }
        .omni-search:focus-within { width: 520px; border-color: var(--accent); }
        .omni-search input { flex: 1; border: none; padding: 12px; outline: none; font-size: 16px; color: #0f172a; font-weight: 600; background: transparent; }
        .omni-search i { color: #64748b; font-size: 20px; margin-right: 10px; }

        /* -----------------------------------------------------------------
           SIDEBAR DE CONTROL FISCAL
        ----------------------------------------------------------------- */
        #sidebar { 
            width: 460px; background: var(--bg-panel); border-left: 1px solid rgba(255,255,255,0.08); 
            display: flex; flex-direction: column; z-index: 10; box-shadow: -20px 0 60px rgba(0,0,0,0.7); 
        }
        
        /* HEADER SIN EL VERDE DE FONDO - AHORA ES ELEGANTE */
        .sidebar-header { 
            padding: 35px 30px; 
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); 
            text-align: center; position: relative; 
            border-bottom: 5px solid transparent;
            border-image: linear-gradient(to right, var(--amarillo) 33.3%, var(--rojo) 33.3% 66.6%, var(--verde) 66.6%) 1;
        }
        .sidebar-header h1 { margin: 0; font-size: 26px; font-weight: 900; color: white; letter-spacing: -1px; }
        .sidebar-header p { margin: 8px 0 0; font-size: 13px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 3px; }
        
        /* CONTENEDOR DE SCROLL */
        .scroller { flex: 1; overflow-y: auto; padding: 30px; scrollbar-width: thin; scrollbar-color: #475569 #0f172a; }
        
        /* BOTONES DE ACCIÓN */
        .btn { 
            padding: 16px 24px; border-radius: 14px; border: none; cursor: pointer; 
            font-weight: 800; font-size: 12px; text-transform: uppercase; 
            letter-spacing: 1.2px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { 
            background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%); 
            color: #000; width: 100%; box-shadow: 0 10px 25px rgba(245,158,11,0.25); 
        }
        .btn-primary:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 15px 35px rgba(245,158,11,0.4); background: #fff; }

        /* TARJETAS DE CAPA FISCAL */
        .fiscal-layer { background: var(--bg-card); border-radius: 20px; margin-bottom: 35px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .layer-top { padding: 20px 25px; background: rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .layer-top span { font-weight: 800; color: var(--accent); font-size: 14px; }
        
        .layer-grid { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: rgba(15, 23, 42, 0.6); }
        .btn-mini { padding: 12px; font-size: 10px; background: #334155; color: white; }
        .btn-mini:hover { background: #475569; }
        
        .draw-btn { grid-column: span 2; background: #1e293b; border: 1px solid var(--accent); color: var(--accent); }
        .draw-btn.active { background: var(--danger) !important; color: white; border-color: white; animation: blinker 1.5s infinite; }
        @keyframes blinker { 50% { opacity: 0.6; } }

        /* LISTA DE ELEMENTOS DIBUJADOS */
        .elements-sublist { background: #020617; max-height: 250px; overflow-y: auto; }
        .list-caption { padding: 12px 25px; font-size: 10px; color: #475569; text-transform: uppercase; font-weight: 900; background: #0b0f1a; border-bottom: 1px solid #1e293b; letter-spacing: 1px; }
        .element-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .element-item:hover { background: #1e293b; padding-left: 32px; }
        .status-dot { width: 20px; height: 20px; border-radius: 6px; border: 2px solid rgba(255,255,255,0.8); flex-shrink: 0; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }

        /* -----------------------------------------------------------------
           MODALES DINÁMICOS
        ----------------------------------------------------------------- */
        .modal-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(2, 6, 23, 0.95); z-index: 9998; display: none; backdrop-filter: blur(15px); }
        .modal-box { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--bg-panel); z-index: 9999; width: 480px; padding: 45px; 
            border-radius: 30px; border: 2px solid var(--accent); display: none; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        
        /* FICHA TÉCNICA - CORRECCIÓN DE VISIBILIDAD */
        .sortable-item { 
            display: flex; align-items: center; background: #020617; padding: 18px; 
            margin: 12px 0; border-radius: 15px; border: 1px solid #334155; 
            color: #fff; font-weight: 600; cursor: grab; transition: 0.2s;
        }
        .sortable-item:hover { border-color: var(--accent); background: #0f172a; }
        .sortable-item input[type="checkbox"] { width: 24px; height: 24px; cursor: pointer; accent-color: var(--accent); }

        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; margin: 30px 0; }
        .color-swatch { width: 55px; height: 55px; border-radius: 50%; border: 4px solid #fff; cursor: pointer; transition: 0.3s; }
        .color-swatch.active { transform: scale(1.2); border-color: var(--accent); box-shadow: 0 0 25px var(--accent); }

        /* -----------------------------------------------------------------
           ESTILOS DE POPUPS (RESULTADO FINAL)
        ----------------------------------------------------------------- */
        .leaflet-popup-content-wrapper { border-radius: 20px; padding: 0; background: #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .popup-master { min-width: 340px; overflow: hidden; border-radius: 20px; }
        .popup-header-img { width: 100%; height: 220px; object-fit: cover; background: #f1f5f9; border-bottom: 5px solid var(--verde); }
        .popup-main { padding: 25px; }
        .popup-name { font-size: 24px; font-weight: 900; color: #0f172a; margin-bottom: 15px; border-bottom: 4px solid #f1f5f9; padding-bottom: 10px; }
        .popup-data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f8fafc; font-size: 14px; }
        .popup-data-row b { color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 11px; }
        .popup-data-row span { font-weight: 800; color: #1e293b; }

        .form-control { width: 100%; padding: 20px; background: #020617; border: 2px solid #334155; color: #fff; border-radius: 18px; margin-top: 20px; font-size: 16px; outline: none; }
        .form-control:focus { border-color: var(--accent); }
    </style>
</head>
<body>

<div class="master-wrapper">
    <div id="map"></div>
    
    <div class="brand-floating-badge">
        <div class="mini-flag">
            <div class="stripe" style="background:var(--amarillo)"></div>
            <div class="stripe" style="background:var(--rojo)"></div>
            <div class="stripe" style="background:var(--verde)"></div>
        </div>
        <div class="badge-content">
            <b>AYACUCHO GIS PRO</b>
            <small>INTELIGENCIA FISCAL • v4.0</small>
        </div>
    </div>

    <div class="omni-search">
        <i>🔍</i>
        <input type="text" id="master-filter" placeholder="Buscar por RIF, Nombre, Estatus o Sector..." onkeyup="globalSearchEngine()">
    </div>

    <aside id="sidebar">
        <header class="sidebar-header">
            <h1>SGF MASTER PRO</h1>
            <p>Hacienda Municipal</p>
        </header>
        
        <div class="scroller">
            <button class="btn btn-primary" onclick="initNewFiscalLayer()">
                <span>+ NUEVA CAPA DE RECAUDACIÓN</span>
            </button>
            
            <div id="fiscal-layers-container" style="margin-top: 40px;">
                </div>
        </div>
    </aside>
</div>

<div class="modal-screen" id="master-overlay" onclick="closeActiveModals()"></div>

<div class="modal-box" id="ficha-config-modal">
    <h2 style="margin:0; color:var(--accent); font-size:24px; font-weight:900;">Configurar Ficha Técnica</h2>
    <p style="color:var(--text-muted); font-size:13px; margin-top:5px; margin-bottom:25px;">Define el orden y visibilidad de los datos en el mapa:</p>
    <div id="sortable-columns" style="max-height: 420px; overflow-y: auto; padding-right: 10px;"></div>
    <button class="btn btn-primary" style="margin-top:30px;" onclick="saveFichaSettings()">SINCRONIZAR DATOS</button>
</div>

<div class="modal-box" id="sector-editor-modal">
    <h2 style="margin:0; color:var(--accent); font-size:24px; font-weight:900;">Propiedades de Zona</h2>
    <input type="text" id="sector-name-input" class="form-control" placeholder="Nombre del Sector (Ej: Bloque Central A)">
    
    <div class="palette-grid" id="global-palette"></div>
    
    <label style="font-size:12px; color:var(--text-muted); font-weight:800; letter-spacing:1px;">OPACIDAD DEL RELLENO</label>
    <input type="range" id="sector-opacity-slider" min="0.1" max="1" step="0.1" value="0.5" style="width:100%; margin:25px 0; accent-color:var(--accent);">
    
    <button class="btn btn-primary" onclick="applySectorChanges()">GUARDAR CAMBIOS</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
    /**
     * SGF MASTER PRO v4.0 - LÓGICA DE NEGOCIO
     * GESTIÓN DE DATOS FISCALES DEL MUNICIPIO AYACUCHO
     */

    // 1. CONFIGURACIÓN DEL NÚCLEO GIS
    const layers = {
        satellite: L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] }),
        streets: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 })
    };
    
    const map = L.map('map', { 
        center: [8.03317, -72.25693], 
        zoom: 16, 
        zoomControl: false,
        attributionControl: false, 
        layers: [layers.satellite] 
    });

    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.control.layers({ "📡 Satélite Híbrido": layers.satellite, "🗺️ Callejero OSM": layers.streets }, null, { position: 'topright' }).addTo(map);

    const colors = ["#f59e0b", "#1e40af", "#ef4444", "#22c55e", "#9333ea", "#0ea5e9", "#f97316", "#eab308", "#db2777", "#a855f7", "#fb923c", "#4f46e5", "#c084fc", "#14b8a6", "#be123c", "#2d3748", "#111827", "#166534", "#991b1b", "#854d0e"];
    
    let storage = {}; 
    let activeState = { lid: null, eid: null, hex: '#f59e0b' };

    // 2. MOTOR DE DIBUJO PROFESIONAL (VICTORIA: LIMPIEZA TOTAL)
    const GeoDrawer = {
        instance: null,
        activeLid: null,
        start: function(lid) {
            if(this.instance) this.stop();
            this.activeLid = lid;
            this.instance = new L.Control.Draw({
                edit: { featureGroup: storage[lid].group },
                draw: { 
                    polygon: { shapeOptions: { color: activeState.hex, fillOpacity: 0.5, weight: 3 } },
                    rectangle: { shapeOptions: { color: activeState.hex } },
                    circle: false, marker: false, polyline: false
                }
            });
            map.addControl(this.instance);
            storage[lid].isDrawing = true; refreshSidebarView();

            map.off(L.Draw.Event.CREATED).on(L.Draw.Event.CREATED, (e) => {
                const zoneName = prompt("Identificador del Sector:", "Nuevo Sector Fiscal");
                if(zoneName) {
                    const poly = e.layer;
                    poly.options.name = zoneName;
                    poly.options.color = activeState.hex;
                    storage[this.activeLid].group.addLayer(poly);
                    executeSpatialAnalysis(this.activeLid, poly);
                }
                this.stop();
            });
        },
        stop: function() {
            if(this.instance) {
                if(this.instance.disable) this.instance.disable();
                map.removeControl(this.instance);
                this.instance = null;
            }
            Object.keys(storage).forEach(k => storage[k].isDrawing = false);
            refreshSidebarView();
        }
    };

    // 3. CONTROLADOR DE CAPAS Y SIDEBAR
    function initNewFiscalLayer() {
        const title = prompt("Nombre de la Capa Fiscal (Ej: Censo 2026):"); if(!title) return;
        const id = 'layer_' + Date.now();
        storage[id] = { name: title, group: L.featureGroup().addTo(map), config: [], csv: [], isDrawing: false };
        refreshSidebarView();
    }

    function refreshSidebarView() {
        const container = document.getElementById('fiscal-layers-container'); container.innerHTML = "";
        Object.keys(storage).forEach(lid => {
            const data = storage[lid];
            let elementsHTML = "";
            data.group.eachLayer(layer => {
                if(layer instanceof L.Polygon) {
                    const eid = L.Util.stamp(layer);
                    elementsHTML += `
                        <div class="element-item">
                            <div class="status-dot" style="background:${layer.options.color}" onclick="openSectorEditor('${lid}','${eid}')"></div>
                            <span onclick="zoomToElement('${lid}','${eid}')">${layer.options.name}</span>
                        </div>`;
                }
            });

            container.innerHTML += `
                <div class="fiscal-layer">
                    <div class="layer-top">
                        <span>${data.name}</span>
                        <button onclick="removeFiscalLayer('${lid}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:900;">✕</button>
                    </div>
                    <div class="layer-grid">
                        <button class="btn btn-mini" onclick="initCsvImport('${lid}')">📥 CARGAR CSV</button>
                        <button class="btn btn-mini" onclick="openFichaConfigurator('${lid}')">⚙️ CONFIG FICHA</button>
                        <button class="btn draw-btn ${data.isDrawing?'active':''}" onclick="GeoDrawer.start('${lid}')">
                            ${data.isDrawing ? 'FINALIZAR DIBUJO' : '✏️ DIBUJAR SECTOR'}
                        </button>
                    </div>
                    <div class="elements-sublist">
                        ${elementsHTML ? '<div class="list-caption">Zonificación Registrada</div>' + elementsHTML : ''}
                    </div>
                </div>`;
        });
    }

    // 4. PROCESAMIENTO DE DATOS (CSV + VALIDACIÓN)
    function initCsvImport(lid) {
        const op = prompt("1. Google Sheets URL\n2. Archivo Local CSV", "1");
        if(op === "1") {
            const url = prompt("Pegue la URL pública del CSV:");
            if(url) Papa.parse(url, { download:true, header:true, skipEmptyLines: true, complete: r => handleCsvData(lid, r) });
        } else {
            const fileInput = document.createElement('input'); fileInput.type = 'file'; fileInput.accept = ".csv";
            fileInput.onchange = e => Papa.parse(e.target.files[0], { header:true, skipEmptyLines: true, complete: r => handleCsvData(lid, r) });
            fileInput.click();
        }
    }

    function handleCsvData(lid, results) {
        if(results.errors.length) return alert("Error estructural en el CSV.");
        storage[lid].csv = results.data;
        // Solo inicializa configuración si la capa está nueva
        if(storage[lid].config.length === 0) {
            storage[lid].config = results.meta.fields.map(f => ({ id: f, active: true }));
        }
        renderFiscalMarkers(lid);
        refreshSidebarView();
        alert("Sincronización Exitosa: " + results.data.length + " establecimientos.");
    }

    function renderFiscalMarkers(lid) {
        const layer = storage[lid];
        // Limpia solo los puntos, mantiene los polígonos
        layer.group.eachLayer(l => { if(l instanceof L.CircleMarker) layer.group.removeLayer(l); });
        
        layer.csv.forEach(row => {
            const lat = parseFloat(row.Latitud || row.lat || row.LAT);
            const lon = parseFloat(row.Longitud || row.lon || row.LON);
            
            if(!isNaN(lat) && !isNaN(lon)) {
                // LÓGICA DE COLOR POR ESTATUS FISCAL
                let pointColor = "#3b82f6";
                const estatus = (row.Estatus || row.Licencia || row.Estado || "").toUpperCase();
                if(estatus.includes("VIGENTE")) pointColor = var(--success);
                else if(estatus.includes("VENCID") || estatus.includes("MORA")) pointColor = var(--danger);
                else if(estatus.includes("REVISI")) pointColor = var(--accent);

                const marker = L.circleMarker([lat, lon], { radius: 9, fillColor: pointColor, color: "#fff", weight: 2.5, fillOpacity: 1 });
                
                // GENERADOR DE POPUP PROFESIONAL
                let popupHtml = `<div class="popup-master">`;
                const imgSource = row.Imagen || row.Foto || row.URL_Foto;
                if(imgSource) popupHtml += `<img src="${imgSource}" class="popup-header-img" onerror="this.src='https://placehold.co/600x400/0f172a/f59e0b?text=Hacienda+Ayacucho'">`;
                
                popupHtml += `<div class="popup-main"><div class="popup-name">${row.Nombre || row.Razon_Social || 'Comercio Registrado'}</div>`;
                
                layer.config.forEach(field => {
                    const val = row[field.id];
                    if(field.active && val && !field.id.toLowerCase().includes('foto') && !field.id.toLowerCase().includes('imagen')) {
                        popupHtml += `<div class="popup-data-row"><b>${field.id}</b><span>${val}</span></div>`;
                    }
                });
                
                marker.bindPopup(popupHtml + `</div></div>`, { maxWidth: 380, padding: [0,0] });
                layer.group.addLayer(marker);
            }
        });
    }

    // 5. CONFIGURACIÓN DE FICHA (SORTABLE)
    function openFichaConfigurator(lid) {
        activeState.lid = lid;
        const listContainer = document.getElementById('sortable-columns'); listContainer.innerHTML = "";
        if(!storage[lid].config.length) return alert("Primero cargue un archivo CSV.");

        storage[lid].config.forEach(f => {
            listContainer.innerHTML += `
                <div class="sortable-item" data-id="${f.id}">
                    <input type="checkbox" ${f.active?'checked':''}>
                    <span style="flex:1; margin-left:20px; font-size:15px; text-transform:uppercase; letter-spacing:1px;">${f.id}</span>
                    <span style="color:var(--text-muted); font-size:20px;">☰</span>
                </div>`;
        });
        document.getElementById('master-overlay').style.display = "block";
        document.getElementById('ficha-config-modal').style.display = "block";
        
        // Reinicializa SortableJS
        if(window.sortInstance) window.sortInstance.destroy();
        window.sortInstance = new Sortable(listContainer, { animation: 200, ghostClass: 'sortable-ghost' });
    }

    function saveFichaSettings() {
        const domItems = document.querySelectorAll('.sortable-item');
        const updatedConfig = [];
        domItems.forEach(el => {
            updatedConfig.push({ id: el.dataset.id, active: el.querySelector('input').checked });
        });
        storage[activeState.lid].config = updatedConfig;
        renderFiscalMarkers(activeState.lid);
        closeActiveModals();
    }

    // 6. EDITOR DE SECTORES Y ANALÍTICA TURF.JS
    function openSectorEditor(lid, eid) {
        activeState.lid = lid; activeState.eid = eid;
        const polygon = storage[lid].group.getLayer(eid);
        document.getElementById('sector-name-input').value = polygon.options.name;
        document.getElementById('sector-opacity-slider').value = polygon.options.fillOpacity || 0.5;
        
        const palette = document.getElementById('global-palette'); palette.innerHTML = "";
        colors.forEach(c => {
            const isSelected = polygon.options.color === c ? 'active' : '';
            palette.innerHTML += `<div class="color-swatch ${isSelected}" style="background:${c}" onclick="selectPaletteColor('${c}', this)"></div>`;
        });
        
        document.getElementById('master-overlay').style.display = "block";
        document.getElementById('sector-editor-modal').style.display = "block";
    }

    function selectPaletteColor(c, element) {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        element.classList.add('active');
        activeState.hex = c;
    }

    function applySectorChanges() {
        const polyLayer = storage[activeState.lid].group.getLayer(activeState.eid);
        const newOpacity = document.getElementById('sector-opacity-slider').value;
        polyLayer.options.name = document.getElementById('sector-name-input').value;
        
        polyLayer.setStyle({ 
            color: activeState.hex, 
            fillColor: activeState.hex, 
            fillOpacity: newOpacity 
        });
        
        executeSpatialAnalysis(activeState.lid, polyLayer);
        closeActiveModals(); 
        refreshSidebarView();
    }

    function executeSpatialAnalysis(lid, poly) {
        const geoJSON = poly.toGeoJSON();
        let counter = 0;
        storage[lid].group.eachLayer(l => {
            if(l instanceof L.CircleMarker) {
                const point = turf.point([l.getLatLng().lng, l.getLatLng().lat]);
                if(turf.booleanPointInPolygon(point, geoJSON)) counter++;
            }
        });
        
        poly.bindPopup(`
            <div style="text-align:center; padding:15px; color:#0f172a;">
                <b style="font-size:20px; color:var(--verde);">${poly.options.name}</b><br>
                <div style="margin-top:12px; border-top:2px solid #f1f5f9; padding-top:10px;">
                <small style="font-weight:700; color:#64748b;">CENSO DETECTADO:</small><br>
                <span style="font-size:32px; font-weight:900; color:var(--info);">${counter}</span><br>
                <small style="font-weight:600;">Establecimientos</small>
                </div>
            </div>`);
    }

    // 7. MOTOR DE BÚSQUEDA GLOBAL
    function globalSearchEngine() {
        const term = document.getElementById('master-filter').value.toLowerCase();
        Object.keys(storage).forEach(lid => {
            storage[lid].group.eachLayer(layer => {
                if(layer instanceof L.CircleMarker) {
                    const content = JSON.stringify(layer.getPopup().getContent()).toLowerCase();
                    if(content.includes(term)) {
                        layer.setStyle({ opacity: 1, fillOpacity: 1, radius: 12 });
                    } else {
                        layer.setStyle({ opacity: 0.1, fillOpacity: 0.1, radius: 5 });
                    }
                }
            });
        });
    }

    // 8. UTILIDADES DEL SISTEMA
    function closeActiveModals() { 
        document.getElementById('master-overlay').style.display = "none";
        document.querySelectorAll('.modal-box').forEach(m => m.style.display = "none");
    }
    
    function removeFiscalLayer(lid) {
        if(confirm("ATENCIÓN: Se eliminará la capa '"+storage[lid].name+"' permanentemente. ¿Proceder?")) {
            map.removeLayer(storage[lid].group); 
            delete storage[lid]; 
            refreshSidebarView();
        }
    }

    function zoomToElement(lid, eid) {
        const target = storage[lid].group.getLayer(eid);
        if(target) map.fitBounds(target.getBounds(), { padding: [60, 60], maxZoom: 18 });
    }

    // LOGS DE ARRANQUE PARA EL INGENIERO
    console.log("SGF MASTER PRO v4.0 CARGADO - MUNICIPIO AYACUCHO");
    console.log("Esperando interacción del Ingeniero...");

</script>
