<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF CORE v6.2 - HACIENDA AYACUCHO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --accent: #00f2ff; --bg-dark: #0b0e14; --panel: #161b22; 
            --text: #e6edf3; --border: #30363d; --google-yellow: #fbbc04; --danger: #ff4444;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text); overflow: hidden; }

        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; background: #000; }
        
        /* Solo oscurecemos el satélite, no la interfaz */
        .leaflet-tile { filter: brightness(0.5) contrast(1.2) saturate(1.2); }
        .leaflet-container { cursor: crosshair !important; }

        .glass-panel { 
            background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(12px); 
            border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .top-nav { position: absolute; top: 15px; left: 15px; z-index: 1000; display: flex; gap: 15px; }
        .search-engine { width: 380px; height: 50px; display: flex; align-items: center; padding: 0 15px; }
        .search-engine input { background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 15px; }

        .tools-box { height: 50px; display: flex; align-items: center; padding: 0 10px; gap: 5px; }
        .t-btn { 
            background: transparent; border: none; color: #8b949e; width: 38px; height: 38px; 
            border-radius: 8px; cursor: pointer; font-size: 18px; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .t-btn:hover { color: var(--accent); background: rgba(0, 242, 255, 0.1); }
        .t-btn.active { color: var(--accent); border: 1px solid var(--accent); }

        #sidebar { 
            position: absolute; top: 80px; left: 15px; bottom: 20px; z-index: 1000; 
            width: 380px; display: flex; flex-direction: column; overflow: hidden;
        }
        .side-header { padding: 20px; border-bottom: 1px solid var(--border); border-top: 4px solid var(--google-yellow); }
        .side-header h1 { margin: 0; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; }
        .side-header span { font-size: 10px; color: var(--accent); font-weight: 800; }

        .layer-scroll { flex: 1; overflow-y: auto; padding: 10px; }
        .layer-card { background: rgba(255,255,255,0.02); border-radius: 8px; margin-bottom: 10px; border: 1px solid transparent; }
        .layer-card.active-l { border-color: var(--accent); background: rgba(0, 242, 255, 0.05); }
        .layer-head { padding: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        
        .item-row { 
            padding: 8px 10px 8px 45px; font-size: 13px; color: #8b949e; display: flex; 
            align-items: center; gap: 10px; cursor: pointer;
        }
        .item-row:hover { color: white; background: rgba(255,255,255,0.08); }

        /* POPUP EDITABLE */
        .edit-popup { min-width: 250px; color: #111; padding: 5px; }
        .edit-popup label { font-size: 10px; font-weight: bold; color: #666; text-transform: uppercase; }
        .edit-popup input, .edit-popup textarea { 
            width: 100%; border: 1px solid #ccc; padding: 6px; border-radius: 4px; margin-bottom: 8px; box-sizing: border-box;
        }
        .popup-img { width: 100%; border-radius: 4px; margin-top: 5px; max-height: 150px; object-fit: cover; border: 1px solid #ddd; }
        .save-btn { background: #1a73e8; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; width: 380px; padding: 25px; display: none; }
        .modal input { background: #0d1117; border: 1px solid var(--border); color: white; padding: 10px; width: 100%; margin: 10px 0; border-radius: 4px; box-sizing: border-box; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="top-nav">
    <div class="search-engine glass-panel">
        <i class="fas fa-microchip" style="color: var(--accent); margin-right: 12px;"></i>
        <input type="text" id="master-search" placeholder="Buscar en Ayacucho..." oninput="filtrarTodo()">
    </div>
    <div class="tools-box glass-panel">
        <button class="t-btn" id="t-marker" title="Punto"><i class="fas fa-location-dot"></i></button>
        <button class="t-btn" id="t-poly" title="Área"><i class="fas fa-vector-square"></i></button>
        <div style="width: 1px; height: 20px; background: var(--border); margin: 0 10px;"></div>
        <button class="t-btn" onclick="exportar()"><i class="fas fa-download"></i></button>
    </div>
</div>

<aside id="sidebar" class="glass-panel">
    <div class="side-header">
        <h1>SGF CORE SYSTEM</h1>
        <span>AYACUCHO V6.2 // MODO EDICIÓN</span>
    </div>
    <div class="layer-scroll" id="layer-list"></div>
    <div style="padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="save-btn" style="background:#238636" onclick="abrirModal('m-new-layer')">+ Capa</button>
        <button class="save-btn" style="background:#30363d" onclick="abrirModal('m-import')">Importar</button>
    </div>
</aside>

<div id="m-new-layer" class="modal glass-panel">
    <h3>Nueva Capa Fiscal</h3>
    <input type="text" id="new-l-name" placeholder="Nombre de la capa...">
    <button class="save-btn" onclick="crearCapaManual()">Crear Ahora</button>
    <button class="t-btn" style="width:100%; margin-top:10px" onclick="cerrarModal('m-new-layer')">Cerrar</button>
</div>

<div id="m-import" class="modal glass-panel">
    <h3>Importar desde Google</h3>
    <input type="text" id="imp-name" placeholder="Nombre de capa">
    <input type="text" id="imp-url" placeholder="URL del CSV">
    <div id="mapping" style="display:none; font-size:12px; margin-top:10px">
        Coord (Lat,Lon): <select id="sel-c" style="width:100%"></select><br>
        Título: <select id="sel-t" style="width:100%"></select>
    </div>
    <button id="btn-imp" class="save-btn" style="margin-top:15px" onclick="prepararCSV()">Analizar</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    let db = {}; let activeId = null; let tempCSV = null;

    function getIcon(color) {
        return L.divIcon({
            html: `<i class="fas fa-map-marker-alt" style="color:${color}; font-size:28px; text-shadow: 0 2px 4px #000;"></i>`,
            className: 'custom-pin', iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -25]
        });
    }

    const drawMarker = new L.Draw.Marker(map, { icon: getIcon('#00f2ff') });
    const drawPoly = new L.Draw.Polygon(map, { shapeOptions: { color: '#00f2ff', fillOpacity: 0.4 } });

    document.getElementById('t-marker').onclick = () => { if(activeId) drawMarker.enable(); else alert("Crea una capa"); };
    document.getElementById('t-poly').onclick = () => { if(activeId) drawPoly.enable(); else alert("Crea una capa"); };

    map.on(L.Draw.Event.CREATED, (e) => {
        const id = db[activeId].group.addLayer(e.layer)._leaflet_id;
        db[activeId].items.push({ id, name: "Nuevo Local", desc: "", img: "", color: "#00f2ff" });
        actualizarPunto(activeId, id);
        renderSidebar();
    });

    function actualizarPunto(lid, iid) {
        const item = db[lid].items.find(x => x.id === iid);
        const lyr = db[lid].group.getLayer(iid);
        
        if(lyr.setIcon) lyr.setIcon(getIcon(item.color));
        if(lyr.setStyle) lyr.setStyle({ color: item.color, fillColor: item.color });

        const isImg = (s) => /\.(jpg|jpeg|png|webp)$/i.test(s);
        const img = isImg(item.img) ? `<img src="${item.img}" class="popup-img">` : '';

        const html = `
            <div class="edit-popup" onmousedown="L.DomEvent.stopPropagation(event)">
                <label>Razón Social:</label>
                <input type="text" id="n-${iid}" value="${item.name}">
                <label>Descripción / Foto URL:</label>
                <textarea id="d-${iid}">${item.img || item.desc}</textarea>
                <label>Color:</label>
                <input type="color" id="c-${iid}" value="${item.color}" style="height:30px">
                ${img}
                <button class="save-btn" onclick="window.saveI('${lid}', ${iid})">GUARDAR</button>
            </div>`;
        lyr.bindPopup(html);
    }

    window.saveI = function(lid, iid) {
        const it = db[lid].items.find(x => x.id === iid);
        const n = document.getElementById(`n-${iid}`).value;
        const d = document.getElementById(`d-${iid}`).value;
        const c = document.getElementById(`c-${iid}`).value;

        it.name = n; it.color = c;
        if(d.startsWith('http')) it.img = d; else { it.desc = d; it.img = ""; }

        actualizarPunto(lid, iid);
        renderSidebar();
        db[lid].group.getLayer(iid).closePopup();
    }

    function abrirModal(id) { document.getElementById(id).style.display='block'; }
    function cerrarModal(id) { document.getElementById(id).style.display='none'; }

    function crearCapaManual() {
        const n = document.getElementById('new-l-name').value;
        if(!n) return;
        const id = 'l'+Date.now();
        db[id] = { name: n, group: new L.FeatureGroup().addTo(map), items: [], visible: true };
        activeId = id; renderSidebar(); cerrarModal('m-new-layer');
    }

    function renderSidebar() {
        const box = document.getElementById('layer-list');
        box.innerHTML = "";
        for(let id in db) {
            let h = `<div class="layer-card ${id===activeId?'active-l':''}">
                <div class="layer-head" onclick="activeId='${id}';renderSidebar()">
                    <input type="checkbox" checked onclick="toggleV('${id}')"> 📁 ${db[id].name}
                </div>`;
            db[id].items.forEach(it => {
                h += `<div class="item-row" onclick="foco('${id}',${it.id})">
                    <div class="dot" style="background:${it.color}"></div> ${it.name}
                </div>`;
            });
            h += `</div>`;
            box.insertAdjacentHTML('beforeend', h);
        }
    }

    function foco(lid, iid) {
        const l = db[lid].group.getLayer(iid);
        map.setView(l.getBounds ? l.getBounds().getCenter() : l.getLatLng(), 18);
        l.openPopup();
    }

    function toggleV(id) {
        db[id].visible ? map.removeLayer(db[id].group) : map.addLayer(db[id].group);
        db[id].visible = !db[id].visible;
    }

    function prepararCSV() {
        const url = document.getElementById('imp-url').value.replace('/edit?usp=sharing', '/export?format=csv');
        Papa.parse(url, { download: true, header: true, complete: (r) => {
            tempCSV = r.data;
            let o = ""; r.meta.fields.forEach(f => o+=`<option value="${f}">${f}</option>`);
            document.getElementById('sel-c').innerHTML = o;
            document.getElementById('sel-t').innerHTML = o;
            document.getElementById('mapping').style.display='block';
            document.getElementById('btn-imp').onclick = finalizarCSV;
        }});
    }

    function finalizarCSV() {
        const colC = document.getElementById('sel-c').value;
        const colT = document.getElementById('sel-t').value;
        const group = new L.FeatureGroup().addTo(map);
        const items = [];
        tempCSV.forEach(row => {
            if(row[colC]) {
                let p = row[colC].replace(/[()]/g,'').split(/[, ]+/);
                let lat = parseFloat(p[0]), lon = parseFloat(p[1]);
                if(!isNaN(lat)) {
                    const m = L.marker([lat, lon]);
                    const id = group.addLayer(m)._leaflet_id;
                    items.push({ id, name: row[colT]||"Censo", desc: "", img: "", color: "#ff4444" });
                }
            }
        });
        const id = 'l'+Date.now();
        db[id] = { name: document.getElementById('imp-name').value||"Import", group, items, visible: true };
        activeId = id; renderSidebar(); 
        items.forEach(it => actualizarPunto(id, it.id));
        cerrarModal('m-import');
    }

    function filtrarTodo() {
        const q = document.getElementById('master-search').value.toLowerCase();
        document.querySelectorAll('.item-row').forEach(el => {
            el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
        });
    }

    function exportar() {
        const blob = new Blob([JSON.stringify(db)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = "SGF_Backup.json"; a.click();
    }
</script>
</body>
</html>
