<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACIENDA MUNICIPAL AYACUCHO | SGF</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --amarillo: #ffcc00; --rojo: #e60000; --verde: #007a33;
            --dark-bg: #020617; --panel-bg: #0f172a; --card-bg: #1e293b;
            --accent: #fbbf24; --text-main: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: var(--text-main); height: 100vh; overflow: hidden; }

        .app-shell { display: flex; height: 100vh; width: 100vw; position: relative; }
        #map { flex: 1; z-index: 1; background: #000; outline: none; }

        /* ELIMINAR PUBLICIDAD DE LEAFLET */
        .leaflet-control-attribution { display: none !important; }

        /* REPARO 3: CUADRO DE IDENTIDAD MOVIDO A LA DERECHA (SIN "SGF") */
        .brand-shield { 
            position: absolute; top: 20px; right: 20px; z-index: 1000; 
            background: rgba(15, 23, 42, 0.9); padding: 15px 25px; border-radius: 8px;
            backdrop-filter: blur(10px); display: flex; align-items: center; gap: 15px;
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .brand-shield b { font-size: 18px; color: #fff; font-weight: 900; letter-spacing: 0.5px; }
        
        /* OMNI-BUSCADOR GLOBAL */
        .omni-box { 
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; 
            width: 480px; background: #fff; border-radius: 60px; display: flex; 
            align-items: center; padding: 12px 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); 
        }
        .omni-box input { flex: 1; border: none; outline: none; font-size: 15px; font-weight: 700; color: #0f172a; background: transparent; }
        .omni-box i { font-style: normal; font-size: 18px; margin-right: 15px; color: #64748b; }

        /* SIDEBAR DE CONTROL TOTAL (CON IDENTIDAD CORREGIDA) */
        #sidebar-admin { 
            width: 450px; background: var(--panel-bg); border-left: 1px solid rgba(255,255,255,0.08); 
            display: flex; flex-direction: column; z-index: 100; box-shadow: -20px 0 60px rgba(0,0,0,0.7); 
        }
        
        .sidebar-brand { 
            padding: 40px 30px; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); 
            text-align: center; position: relative;
        }
        /* REPARO 5: TRICOLOR MUNICIPAL */
        .sidebar-brand::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(to right, var(--amarillo) 33.3%, var(--rojo) 33.3% 66.6%, var(--verde) 66.6%);
        }
        
        /* REPARO 5: IDENTIDAD CORREGIDA (HACIENDA MUNICIPAL AYACUCHO) */
        .sidebar-brand h1 { font-size: 24px; font-weight: 900; color: white; letter-spacing: -0.5px; }
        .sidebar-brand p { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 3px; margin-top: 5px; }
        
        .sidebar-scroller { flex: 1; overflow-y: auto; padding: 25px; }
        
        /* SISTEMA DE BOTONES Y CARTAS */
        .btn { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; cursor: pointer;
            font-weight: 900; font-size: 12px; text-transform: uppercase; 
            letter-spacing: 1.5px; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-gold { background: var(--accent); color: #000; box-shadow: 0 5px 15px rgba(251,191,36,0.1); }
        .btn-gold:hover { transform: translateY(-2px); background: #fff; box-shadow: 0 10px 25px rgba(251,191,36,0.2); }

        /* REPARO 2: GESTIÓN DE CAPAS (MULTICAPAS SELECCIONABLES) */
        .layer-node { background: var(--card-bg); border-radius: 18px; margin-bottom: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .layer-node-header { padding: 15px 20px; background: rgba(0,0,0,0.25); display: flex; justify-content: space-between; align-items: center; }
        .layer-node-header span { font-size: 14px; font-weight: 700; color: var(--accent); }
        
        /* SWITCH DE VISIBILIDAD */
        .vis-toggle { width: 36px; height: 18px; background: #475569; border-radius: 20px; cursor: pointer; position: relative; transition: 0.3s; }
        .vis-toggle.active { background: var(--verde); }
        .vis-toggle::after { content: ''; position: absolute; width: 14px; height: 14px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .vis-toggle.active::after { left: 20px; }

        .layer-node-body { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-util { padding: 12px; font-size: 10px; background: #334155; color: white; border-radius: 8px; font-weight: 700; }
        .btn-util:hover { background: #475569; }
        
        .btn-draw-master { grid-column: span 2; background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn-draw-master.drawing { background: var(--rojo); color: #fff; border-color: #fff; }

        /* LISTADO DE SECTORES (REPARO 4) */
        .sector-sublist { background: #020617; max-height: 200px; overflow-y: auto; border-top: 1px solid #334155; }
        .sector-entry { padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer; }
        .sector-entry:hover { background: var(--card-bg); }

        /* MODALES Glassmorphism */
        .modal-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9998; display: none; backdrop-filter: blur(10px); }
        .modal-frame { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--panel-bg); z-index: 9999; width: 450px; padding: 35px; 
            border-radius: 20px; border: 1px solid var(--accent); display: none; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        
        /* FICHA TÉCNICA (REVISIÓN) */
        .sort-item { 
            display: flex; align-items: center; background: #020617; padding: 12px; 
            margin: 8px 0; border-radius: 10px; border: 1px solid #334155; 
            color: #fff; font-size: 13px; font-weight: 600;
        }
        .sort-item input { width: 18px; height: 18px; margin-right: 15px; cursor: pointer; }

        /* POPUP DEL MAPA INSTITUCIONAL */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .pop-card { width: 300px; font-family: 'Inter', sans-serif; color: #000; }
        .pop-header { background: #f8fafc; padding: 12px; font-weight: 900; font-size: 15px; border-bottom: 3px solid var(--verde); }
        .pop-body { padding: 12px; font-size: 12px; }
        .pop-line { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #eee; }
        .pop-line b { color: #64748b; font-size: 9px; text-transform: uppercase; }
        .pop-line span { font-weight: 700; color: #0f172a; text-align: right; }

        .cloud-input { width: 100%; padding: 14px; background: #020617; border: 1px solid #334155; color: #fff; border-radius: 10px; margin-bottom: 15px; font-size: 12px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="map"></div>
    
    <div class="brand-shield">
        <b style="color:var(--amarillo)">HACIENDA MUNICIPAL AYACUCHO</b>
    </div>

    <div class="omni-box">
        <i>🔎</i>
        <input type="text" id="omni-search" placeholder="RIF, Comercio o Estatus..." onkeyup="globalSearch()">
    </div>

    <aside id="sidebar-admin">
        <header class="sidebar-brand">
            <h1>GESTIÓN FISCAL MASTER</h1>
            <p>SAN JUAN DE COLÓN • TÁCHIRA</p>
        </header>
        
        <div class="sidebar-scroller">
            <button class="btn btn-gold" onclick="addLayer()">
                <span>+ VINCULAR CAPA DESDE GOOGLE SHEETS</span>
            </button>
            
            <div id="layer-stack" style="margin-top: 30px;">
                </div>
        </div>
    </aside>
</div>

<div class="modal-screen" id="modal-overlay" onclick="closeModals()"></div>

<div class="modal-frame" id="modal-ficha">
    <h3 style="color:var(--accent); margin-bottom:15px">Campos de la Ficha</h3>
    <p style="font-size:11px; color:#94a3b8; margin-bottom:20px">Seleccione la información visible en el mapa:</p>
    <div id="ficha-config-list" style="max-height:300px; overflow-y:auto"></div>
    <button class="btn btn-gold" style="margin-top:25px" onclick="applyFichaConfig()">GUARDAR CAMBIOS</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
    let STORE = {}; // Base de datos de Multicapas
    let ACTIVE = { lid: null, drawInstance: null }; // Estado Global

    // 1. INICIALIZAR MAPA (DUALIDAD SATÉLITE/CALLE)
    const mapBase = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] });
    const googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] });

    const map = L.map('map', { 
        center: [8.03317, -72.25693], 
        zoom: 16, 
        layers: [googleSat],
        zoomControl: false 
    });

    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.control.layers({ "📡 Satélite": googleSat, "🗺️ Calles": mapBase }, null, { position: 'topright' }).addTo(map);

    // 2. GESTIÓN DE CAPAS (REPARO 2: ELIMINACIÓN Y MULTICAPAS)
    function addLayer() {
        const name = prompt("Nombre de la Capa (Ej: Licorerías 2024):");
        if(!name) return;
        const id = 'ID_' + Date.now();
        STORE[id] = { name: name, group: L.featureGroup().addTo(map), url: '', config: [], data: [], visible: true, drawing: false };
        renderSidebar();
    }

    function renderSidebar() {
        const stack = document.getElementById('layer-stack');
        stack.innerHTML = "";
        Object.keys(STORE).forEach(id => {
            const l = STORE[id];
            
            // Renderizado de sectores (REPARO 4)
            let secsHtml = "";
            l.group.eachLayer(layer => {
                if(layer instanceof L.Polygon) {
                    const eid = L.Util.stamp(layer);
                    secsHtml += `<div class="sector-entry" onclick="zoomToEntity('${id}','${eid}')">
                        <b>Sector: ${layer.options.name}</b>
                        <span>📍</span>
                    </div>`;
                }
            });

            stack.innerHTML += `
                <div class="layer-node">
                    <div class="layer-node-header">
                        <span>${l.name}</span>
                        <div style="display:flex; align-items:center; gap:10px">
                            <div class="vis-toggle ${l.visible?'active':''}" onclick="toggleLayerVisibility('${id}')"></div>
                            <b onclick="deleteLayer('${id}')" style="color:var(--rojo); cursor:pointer">✕</b>
                        </div>
                    </div>
                    <div class="layer-node-body">
                        <input type="text" class="cloud-input" placeholder="URL de Google Sheets..." 
                               onchange="autoSyncLayer('${id}', this.value)" value="${l.url}">
                        <div class="layer-grid">
                            <button class="btn-util" onclick="openFichaConfig('${id}')">📋 CONFIG. FICHA</button>
                            <button class="btn-util btn-draw-master ${l.drawing?'drawing':''}" onclick="toggleDrawMode('${id}')">
                                ${l.drawing ? 'FINALIZAR DIBUJO' : '✏️ DIBUJAR SECTOR'}
                            </button>
                        </div>
                    </div>
                    <div class="sector-sublist">${secsHtml}</div>
                </div>`;
        });
    }

    // REPARO 1: CARGA AUTOMÁTICA AL PEGAR URL
    function autoSyncLayer(lid, url) {
        if(!url.includes('/edit')) return alert("URL de Google Sheets inválido. Debe contener '/edit'");
        const csvUrl = url.split('/edit')[0] + '/export?format=csv';
        STORE[lid].url = url; // Guardar URL original para la UI
        
        Papa.parse(csvUrl, {
            download: true, header: true, skipEmptyLines: true,
            complete: r => {
                if(r.errors.length) return alert("Error al leer el Google Sheet. Asegúrese que sea 'Público'.");
                STORE[lid].data = r.data;
                
                // Mapeo automático de cabeceras (Solución cuadros blancos F15)
                if(STORE[lid].config.length === 0) {
                    STORE[lid].config = Object.keys(r.data[0]).filter(k => k.trim() !== "").map(k => ({ name: k, visible: true }));
                }
                plotData(lid);
                renderSidebar();
            }
        });
    }

    function plotData(lid) {
        const l = STORE[lid];
        // Limpiar puntos antiguos
        l.group.eachLayer(layer => { if(layer instanceof L.CircleMarker) l.group.removeLayer(layer); });

        l.data.forEach(row => {
            const lat = parseFloat(row.Latitud || row.lat || row.LAT);
            const lon = parseFloat(row.Longitud || row.lon || row.LON);
            if(isNaN(lat) || isNaN(lon)) return;

            // Semáforo Fiscal
            let color = "#3b82f6"; // Azul por defecto
            const est = (row.Estatus || row.Estado || "").toUpperCase();
            if(est.includes("PAGO") || est.includes("VIGENTE") || est.includes("AL DIA")) color = var(--verde);
            else if(est.includes("MORA") || est.includes("DEUDA")) color = var(--rojo);

            const p = L.circleMarker([lat, lon], { radius: 8, color: '#fff', weight: 2, fillColor: color, fillOpacity: 1 });
            
            // Popup Profesional (FOTOS 17-18)
            let html = `<div class="pop-card"><div class="pop-header">${row.Nombre || row.RAZON_SOCIAL || 'Comercio'}</div><div class="pop-body">`;
            l.config.forEach(c => {
                if(c.visible && row[c.name]) html += `<div class="pop-line"><b>${c.name}</b><span>${row[c.name]}</span></div>`;
            });
            p.bindPopup(html + `</div></div>`, { maxWidth: 320 });
            l.group.addLayer(p);
        });
    }

    // REPARO 3: DIBUJO (CENSO MULTICAPA INTEGRADO)
    function toggleDrawMode(lid) {
        if(STORE[lid].drawing) {
            map.removeControl(ACTIVE.drawInstance);
            STORE[lid].drawing = false;
        } else {
            ACTIVE.lid = lid; STORE[lid].drawing = true;
            ACTIVE.drawInstance = new L.Control.Draw({
                draw: { polygon: true, rectangle: true, circle: false, marker: false, polyline: false }
            });
            map.addControl(ACTIVE.drawInstance);
        }
        renderSidebar();
    }

    map.on(L.Draw.Event.CREATED, e => {
        const name = prompt("Identificador del Sector:");
        if(!name) return;
        const layer = e.layer;
        layer.options.name = name;
        layer.options.color = '#fbbf24';
        STORE[ACTIVE.lid].group.addLayer(layer);
        
        // CENSO ESPACIAL CON TURF.JS (FOTOS 13-14)
        const polyGeo = layer.toGeoJSON();
        let censoCount = 0;
        // Contar solo puntos de capas visibles
        Object.keys(STORE).forEach(lid => {
            if(STORE[lid].visible) {
                STORE[lid].group.eachLayer(l => {
                    if(l instanceof L.CircleMarker && turf.booleanPointInPolygon(l.toGeoJSON(), polyGeo)) censoCount++;
                });
            }
        });

        layer.bindPopup(`<div style="text-align:center; padding:10px">
            <b>${name}</b><br><small>Censo Visible:</small><br>
            <span style="font-size:24px; color:var(--verde); font-weight:900">${censoCount}</span>
        </div>`);
        toggleDrawMode(ACTIVE.lid); // Cerrar dibujo
    });

    // 3. MODALES Y CONFIGURACIÓN (FOTOS 15-16)
    function openFichaConfig(lid) {
        ACTIVE.lid = lid;
        const list = document.getElementById('ficha-config-list');
        list.innerHTML = "";
        STORE[lid].config.forEach((c, idx) => {
            list.innerHTML += `<div class="sort-item"><input type="checkbox" id="field-${idx}" ${c.visible?'checked':''}><span>${c.name}</span></div>`;
        });
        document.getElementById('modal-overlay').style.display = "block";
        document.getElementById('modal-ficha').style.display = "block";
    }

    function applyFichaConfig() {
        const lid = ACTIVE.lid;
        STORE[lid].config.forEach((c, idx) => {
            c.visible = document.getElementById(`field-${idx}`).checked;
        });
        plotData(lid);
        closeModals();
    }

    // UTILIDADES
    function toggleLayerVisibility(lid) {
        STORE[lid].visible = !STORE[lid].visible;
        if(STORE[lid].visible) map.addLayer(STORE[lid].group);
        else map.removeLayer(STORE[lid].group);
        renderSidebar();
    }

    function deleteLayer(lid) {
        if(confirm(`¿Eliminar capa '${STORE[lid].name}' permanentemente?`)) {
            map.removeLayer(STORE[lid].group);
            delete STORE[lid];
            renderSidebar();
        }
    }

    function closeModals() {
        document.getElementById('modal-overlay').style.display = "none";
        document.querySelectorAll('.modal-frame').forEach(m => m.style.display = "none");
    }

    function globalSearch() {
        const q = document.getElementById('omni-search').value.toLowerCase();
        Object.keys(STORE).forEach(lid => {
            STORE[lid].group.eachLayer(l => {
                if(l instanceof L.CircleMarker) {
                    const content = JSON.stringify(l.getPopup().getContent()).toLowerCase();
                    l.setStyle({ opacity: content.includes(q)?1:0.1, fillOpacity: content.includes(q)?1:0.1 });
                }
            });
        });
    }

    function zoomToEntity(lid, eid) {
        const entity = STORE[lid].group.getLayer(eid);
        map.fitBounds(entity.getBounds(), { padding: [50, 50] });
    }
</script>
</body>
</html>
