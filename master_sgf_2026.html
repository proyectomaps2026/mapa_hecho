<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF MASTER v2.1 (RECOPILATORIO TOTAL)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    
    <style>
        :root { --amarillo: #ffcc00; --fondo: #0f172a; --card: #1e293b; --azul: #3b82f6; --rojo: #ef4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #000; color: white; overflow: hidden; }
        #map { flex: 1; z-index: 1; background: #000; }

        /* HEADER Y BUSCADOR (FOTOS 1, 6, 9) */
        .brand-header { position: absolute; top: 20px; left: 20px; z-index: 1000; background: rgba(15, 23, 42, 0.95); padding: 15px 25px; border-radius: 10px; border-left: 6px solid var(--amarillo); backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .top-search-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 400px; }
        .top-search { width: 100%; padding: 14px 20px; border-radius: 25px; border: none; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.5); outline: none; }

        /* BARRA HERRAMIENTAS DIBUJO (FOTOS 7, 8) */
        .drawing-toolbar { position: absolute; top: 85px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; display: flex; padding: 6px; border-radius: 6px; box-shadow: 0 2px 15px rgba(0,0,0,0.3); }
        .tool-btn { padding: 8px 15px; color: #333; cursor: pointer; border-right: 1px solid #ddd; font-size: 13px; font-weight: 600; }
        .tool-btn:hover { background: #f0f4f8; color: var(--azul); }

        /* ESTILO TRAZADO NEGRO/BLANCO (FOTO 8) */
        .leaflet-draw-draw-polygon { stroke: #000 !important; stroke-width: 5px !important; stroke-opacity: 1 !important; }
        .leaflet-draw-guide-marker { background: #fff !important; border: 2px solid #000 !important; border-radius: 50% !important; width: 12px !important; height: 12px !important; }

        /* SIDEBAR DINÁMICO (FOTOS 5, 9) */
        #sidebar { width: 420px; background: var(--fondo); border-left: 1px solid #334155; display: flex; flex-direction: column; }
        .side-title { padding: 30px; text-align: center; border-bottom: 5px solid var(--amarillo); background: var(--card); }
        .side-content { flex: 1; overflow-y: auto; padding: 20px; }
        .layer-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 2px solid transparent; cursor: pointer; }
        .layer-card.active { border-color: var(--amarillo); }
        .layer-header { display: flex; justify-content: space-between; align-items: center; }
        .layer-stats { font-size: 11px; color: var(--amarillo); margin-top: 5px; font-weight: 800; }
        .btn-create { background: transparent; color: var(--azul); border: 2px dashed var(--azul); width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 800; margin-top: 10px; }

        /* MODALES DE CONFIGURACIÓN (RECOPILADO FOTOS 0, 4, 8) */
        .config-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; background: white; color: #333; width: 400px; padding: 30px; border-radius: 15px; display: none; box-shadow: 0 25px 70px rgba(0,0,0,0.9); }
        .modal-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .col-option { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; }

        /* FICHA POPUP (FOTO 16) */
        .leaflet-popup-content-wrapper { border-radius: 10px; padding: 0; overflow: hidden; }
        .ficha-header { background: #f1f5f9; padding: 15px; border-bottom: 4px solid var(--amarillo); font-weight: 800; color: #1e293b; font-size: 16px; }
        .ficha-body { padding: 15px; background: white; color: #333; font-size: 13px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="brand-header">
    <b>HACIENDA AYACUCHO</b>
    <span style="color:var(--amarillo); font-size:10px; font-weight:800; display:block;">SGF MASTER - CONTROL FISCAL</span>
</div>

<div class="top-search-container">
    <input type="text" class="top-search" placeholder="🔍 Buscar contribuyente o censo...">
</div>

<div class="drawing-toolbar">
    <div class="tool-btn" id="btn-poly">📐 Trazar Bloque</div>
    <div class="tool-btn" id="btn-marker">📍 Punto Censo</div>
</div>

<div id="create-modal" class="config-modal">
    <b style="font-size: 18px; display:block; margin-bottom:15px;">Nueva Capa Dinámica</b>
    <input type="text" id="layer-name-in" class="modal-input" placeholder="Nombre (Ej: Sector Centro)">
    <input type="text" id="layer-url-in" class="modal-input" placeholder="Google Sheets CSV URL">
    <div style="display:flex; gap:10px; margin-top:15px;">
        <button onclick="closeModal('create-modal')" style="flex:1; padding:10px; cursor:pointer;">Cancelar</button>
        <button onclick="processLayerRequest()" style="flex:1; padding:10px; background:var(--azul); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">Siguiente</button>
    </div>
</div>

<div id="mapeo-modal" class="config-modal">
    <b style="font-size: 16px;">Selecciona columnas para marcadores (Lat/Lon)</b>
    <hr style="margin: 15px 0; opacity: 0.2;">
    <div id="lat-fields" class="field-list"></div>
    <div id="lon-fields" class="field-list"></div>
    
    <b style="font-size: 16px; display:block; margin-top:20px;">Selecciona columna como título (Replica image_8.png)</b>
    <hr style="margin: 15px 0; opacity: 0.2;">
    <div id="title-fields" class="field-list"></div>
    
    <div style="display:flex; gap:10px; margin-top:25px;">
        <button onclick="closeModal('mapeo-modal')" style="flex:1; padding:10px; cursor:pointer;">Atrás</button>
        <button id="btn-finalizar" style="flex:1; padding:10px; background:var(--azul); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">Finalizar</button>
    </div>
</div>

<aside id="sidebar">
    <div class="side-title">
        <h2 style="margin:0; color:white;">SGF MASTER</h2>
        <small style="color:var(--amarillo); font-weight:800;">GESTOR DE CAPAS TOTAL</small>
    </div>
    <div class="side-content">
        <div id="dynamic-layers"></div>
        <button class="btn-create" onclick="openModal('create-modal')">✚ AÑADIR NUEVA CAPA</button>
    </div>
</aside>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false });
    L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}').addTo(map);

    let capasDB = {}; // Base de datos de capas activas { id: { data: group, csv: parsed_rows } }
    let capaActivaId = null;
    let tempRawData = null; // Almacenamiento temporal de datos parsing
    let tempName = null; // Almacenamiento temporal nombre capa

    // MOTOR DE DIBUJO (Foto 7, 8)
    const polyDrawer = new L.Draw.Polygon(map, { shapeOptions: { color: '#000', weight: 5, fillOpacity: 0.3 } });
    const markerDrawer = new L.Draw.Marker(map);
    document.getElementById('btn-poly').onclick = () => { if(checkActiveLayer()) polyDrawer.enable(); };
    document.getElementById('btn-marker').onclick = () => { if(checkActiveLayer()) markerDrawer.enable(); };

    function checkActiveLayer() {
        if(!capaActivaId) { alert("¡Error! Seleccione una capa antes de dibujar."); return false; }
        return true;
    }

    map.on(L.Draw.Event.CREATED, (e) => {
        const layer = e.layer;
        const nombre = prompt("Identificación (Nombre/Censo) del elemento:");
        if(nombre) {
            layer.bindPopup(`<b>${nombre}</b><br>Trazado en capa: ${capasDB[capaActivaId].name}`);
            capasDB[capaActivaId].group.addLayer(layer);
            updateStats(capaActivaId);
        }
    });

    // SISTEMA DE GESTIÓN DE MODALES
    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // FLUJO DE CREACIÓN E IMPORTACIÓN (SOLUCIÓN AL ERROR DEL CSV)
    function processLayerRequest() {
        tempName = document.getElementById('layer-name-in').value;
        const url = document.getElementById('layer-url-in').value;
        if(!tempName) return alert("Debe asignar un nombre a la capa.");

        if(!url) { // Creación manual (sin CSV)
            saveCapaFinal(null);
            closeModal('create-modal');
        } else { // Importación CSV: Pasamos al panel de Mapeo
            importAndMap(url);
        }
    }

    // Procesa la URL y llena el panel de mapeo replicando Foto 0 e 8
    function importAndMap(url) {
        // Ajuste URL Google Sheets para exportar CSV directo
        if(url.includes('docs.google.com')) url = url.replace('/edit?usp=sharing', '/export?format=csv').replace('/edit#gid=', '/export?format=csv&gid=');

        Papa.parse(url, {
            download: true, header: true,
            complete: function(results) {
                if(results.errors.length > 0) { alert("Error al leer el CSV. Verifique que el link sea público."); return; }
                
                tempRawData = results.data;
                const headers = results.meta.fields;
                
                // Limpiar y llenar panel de mapeo (Replica image_8.png)
                document.getElementById('lat-fields').innerHTML = fillRadioOptions(headers, 'lat-field', 'Selecciona columna Latitud:');
                document.getElementById('lon-fields').innerHTML = fillRadioOptions(headers, 'lon-field', 'Selecciona columna Longitud:');
                document.getElementById('title-fields').innerHTML = fillRadioOptions(headers, 'title-field', '');
                
                closeModal('create-modal');
                openModal('mapeo-modal');
                
                document.getElementById('btn-finalizar').onclick = finalizeMapping;
            }
        });
    }

    // Finaliza el mapeo y pinta los puntos funcionales (SOLUCIÓN DEL CSV)
    function finalizeMapping() {
        const latCol = getSelectedRadio('lat-field');
        const lonCol = getSelectedRadio('lon-field');
        const titleCol = getSelectedRadio('title-field');

        if(!latCol || !lonCol || !titleCol) { alert("¡Debe seleccionar las 3 columnas obligatorias!"); return; }

        const group = new L.FeatureGroup().addTo(map);
        
        tempRawData.forEach(row => {
            let lat = parseFloat(row[latCol]);
            let lon = parseFloat(row[lonCol]);
            // Limpieza de coordenadas con paréntesis (Suma lógica Foto 9)
            if(row[latCol] && row[latCol].includes('(')) {
                let cleanGPS = row[latCol].replace(/[()]/g, '').split(/[\s,]+/);
                lat = parseFloat(cleanGPS[0]);
                lon = parseFloat(cleanGPS[1]);
            }

            if(!isNaN(lat) && !isNaN(lon)) {
                const m = L.marker([lat, lon]);
                m.bindPopup(`<div class="ficha-header">${row[titleCol] || 'Comercio'}</div><div class="ficha-body">Censo: ${row['N° de censo'] || 'N/A'}</div>`);
                group.addLayer(m);
            }
        });

        saveCapaFinal(group);
        closeModal('mapeo-modal');
        tempRawData = null; // Limpiar memoria
    }

    // Funciones auxiliares
    function fillRadioOptions(headers, name, label) {
        let html = label ? `<p style="font-size:12px; margin-bottom:5px;">${label}</p>` : '';
        headers.forEach((h, i) => {
            html += `<div class="col-option"><input type="radio" name="${name}" value="${h}" id="${name}_${i}"><label for="${name}_${i}">${h}</label></div>`;
        });
        return html;
    }
    function getSelectedRadio(name) { const selected = document.querySelector(`input[name="${name}"]:checked`); return selected ? selected.value : null; }

    // GUARDA LA CAPA EN EL SISTEMA DINÁMICO (Fotos anterior)
    function saveCapaFinal(featureGroup) {
        const id = 'layer_' + Date.now();
        const group = featureGroup || new L.FeatureGroup().addTo(map);
        capasDB[id] = { name: tempName, group: group };
        
        // Renderizar tarjeta en sidebar
        const html = `<div class="layer-card" id="card-${id}" onclick="selectLayer('${id}')">
            <div class="layer-header">
                <span class="layer-name">📁 ${tempName}</span>
                <span style="color:var(--rojo)" onclick="deleteLayer(event, '${id}')">🗑️</span>
            </div>
            <div class="layer-stats" id="stats-${id}">Elementos: ${group.getLayers().length}</div>
        </div>`;
        document.getElementById('dynamic-layers').insertAdjacentHTML('beforeend', html);
        
        selectLayer(id);
        
        // Limpiar inputs
        document.getElementById('layer-name-in').value = "";
        document.getElementById('layer-url-in').value = "";
        tempName = null;
    }

    // GESTIÓN SIDEBAR Y ATRIBUTOS
    function selectLayer(id) {
        capaActivaId = id;
        document.querySelectorAll('.layer-card').forEach(c => c.classList.remove('active'));
        document.getElementById('card-' + id).classList.add('active');
    }
    function updateStats(id) { document.getElementById('stats-' + id).innerText = `Elementos: ${capasDB[id].group.getLayers().length}`; }
    function deleteLayer(e, id) { e.stopPropagation(); if(confirm("¿Eliminar capa y todos sus elementos?")) { map.removeLayer(capasDB[id].group); delete capasDB[id]; document.getElementById('card-' + id).remove(); if(capaActivaId === id) capaActivaId = null; } }
</script>
</body>
</html>
