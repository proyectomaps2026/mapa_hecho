<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF AYACUCHO v12.7 - TOTAL CONTROL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0b0e14; --panel: #161b22; --text: #f0f3f6; --border: #30363d; --yellow: #fbbc04; --safe: #238636; --danger: #da3633; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }
        
        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: rgba(22, 27, 34, 0.96); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 12px; }
        
        /* Identidad Municipal */
        .hacienda-attr { bottom: 15px; right: 15px; font-size: 11px; color: white; background: rgba(0,0,0,0.85); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border); font-weight: 900; z-index: 1001; }

        /* Sidebar con Botón de Edición Directa */
        #sidebar { top: 15px; left: 15px; bottom: 20px; width: 380px; display: flex; flex-direction: column; }
        .side-head { padding: 15px; border-bottom: 1px solid var(--border); border-top: 4px solid var(--yellow); }
        .layer-zone { flex: 1; overflow-y: auto; padding: 10px; }
        .b-card { background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 12px; border: 1px solid var(--border); }
        .b-card.active-b { border-color: var(--accent); }
        
        .item-list { border-top: 1px solid var(--border); display: none; max-height: 300px; overflow-y: auto; }
        .active-b .item-list { display: block; }
        .item-row { padding: 10px 15px; font-size: 11px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer; }
        .item-row:hover { background: rgba(255,255,255,0.05); }
        .edit-trigger { color: var(--accent); padding: 5px; border-radius: 4px; background: rgba(0,242,255,0.1); font-size: 10px; border: 1px solid var(--accent); }

        /* POPUP v12.7 - DOUBLE FACE FUNCIONAL */
        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 16px; background: white; width: 320px; }
        .pop-card { color: #333; }
        .pop-img-box { position: relative; width: 100%; height: 160px; background: #000; }
        .pop-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Interruptor de Modo */
        .mode-btn { position: absolute; bottom: -20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--accent); color: #000; border: 3px solid white; cursor: pointer; z-index: 10; }
        .color-dot { position: absolute; top: 10px; left: 10px; width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; cursor: pointer; overflow: hidden; }
        .color-dot input { opacity: 0; cursor: pointer; }

        .pop-body { padding: 25px 15px 15px; max-height: 300px; overflow-y: auto; }
        
        /* Estilos Cara A (Vista) */
        .view-f { margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .v-lab { font-size: 9px; color: #999; font-weight: 800; text-transform: uppercase; display: block; }
        .v-val { font-size: 12px; color: #222; font-weight: 600; }

        /* Estilos Cara B (Edición) */
        .edit-f { display: flex; align-items: center; gap: 10px; background: #f4f4f4; margin-bottom: 6px; padding: 6px 10px; border-radius: 6px; }
        .edit-f input { border: none; background: transparent; flex: 1; font-size: 11px; font-weight: 600; outline: none; }
        .eye-btn { cursor: pointer; font-size: 13px; color: #ccc; width: 20px; }
        .eye-btn.active { color: var(--accent); }

        .pop-save { background: var(--safe); color: white; border: none; width: 100%; padding: 12px; font-weight: 900; cursor: pointer; font-size: 12px; border-radius: 0 0 16px 16px; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="hacienda-attr ui"><i class="fas fa-landmark" style="color:var(--yellow)"></i> HACIENDA AYACUCHO 2026</div>

<aside id="sidebar" class="glass ui">
    <div class="side-head">
        <h2 style="margin:0; font-size:14px;">CONTROL FISCAL</h2>
        <span style="font-size:10px; color:var(--accent); font-weight:bold">ALCALDÍA DE AYACUCHO</span>
    </div>
    <div style="padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <button class="glass" style="color:white; padding:10px; font-size:11px" onclick="abrirModal('m-csv')">IMPORTAR RAW</button>
        <button class="glass" style="color:var(--accent); padding:10px; font-size:11px" onclick="exportarJSON()">GUARDAR JSON</button>
    </div>
    <div class="layer-zone" id="list-container"></div>
</aside>

<div id="m-csv" class="glass ui" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:320px; padding:25px; display:none; z-index:2000">
    <h3 style="margin:0 0 15px">Cargar Excel Hacienda</h3>
    <input type="text" id="csv-url" style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; background:#000; color:white; border:1px solid var(--border)" placeholder="URL Google Sheets">
    <button class="pop-save" style="border-radius:6px" onclick="analizarExcel()">1. ANALIZAR COLUMNAS</button>
    <div id="config-raw" style="display:none; margin-top:15px">
        <label style="font-size:10px">Ubicación:</label><select id="sel-coo" style="width:100%; margin-bottom:10px"></select>
        <label style="font-size:10px">Foto:</label><select id="sel-img" style="width:100%; margin-bottom:15px"></select>
        <button class="pop-save" style="background:var(--accent); color:black; border-radius:6px" onclick="inyectarTodo()">2. INYECTAR MAPA</button>
    </div>
    <button class="pop-save" style="background:var(--danger); margin-top:10px; border-radius:6px" onclick="cerrarModal('m-csv')">CERRAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false, attributionControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    let STORE = {}; let allCols = []; let rawData = [];

    const getIcon = (color) => L.divIcon({ 
        html: `<i class="fas fa-map-marker-alt" style="color:${color}; font-size:28px; text-shadow: 0 0 5px #000"></i>`, 
        className: 'c-pin', iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -25] 
    });

    // MOTOR POPUP v12.7
    function abrirPopup(bid, lid, modo = 'vista') {
        const capa = STORE[bid];
        const it = capa.items.find(x => x.lid === lid);
        const l = capa.group.getLayer(lid);

        // Color Logic
        let pinColor = it.color || '#00f2ff';
        if(capa.semCol && it.data[capa.semCol] && !it.manualColor) {
            const v = it.data[capa.semCol].toUpperCase();
            if(v.includes('DEUDA') || v.includes('VENCID')) pinColor = '#da3633';
            else if(v.includes('DIA') || v.includes('PAGO')) pinColor = '#238636';
            else if(v.includes('PROCESO')) pinColor = '#fbbc04';
        }
        if(l.setIcon) l.setIcon(getIcon(pinColor));

        let html = `<div class="pop-card">
            <div class="pop-img-box">
                <img src="${it.img}" class="pop-img" onerror="this.src='https://via.placeholder.com/320x160?text=FOTO+HACIENDA'">
                <div class="color-dot" style="background:${pinColor}"><input type="color" onchange="updatePinColor('${bid}',${lid},this.value)"></div>
                <div class="mode-btn" onclick="abrirPopup('${bid}',${lid},'${modo==='vista'?'edicion':'vista'}')">
                    <i class="fas ${modo==='vista'?'fa-edit':'fa-eye'}"></i>
                </div>
            </div>
            <div class="pop-body">`;

        if(modo === 'vista') {
            for(let key in it.data) {
                if(!it.ocultos || !it.ocultos.includes(key)) {
                    html += `<div class="view-f"><span class="v-lab">${key}</span><span class="v-val">${it.data[key]}</span></div>`;
                }
            }
        } else {
            for(let key in it.data) {
                const isHidden = it.ocultos && it.ocultos.includes(key);
                html += `<div class="edit-f">
                    <i class="fas ${isHidden?'fa-eye-slash':'fa-eye'} eye-btn ${!isHidden?'active':''}" onclick="toggleOjo('${bid}',${lid},'${key}')"></i>
                    <input type="text" value="${it.data[key]}" onchange="updateDato('${bid}',${lid},'${key}',this.value)">
                </div>`;
            }
            html += `<div class="edit-f" style="background:#fff2cc"><i class="fas fa-camera eye-btn active"></i><input type="text" value="${it.img}" onchange="updateImg('${bid}',${lid},this.value)" placeholder="URL Foto"></div>`;
        }

        html += `</div><button class="pop-save" onclick="STORE['${bid}'].group.getLayer(${lid}).closePopup()">GUARDAR Y CERRAR</button></div>`;
        
        l.bindPopup(html, { padding: [0,0], maxWidth: 320 }).openPopup();
    }

    // Funciones de Control
    function updateDato(bid, lid, k, v) { STORE[bid].items.find(x => x.lid === lid).data[k] = v; renderPanel(); }
    function updateImg(bid, lid, v) { STORE[bid].items.find(x => x.lid === lid).img = v; abrirPopup(bid, lid, 'edicion'); }
    function updatePinColor(bid, lid, v) { const it = STORE[bid].items.find(x => x.lid === lid); it.color = v; it.manualColor = true; abrirPopup(bid, lid, 'vista'); }
    
    function toggleOjo(bid, lid, k) {
        const it = STORE[bid].items.find(x => x.lid === lid);
        if(!it.ocultos) it.ocultos = [];
        if(it.ocultos.includes(k)) it.ocultos = it.ocultos.filter(x => x !== k);
        else it.ocultos.push(k);
        abrirPopup(bid, lid, 'edicion');
    }

    // Panel Lateral
    function renderPanel() {
        const cont = document.getElementById('list-container'); cont.innerHTML = "";
        for(let id in STORE) {
            const capa = STORE[id];
            let opts = allCols.map(c => `<option value="${c}" ${capa.viewCol===c?'selected':''}>Ver: ${c}</option>`).join('');
            let sem = allCols.map(c => `<option value="${c}" ${capa.semCol===c?'selected':''}>Semáforo: ${c}</option>`).join('');

            let h = `<div class="b-card active-b">
                <div class="side-head" style="cursor:default">
                    <input type="text" value="${capa.name}" onchange="STORE['${id}'].name=this.value" style="background:transparent; border:none; color:white; font-weight:800; width:100%">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:8px">
                        <select onchange="STORE['${id}'].viewCol=this.value;renderPanel()" style="font-size:10px">${opts}</select>
                        <select onchange="STORE['${id}'].semCol=this.value;renderPanel()" style="font-size:10px">${sem}</select>
                    </div>
                </div>
                <div class="item-list">`;
            
            capa.items.forEach(it => {
                const label = it.data[capa.viewCol] || "S/N";
                h += `<div class="item-row" onclick="irA('${id}',${it.lid},'vista')">
                    <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px">${label}</span>
                    <button class="edit-trigger" onclick="event.stopPropagation(); irA('${id}',${it.lid},'edicion')">EDITAR</button>
                </div>`;
            });
            cont.insertAdjacentHTML('beforeend', h + `</div></div>`);
        }
    }

    // Lógica Excel
    async function analizarExcel() {
        let url = document.getElementById('csv-url').value;
        if(url.includes('/edit')) url = url.replace(/\/edit.*$/, '/export?format=csv');
        try {
            const res = await fetch(url); const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
            allCols = rows[0]; rawData = [];
            for(let i=1; i<rows.length; i++) { if(rows[i].length >= allCols.length) { let obj = {}; allCols.forEach((k, idx) => obj[k] = rows[i][idx]); rawData.push(obj); } }
            let opts = allCols.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-coo').innerHTML = opts;
            document.getElementById('sel-img').innerHTML = opts;
            document.getElementById('config-raw').style.display = 'block';
        } catch (e) { alert("Error al leer Google Sheets"); }
    }

    function inyectarTodo() {
        const bid = 'b'+Date.now(); const grp = new L.FeatureGroup().addTo(map);
        const cCol = document.getElementById('sel-coo').value;
        const iCol = document.getElementById('sel-img').value;
        const its = [];
        rawData.forEach(row => {
            const p = row[cCol].replace(/[A-Za-z()]/g, '').trim().split(/[, ]+/);
            const lat = parseFloat(p[0]), lng = parseFloat(p[1]);
            if(!isNaN(lat)) {
                const m = L.marker([lat, lng]);
                m.on('click', () => abrirPopup(bid, m._leaflet_id, 'vista'));
                grp.addLayer(m);
                its.push({ lid: m._leaflet_id, data: {...row}, ocultos: [], img: row[iCol], color: '#00f2ff' });
            }
        });
        STORE[bid] = { name: "Sector Importado", items: its, group: grp, viewCol: allCols[0], semCol: allCols[0] };
        renderPanel(); cerrarModal('m-csv');
    }

    function irA(bid, lid, modo) {
        const l = STORE[bid].group.getLayer(lid);
        map.setView(l.getLatLng(), 19);
        abrirPopup(bid, lid, modo);
    }

    function abrirModal(id) { document.getElementById(id).style.display = 'block'; }
    function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
    function exportarJSON() { const blob = new Blob([JSON.stringify(STORE)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'hacienda_data.json'; a.click(); }
</script>
</body>
</html>
