<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF AYACUCHO v13.4 - CONTROL FISCAL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0b0e14; --panel: #161b22; --text: #f0f3f6; --border: #30363d; --yellow: #fbbc04; --safe: #238636; --danger: #da3633; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }
        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: rgba(22, 27, 34, 0.96); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 12px; }

        /* Sidebar Inteligente */
        #sidebar { top: 85px; left: 15px; bottom: 20px; width: 380px; display: flex; flex-direction: column; }
        .side-head { padding: 15px; border-bottom: 1px solid var(--border); border-top: 4px solid var(--yellow); }
        .layer-zone { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* Acordeón de Categorías */
        .cat-group { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: rgba(255,255,255,0.02); }
        .cat-header { padding: 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; background: rgba(0,0,0,0.2); transition: 0.2s; }
        .cat-header:hover { background: rgba(0,242,255,0.1); }
        .cat-title { font-size: 11px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .cat-count { font-size: 10px; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px; }
        .item-list { display: none; background: rgba(0,0,0,0.3); max-height: 250px; overflow-y: auto; }
        .item-row { padding: 8px 15px; font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 10px; cursor: pointer; }

        /* Popup con "Ojito" y Edición */
        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 16px; background: white; width: 320px; }
        .pop-img-box { position: relative; width: 100%; height: 160px; background: #000; }
        .pop-img { width: 100%; height: 100%; object-fit: cover; }
        .mode-btn { position: absolute; bottom: -20px; right: 20px; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--accent); color: #000; border: 3px solid white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .pop-body { padding: 25px 15px 15px; max-height: 280px; overflow-y: auto; color: #333; }
        .f-row { margin-bottom: 8px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; padding-bottom: 4px; }
        .v-lab { font-size: 9px; color: #aaa; font-weight: 900; text-transform: uppercase; flex: 1; }
        .v-val { font-size: 12px; font-weight: 600; text-align: right; border: none; background: transparent; width: 65%; outline: none; }
        .eye-btn { cursor: pointer; font-size: 14px; color: #ddd; margin-right: 8px; }
        .eye-btn.active { color: var(--accent); }
        .pop-save { background: var(--safe); color: white; border: none; width: 100%; padding: 12px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui glass" style="top:15px; left:15px; right:15px; height:55px; display:flex; align-items:center; padding:0 15px; gap:10px;">
    <div style="flex:1; display:flex; align-items:center; gap:10px; background:rgba(0,0,0,0.4); padding:8px 15px; border-radius:8px; border:1px solid var(--border);">
        <i class="fas fa-search" style="color:var(--accent)"></i>
        <input type="text" id="main-search" placeholder="Buscar en San Juan de Colón..." oninput="filtrarGlobal()" style="background:transparent; border:none; color:white; outline:none; width:100%;">
    </div>
    <div style="display:flex; gap:5px; background:rgba(0,0,0,0.2); padding:5px; border-radius:10px;">
        <button class="glass" style="width:40px; height:40px; color:#8b949e" onclick="enableTool('marker')"><i class="fas fa-map-marker-alt"></i></button>
        <button class="glass" style="width:40px; height:40px; color:#8b949e" onclick="enableTool('poly')"><i class="fas fa-draw-polygon"></i></button>
    </div>
    <button class="glass" style="color:var(--yellow); padding:10px 20px; font-weight:900;" onclick="exportarJSON()">RESPALDO JSON</button>
</div>

<aside id="sidebar" class="glass ui">
    <div class="side-head">
        <h2 style="margin:0; font-size:14px; letter-spacing:1px;">CATASTRO AYACUCHO</h2>
        <span id="active-sector-name" style="font-size:10px; color:var(--accent); font-weight:bold">SECTOR: NO SELECCIONADO</span>
    </div>
    <div class="layer-zone" id="list-container">
        </div>
    <div style="padding:15px; display:grid; grid-template-columns: 1fr 1fr; gap:10px; border-top:1px solid var(--border);">
        <button class="glass" style="color:white; padding:12px; font-size:11px;" onclick="crearCapaManual()">+ SECTOR</button>
        <button class="glass" style="background:var(--yellow); color:#000; padding:12px; font-weight:900;" onclick="abrirModal('m-csv')">IMPORTAR RAW</button>
    </div>
</aside>

<div id="m-csv" class="glass ui" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:340px; padding:25px; display:none; z-index:2001">
    <h3 style="margin:0 0 15px">Inyección de Datos RAW</h3>
    <input type="text" id="csv-url" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:white; border:1px solid var(--border)" placeholder="URL Google Sheets">
    <button class="pop-save" onclick="analizarExcel()">ANALIZAR COLUMNAS</button>
    <div id="raw-ui" style="display:none; margin-top:15px">
        <label style="font-size:10px">Columna Ubicación:</label><select id="sel-coo" style="width:100%; margin-bottom:10px"></select>
        <label style="font-size:10px">Columna Estatus (Licencia):</label><select id="sel-col" style="width:100%; margin-bottom:10px"></select>
        <label style="font-size:10px">Columna Imagen:</label><select id="sel-img" style="width:100%; margin-bottom:15px"></select>
        <button class="pop-save" style="background:var(--accent); color:black" onclick="inyectarDatos()">INYECTAR AL MAPA</button>
    </div>
    <button class="pop-save" style="background:var(--danger); margin-top:10px" onclick="cerrarModal('m-csv')">CANCELAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false, attributionControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    let STORE = {}; let activeId = null; let allCols = []; let rawData = [];

    const getIcon = (color) => L.divIcon({ 
        html: `<i class="fas fa-map-marker-alt" style="color:${color}; font-size:28px; text-shadow: 0 0 5px #000"></i>`, 
        className: 'c-pin', iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -25] 
    });

    // Herramientas
    const drawM = new L.Draw.Marker(map, { icon: getIcon('#00f2ff') });
    const drawP = new L.Draw.Polygon(map, { shapeOptions: { color: '#00f2ff', fillOpacity: 0.1, weight: 3 } });
    function enableTool(t) { if(!activeId) return alert("Seleccione un Sector primero"); t==='marker'?drawM.enable():drawP.enable(); }

    // CREACIÓN Y PERSISTENCIA DE EVENTOS
    map.on(L.Draw.Event.CREATED, (e) => {
        const l = e.layer;
        if(l instanceof L.Marker) l.options.draggable = true;
        STORE[activeId].group.addLayer(l);
        const it = { lid: l._leaflet_id, data: {"Contribuyente": "NUEVO REGISTRO"}, img: "", color: "#00f2ff", type: e.layerType, ocultos: [] };
        STORE[activeId].items.push(it);
        vincular(l, activeId, it.lid);
        renderPanel();
        abrirPopup(activeId, it.lid, 'edicion');
    });

    function vincular(l, bid, lid) {
        l.on('click', () => abrirPopup(bid, lid, 'vista'));
        l.on('dragend', () => { renderPanel(); });
    }

    // POPUP INTELIGENTE (MODO VISTA / EDICIÓN)
    function abrirPopup(bid, lid, modo = 'vista') {
        const it = STORE[bid].items.find(x => x.lid === lid);
        const l = STORE[bid].group.getLayer(lid);
        if(!l) return;

        let html = `<div class="pop-card">
            <div class="pop-img-box" style="display: ${l instanceof L.Polygon ? 'none' : 'block'}">
                <img src="${it.img}" class="pop-img" onerror="this.src='https://via.placeholder.com/320x160?text=SGF+AYACUCHO'">
                <div style="position:absolute; top:10px; left:10px; width:22px; height:22px; border-radius:50%; background:${it.color}; border:2px solid white; overflow:hidden">
                    <input type="color" value="${it.color}" onchange="upCol('${bid}',${lid},this.value)" style="opacity:0; cursor:pointer; width:100%; height:100%">
                </div>
                <div class="mode-btn" onclick="abrirPopup('${bid}',${lid},'${modo==='vista'?'edicion':'vista'}')">
                    <i class="fas ${modo==='vista'?'fa-pen':'fa-eye'}"></i>
                </div>
            </div>
            <div class="pop-body">`;

        // Lógica de Contenidos del Cuadro (Sumatoria si es Polígono)
        if(l instanceof L.Polygon) {
            const res = calcularDentro(l);
            html += `<h4 style="margin:0 0 10px">Resumen de Sector</h4>
                     <p style="font-size:12px">● Vigentes: ${res.v} | ● Vencidas: ${res.d}</p>`;
        } else {
            for(let k in it.data) {
                const isHid = it.ocultos?.includes(k);
                if(modo === 'vista' && isHid) continue;
                html += `<div class="f-row">
                    ${modo==='edicion' ? `<i class="fas ${isHid?'fa-eye-slash':'fa-eye'} eye-btn ${!isHid?'active':''}" onclick="toggleOjo('${bid}',${lid},'${k}')"></i>` : ''}
                    <span class="v-lab">${k}</span>
                    <input type="text" class="v-val" value="${it.data[k]}" ${modo==='vista'?'readonly':''} onchange="upData('${bid}',${lid},'${k}',this.value)">
                </div>`;
            }
        }

        if(modo === 'edicion' && !(l instanceof L.Polygon)) {
            html += `<div class="f-row" style="background:#f9f9f9; padding:5px"><i class="fas fa-link" style="font-size:10px; color:#ccc"></i>
                     <input type="text" value="${it.img}" placeholder="Link de Foto (Privado)" onchange="upImg('${bid}',${lid},this.value)" style="width:100%; font-size:10px; border:none; background:transparent"></div>`;
        }

        html += `</div><button class="pop-save" onclick="closePop('${bid}',${lid})">FINALIZAR</button></div>`;
        l.bindPopup(html, { closeButton: false }).openPopup();
    }

    // REFRESCAR PANEL CON LEYENDA TIPO GOOGLE
    function renderPanel() {
        const cont = document.getElementById('list-container'); 
        cont.innerHTML = "";
        
        for(let id in STORE) {
            const capa = STORE[id];
            const stats = {};
            capa.items.forEach(it => {
                const tag = it.data["Estatus"] || "SIN CATEGORÍA";
                stats[tag] = (stats[tag] || 0) + 1;
            });

            let h = `<div class="cat-group">
                <div class="cat-header" onclick="activeId='${id}'; toggleList('${id}')">
                    <div class="cat-title"><i class="fas fa-folder" style="color:var(--yellow)"></i> ${capa.name}</div>
                    <i class="fas fa-trash-alt" style="color:var(--danger); font-size:10px" onclick="borrarCapa('${id}')"></i>
                </div>
                <div id="list-${id}" class="item-list" style="display:${id===activeId?'block':'none'}">`;
            
            // Agrupar por colores/estatus en la leyenda
            for(let tag in stats) {
                const color = capa.items.find(x => (x.data["Estatus"] || "SIN CATEGORÍA") === tag).color;
                h += `<div style="padding:5px 15px; font-size:10px; font-weight:900; color:${color}; background:rgba(0,0,0,0.2)">
                        ● ${tag} (${stats[tag]})
                      </div>`;
                capa.items.filter(x => (x.data["Estatus"] || "SIN CATEGORÍA") === tag).forEach(it => {
                    h += `<div class="item-row" onclick="irA('${id}',${it.lid})">
                        <i class="fas fa-map-marker-alt" style="color:${it.color}"></i>
                        <span>${it.data["Contribuyente"] || "Local"}</span>
                    </div>`;
                });
            }
            cont.insertAdjacentHTML('beforeend', h + `</div></div>`);
        }
        if(activeId) document.getElementById('active-sector-name').innerText = "SECTOR: " + STORE[activeId].name;
    }

    // LÓGICA DE ACTUALIZACIÓN
    function upCol(bid, lid, v) { 
        const it = STORE[bid].items.find(x => x.lid === lid); it.color = v;
        const l = STORE[bid].group.getLayer(lid);
        if(l.setIcon) l.setIcon(getIcon(v));
        renderPanel(); abrirPopup(bid, lid, 'vista');
    }
    function upData(bid, lid, k, v) { STORE[bid].items.find(x => x.lid === lid).data[k] = v; renderPanel(); }
    function upImg(bid, lid, v) { STORE[bid].items.find(x => x.lid === lid).img = v; abrirPopup(bid, lid, 'edicion'); }
    function toggleOjo(bid, lid, k) {
        const it = STORE[bid].items.find(x => x.lid === lid);
        if(!it.ocultos) it.ocultos = [];
        it.ocultos.includes(k) ? it.ocultos = it.ocultos.filter(x => x !== k) : it.ocultos.push(k);
        abrirPopup(bid, lid, 'edicion');
    }

    // IMPORTACIÓN RAW MEJORADA
    async function analizarExcel() {
        let url = document.getElementById('csv-url').value;
        if(url.includes('/edit')) url = url.replace(/\/edit.*$/, '/export?format=csv');
        try {
            const res = await fetch(url); const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
            allCols = rows[0]; rawData = [];
            rows.slice(1).forEach(r => { if(r.length >= allCols.length) { let o={}; allCols.forEach((k,i)=>o[k]=r[i]); rawData.push(o); }});
            document.getElementById('sel-coo').innerHTML = allCols.map(c=>`<option>${c}</option>`).join('');
            document.getElementById('sel-col').innerHTML = allCols.map(c=>`<option>${c}</option>`).join('');
            document.getElementById('sel-img').innerHTML = allCols.map(c=>`<option>${c}</option>`).join('');
            document.getElementById('raw-ui').style.display = 'block';
        } catch(e) { alert("Error de conexión"); }
    }

    function inyectarDatos() {
        const bid = 'b'+Date.now(); const grp = new L.FeatureGroup().addTo(map);
        const cC = document.getElementById('sel-coo').value, cS = document.getElementById('sel-col').value, cI = document.getElementById('sel-img').value;
        const its = [];
        rawData.forEach(row => {
            const p = row[cC].replace(/[A-Za-z()]/g, '').trim().split(/[, ]+/);
            const lat = parseFloat(p[0]), lng = parseFloat(p[1]);
            if(!isNaN(lat)) {
                let col = '#da3633'; // Default Rojo
                const s = row[cS]?.toUpperCase() || "";
                if(s.includes("VIGENTE")) col="#238636"; else if(s.includes("TEMPORAL")) col="#fbbc04";
                
                const m = L.marker([lat, lng], { icon: getIcon(col), draggable: true });
                vincular(m, bid, m._leaflet_id);
                grp.addLayer(m);
                its.push({ lid: m._leaflet_id, data: {...row, "Estatus": s}, img: row[cI]||"", color: col, ocultos: [] });
            }
        });
        STORE[bid] = { name: "CENSO RAW", items: its, group: grp };
        activeId = bid; renderPanel(); cerrarModal('m-csv');
    }

    // UTILIDADES
    function irA(bid, lid) { const l = STORE[bid].group.getLayer(lid); map.setView(l.getLatLng(), 19); abrirPopup(bid, lid, 'vista'); }
    function toggleList(id) { renderPanel(); }
    function closePop(bid, lid) { STORE[bid].group.getLayer(lid).closePopup(); }
    function exportarJSON() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(STORE)], {type:'application/json'})); a.download = 'hacienda_ayacucho.json'; a.click(); }
    function crearCapaManual() { const id = 'b'+Date.now(); STORE[id] = { name: "Nuevo Sector", items: [], group: new L.FeatureGroup().addTo(map) }; activeId = id; renderPanel(); }
    function abrirModal(id) { document.getElementById(id).style.display = 'block'; }
    function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
    function filtrarGlobal() { /* Implementar si se requiere búsqueda por texto */ }
</script>
</body>
</html>
