<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF MASTER PRO | Hacienda Municipio Ayacucho</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --verde-ayacucho: #008f39; --rojo-ayacucho: #cf0000; --amarillo-ayacucho: #ffe600;
            --dark-bg: #0f172a; --panel-bg: #1e293b; --accent: #f59e0b; --text-light: #f8fafc;
            --success: #22c55e; --danger: #ef4444; --border: rgba(255,255,255,0.1);
        }

        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--dark-bg); color: var(--text-light); height: 100vh; overflow: hidden; }

        /* CONTENEDOR PRINCIPAL */
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* MAPA FULLSCREEN */
        #map { flex: 1; z-index: 1; outline: none; background: #0b0f1a; }
        
        /* 🚩 BANDERA FLOTANTE EN MAPA */
        .map-identity-badge { 
            position: absolute; top: 20px; left: 70px; z-index: 1000; 
            background: rgba(15, 23, 42, 0.9); padding: 12px 20px; 
            border-radius: 15px; border-left: 6px solid var(--amarillo-ayacucho); 
            backdrop-filter: blur(10px); display: flex; align-items: center; gap: 15px; 
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .badge-logo-container { display: flex; flex-direction: column; width: 20px; height: 40px; border-radius: 2px; overflow: hidden; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .stripe { flex: 1; width: 100%; }
        .badge-text b { font-size: 16px; font-weight: 900; color: #fff; display: block; letter-spacing: 0.5px; }
        .badge-text small { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 700; letter-spacing: 1.5px; }

        /* BUSCADOR SUPERIOR */
        .top-search-bar { 
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; 
            width: 450px; background: white; border-radius: 50px; display: flex; 
            align-items: center; padding: 5px 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
        }
        .top-search-bar input { flex: 1; border: none; padding: 12px; outline: none; font-size: 15px; color: #1e293b; font-weight: 600; }
        .top-search-bar i { color: #64748b; font-size: 18px; }

        /* 📱 SIDEBAR LATERAL GIGANTE */
        #sidebar { width: 450px; background: var(--panel-bg); border-left: 1px solid #334155; display: flex; flex-direction: column; z-index: 2; box-shadow: -15px 0 45px rgba(0,0,0,0.6); }
        
        .sidebar-header { padding: 30px; background: var(--verde-ayacucho); border-bottom: 6px solid var(--rojo-ayacucho); text-align: center; position: relative; }
        .sidebar-header h1 { margin: 0; font-size: 24px; font-weight: 900; color: white; text-shadow: 0 3px 6px rgba(0,0,0,0.3); }
        .sidebar-header p { margin: 5px 0 0; font-size: 12px; font-weight: 700; color: var(--amarillo-ayacucho); text-transform: uppercase; letter-spacing: 2px; }
        
        .flag-horizontal { display: flex; height: 10px; justify-content: center; margin-top: 15px; border-radius: 5px; overflow: hidden; width: 100px; margin-left: auto; margin-right: auto; }

        .content-scroll { flex: 1; overflow-y: auto; padding: 25px; scrollbar-width: thin; }
        
        /* TARJETAS DE CAPA */
        .layer-box { background: #2a3547; border-radius: 18px; margin-bottom: 30px; border: 1px solid #475569; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .layer-box-header { padding: 18px 22px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #475569; }
        .layer-box-header strong { font-size: 16px; color: var(--accent); text-transform: uppercase; }
        
        .layer-actions { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: rgba(15, 23, 42, 0.4); }

        .items-list { background: #0f172a; }
        .list-header { padding: 10px 20px; font-size: 11px; color: #64748b; text-transform: uppercase; font-weight: 800; border-bottom: 1px solid #1e293b; }
        .element-row { padding: 14px 25px; display: flex; align-items: center; gap: 15px; font-size: 14px; cursor: pointer; border-bottom: 1px solid #1e293b; transition: 0.3s; }
        .element-row:hover { background: #334155; border-left: 4px solid var(--accent); }
        .color-dot { width: 18px; height: 18px; border-radius: 5px; border: 2px solid #fff; flex-shrink: 0; }

        /* MODALES E INTERFAZ */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 9998; display: none; backdrop-filter: blur(8px); }
        .modal-body { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel-bg); z-index: 9999; width: 450px; padding: 40px; border-radius: 25px; border: 3px solid var(--accent); display: none; }
        
        .field-card { display: flex; align-items: center; background: #0f172a; padding: 15px; margin: 12px 0; border-radius: 12px; border: 1px solid #334155; cursor: grab; }
        .field-card:active { cursor: grabbing; border-color: var(--accent); }

        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin: 25px 0; }
        .swatch { width: 50px; height: 50px; border-radius: 50%; border: 4px solid white; cursor: pointer; transition: 0.3s; }
        .swatch.active { border-color: var(--accent); transform: scale(1.15); box-shadow: 0 0 20px var(--accent); }

        /* POPUPS PRESTIGIO */
        .leaflet-popup-content-wrapper { border-radius: 15px; padding: 0; overflow: hidden; }
        .popup-container { min-width: 320px; font-family: 'Inter', sans-serif; }
        .popup-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 4px solid var(--verde-ayacucho); }
        .popup-body { padding: 20px; }
        .popup-title { font-size: 22px; font-weight: 900; color: #1e293b; margin-bottom: 12px; line-height: 1.1; }
        .popup-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .popup-row b { color: #64748b; text-transform: uppercase; font-size: 10px; }
        .popup-row span { font-weight: 700; color: #0f172a; }

        /* BOTONES */
        .btn { padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; font-size: 12px; text-transform: uppercase; transition: 0.3s; letter-spacing: 1px; }
        .btn-main { background: var(--accent); color: var(--dark-bg); width: 100%; box-shadow: 0 10px 20px rgba(245,158,11,0.2); }
        .btn-main:hover { background: #fff; transform: translateY(-3px); }
        .btn-draw { grid-column: span 2; background: #475569; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn-draw.active { background: var(--danger) !important; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239,68,68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239,68,68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68, 0); } }
        
        .form-input { width: 100%; padding: 18px; background: #0f172a; border: 2px solid #334155; color: white; border-radius: 15px; margin-top: 15px; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="map"></div>
    
    <div class="map-identity-badge">
        <div class="badge-logo-container">
            <div class="stripe" style="background:var(--amarillo-ayacucho)"></div>
            <div class="stripe" style="background:var(--rojo-ayacucho)"></div>
            <div class="stripe" style="background:var(--verde-ayacucho)"></div>
        </div>
        <div class="badge-text">
            <b>AYACUCHO GIS</b>
            <small>SISTEMA DE GESTIÓN FISCAL</small>
        </div>
    </div>

    <div class="top-search-bar">
        <input type="text" id="global-search" placeholder="Buscar RIF, Comercio o Sector..." onkeyup="filterMapElements()">
        <span>🔍</span>
    </div>

    <aside id="sidebar">
        <header class="sidebar-header">
            <h1>SGF MASTER PRO</h1>
            <p>Hacienda Municipal Ayacucho</p>
            <div class="flag-horizontal">
                <div class="stripe" style="background:var(--amarillo-ayacucho)"></div>
                <div class="stripe" style="background:var(--rojo-ayacucho)"></div>
                <div class="stripe" style="background:var(--verde-ayacucho)"></div>
            </div>
        </header>
        
        <div class="content-scroll">
            <button class="btn btn-main" onclick="createNewWorkLayer()">+ CREAR CAPA DE TRABAJO</button>
            <div id="layer-container" style="margin-top: 30px;"></div>
        </div>
    </aside>
</div>

<div class="modal-overlay" id="overlay" onclick="closeModals()"></div>
<div class="modal-body" id="ficha-modal">
    <h2 style="margin:0; color:var(--accent);">Estructura de Ficha</h2>
    <p style="color:#94a3b8; font-size:13px;">Arrastra para ordenar los datos en los Popups</p>
    <div id="sortable-fields" style="max-height: 400px; overflow-y: auto;"></div>
    <button class="btn btn-main" style="margin-top:25px;" onclick="applyFichaConfig()">SINCRONIZAR CAPA</button>
</div>

<div class="modal-body" id="zone-modal">
    <h2 style="margin:0; color:var(--accent);">Propiedades de Zona</h2>
    <input type="text" id="zone-name-input" class="form-input" placeholder="Nombre del Sector">
    <div class="color-grid" id="color-palette"></div>
    <label style="font-size:12px; color:#94a3b8">OPACIDAD DEL ÁREA</label>
    <input type="range" id="zone-opacity" min="0.1" max="1" step="0.1" value="0.5" style="width:100%; margin:20px 0;">
    <button class="btn btn-main" onclick="saveZoneChanges()">GUARDAR CAMBIOS</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
    // 1. INICIALIZACIÓN DEL ENTORNO GIS
    const googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });
    const osmRoads = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
    
    const map = L.map('map', { 
        center: [8.03317, -72.25693], 
        zoom: 16, 
        attributionControl: false, 
        layers: [googleSat] 
    });

    L.control.layers({ "📡 Satélite Híbrido": googleSat, "🗺️ Callejero OSM": osmRoads }, null, { position: 'topright' }).addTo(map);

    const myMapsColors = ["#f59e0b", "#1e40af", "#ef4444", "#22c55e", "#9333ea", "#0ea5e9", "#f97316", "#eab308", "#db2777", "#a855f7", "#fb923c", "#4f46e5", "#c084fc", "#14b8a6", "#be123c", "#2d3748", "#111827", "#166534", "#991b1b", "#854d0e"];
    
    let db = {}; 
    let state = { activeLid: null, activeEid: null, pendingColor: '#f59e0b' };

    // 2. MOTOR DE DIBUJO (VICTORIA: ZERO HANDLES BLANCOS)
    const DrawEngine = {
        ctrl: null,
        init: function(lid) {
            if(this.ctrl) this.kill();
            state.activeLid = lid;
            this.ctrl = new L.Control.Draw({
                edit: { featureGroup: db[lid].group },
                draw: { 
                    polygon: { shapeOptions: { color: state.pendingColor, fillOpacity: 0.5, weight: 3 } },
                    rectangle: { shapeOptions: { color: state.pendingColor } },
                    circle: false, marker: false, polyline: false
                }
            });
            map.addControl(this.ctrl);
            db[lid].drawing = true; refreshSidebar();

            map.off(L.Draw.Event.CREATED).on(L.Draw.Event.CREATED, (e) => {
                const name = prompt("Nombre del Polígono/Lote:", "Sector Nuevo");
                if(name) {
                    const layer = e.layer;
                    layer.options.name = name;
                    layer.options.color = state.pendingColor;
                    db[lid].group.addLayer(layer);
                    runTurfAnalysis(lid, layer);
                }
                this.kill();
            });
        },
        kill: function() {
            if(this.ctrl) {
                if(this.ctrl.disable) this.ctrl.disable();
                map.removeControl(this.ctrl);
                this.ctrl = null;
            }
            Object.keys(db).forEach(k => db[k].drawing = false);
            refreshSidebar();
        }
    };

    // 3. LOGÍSICA DE DATOS
    function createNewWorkLayer() {
        const name = prompt("Nombre para la nueva Capa Fiscal:"); if(!name) return;
        const id = 'layer_' + Date.now();
        db[id] = { name, group: L.featureGroup().addTo(map), config: [], csv: [], drawing: false };
        refreshSidebar();
    }

    function refreshSidebar() {
        const container = document.getElementById('layer-container'); container.innerHTML = "";
        Object.keys(db).forEach(lid => {
            const l = db[lid];
            let elementsHTML = "";
            l.group.eachLayer(layer => {
                if(layer instanceof L.Polygon) {
                    const eid = L.Util.stamp(layer);
                    elementsHTML += `
                        <div class="element-row">
                            <div class="color-dot" style="background:${layer.options.color}" onclick="openZoneEditor('${lid}','${eid}')"></div>
                            <span onclick="focusElement('${lid}','${eid}')">${layer.options.name}</span>
                        </div>`;
                }
            });

            container.innerHTML += `
                <div class="layer-box">
                    <div class="layer-box-header">
                        <strong>${l.name}</strong>
                        <button onclick="deleteWorkLayer('${lid}')" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
                    </div>
                    <div class="layer-actions">
                        <button class="btn" style="background:#475569; color:white;" onclick="triggerImport('${lid}')">📥 CARGAR CSV</button>
                        <button class="btn" style="background:#475569; color:white;" onclick="openFichaModal('${lid}')">⚙️ FICHA</button>
                        <button class="btn btn-draw ${l.drawing?'active':''}" onclick="DrawEngine.init('${lid}')">
                            ${l.drawing ? '🛑 CANCELAR' : '✏️ DIBUJAR ÁREA'}
                        </button>
                    </div>
                    <div class="items-list">
                        ${elementsHTML ? '<div class="list-header">Sectores y Polígonos</div>' + elementsHTML : ''}
                    </div>
                </div>`;
        });
    }

    function triggerImport(lid) {
        const choice = prompt("1. Enlace Google Sheets (CSV)\n2. Subir archivo .csv local", "1");
        if(choice === "1") {
            const url = prompt("Pegue la URL del CSV:");
            if(url) Papa.parse(url, { download:true, header:true, complete: r => processCSV(lid, r) });
        } else {
            const input = document.createElement('input'); input.type = 'file'; input.accept = ".csv";
            input.onchange = e => Papa.parse(e.target.files[0], { header:true, complete: r => processCSV(lid, r) });
            input.click();
        }
    }

    function processCSV(lid, results) {
        db[lid].csv = results.data;
        if(db[lid].config.length === 0) {
            db[lid].config = results.meta.fields.map(f => ({ id: f, visible: true }));
        }
        renderPoints(lid);
        refreshSidebar();
        alert("¡Éxito! Cargados " + results.data.length + " registros.");
    }

    function renderPoints(lid) {
        const l = db[lid];
        l.group.eachLayer(layer => { if(layer instanceof L.CircleMarker) l.group.removeLayer(layer); });
        
        l.csv.forEach(row => {
            const lat = parseFloat(row.Latitud || row.lat || row.LAT);
            const lon = parseFloat(row.Longitud || row.lon || row.LON);
            if(!isNaN(lat) && !isNaN(lon)) {
                // ESTATUS POR COLOR
                let color = "#3b82f6";
                const estatus = (row.Estatus || row.Licencia || "").toUpperCase();
                if(estatus.includes("VIGENTE")) color = "#22c55e";
                else if(estatus.includes("VENCID") || estatus.includes("MORA")) color = "#ef4444";

                const marker = L.circleMarker([lat, lon], { radius: 8, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.9 });
                
                // POPUP GENERATOR
                let html = `<div class="popup-container">`;
                const img = row.Imagen || row.Foto;
                if(img) html += `<img src="${img}" class="popup-img" onerror="this.src='https://placehold.co/400x200?text=SGF+Ayacucho'">`;
                
                html += `<div class="popup-body"><div class="popup-title">${row.Nombre || row.Razon_Social || 'Establecimiento'}</div>`;
                l.config.forEach(c => {
                    if(c.visible && row[c.id] && c.id !== 'Imagen' && c.id !== 'Foto') {
                        html += `<div class="popup-row"><b>${c.id}</b><span>${row[c.id]}</span></div>`;
                    }
                });
                
                marker.bindPopup(html + `</div></div>`, { maxWidth: 350 });
                l.group.addLayer(marker);
            }
        });
    }

    // 4. MODALES Y CONFIGURACIÓN
    function openFichaModal(lid) {
        state.activeLid = lid;
        const container = document.getElementById('sortable-fields'); container.innerHTML = "";
        if(!db[lid].config.length) return alert("Cargue un CSV primero.");

        db[lid].config.forEach(f => {
            container.innerHTML += `
                <div class="field-card" data-id="${f.id}">
                    <input type="checkbox" ${f.visible?'checked':''} style="width:22px; height:22px;">
                    <span style="flex:1; margin-left:15px; font-weight:700; color:#fff;">${f.id}</span>
                    <span style="color:#475569;">☰</span>
                </div>`;
        });
        document.getElementById('overlay').style.display = "block";
        document.getElementById('ficha-modal').style.display = "block";
        new Sortable(container, { animation: 150 });
    }

    function applyFichaConfig() {
        const items = document.querySelectorAll('.field-card');
        const newCfg = [];
        items.forEach(el => {
            newCfg.push({ id: el.dataset.id, visible: el.querySelector('input').checked });
        });
        db[state.activeLid].config = newCfg;
        renderPoints(state.activeLid);
        closeModals();
    }

    function openZoneEditor(lid, eid) {
        state.activeLid = lid; state.activeEid = eid;
        const poly = db[lid].group.getLayer(eid);
        document.getElementById('zone-name-input').value = poly.options.name;
        document.getElementById('zone-opacity').value = poly.options.fillOpacity || 0.5;
        
        const palette = document.getElementById('color-palette'); palette.innerHTML = "";
        myMapsColors.forEach(c => {
            const active = poly.options.color === c ? 'active' : '';
            palette.innerHTML += `<div class="swatch ${active}" style="background:${c}" onclick="setZoneColor('${c}', this)"></div>`;
        });
        
        document.getElementById('overlay').style.display = "block";
        document.getElementById('zone-modal').style.display = "block";
    }

    function setZoneColor(c, el) {
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        state.pendingColor = c;
    }

    function saveZoneChanges() {
        const poly = db[state.activeLid].group.getLayer(state.activeEid);
        poly.options.name = document.getElementById('zone-name-input').value;
        poly.setStyle({ color: state.pendingColor, fillColor: state.pendingColor, fillOpacity: document.getElementById('zone-opacity').value });
        runTurfAnalysis(state.activeLid, poly);
        closeModals(); refreshSidebar();
    }

    // 5. ANALÍTICA TURF (VICTORIA)
    function runTurfAnalysis(lid, poly) {
        const polyJSON = poly.toGeoJSON();
        let count = 0;
        db[lid].group.eachLayer(layer => {
            if(layer instanceof L.CircleMarker) {
                const pt = turf.point([layer.getLatLng().lng, layer.getLatLng().lat]);
                if(turf.booleanPointInPolygon(pt, polyJSON)) count++;
            }
        });
        poly.bindPopup(`
            <div style="text-align:center; padding:10px;">
                <b style="font-size:18px; color:var(--verde-ayacucho);">${poly.options.name}</b><hr>
                <small>Establecimientos Detectados:</small><br>
                <span style="font-size:28px; font-weight:900; color:#1e293b;">${count}</span>
            </div>`);
    }

    // 6. UTILIDADES
    function closeModals() { 
        document.getElementById('overlay').style.display = "none";
        document.querySelectorAll('.modal-body').forEach(m => m.style.display = "none");
    }
    
    function deleteWorkLayer(lid) {
        if(confirm("¿Seguro de eliminar la capa '"+db[lid].name+"'?")) {
            map.removeLayer(db[lid].group); delete db[lid]; refreshSidebar();
        }
    }

    function focusElement(lid, eid) {
        const layer = db[lid].group.getLayer(eid);
        if(layer) map.fitBounds(layer.getBounds(), { padding: [50, 50] });
    }

    function filterMapElements() {
        const query = document.getElementById('global-search').value.toLowerCase();
        Object.keys(db).forEach(lid => {
            db[lid].group.eachLayer(layer => {
                if(layer instanceof L.CircleMarker) {
                    const text = JSON.stringify(layer.getPopup().getContent()).toLowerCase();
                    if(text.includes(query)) layer.setStyle({ opacity: 1, fillOpacity: 0.9 });
                    else layer.setStyle({ opacity: 0.1, fillOpacity: 0.1 });
                }
            });
        });
    }
</script>
</body>
</html>
