<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF MASTER V8 | AYACUCHO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --amarillo: #ffcc00; --rojo: #e60000; --verde: #007a33;
            --dark: #020617; --panel: #0f172a; --accent: #fbbf24;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: #fff; height: 100vh; overflow: hidden; }

        .layout { display: flex; height: 100vh; width: 100vw; position: relative; }
        #map { flex: 1; z-index: 1; background: #000; }

        /* REVISIÓN 1: CUADRO IDENTIDAD SIN "GIS" */
        .brand-box { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: rgba(15, 23, 42, 0.95); padding: 18px 25px; border-radius: 10px;
            border-left: 6px solid var(--amarillo); backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
        }
        .brand-box b { font-size: 19px; letter-spacing: 1px; display: block; }
        .brand-box span { font-size: 11px; color: var(--accent); font-weight: 800; text-transform: uppercase; }

        /* BUSCADOR */
        .search-engine { 
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; 
            width: 450px; background: #fff; border-radius: 50px; padding: 12px 25px;
            display: flex; align-items: center; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .search-engine input { border: none; outline: none; flex: 1; font-weight: 700; color: #0f172a; font-size: 15px; }

        /* SIDEBAR PROFESIONAL */
        #sidebar { 
            width: 450px; background: var(--panel); border-left: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; z-index: 100; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar-header { 
            padding: 40px 30px; text-align: center; 
            border-bottom: 5px solid transparent;
            border-image: linear-gradient(to right, var(--amarillo) 33%, var(--rojo) 33% 66%, var(--verde) 66%) 1;
        }

        .scroll-area { flex: 1; overflow-y: auto; padding: 25px; }

        /* REVISIÓN 2: BOTONES Y CARTAS (PULIDO) */
        .btn { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; cursor: pointer;
            font-weight: 900; font-size: 12px; text-transform: uppercase; margin-bottom: 25px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-gold { background: var(--accent); color: #000; box-shadow: 0 8px 20px rgba(251, 191, 36, 0.2); }
        .btn-gold:hover { transform: translateY(-3px); background: #fff; }

        .layer-card { background: #1e293b; border-radius: 18px; margin-bottom: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .layer-header { padding: 18px; background: rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; }
        .layer-header b { color: var(--accent); font-size: 14px; }
        
        .layer-grid { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-tool { padding: 12px; font-size: 10px; background: #334155; color: #fff; border-radius: 8px; font-weight: 700; }
        .btn-draw-active { grid-column: span 2; border: 2px solid var(--accent); background: transparent; color: var(--accent); }
        .btn-draw-active.on { background: var(--rojo); color: #fff; border-color: #fff; animation: blink 1.5s infinite; }

        @keyframes blink { 50% { opacity: 0.7; } }

        /* LISTA DE SECTORES */
        .sector-stack { background: #020617; max-height: 250px; overflow-y: auto; border-top: 1px solid #1e293b; }
        .sector-item { padding: 15px 25px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .sector-item:hover { background: #1e293b; padding-left: 30px; }
        .dot { width: 14px; height: 14px; border-radius: 4px; }

        /* REVISIÓN 3: MODALES GLASSMISM */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; display: none; backdrop-filter: blur(10px); }
        .modal-panel { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--panel); width: 480px; padding: 40px; border-radius: 25px; 
            z-index: 1000; border: 1px solid var(--accent); display: none;
        }

        /* REVISIÓN 4: FICHA TÉCNICA (NOMBRE DE CAMPOS VISIBLES) */
        .field-row { 
            display: flex; align-items: center; background: #020617; 
            padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155;
            color: #fff; font-weight: 600; font-size: 14px;
        }
        .field-row input { margin-right: 15px; width: 20px; height: 20px; accent-color: var(--verde); }

        /* POPUP DEL MAPA */
        .leaflet-popup-content-wrapper { border-radius: 20px; padding: 0; overflow: hidden; background: #fff; }
        .pop-container { width: 320px; color: #0f172a; }
        .pop-head { background: #f8fafc; padding: 20px; font-weight: 900; font-size: 18px; border-bottom: 4px solid var(--verde); }
        .pop-body { padding: 20px; }
        .pop-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .pop-item b { color: #94a3b8; font-size: 10px; text-transform: uppercase; }
        .pop-item span { font-weight: 800; color: #1e293b; }

    </style>
</head>
<body>

<div class="layout">
    <div id="map"></div>

    <div class="brand-box">
        <b>HACIENDA AYACUCHO</b>
        <span>GESTIÓN FISCAL MAESTRA</span>
    </div>

    <div class="search-engine">
        <span style="margin-right:15px">🔍</span>
        <input type="text" id="omni-search" placeholder="RIF, Comercio o Estatus..." onkeyup="engineSearch()">
    </div>

    <aside id="sidebar">
        <header class="sidebar-header">
            <h1 style="font-weight:900; font-size:26px">SGF MASTER</h1>
            <p style="font-size:11px; color:var(--accent); letter-spacing:3px">ESTADO TÁCHIRA</p>
        </header>
        <div class="scroll-area">
            <button class="btn btn-gold" onclick="engineAddLayer()">+ REGISTRAR NUEVA CAPA</button>
            <div id="layer-list"></div>
        </div>
    </aside>
</div>

<div class="modal-overlay" id="overlay" onclick="closeModals()"></div>
<div class="modal-panel" id="modal-ficha">
    <h3 style="color:var(--accent); margin-bottom:10px">Configuración de Datos</h3>
    <p style="font-size:12px; color:#94a3b8; margin-bottom:20px">Seleccione los campos que desea visualizar en el mapa:</p>
    <div id="ficha-container" style="max-height:350px; overflow-y:auto"></div>
    <button class="btn btn-gold" style="margin-top:25px" onclick="saveFicha()">ACTUALIZAR VISTA</button>
</div>

<div class="modal-panel" id="modal-sector">
    <h3 style="margin-bottom:20px">Propiedades del Área</h3>
    <input type="text" id="sec-name" style="width:100%; padding:15px; background:#020617; border:1px solid #334155; color:#fff; border-radius:12px; margin-bottom:20px" placeholder="Nombre del Sector">
    <div id="palette" style="display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:25px"></div>
    <button class="btn btn-gold" onclick="saveSector()">GUARDAR CAMBIOS</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
    /**
     * SGF MASTER v8.0 - NÚCLEO DE INGENIERÍA
     * Revisado por Gemini para el Ingeniero (Hacienda Ayacucho)
     */

    let DB = {};
    let UI = { lid: null, eid: null, color: '#fbbf24' };
    const PALETTE = ["#fbbf24", "#3b82f6", "#ef4444", "#10b981", "#8b5cf6", "#f97316", "#06b6d4", "#ec4899", "#71717a", "#4f46e5"];

    // 1. MOTOR DE MAPA (REVISIÓN DE CARGA)
    const map = L.map('map', { center: [8.03317, -72.25693], zoom: 16, zoomControl: false });
    
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3']
    }).addTo(map);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // 2. GESTIÓN DE CAPAS FISCALES
    function engineAddLayer() {
        const name = prompt("Nombre de la Capa Fiscal:");
        if(!name) return;
        const id = 'L' + Date.now();
        DB[id] = { name: name, group: L.featureGroup().addTo(map), csv: [], config: [], drawing: false };
        renderUI();
    }

    function renderUI() {
        const box = document.getElementById('layer-list');
        box.innerHTML = "";
        Object.keys(DB).forEach(id => {
            const l = DB[id];
            let sectorsHtml = "";
            l.group.eachLayer(layer => {
                if(layer instanceof L.Polygon) {
                    const eid = L.Util.stamp(layer);
                    sectorsHtml += `<div class="sector-item" onclick="zoomTo('${id}','${eid}')">
                        <div class="dot" style="background:${layer.options.color}" onclick="openSectorMod('${id}','${eid}', event)"></div>
                        <span style="font-weight:600; font-size:13px">${layer.options.name}</span>
                    </div>`;
                }
            });

            box.innerHTML += `<div class="layer-card">
                <div class="layer-header"><b>${l.name}</b><span onclick="deleteLayer('${id}')" style="cursor:pointer; color:var(--rojo)">✕</span></div>
                <div class="layer-grid">
                    <button class="btn-tool" onclick="importCSV('${id}')">CARGAR CSV</button>
                    <button class="btn-tool" onclick="openFichaMod('${id}')">CONFIG. FICHA</button>
                    <button class="btn-tool btn-draw-active ${l.drawing?'on':''}" onclick="toggleDraw('${id}')">
                        ${l.drawing ? 'FINALIZAR DIBUJO' : '✏️ DIBUJAR SECTOR'}
                    </button>
                </div>
                <div class="sector-stack">${sectorsHtml}</div>
            </div>`;
        });
    }

    // 3. PROCESAMIENTO DE DATOS (REVISIÓN FICHA)
    function importCSV(lid) {
        const input = document.createElement('input'); input.type = 'file'; input.accept = ".csv";
        input.onchange = e => {
            Papa.parse(e.target.files[0], {
                header: true, skipEmptyLines: true,
                complete: r => {
                    DB[lid].csv = r.data;
                    // Generar configuración solo con campos reales (REPARADO)
                    if(DB[lid].config.length === 0) {
                        DB[lid].config = r.meta.fields
                            .filter(f => f.trim() !== "")
                            .map(f => ({ id: f, visible: true }));
                    }
                    plotData(lid);
                    renderUI();
                }
            });
        };
        input.click();
    }

    function plotData(lid) {
        const l = DB[lid];
        l.group.eachLayer(layer => { if(layer instanceof L.CircleMarker) l.group.removeLayer(layer); });

        l.csv.forEach(row => {
            const lat = parseFloat(row.Latitud || row.lat || row.LAT);
            const lon = parseFloat(row.Longitud || row.lon || row.LON);
            if(isNaN(lat) || isNaN(lon)) return;

            // Semáforo Fiscal
            let color = "#3b82f6";
            const status = (row.Estatus || row.Estado || row.ESTADO || "").toUpperCase();
            if(status.includes("AL DIA") || status.includes("PAGO") || status.includes("VIGENTE")) color = var(--verde);
            if(status.includes("MORA") || status.includes("DEUDA")) color = var(--rojo);

            const m = L.circleMarker([lat, lon], { radius: 8, color: '#fff', weight: 2, fillColor: color, fillOpacity: 1 });
            
            // Popup Profesional
            let html = `<div class="pop-container"><div class="pop-head">${row.Nombre || row.RAZON_SOCIAL || 'Registro Fiscal'}</div><div class="pop-body">`;
            l.config.forEach(c => {
                if(c.visible && row[c.id]) {
                    html += `<div class="pop-item"><b>${c.id}</b><span>${row[c.id]}</span></div>`;
                }
            });
            m.bindPopup(html + `</div></div>`, { maxWidth: 350 });
            l.group.addLayer(m);
        });
    }

    // 4. DIBUJO Y ESPACIAL (TURF.JS)
    let drawCtrl = null;
    function toggleDraw(lid) {
        if(DB[lid].drawing) {
            map.removeControl(drawCtrl);
            DB[lid].drawing = false;
        } else {
            UI.lid = lid;
            DB[lid].drawing = true;
            drawCtrl = new L.Control.Draw({
                draw: { polygon: { shapeOptions: { color: UI.color, fillOpacity: 0.5 } }, rectangle: true, circle: false, marker: false, polyline: false },
                edit: { featureGroup: DB[lid].group }
            });
            map.addControl(drawCtrl);
        }
        renderUI();
    }

    map.on(L.Draw.Event.CREATED, e => {
        const name = prompt("Identificador del Sector:");
        if(!name) return;
        const layer = e.layer;
        layer.options.name = name;
        layer.options.color = UI.color;
        DB[UI.lid].group.addLayer(layer);
        runSpatial(UI.lid, layer);
        toggleDraw(UI.lid);
    });

    function runSpatial(lid, poly) {
        const geo = poly.toGeoJSON();
        let count = 0;
        DB[lid].group.eachLayer(l => {
            if(l instanceof L.CircleMarker && turf.booleanPointInPolygon(l.toGeoJSON(), geo)) count++;
        });
        poly.bindPopup(`<div style="text-align:center; padding:10px">
            <h2 style="color:var(--verde)">${poly.options.name}</h2>
            <hr style="margin:10px 0; border:0; border-top:1px solid #eee">
            <p style="font-size:12px; color:#64748b">Comercios Detectados:</p>
            <b style="font-size:28px; color:#3b82f6">${count}</b>
        </div>`);
    }

    // 5. MODALES Y CONFIGURACIÓN
    function openFichaMod(lid) {
        UI.lid = lid;
        const container = document.getElementById('ficha-container');
        container.innerHTML = "";
        DB[lid].config.forEach((c, idx) => {
            container.innerHTML += `<div class="field-row">
                <input type="checkbox" id="field-${idx}" ${c.visible?'checked':''}>
                <span>${c.id}</span>
            </div>`;
        });
        document.getElementById('overlay').style.display = "block";
        document.getElementById('modal-ficha').style.display = "block";
    }

    function saveFicha() {
        const lid = UI.lid;
        DB[lid].config.forEach((c, idx) => {
            c.visible = document.getElementById(`field-${idx}`).checked;
        });
        plotData(lid);
        closeModals();
    }

    function openSectorMod(lid, eid, ev) {
        ev.stopPropagation();
        UI.lid = lid; UI.eid = eid;
        const p = DB[lid].group.getLayer(eid);
        document.getElementById('sec-name').value = p.options.name;
        const palette = document.getElementById('palette');
        palette.innerHTML = "";
        PALETTE.forEach(c => {
            palette.innerHTML += `<div class="dot" style="background:${c}; width:45px; height:45px; cursor:pointer; border:${p.options.color===c?'3px solid white':'none'}" onclick="UI.color='${c}'; saveSector()"></div>`;
        });
        document.getElementById('overlay').style.display = "block";
        document.getElementById('modal-sector').style.display = "block";
    }

    function saveSector() {
        const p = DB[UI.lid].group.getLayer(UI.eid);
        p.options.name = document.getElementById('sec-name').value;
        p.setStyle({ color: UI.color, fillColor: UI.color });
        runSpatial(UI.lid, p);
        closeModals(); renderUI();
    }

    function closeModals() {
        document.getElementById('overlay').style.display = "none";
        document.querySelectorAll('.modal-panel').forEach(m => m.style.display = "none");
    }

    function engineSearch() {
        const q = document.getElementById('omni-search').value.toLowerCase();
        Object.keys(DB).forEach(lid => {
            DB[lid].group.eachLayer(l => {
                const content = l.getPopup() ? l.getPopup().getContent().toString().toLowerCase() : "";
                l.setStyle({ opacity: content.includes(q) ? 1 : 0.1, fillOpacity: content.includes(q) ? 1 : 0.1 });
            });
        });
    }

    function zoomTo(lid, eid) {
        const l = DB[lid].group.getLayer(eid);
        map.fitBounds(l.getBounds(), { padding: [50, 50] });
    }

    function deleteLayer(id) {
        if(confirm("¿Eliminar capa permanentemente?")) { map.removeLayer(DB[id].group); delete DB[id]; renderUI(); }
    }

</script>
</body>
</html>
