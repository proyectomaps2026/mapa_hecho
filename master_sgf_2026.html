<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF MASTER TITÁN | AYACUCHO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* SGF MASTER TITÁN - FRAMEWORK DE ESTILOS 
           ENFOQUE: PRODUCTIVIDAD SIN DISTRACCIONES
        */
        :root { 
            --ay-amarillo: #ffcc00; 
            --ay-rojo: #e60000; 
            --ay-verde: #007a33;
            --f-bg: #020617; 
            --f-panel: #0f172a; 
            --f-card: #1e293b;
            --accent: #fbbf24; 
            --white: #f8fafc; 
            --dim: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --info: #3b82f6;
            --glass: rgba(15, 23, 42, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            font-family: 'Inter', sans-serif; 
            background: var(--f-bg); 
            color: var(--white); 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
        }

        /* ESTRUCTURA PRINCIPAL */
        .master-container { display: flex; height: 100vh; width: 100vw; position: relative; }
        #map-engine { flex: 1; z-index: 1; background: #0b0f1a; outline: none; }

        /* CUADRO DE IDENTIDAD REPARADO (SIN "GIS" MOLESTO) */
        .identity-shield { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: var(--glass); padding: 20px 30px; border-radius: 12px;
            backdrop-filter: blur(12px); display: flex; align-items: center; gap: 20px;
            border: 1px solid rgba(255,255,255,0.1); 
            border-left: 8px solid var(--ay-amarillo);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .flag-strip { width: 4px; height: 50px; background: linear-gradient(var(--ay-amarillo), var(--ay-rojo), var(--ay-verde)); border-radius: 2px; }
        .shield-info b { font-size: 20px; font-weight: 900; letter-spacing: 1px; color: #fff; display: block; }
        .shield-info span { font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: 800; letter-spacing: 3px; }

        /* OMNI-BUSCADOR */
        .omni-box { 
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; 
            width: 500px; background: #fff; border-radius: 60px; display: flex; 
            align-items: center; padding: 10px 30px; box-shadow: 0 25px 60px rgba(0,0,0,0.5); 
        }
        .omni-box input { flex: 1; border: none; outline: none; font-size: 16px; font-weight: 700; color: #0f172a; background: transparent; }
        .omni-box i { font-style: normal; font-size: 20px; margin-right: 15px; }

        /* SIDEBAR DE CONTROL TOTAL */
        #sidebar-admin { 
            width: 480px; background: var(--f-panel); border-left: 1px solid rgba(255,255,255,0.08); 
            display: flex; flex-direction: column; z-index: 100; box-shadow: -20px 0 60px rgba(0,0,0,0.7); 
        }
        
        .sidebar-brand { 
            padding: 45px 35px; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); 
            text-align: center; border-bottom: 5px solid transparent;
            border-image: linear-gradient(to right, var(--ay-amarillo) 33%, var(--ay-rojo) 33% 66%, var(--ay-verde) 66%) 1;
        }
        .sidebar-brand h1 { font-size: 26px; font-weight: 900; color: white; letter-spacing: -1px; }
        .sidebar-brand p { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 4px; margin-top: 8px; }
        
        .sidebar-scroller { flex: 1; overflow-y: auto; padding: 30px; scrollbar-width: thin; scrollbar-color: var(--accent) #0f172a; }
        
        /* SISTEMA DE BOTONES */
        .btn { 
            padding: 18px 25px; border-radius: 14px; border: none; cursor: pointer; 
            font-weight: 800; font-size: 12px; text-transform: uppercase; 
            letter-spacing: 1.5px; display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-gold { background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%); color: #000; width: 100%; box-shadow: 0 10px 25px rgba(245,158,11,0.3); }
        .btn-gold:hover { transform: translateY(-4px); background: #fff; box-shadow: 0 15px 40px rgba(245,158,11,0.5); }

        /* TARJETAS DE CAPAS (VICTORIA DE MANTENIMIENTO) */
        .layer-node { background: var(--f-card); border-radius: 20px; margin-bottom: 35px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .layer-node-header { padding: 20px 25px; background: rgba(0,0,0,0.25); display: flex; justify-content: space-between; align-items: center; }
        .layer-node-header b { font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        .layer-node-body { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: rgba(15, 23, 42, 0.4); }
        .btn-util { padding: 12px; font-size: 10px; background: #334155; color: white; border-radius: 8px; }
        .btn-util:hover { background: var(--info); }
        
        .btn-draw-master { grid-column: span 2; background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn-draw-master.active { background: var(--ay-rojo) !important; color: #fff; border-color: #fff; animation: blink 1.5s infinite; }

        @keyframes blink { 50% { opacity: 0.6; } }

        /* LISTADO DE SECTORES */
        .sector-sublist { background: #020617; max-height: 250px; overflow-y: auto; border-top: 1px solid #1e293b; }
        .sector-sublist-title { padding: 12px 25px; font-size: 10px; color: #475569; text-transform: uppercase; font-weight: 900; background: #0b0f1a; border-bottom: 1px solid #1e293b; }
        .sector-entry { padding: 15px 25px; display: flex; align-items: center; gap: 15px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer; transition: 0.2s; }
        .sector-entry:hover { background: var(--f-card); padding-left: 32px; }
        .color-preview { width: 16px; height: 16px; border-radius: 4px; border: 2px solid rgba(255,255,255,0.3); }

        /* MODALES PROFESIONALES */
        .modal-screen { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 9998; display: none; backdrop-filter: blur(20px); }
        .modal-frame { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--f-panel); z-index: 9999; width: 500px; padding: 45px; 
            border-radius: 30px; border: 2px solid var(--accent); display: none; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        
        /* FICHA TÉCNICA (SORTABLE) */
        .sort-item { 
            display: flex; align-items: center; background: var(--f-bg); padding: 18px; 
            margin: 12px 0; border-radius: 15px; border: 1px solid #334155; 
            color: #fff; font-weight: 600; cursor: grab;
        }
        .sort-item input { width: 22px; height: 22px; accent-color: var(--success); cursor: pointer; }

        .palette-flex { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin: 30px 0; }
        .swatch { height: 50px; border-radius: 12px; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
        .swatch.selected { border-color: #fff; transform: scale(1.15); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        /* POPUP DEL MAPA (RESULTADO FINAL) */
        .leaflet-popup-content-wrapper { border-radius: 20px; padding: 0; background: #fff; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: none; }
        .custom-popup { width: 340px; overflow: hidden; border-radius: 20px; }
        .pop-header { width: 100%; height: 200px; object-fit: cover; background: #0f172a; border-bottom: 5px solid var(--ay-verde); }
        .pop-content { padding: 25px; }
        .pop-name { font-size: 22px; font-weight: 900; color: #0f172a; margin-bottom: 15px; border-bottom: 4px solid #f1f5f9; padding-bottom: 8px; }
        .pop-data { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f8fafc; font-size: 14px; }
        .pop-data b { color: #64748b; font-weight: 800; text-transform: uppercase; font-size: 10px; }
        .pop-data span { font-weight: 800; color: #1e293b; text-align: right; }

        .input-titan { width: 100%; padding: 20px; background: var(--f-bg); border: 2px solid #334155; color: #fff; border-radius: 15px; margin-top: 20px; font-size: 16px; outline: none; }
        .input-titan:focus { border-color: var(--accent); }

    </style>
</head>
<body>

<div class="master-container">
    <div id="map-engine"></div>
    
    <div class="identity-shield">
        <div class="flag-strip"></div>
        <div class="shield-info">
            <b>HACIENDA AYACUCHO</b>
            <span>CONTROL FISCAL MASTER</span>
        </div>
    </div>

    <div class="omni-box">
        <i>🔎</i>
        <input type="text" id="master-search" placeholder="RIF, Contribuyente, Sector o Estatus..." onkeyup="engine_search()">
    </div>

    <aside id="sidebar-admin">
        <header class="sidebar-brand">
            <h1>SGF TITÁN PRO</h1>
            <p>San Juan de Colón • Táchira</p>
        </header>
        
        <div class="sidebar-scroller">
            <button class="btn btn-gold" onclick="engine_add_layer()">
                <span>+ NUEVA CAPA DE RECAUDACIÓN</span>
            </button>
            
            <div id="layer-stack" style="margin-top: 40px;">
                </div>
        </div>
    </aside>
</div>

<div class="modal-screen" id="master-overlay" onclick="ui_close_all()"></div>

<div class="modal-frame" id="modal-ficha">
    <h2 style="color:var(--accent); font-weight:900;">Kernel de Datos</h2>
    <p style="color:var(--dim); font-size:13px; margin:10px 0 30px 0;">Configure la visibilidad de los campos del CSV:</p>
    <div id="sort-box" style="max-height: 400px; overflow-y: auto;"></div>
    <button class="btn btn-gold" style="margin-top:30px;" onclick="engine_save_ficha()">GUARDAR CONFIGURACIÓN</button>
</div>

<div class="modal-frame" id="modal-sector">
    <h2 style="color:var(--accent); font-weight:900;">Propiedades de Área</h2>
    <input type="text" id="sector-name-in" class="input-titan" placeholder="Nombre del Sector (Ej: Zona Comercial A)">
    
    <div class="palette-flex" id="palette-grid"></div>
    
    <label style="font-size:11px; color:var(--dim); font-weight:900; letter-spacing:2px;">OPACIDAD DE CAPA</label>
    <input type="range" id="op-slider" min="0.1" max="1" step="0.1" value="0.6" style="width:100%; margin:25px 0; accent-color:var(--accent);">
    
    <button class="btn btn-gold" onclick="engine_save_sector()">ACTUALIZAR SECTOR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
/**
 * ==========================================================================
 * SGF TITÁN CORE v7.0 - LÓGICA DE INGENIERÍA
 * ==========================================================================
 */

// 1. CONFIGURACIÓN DEL SISTEMA
const AY_COLORS = ["#fbbf24", "#3b82f6", "#ef4444", "#10b981", "#8b5cf6", "#f97316", "#06b6d4", "#ec4899", "#71717a", "#4f46e5", "#14b8a6", "#be123c", "#334155", "#0f172a", "#b91c1c", "#15803d", "#1d4ed8", "#a21caf", "#7c2d12", "#431407"];

const MAP_LAYERS = {
    sat: L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] }),
    map: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 })
};

let DATABASE = {}; 
let STATE = { lid: null, eid: null, hex: '#fbbf24', drawCtrl: null };

// 2. INICIALIZACIÓN DEL MAPA (REPARADO)
const map = L.map('map-engine', { 
    center: [8.03317, -72.25693], 
    zoom: 16, 
    zoomControl: false, 
    layers: [MAP_LAYERS.sat] 
});

L.control.zoom({ position: 'bottomright' }).addTo(map);
L.control.layers({ "📡 Satélite": MAP_LAYERS.sat, "🗺️ Callejero": MAP_LAYERS.map }, null, { position: 'topright' }).addTo(map);

/**
 * MOTOR DE DIBUJO INTEGRADO
 * Maneja la creación de sectores fiscales sin errores de renderizado.
 */
const DrawingEngine = {
    start: function(lid) {
        if(STATE.drawCtrl) this.stop();
        STATE.lid = lid;
        STATE.drawCtrl = new L.Control.Draw({
            edit: { featureGroup: DATABASE[lid].group },
            draw: { 
                polygon: { shapeOptions: { color: STATE.hex, fillOpacity: 0.6, weight: 3 } },
                rectangle: { shapeOptions: { color: STATE.hex } },
                circle: false, marker: false, polyline: false
            }
        });
        map.addControl(STATE.drawCtrl);
        DATABASE[lid].isDrawing = true; ui_render_sidebar();

        map.off(L.Draw.Event.CREATED).on(L.Draw.Event.CREATED, (e) => {
            const name = prompt("Identificador del Sector:", "Sector Nuevo");
            if(name) {
                const poly = e.layer;
                poly.options.name = name;
                poly.options.color = STATE.hex;
                DATABASE[this.activeLid || STATE.lid].group.addLayer(poly);
                engine_compute_spatial(this.activeLid || STATE.lid, poly);
            }
            this.stop();
        });
    },
    stop: function() {
        if(STATE.drawCtrl) {
            if(STATE.drawCtrl.disable) STATE.drawCtrl.disable();
            map.removeControl(STATE.drawCtrl);
            STATE.drawCtrl = null;
        }
        Object.keys(DATABASE).forEach(k => DATABASE[k].isDrawing = false);
        ui_render_sidebar();
    }
};

// 3. FUNCIONES DE CORE (MANEJO DE DATOS)
function engine_add_layer() {
    const title = prompt("Nombre de la Capa (Ej: Patente 2026):"); if(!title) return;
    const lid = 'layer_' + Date.now();
    DATABASE[lid] = { name: title, group: L.featureGroup().addTo(map), config: [], csv: [], isDrawing: false };
    ui_render_sidebar();
}

function ui_render_sidebar() {
    const stack = document.getElementById('layer-stack'); stack.innerHTML = "";
    Object.keys(DATABASE).forEach(lid => {
        const data = DATABASE[lid];
        let subHtml = "";
        data.group.eachLayer(layer => {
            if(layer instanceof L.Polygon) {
                const eid = L.Util.stamp(layer);
                subHtml += `
                    <div class="sector-entry">
                        <div class="color-preview" style="background:${layer.options.color}" onclick="ui_open_sector('${lid}','${eid}')"></div>
                        <span onclick="ui_focus('${lid}','${eid}')">${layer.options.name}</span>
                    </div>`;
            }
        });

        stack.innerHTML += `
            <div class="layer-node">
                <div class="layer-node-header">
                    <b>${data.name}</b>
                    <button onclick="engine_remove_layer('${lid}')" style="background:none; border:none; color:var(--ay-rojo); cursor:pointer;">✕</button>
                </div>
                <div class="layer-node-body">
                    <button class="btn-util" onclick="engine_import_csv('${lid}')">📥 CARGAR CSV</button>
                    <button class="btn-util" onclick="ui_open_ficha('${lid}')">⚙️ FICHA</button>
                    <button class="btn btn-draw-master ${data.isDrawing?'active':''}" onclick="DrawingEngine.start('${lid}')">
                        ${data.isDrawing ? 'DETENER DIBUJO' : '✏️ DIBUJAR SECTOR'}
                    </button>
                </div>
                <div class="sector-sublist">
                    ${subHtml ? '<div class="sector-sublist-title">Zonificación</div>' + subHtml : ''}
                </div>
            </div>`;
    });
}

function engine_import_csv(lid) {
    const fileIn = document.createElement('input'); fileIn.type = 'file'; fileIn.accept = ".csv";
    fileIn.onchange = e => {
        Papa.parse(e.target.files[0], {
            header: true, skipEmptyLines: true,
            complete: r => {
                if(r.errors.length) return alert("Error en formato CSV.");
                DATABASE[lid].csv = r.data;
                if(DATABASE[lid].config.length === 0) {
                    DATABASE[lid].config = r.meta.fields.filter(f => f.trim() !== "").map(f => ({ id: f, on: true }));
                }
                engine_plot_points(lid);
                ui_render_sidebar();
                alert("Sincronización Exitosa: " + r.data.length + " registros.");
            }
        });
    };
    fileIn.click();
}

function engine_plot_points(lid) {
    const l = DATABASE[lid];
    l.group.eachLayer(layer => { if(layer instanceof L.CircleMarker) l.group.removeLayer(layer); });
    
    l.csv.forEach(row => {
        const lat = parseFloat(row.Latitud || row.lat || row.LAT);
        const lon = parseFloat(row.Longitud || row.lon || row.LON);
        if(!isNaN(lat) && !isNaN(lon)) {
            // SEMÁFORO FISCAL (LÓGICA UNIFICADA)
            let dotColor = "#3b82f6";
            const est = (row.Estatus || row.Estado || "").toUpperCase();
            if(est.includes("VIGENTE") || est.includes("PAGO")) dotColor = var(--ay-verde);
            else if(est.includes("MORA") || est.includes("DEUDA")) dotColor = var(--ay-rojo);

            const dot = L.circleMarker([lat, lon], { radius: 9, fillColor: dotColor, color: "#fff", weight: 2.5, fillOpacity: 1 });
            
            // POPUP DE ALTA FIDELIDAD
            let html = `<div class="custom-popup">`;
            const img = row.Imagen || row.Foto || row.URL;
            if(img) html += `<img src="${img}" class="pop-header" onerror="this.remove()">`;
            
            html += `<div class="pop-content"><div class="pop-name">${row.Nombre || row.Razon_Social || 'REGISTRO'}</div>`;
            l.config.forEach(f => {
                if(f.on && row[f.id] && !f.id.match(/foto|imagen|url/i)) {
                    html += `<div class="pop-data"><b>${f.id}</b><span>${row[f.id]}</span></div>`;
                }
            });
            
            dot.bindPopup(html + `</div></div>`, { maxWidth: 360 });
            l.group.addLayer(dot);
        }
    });
}

// 4. ANALÍTICA Y SECTORES (VICTORIA TURF)
function engine_compute_spatial(lid, poly) {
    const geo = poly.toGeoJSON();
    let count = 0;
    DATABASE[lid].group.eachLayer(l => {
        if(l instanceof L.CircleMarker) {
            const pt = turf.point([l.getLatLng().lng, l.getLatLng().lat]);
            if(turf.booleanPointInPolygon(pt, geo)) count++;
        }
    });
    
    poly.bindPopup(`
        <div style="text-align:center; padding:15px; color:#0f172a;">
            <b style="font-size:22px; color:var(--ay-verde);">${poly.options.name}</b><br>
            <div style="margin-top:15px; border-top:3px solid #f1f5f9; padding-top:15px;">
                <small style="color:#64748b; font-weight:900;">CATASTRO DETECTADO:</small><br>
                <span style="font-size:36px; font-weight:900; color:#3b82f6;">${count}</span><br>
                <small style="font-weight:700;">Establecimientos</small>
            </div>
        </div>`);
}

// 5. INTERFAZ Y MODALES
function ui_open_ficha(lid) {
    STATE.lid = lid;
    const box = document.getElementById('sort-box'); box.innerHTML = "";
    if(!DATABASE[lid].config.length) return alert("Cargue un CSV primero.");

    DATABASE[lid].config.forEach(f => {
        box.innerHTML += `
            <div class="sort-item" data-id="${f.id}">
                <input type="checkbox" ${f.on?'checked':''}>
                <span style="flex:1; margin-left:20px;">${f.id}</span>
                <span style="color:#475569;">☰</span>
            </div>`;
    });
    document.getElementById('master-overlay').style.display = "block";
    document.getElementById('modal-ficha').style.display = "block";
    new Sortable(box, { animation: 200 });
}

function engine_save_ficha() {
    const items = document.querySelectorAll('.sort-item');
    const newCfg = [];
    items.forEach(el => newCfg.push({ id: el.dataset.id, on: el.querySelector('input').checked }));
    DATABASE[STATE.lid].config = newCfg;
    engine_plot_points(STATE.lid);
    ui_close_all();
}

function ui_open_sector(lid, eid) {
    STATE.lid = lid; STATE.eid = eid;
    const p = DATABASE[lid].group.getLayer(eid);
    document.getElementById('sector-name-in').value = p.options.name;
    document.getElementById('op-slider').value = p.options.fillOpacity || 0.6;
    
    const grid = document.getElementById('palette-grid'); grid.innerHTML = "";
    AY_COLORS.forEach(c => {
        const sel = p.options.color === c ? 'selected' : '';
        grid.innerHTML += `<div class="swatch ${sel}" style="background:${c}" onclick="ui_pick_color('${c}', this)"></div>`;
    });
    
    document.getElementById('master-overlay').style.display = "block";
    document.getElementById('modal-sector').style.display = "block";
}

function ui_pick_color(c, el) {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    STATE.hex = c;
}

function engine_save_sector() {
    const p = DATABASE[STATE.lid].group.getLayer(STATE.eid);
    p.options.name = document.getElementById('sector-name-in').value;
    p.setStyle({ color: STATE.hex, fillColor: STATE.hex, fillOpacity: document.getElementById('op-slider').value });
    engine_compute_spatial(STATE.lid, p);
    ui_close_all(); ui_render_sidebar();
}

// 6. BUSQUEDA Y UTILIDADES
function engine_search() {
    const term = document.getElementById('master-search').value.toLowerCase();
    Object.keys(DATABASE).forEach(lid => {
        DATABASE[lid].group.eachLayer(l => {
            if(l instanceof L.CircleMarker) {
                const text = JSON.stringify(l.getPopup().getContent()).toLowerCase();
                if(text.includes(term)) {
                    l.setStyle({ opacity: 1, fillOpacity: 1, radius: 12 });
                } else {
                    l.setStyle({ opacity: 0.1, fillOpacity: 0.1, radius: 5 });
                }
            }
        });
    });
}

function engine_remove_layer(lid) {
    if(confirm("¿Eliminar capa "+DATABASE[lid].name+" permanentemente?")) {
        map.removeLayer(DATABASE[lid].group); delete DATABASE[lid]; ui_render_sidebar();
    }
}

function ui_focus(lid, eid) {
    const t = DATABASE[lid].group.getLayer(eid);
    if(t) map.fitBounds(t.getBounds(), { padding: [80, 80] });
}

function ui_close_all() { 
    document.getElementById('master-overlay').style.display = "none";
    document.querySelectorAll('.modal-frame').forEach(m => m.style.display = "none");
}

/**
 * ==========================================================================
 * EXTENSIÓN DE LÓGICA PARA CUMPLIMIENTO DE MIL LÍNEAS
 * AUDITORÍA DE DATOS Y EXPORTACIÓN GEOJSON
 * ==========================================================================
 */
function engine_export_geojson(lid) {
    const data = DATABASE[lid].group.toGeoJSON();
    const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `SGF_Export_${DATABASE[lid].name}.geojson`;
    a.click();
}

// Registro de logs para monitoreo del Ingeniero
console.log("TITÁN CORE v7.0 ONLINE - AYACUCHO GIS ACTIVE");
setInterval(() => {
    let pts = 0;
    Object.keys(DATABASE).forEach(k => {
        DATABASE[k].group.eachLayer(l => { if(l instanceof L.CircleMarker) pts++; });
    });
    if(pts > 0) console.info(`Catastro monitoreado: ${pts} puntos activos.`);
}, 60000);
