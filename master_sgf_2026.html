<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF CORE v6.3 - AYACUCHO ESTABLE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --accent: #00f2ff; --bg-dark: #0b0e14; --panel: #161b22; 
            --text: #e6edf3; --border: #30363d; --google-yellow: #fbbc04;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text); overflow: hidden; }

        /* Contenedor del Mapa */
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }
        
        /* Filtro solo para el Satélite */
        .leaflet-tile { filter: brightness(0.6) contrast(1.1); }

        /* Interfaz Flotante */
        .ui-element { position: absolute; z-index: 1000; pointer-events: auto; }

        .glass { 
            background: rgba(22, 27, 34, 0.95); border: 1px solid var(--border); 
            border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Buscador Superior */
        .top-bar { top: 15px; left: 15px; display: flex; gap: 10px; align-items: center; }
        .search-box { width: 350px; height: 45px; display: flex; align-items: center; padding: 0 15px; }
        .search-box input { background: transparent; border: none; color: white; flex: 1; outline: none; }

        .tool-btn { 
            width: 45px; height: 45px; cursor: pointer; border: none; background: transparent; 
            color: #8b949e; border-radius: 8px; transition: 0.2s; font-size: 18px;
        }
        .tool-btn:hover { color: var(--accent); background: rgba(0,242,255,0.1); }

        /* Panel Lateral */
        #sidebar { top: 75px; left: 15px; bottom: 20px; width: 350px; display: flex; flex-direction: column; }
        .side-header { padding: 15px; border-bottom: 1px solid var(--border); border-top: 4px solid var(--google-yellow); }
        .list-area { flex: 1; overflow-y: auto; padding: 10px; }

        /* Items de la lista */
        .layer-group { margin-bottom: 15px; background: rgba(255,255,255,0.03); border-radius: 6px; }
        .layer-title { padding: 10px; display: flex; align-items: center; font-weight: bold; cursor: pointer; font-size: 13px; }
        .item-row { padding: 8px 10px 8px 35px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .item-row:hover { background: rgba(255,255,255,0.1); }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        /* Popups del Mapa */
        .custom-popup .leaflet-popup-content-wrapper { background: white; color: #333; border-radius: 8px; }
        .pop-form { min-width: 220px; padding: 5px; }
        .pop-form label { font-size: 10px; font-weight: bold; color: #777; display: block; margin-top: 8px; }
        .pop-form input, .pop-form textarea { width: 100%; padding: 6px; margin-top: 3px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 10px; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Modales */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; width: 320px; padding: 20px; display: none; }
        .modal input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid var(--border); color: white; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-element top-bar">
    <div class="search-box glass">
        <i class="fas fa-search" style="margin-right:10px; color:var(--accent)"></i>
        <input type="text" placeholder="Filtrar por nombre..." oninput="filtrar(this.value)">
    </div>
    <div class="glass" style="display:flex; padding:0 5px;">
        <button class="tool-btn" id="btn-m" title="Punto"><i class="fas fa-map-pin"></i></button>
        <button class="tool-btn" id="btn-p" title="Área"><i class="fas fa-draw-polygon"></i></button>
    </div>
</div>

<div id="sidebar" class="ui-element glass">
    <div class="side-header">
        <h2 style="margin:0; font-size:14px;">HACIENDA AYACUCHO</h2>
        <small style="color:var(--accent)">SISTEMA DE GESTIÓN FISCAL v6.3</small>
    </div>
    <div class="list-area" id="list-container"></div>
    <div style="padding:15px; border-top:1px solid var(--border);">
        <button class="btn-save" style="margin:0; background:#238636" onclick="showModal('m-capa')">+ Nueva Capa</button>
    </div>
</div>

<div id="m-capa" class="modal glass">
    <h4 style="margin-top:0">Nombre de la Capa</h4>
    <input type="text" id="capa-name" placeholder="Ej: Comercios Centro">
    <button class="btn-save" onclick="crearCapa()">Confirmar</button>
    <button class="btn-save" style="background:#444" onclick="hideModal('m-capa')">Cancelar</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    // Inicializar Mapa
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    let baseData = {}; 
    let activeLayerId = null;

    // Prevenir que el mapa robe clics a la interfaz
    const sidebar = document.getElementById('sidebar');
    L.DomEvent.disableClickPropagation(sidebar);
    L.DomEvent.disableScrollPropagation(sidebar);

    // Herramientas de dibujo
    const markerTool = new L.Draw.Marker(map, { icon: L.divIcon({ 
        html: '<i class="fas fa-map-marker-alt" style="color:#00f2ff; font-size:24px;"></i>', 
        className: 'custom-icon', iconSize: [24, 24], iconAnchor: [12, 24], popupAnchor: [0, -20]
    })});
    const polyTool = new L.Draw.Polygon(map, { shapeOptions: { color: '#00f2ff' } });

    document.getElementById('btn-m').onclick = () => { if(activeLayerId) markerTool.enable(); else alert("Crea una capa primero"); };
    document.getElementById('btn-p').onclick = () => { if(activeLayerId) polyTool.enable(); else alert("Crea una capa primero"); };

    map.on(L.Draw.Event.CREATED, (e) => {
        const lyr = e.layer;
        const id = baseData[activeLayerId].group.addLayer(lyr)._leaflet_id;
        baseData[activeLayerId].items.push({ id, name: "Nuevo Local", color: "#00f2ff", desc: "" });
        updateFeature(activeLayerId, id);
        render();
    });

    function updateFeature(lid, iid) {
        const item = baseData[lid].items.find(x => x.id === iid);
        const lyr = baseData[lid].group.getLayer(iid);

        if(lyr.setIcon) {
            lyr.setIcon(L.divIcon({ 
                html: `<i class="fas fa-map-marker-alt" style="color:${item.color}; font-size:28px; text-shadow:0 2px 4px #000;"></i>`,
                className: '', iconSize:[28,28], iconAnchor:[14,28], popupAnchor:[0,-25]
            }));
        } else {
            lyr.setStyle({ color: item.color, fillColor: item.color });
        }

        const form = `
            <div class="pop-form" onmousedown="L.DomEvent.stopPropagation(event)">
                <label>Nombre Fiscal:</label>
                <input type="text" id="n-${iid}" value="${item.name}">
                <label>Descripción / Foto URL:</label>
                <textarea id="d-${iid}" rows="2">${item.desc}</textarea>
                <label>Color de Categoría:</label>
                <input type="color" id="c-${iid}" value="${item.color}">
                <button class="btn-save" onclick="saveData('${lid}', ${iid})">GUARDAR CAMBIOS</button>
            </div>`;
        lyr.bindPopup(form, { className: 'custom-popup' });
    }

    window.saveData = (lid, iid) => {
        const item = baseData[lid].items.find(x => x.id === iid);
        item.name = document.getElementById(`n-${iid}`).value;
        item.desc = document.getElementById(`d-${iid}`).value;
        item.color = document.getElementById(`c-${iid}`).value;
        updateFeature(lid, iid);
        render();
        baseData[lid].group.getLayer(iid).closePopup();
    };

    function crearCapa() {
        const name = document.getElementById('capa-name').value;
        if(!name) return;
        const id = 'layer_' + Date.now();
        baseData[id] = { name, group: new L.FeatureGroup().addTo(map), items: [] };
        activeLayerId = id;
        hideModal('m-capa');
        render();
    }

    function render() {
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        for(let id in baseData) {
            let html = `
                <div class="layer-group" style="border: ${id === activeLayerId ? '1px solid var(--accent)' : 'none'}">
                    <div class="layer-title" onclick="activeLayerId='${id}';render()">
                        <i class="fas fa-folder-open" style="margin-right:8px; color:var(--google-yellow)"></i> ${baseData[id].name}
                    </div>`;
            baseData[id].items.forEach(it => {
                html += `
                <div class="item-row" onclick="irA('${id}', ${it.id})">
                    <div class="dot" style="background:${it.color}"></div> ${it.name}
                </div>`;
            });
            html += `</div>`;
            container.insertAdjacentHTML('beforeend', html);
        }
    }

    function irA(lid, iid) {
        const lyr = baseData[lid].group.getLayer(iid);
        map.setView(lyr.getBounds ? lyr.getBounds().getCenter() : lyr.getLatLng(), 18);
        lyr.openPopup();
    }

    function filtrar(val) {
        const q = val.toLowerCase();
        document.querySelectorAll('.item-row').forEach(el => {
            el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
        });
    }

    function showModal(id) { document.getElementById(id).style.display = 'block'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
