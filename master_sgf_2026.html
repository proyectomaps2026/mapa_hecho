<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF AYACUCHO v10.1 - PROTECCIÓN TOTAL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0b0e14; --panel: #161b22; --text: #f0f3f6; --border: #30363d; --yellow: #fbbc04; --safe: #238636; --danger: #da3633; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; background: #000; }
        .map-bright { filter: brightness(0.9) contrast(1.1); }

        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: rgba(22, 27, 34, 0.98); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }

        /* Barra Superior */
        .top-nav { top: 15px; left: 15px; right: 15px; display: flex; gap: 10px; height: 55px; align-items: center; padding: 0 15px; }
        .search-box { flex: 1; max-width: 300px; display: flex; align-items: center; gap: 10px; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 13px; }
        
        .tool-dock { display: flex; gap: 4px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 10px; border: 1px solid var(--border); }
        .t-btn { background: transparent; border: none; color: #8b949e; width: 42px; height: 42px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .t-btn:hover { color: var(--accent); background: rgba(0,242,255,0.1); }
        .t-btn.active { color: var(--accent); background: rgba(0,242,255,0.15); border: 1px solid var(--accent); }

        .btn-save { background: var(--safe); color: white; border: none; padding: 0 15px; height: 42px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 11px; margin-left: auto; }

        /* Sidebar */
        #sidebar { top: 85px; left: 15px; bottom: 20px; width: 360px; display: flex; flex-direction: column; transition: 0.3s; }
        .side-head { padding: 15px; border-bottom: 1px solid var(--border); border-top: 4px solid var(--yellow); }
        .side-head h1 { margin: 0; font-size: 14px; font-weight: 900; letter-spacing: 1px; }
        
        .layer-zone { flex: 1; overflow-y: auto; padding: 12px; }
        .b-card { background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 8px; border: 1px solid transparent; }
        .b-card.active-b { border-color: var(--accent); }
        .b-head { padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .badge { background: var(--border); color: var(--accent); padding: 2px 7px; border-radius: 8px; font-size: 10px; font-weight: bold; margin-left: auto; }
        
        .item-row { padding: 7px 12px 7px 40px; font-size: 12px; color: #8b949e; cursor: pointer; border-left: 2px solid transparent; }
        .item-row:hover { color: white; background: rgba(255,255,255,0.08); border-left-color: var(--accent); }

        /* Popups */
        .pop-card { min-width: 250px; padding: 5px; color: #222; }
        .pop-card label { font-size: 10px; font-weight: 900; color: #888; display: block; margin-top: 8px; }
        .pop-card input, .pop-card textarea { width: 100%; border: 1px solid #ccc; padding: 8px; border-radius: 5px; box-sizing: border-box; margin-top: 4px; font-family: inherit; }
        .pop-img { width: 100%; border-radius: 6px; margin-top: 10px; max-height: 150px; object-fit: cover; }
        .pop-btn { background: #1a73e8; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: 800; margin-top: 12px; cursor: pointer; }

        /* Modales */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5000; width: 330px; padding: 25px; display: none; }
        .modal input, .modal select { width: 100%; padding: 10px; background: #0d1117; border: 1px solid var(--border); color: white; margin: 10px 0; border-radius: 5px; box-sizing: border-box; }

        /* Mapa Selector */
        .map-ctrl { bottom: 25px; right: 20px; display: flex; flex-direction: column; gap: 8px; }
        .m-btn { width: 50px; height: 50px; border-radius: 10px; cursor: pointer; border: 2px solid var(--border); overflow: hidden; transition: 0.2s; }
        .m-btn.active { border-color: var(--accent); transform: scale(1.1); }
        .m-btn img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui top-nav glass">
    <div class="search-box">
        <i class="fas fa-search" style="color: var(--accent)"></i>
        <input type="text" id="main-search" placeholder="Filtrar por nombre..." oninput="filtrarLista()">
    </div>
    
    <div class="tool-dock">
        <button class="t-btn active" id="btn-select" title="Mover Mapa (ESC)" onclick="resetTool()"><i class="fas fa-hand-paper"></i></button>
        <button class="t-btn" id="btn-mark" onclick="enableTool('marker')"><i class="fas fa-map-marker-alt"></i></button>
        <button class="t-btn" id="btn-poly" onclick="enableTool('poly')"><i class="fas fa-vector-square"></i></button>
        <button class="t-btn" onclick="borrarCapa()"><i class="fas fa-eraser" style="color:var(--danger)"></i></button>
    </div>

    <button class="btn-save" onclick="guardarTodo()">GUARDAR CONFIG</button>
</div>

<aside id="sidebar" class="glass ui">
    <div class="side-head">
        <h1>HACIENDA AYACUCHO</h1>
        <span style="font-size:9px; color:var(--accent); font-weight:bold">MOTOR FISCAL v10.1</span>
    </div>
    <div class="layer-zone" id="list-container"></div>
    <div style="padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border-top: 1px solid var(--border)">
        <button class="pop-btn" style="margin:0; background: #30363d" onclick="abrir('m-capa')">+ Bloque</button>
        <button class="pop-btn" style="margin:0; background: #30363d" onclick="abrir('m-csv')">Cargar CSV</button>
    </div>
</aside>

<div class="ui map-ctrl">
    <div class="m-btn active" id="m-sat" onclick="setMap('y')"><img src="https://mt1.google.com/vt/lyrs=y&x=1194&y=1646&z=12"></div>
    <div class="m-btn" id="m-str" onclick="setMap('m')"><img src="https://mt1.google.com/vt/lyrs=m&x=1194&y=1646&z=12"></div>
</div>

<div id="m-capa" class="modal glass">
    <h3>Nuevo Sector</h3>
    <input type="text" id="n-capa" placeholder="Nombre">
    <button class="pop-btn" onclick="crearBloque()">Crear</button>
    <button class="t-btn" style="width:100%; margin-top:5px" onclick="cerrar('m-capa')">Cancelar</button>
</div>

<div id="m-csv" class="modal glass">
    <h3>Importar Sheets</h3>
    <input type="text" id="csv-url" placeholder="Pegue la URL del Google Sheets">
    <div id="csv-map" style="display:none; margin-top:10px">
        <label>Columna Coordenadas:</label>
        <select id="s-coo"></select>
        <label>Columna Nombre:</label>
        <select id="s-nom"></select>
    </div>
    <button id="btn-import-act" class="pop-btn" onclick="analizarCSV()">1. Analizar</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false });
    const sat = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'], className: 'map-bright' }).addTo(map);
    const str = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] });

    let STORE = {}; let activeId = null; let csvCache = null;

    const side = document.getElementById('sidebar');
    L.DomEvent.disableClickPropagation(side);
    L.DomEvent.disableScrollPropagation(side);

    const getIcon = (c) => L.divIcon({ html: `<i class="fas fa-map-marker-alt" style="color:${c}; font-size:28px; text-shadow:0 2px 4px #000"></i>`, className: 'c-pin', iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -25] });
    const drawM = new L.Draw.Marker(map, { icon: getIcon('#00f2ff') });
    const drawP = new L.Draw.Polygon(map, { shapeOptions: { color: '#00f2ff', fillOpacity: 0.3 } });

    function enableTool(t) {
        resetTool(); if(!activeId) return alert("Crea un Bloque primero");
        if(t==='marker') { drawM.enable(); document.getElementById('btn-mark').classList.add('active'); }
        else { drawP.enable(); document.getElementById('btn-poly').classList.add('active'); }
        document.getElementById('btn-select').classList.remove('active');
    }

    function resetTool() {
        drawM.disable(); drawP.disable();
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-select').classList.add('active');
    }

    window.onkeydown = (e) => { if(e.key==="Escape") resetTool(); };

    map.on(L.Draw.Event.CREATED, (e) => {
        const l = e.layer; STORE[activeId].group.addLayer(l);
        STORE[activeId].items.push({ id: l._leaflet_id, name: "Local Nuevo", desc: "", color: "#00f2ff", type: e.layerType });
        configIt(activeId, l._leaflet_id); renderSide(); resetTool();
    });

    function configIt(bid, iid) {
        const it = STORE[bid].items.find(x => x.id === iid);
        const l = STORE[bid].group.getLayer(iid);
        if(l.setIcon) l.setIcon(getIcon(it.color)); else l.setStyle({ color: it.color, fillColor: it.color });
        const isImg = (u) => (u && u.startsWith('http') && /\.(jpg|jpeg|png|webp)$/i.test(u));
        const html = `<div class="pop-card" onmousedown="L.DomEvent.stopPropagation(event)">
            <label>FISCAL/RAZÓN:</label><input type="text" id="in-${iid}" value="${it.name}">
            <label>DETALLES/FOTO:</label><textarea id="id-${iid}" rows="2">${it.desc}</textarea>
            <label>COLOR:</label><input type="color" id="ic-${iid}" value="${it.color}" style="height:30px">
            ${isImg(it.desc) ? `<img src="${it.desc}" class="pop-img">` : ''}
            <button class="pop-btn" onclick="saveP('${bid}', ${iid})">GUARDAR</button>
        </div>`;
        l.bindPopup(html, { maxWidth: 260 });
    }

    window.saveP = (bid, iid) => {
        const it = STORE[bid].items.find(x => x.id === iid);
        it.name = document.getElementById(`in-${iid}`).value;
        it.desc = document.getElementById(`id-${iid}`).value;
        it.color = document.getElementById(`ic-${iid}`).value;
        configIt(bid, iid); renderSide(); STORE[bid].group.getLayer(iid).closePopup();
    };

    function crearBloque() {
        const n = document.getElementById('n-capa').value; if(!n) return;
        const id = 'b'+Date.now(); STORE[id] = { name: n, items: [], visible: true, group: new L.FeatureGroup().addTo(map) };
        activeId = id; renderSide(); cerrar('m-capa');
    }

    function renderSide() {
        const box = document.getElementById('list-container'); box.innerHTML = "";
        for(let id in STORE) {
            let h = `<div class="b-card ${id===activeId?'active-b':''}">
                <div class="b-head" onclick="activeId='${id}';renderSide()"><span style="font-weight:900">📁 ${STORE[id].name}</span><span class="badge">${STORE[id].items.length}</span></div>
                <div style="display:${id===activeId?'block':'none'}">`;
            STORE[id].items.forEach(it => h += `<div class="item-row" onclick="foc('${id}',${it.id})">● ${it.name}</div>`);
            box.insertAdjacentHTML('beforeend', h+'</div></div>');
        }
    }

    // MOTOR DE IMPORTACIÓN RE-CONSTRUIDO
    function analizarCSV() {
        let rawUrl = document.getElementById('csv-url').value;
        // Convierte link de Google Sheets a exportación CSV real
        let url = rawUrl.includes('/edit') ? rawUrl.replace(/\/edit.*$/, '/export?format=csv') : rawUrl;
        
        Papa.parse(url, { download: true, header: true, complete: (r) => {
            if(r.data && r.data.length > 0) {
                csvCache = r.data;
                let o = ""; r.meta.fields.forEach(f => o += `<option value="${f}">${f}</option>`);
                document.getElementById('s-coo').innerHTML = o;
                document.getElementById('s-nom').innerHTML = o;
                document.getElementById('csv-map').style.display = 'block';
                document.getElementById('btn-import-act').innerText = "2. IMPORTAR AHORA";
                document.getElementById('btn-import-act').onclick = forzarImportacion;
            } else { alert("Error: El archivo está vacío o el link es privado."); }
        }});
    }

    function forzarImportacion() {
        const cCol = document.getElementById('s-coo').value;
        const nCol = document.getElementById('s-nom').value;
        const bid = 'b'+Date.now();
        const grp = new L.FeatureGroup().addTo(map);
        const its = [];

        cerrar('m-csv'); // CIERRE INMEDIATO PARA EVITAR BLOQUEO

        csvCache.forEach(row => {
            if(row[cCol]) {
                let clean = row[cCol].replace(/[A-Za-z()]/g, '').trim();
                let p = clean.split(/[, ]+/);
                let lat = parseFloat(p[0]), lon = parseFloat(p[1]);
                if(!isNaN(lat)) {
                    const m = L.marker([lat, lon]);
                    const iid = grp.addLayer(m)._leaflet_id;
                    its.push({ id: iid, name: row[nCol] || "Censo", desc: "Cargado", color: "#da3633", type: 'marker' });
                }
            }
        });

        STORE[bid] = { name: "Carga " + new Date().toLocaleTimeString(), items: its, visible: true, group: grp };
        activeId = bid;
        its.forEach(it => configIt(bid, it.id));
        renderSide();
        if(its.length > 0) map.fitBounds(grp.getBounds());
    }

    function guardarTodo() {
        const s = {}; for(let id in STORE) { s[id] = { name: STORE[id].name, visible: STORE[id].visible, items: STORE[id].items.map(it => { const l = STORE[id].group.getLayer(it.id); return { ...it, pos: l.getLatLng ? l.getLatLng() : l.getLatLngs() }; }) }; }
        localStorage.setItem('HACIENDA_101', JSON.stringify(s)); alert("CONFIGURACIÓN RESPALDADA.");
    }

    window.onload = () => {
        const s = JSON.parse(localStorage.getItem('HACIENDA_101')); if(!s) return;
        for(let id in s) {
            const g = new L.FeatureGroup(); if(s[id].visible) g.addTo(map);
            s[id].items.forEach(it => { let l = it.type==='marker'?L.marker(it.pos):L.polygon(it.pos); g.addLayer(l); it.id=l._leaflet_id; });
            STORE[id] = { ...s[id], group: g }; s[id].items.forEach(it => configIt(id, it.id));
        }
        renderSide();
    };

    function setMap(t) { if(t==='y') { sat.addTo(map); map.removeLayer(str); document.getElementById('m-sat').classList.add('active'); document.getElementById('m-str').classList.remove('active'); } else { str.addTo(map); map.removeLayer(sat); document.getElementById('m-str').classList.add('active'); document.getElementById('m-sat').classList.remove('active'); } }
    function foc(bid, iid) { const l = STORE[bid].group.getLayer(iid); map.setView(l.getBounds ? l.getBounds().getCenter() : l.getLatLng(), 19); l.openPopup(); }
    function abrir(id) { document.getElementById(id).style.display = 'block'; }
    function cerrar(id) { document.getElementById(id).style.display = 'none'; }
    function borrarCapa() { if(activeId && confirm("¿Borrar?")) { map.removeLayer(STORE[activeId].group); delete STORE[activeId]; activeId = null; renderSide(); } }
    function filtrarLista() { const q = document.getElementById('main-search').value.toLowerCase(); document.querySelectorAll('.item-row').forEach(el => el.style.display = el.innerText.toLowerCase().includes(q)?'block':'none'); }
</script>
</body>
</html>
