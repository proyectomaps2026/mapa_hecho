<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF AYACUCHO v10.5 - RAW ENGINE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0b0e14; --panel: #161b22; --text: #f0f3f6; --border: #30363d; --yellow: #fbbc04; --safe: #238636; --danger: #da3633; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; background: #000; }
        .map-bright { filter: brightness(0.9) contrast(1.1); }
        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: rgba(22, 27, 34, 0.98); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 12px; }
        
        .top-nav { top: 15px; left: 15px; right: 15px; display: flex; gap: 10px; height: 55px; align-items: center; padding: 0 15px; }
        .tool-dock { display: flex; gap: 4px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 10px; border: 1px solid var(--border); }
        .t-btn { background: transparent; border: none; color: #8b949e; width: 42px; height: 42px; border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .t-btn.active { color: var(--accent); background: rgba(0,242,255,0.15); border: 1px solid var(--accent); }
        .btn-save { background: var(--safe); color: white; border: none; padding: 0 15px; height: 42px; border-radius: 8px; font-weight: 800; cursor: pointer; margin-left: auto; font-size: 11px; }

        #sidebar { top: 85px; left: 15px; bottom: 20px; width: 350px; display: flex; flex-direction: column; }
        .side-head { padding: 15px; border-bottom: 1px solid var(--border); border-top: 4px solid var(--yellow); }
        .layer-zone { flex: 1; overflow-y: auto; padding: 12px; }
        .b-card { background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 8px; border: 1px solid transparent; }
        .b-card.active-b { border-color: var(--accent); }
        .b-head { padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 800; font-size: 13px; }
        .item-row { padding: 8px 12px 8px 40px; font-size: 11px; color: #8b949e; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .item-row:hover { color: white; background: rgba(255,255,255,0.08); }

        .pop-card { min-width: 230px; padding: 5px; color: #222; }
        .pop-card input, .pop-card textarea { width: 100%; border: 1px solid #ccc; padding: 6px; border-radius: 4px; margin-top: 4px; box-sizing: border-box; }
        .pop-btn { background: #1a73e8; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; font-weight: 800; margin-top: 8px; cursor: pointer; }

        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5000; width: 320px; padding: 20px; display: none; }
        .modal input, .modal select { width: 100%; padding: 10px; background: #0d1117; border: 1px solid var(--border); color: white; margin: 8px 0; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui top-nav glass">
    <div class="tool-dock">
        <button class="t-btn active" id="btn-select" onclick="resetTool()"><i class="fas fa-mouse-pointer"></i></button>
        <button class="t-btn" id="btn-mark" onclick="enableTool('marker')"><i class="fas fa-map-pin"></i></button>
        <button class="t-btn" id="btn-poly" onclick="enableTool('poly')"><i class="fas fa-draw-polygon"></i></button>
        <button class="t-btn" onclick="borrarCapa()"><i class="fas fa-eraser" style="color:var(--danger)"></i></button>
    </div>
    <button class="btn-save" onclick="exportarConfig()"><i class="fas fa-file-code"></i> ACTUALIZAR CONFIG.JSON</button>
</div>

<aside id="sidebar" class="glass ui">
    <div class="side-head">
        <h2 style="margin:0; font-size:14px">MOTOR FISCAL</h2>
        <span style="font-size:9px; color:var(--accent)">COLÓN, TÁCHIRA v10.5</span>
    </div>
    <div class="layer-zone" id="list-container"></div>
    <div style="padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <button class="pop-btn" style="margin:0; background: #30363d" onclick="abrir('m-capa')">+ Bloque</button>
        <button class="pop-btn" style="margin:0; background: var(--accent); color:#000" onclick="abrir('m-csv')">CONEXIÓN RAW</button>
    </div>
</aside>

<div id="m-csv" class="modal glass">
    <h3 style="margin:0; color:white">Importación RAW</h3>
    <input type="text" id="csv-url" placeholder="URL de Google Sheets">
    <button id="btn-raw" class="pop-btn" style="background:var(--safe)" onclick="procesoRaw()">1. CARGAR DATOS</button>
    
    <div id="raw-map" style="display:none; margin-top:10px">
        <label style="font-size:10px; color:#aaa">Columna GPS:</label>
        <select id="s-coo"></select>
        <label style="font-size:10px; color:#aaa">Columna Nombre:</label>
        <select id="s-nom"></select>
        <button class="pop-btn" onclick="inyectarDatos()">2. INYECTAR AL MAPA</button>
    </div>
    <button class="t-btn" style="width:100%; margin-top:5px; color:#ff4444" onclick="cerrar('m-csv')">Cancelar</button>
</div>

<div id="m-capa" class="modal glass">
    <h3>Nuevo Sector</h3>
    <input type="text" id="n-capa" placeholder="Nombre">
    <button class="pop-btn" onclick="crearBloque()">Crear</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'], className: 'map-bright' }).addTo(map);
    
    let STORE = {}; let activeId = null; let rawData = [];

    const getIcon = (c) => L.divIcon({ html: `<i class="fas fa-map-marker-alt" style="color:${c}; font-size:26px;"></i>`, className: 'c-pin', iconSize: [26, 26], iconAnchor: [13, 26], popupAnchor: [0, -20] });
    const drawM = new L.Draw.Marker(map, { icon: getIcon('#00f2ff') });
    const drawP = new L.Draw.Polygon(map, { shapeOptions: { color: '#00f2ff' } });

    function enableTool(t) { resetTool(); if(!activeId) return alert("Crea un Bloque primero"); t==='marker'?drawM.enable():drawP.enable(); document.getElementById('btn-'+(t==='marker'?'mark':'poly')).classList.add('active'); }
    function resetTool() { drawM.disable(); drawP.disable(); document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-select').classList.add('active'); }

    map.on(L.Draw.Event.CREATED, (e) => {
        const l = e.layer; STORE[activeId].group.addLayer(l);
        const it = { id: l._leaflet_id, name: "Local Nuevo", desc: "", color: "#00f2ff", type: e.layerType };
        STORE[activeId].items.push(it); configIt(activeId, it.id); renderSide(); resetTool();
    });

    function configIt(bid, iid) {
        const it = STORE[bid].items.find(x => x.id === iid);
        const l = STORE[bid].group.getLayer(iid);
        if(l.setIcon) l.setIcon(getIcon(it.color)); else l.setStyle({ color: it.color });
        l.bindPopup(`<div class="pop-card"><label>NOMBRE:</label><input type="text" id="en-${iid}" value="${it.name}"><label>OBSERVA:</label><textarea id="ed-${iid}">${it.desc}</textarea><label>COLOR:</label><input type="color" id="ec-${iid}" value="${it.color}"><button class="pop-btn" onclick="saveIt('${bid}', ${iid})">GUARDAR</button></div>`);
    }

    window.saveIt = (bid, iid) => {
        const it = STORE[bid].items.find(x => x.id === iid);
        it.name = document.getElementById(`en-${iid}`).value; it.desc = document.getElementById(`ed-${iid}`).value; it.color = document.getElementById(`ec-${iid}`).value;
        configIt(bid, iid); renderSide(); STORE[bid].group.getLayer(iid).closePopup();
    };

    // LOGICA RAW DIRECTA
    async function procesoRaw() {
        let url = document.getElementById('csv-url').value;
        if(!url) return;
        if(url.includes('/edit')) url = url.replace(/\/edit.*$/, '/export?format=csv');
        
        try {
            const res = await fetch(url);
            const csvText = await res.text();
            const rows = csvText.split(/\r?\n/).map(row => {
                // Regex para respetar comas dentro de comillas (nombres de empresas)
                return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/"/g, '').trim());
            });
            
            const headers = rows[0];
            rawData = [];
            for(let i=1; i<rows.length; i++) {
                if(rows[i].length < headers.length) continue;
                let obj = {}; headers.forEach((h, idx) => obj[h] = rows[i][idx]);
                rawData.push(obj);
            }

            let opts = ""; headers.forEach(h => opts += `<option value="${h}">${h}</option>`);
            document.getElementById('s-coo').innerHTML = opts;
            document.getElementById('s-nom').innerHTML = opts;
            document.getElementById('raw-map').style.display = 'block';
            document.getElementById('btn-raw').style.display = 'none';
        } catch (e) { alert("Error en conexión RAW. Verifique permisos."); }
    }

    function inyectarDatos() {
        const bid = 'b'+Date.now();
        const grp = new L.FeatureGroup().addTo(map);
        const cCol = document.getElementById('s-coo').value;
        const nCol = document.getElementById('s-nom').value;
        const its = [];

        rawData.forEach(row => {
            if(row[cCol]) {
                let p = row[cCol].replace(/[A-Za-z()]/g, '').trim().split(/[, ]+/);
                let lat = parseFloat(p[0]), lon = parseFloat(p[1]);
                if(!isNaN(lat)) {
                    const m = L.marker([lat, lon]); grp.addLayer(m);
                    its.push({ id: m._leaflet_id, name: row[nCol] || "Local", desc: "RAW", color: "#fbbc04", type: 'marker' });
                }
            }
        });

        STORE[bid] = { name: "Sector RAW ("+its.length+")", items: its, visible: true, group: grp };
        activeId = bid; its.forEach(it => configIt(bid, it.id));
        renderSide(); cerrar('m-csv');
        if(its.length > 0) map.fitBounds(grp.getBounds());
    }

    function renderSide() {
        const box = document.getElementById('list-container'); box.innerHTML = "";
        for(let id in STORE) {
            let h = `<div class="b-card ${id===activeId?'active-b':''}">
                <div class="b-head" onclick="activeId='${id}';renderSide()">📁 ${STORE[id].name}</div>
                <div style="display:${id===activeId?'block':'none'}">`;
            STORE[id].items.forEach(it => h += `<div class="item-row" onclick="foc('${id}',${it.id})"><i class="fas fa-circle" style="color:${it.color}; font-size:7px"></i> ${it.name}</div>`);
            box.insertAdjacentHTML('beforeend', h+'</div></div>');
        }
    }

    function exportarConfig() {
        const data = {};
        for(let id in STORE) {
            data[id] = { name: STORE[id].name, items: STORE[id].items.map(it => {
                const l = STORE[id].group.getLayer(it.id);
                return { ...it, pos: l.getLatLng ? l.getLatLng() : l.getLatLngs() };
            })};
        }
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'config.json'; a.click();
        localStorage.setItem('RAW_HACIENDA', JSON.stringify(data));
    }

    function crearBloque() {
        const n = document.getElementById('n-capa').value; if(!n) return;
        const id = 'b'+Date.now(); STORE[id] = { name: n, items: [], visible: true, group: new L.FeatureGroup().addTo(map) };
        activeId = id; renderSide(); cerrar('m-capa');
    }

    function foc(bid, iid) { const l = STORE[bid].group.getLayer(iid); map.setView(l.getLatLng ? l.getLatLng() : l.getBounds().getCenter(), 19); l.openPopup(); }
    function abrir(id) { document.getElementById(id).style.display = 'block'; }
    function cerrar(id) { document.getElementById(id).style.display = 'none'; }
    function borrarCapa() { if(activeId && confirm("¿Borrar?")) { map.removeLayer(STORE[activeId].group); delete STORE[activeId]; activeId = null; renderSide(); } }
    
    window.onload = () => {
        const s = JSON.parse(localStorage.getItem('RAW_HACIENDA')); if(!s) return;
        for(let id in s) {
            const g = new L.FeatureGroup().addTo(map);
            s[id].items.forEach(it => {
                let l = it.type==='marker'?L.marker(it.pos):L.polygon(it.pos);
                g.addLayer(l); it.id=l._leaflet_id;
            });
            STORE[id] = { ...s[id], group: g }; s[id].items.forEach(it => configIt(id, it.id));
        }
        renderSide();
    };
</script>
</body>
</html>
