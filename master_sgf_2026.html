<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF AYACUCHO v13.2 - MODO EDICIÓN CRÍTICO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0b0e14; --panel: #161b22; --text: #f0f3f6; --border: #30363d; --yellow: #fbbc04; --safe: #238636; --danger: #da3633; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }
        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: rgba(22, 27, 34, 0.96); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 12px; }
        
        /* PANEL LATERAL DE EDICIÓN */
        #sidebar { top: 85px; left: 15px; bottom: 20px; width: 380px; display: flex; flex-direction: column; transition: 0.3s; }
        .side-head { padding: 15px; border-bottom: 1px solid var(--border); border-top: 4px solid var(--yellow); }
        .layer-zone { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* DASHBOARD DE SECTOR (NUEVO) */
        .b-card { background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); overflow: hidden; }
        .b-card.active-b { border-color: var(--accent); background: rgba(0,242,255,0.05); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 10px; background: rgba(0,0,0,0.2); }
        .stat-pill { padding: 8px; border-radius: 6px; text-align: center; font-size: 10px; font-weight: 900; }
        
        /* POPUP REPARADO */
        .leaflet-popup-content-wrapper { padding: 0; border-radius: 12px; overflow: hidden; width: 300px; }
        .pop-img { width: 100%; height: 150px; object-fit: cover; background: #000; }
        .pop-body { padding: 15px; color: #333; }
        .f-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; border-bottom: 1px solid #eee; }
        .v-lab { font-size: 9px; color: #999; font-weight: 800; text-transform: uppercase; }
        .v-val { font-size: 12px; font-weight: 600; border: none; background: transparent; text-align: right; width: 60%; }
        
        /* BOTONES */
        .t-btn { background: transparent; border: none; color: #8b949e; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 18px; }
        .t-btn.active { color: var(--accent); background: rgba(0,242,255,0.1); border: 1px solid var(--accent); }
        .pop-save { background: var(--safe); color: white; border: none; width: 100%; padding: 10px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui top-nav glass" style="top:15px; left:15px; right:15px; height:55px; display:flex; align-items:center; padding:0 15px; gap:10px;">
    <div style="flex:1; display:flex; align-items:center; gap:10px; background:rgba(0,0,0,0.3); padding:8px 15px; border-radius:8px; border:1px solid var(--border);">
        <i class="fas fa-search" style="color:var(--accent)"></i>
        <input type="text" id="main-search" placeholder="Buscar en base de datos..." oninput="filtrarTodo()" style="background:transparent; border:none; color:white; outline:none; width:100%;">
    </div>
    <div class="tool-dock" style="display:flex; gap:5px; padding:5px; background:rgba(0,0,0,0.2); border-radius:10px;">
        <button class="t-btn active" id="btn-select" onclick="resetTool()"><i class="fas fa-mouse-pointer"></i></button>
        <button class="t-btn" id="btn-mark" onclick="enableTool('marker')"><i class="fas fa-map-marker-alt"></i></button>
        <button class="t-btn" id="btn-poly" onclick="enableTool('poly')"><i class="fas fa-draw-polygon"></i></button>
    </div>
    <button class="glass" style="color:var(--yellow); padding:10px 20px; font-weight:900; cursor:pointer;" onclick="exportarJSON()">RESPALDO JSON</button>
</div>

<aside id="sidebar" class="glass ui">
    <div class="side-head">
        <h2 style="margin:0; font-size:14px;">EDICIÓN DE CATASTRO</h2>
        <span style="font-size:10px; color:var(--accent); font-weight:bold">ALCALDÍA DE AYACUCHO</span>
    </div>
    <div class="layer-zone" id="list-container"></div>
    <div style="padding:15px; border-top:1px solid var(--border); display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button class="glass" style="color:white; padding:10px; font-size:11px;" onclick="crearCapaManual()">+ SECTOR</button>
        <button class="glass" style="background:var(--yellow); color:#000; padding:10px; font-size:11px; font-weight:900;" onclick="abrirModal('m-csv')">IMPORTAR RAW</button>
    </div>
</aside>

<div id="m-csv" class="glass ui" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:320px; padding:25px; display:none; z-index:2001">
    <h3 style="margin:0 0 15px">Cargar Excel Hacienda</h3>
    <input type="text" id="csv-url" style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; background:#000; color:white; border:1px solid var(--border)" placeholder="URL Google Sheets">
    <button class="pop-save" style="border-radius:6px" onclick="analizarExcel()">ANALIZAR COLUMNAS</button>
    <div id="raw-ui" style="display:none; margin-top:15px">
        <label style="font-size:10px">Ubicación:</label><select id="sel-coo" style="width:100%; margin-bottom:10px"></select>
        <label style="font-size:10px">Estatus (Color):</label><select id="sel-col" style="width:100%; margin-bottom:15px"></select>
        <button class="pop-save" style="background:var(--accent); color:black; border-radius:6px" onclick="inyectarDatos()">INYECTAR AL MAPA</button>
    </div>
    <button class="pop-save" style="background:var(--danger); margin-top:10px; border-radius:6px" onclick="cerrarModal('m-csv')">CANCELAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false, attributionControl: false });
    const satLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

    let STORE = {}; let activeId = null; let allCols = []; let rawData = [];

    const getIcon = (color) => L.divIcon({ 
        html: `<i class="fas fa-map-marker-alt" style="color:${color}; font-size:24px; text-shadow: 0 0 3px #000"></i>`, 
        className: 'c-pin', iconSize: [24, 24], iconAnchor: [12, 24], popupAnchor: [0, -20] 
    });

    // Herramientas de Dibujo
    const drawM = new L.Draw.Marker(map, { icon: getIcon('#00f2ff') });
    const drawP = new L.Draw.Polygon(map, { shapeOptions: { color: '#00f2ff', fillOpacity: 0.2, weight: 3 } });
    
    function enableTool(t) { resetTool(); if(!activeId) return alert("Selecciona un sector"); t==='marker'?drawM.enable():drawP.enable(); document.getElementById('btn-'+(t==='marker'?'mark':'poly')).classList.add('active'); }
    function resetTool() { drawM.disable(); drawP.disable(); document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-select').classList.add('active'); }

    // EVENTO DE CREACIÓN (Marcadores siempre draggables)
    map.on(L.Draw.Event.CREATED, (e) => {
        const l = e.layer;
        if(l instanceof L.Marker) l.options.draggable = true;
        STORE[activeId].group.addLayer(l);
        const it = { lid: l._leaflet_id, data: {"Contribuyente": "Nuevo"}, img: "", color: "#00f2ff", type: e.layerType };
        STORE[activeId].items.push(it);
        
        vinvularEvento(l, activeId, it.lid);
        renderPanel();
        abrirPopup(activeId, it.lid);
    });

    function vinvularEvento(layer, bid, lid) {
        layer.on('click', () => abrirPopup(bid, lid));
        layer.on('dragend', (e) => { console.log("Nueva pos:", e.target.getLatLng()); });
    }

    // CEREBRO DE CONTEO (Suma por colores)
    function obtenerResumen(bid) {
        const resumen = { vigentes: 0, temporales: 0, deuda: 0, total: 0 };
        STORE[bid].items.forEach(it => {
            resumen.total++;
            if(it.color === "#238636") resumen.vigentes++;
            else if(it.color === "#fbbc04") resumen.temporales++;
            else if(it.color === "#da3633") resumen.deuda++;
        });
        return resumen;
    }

    // POPUP REESTRUCTURADO (No se rompe al actualizar)
    function abrirPopup(bid, lid) {
        const it = STORE[bid].items.find(x => x.lid === lid);
        const l = STORE[bid].group.getLayer(lid);
        
        let html = `<div class="pop-card">
            <div style="position:relative">
                <img src="${it.img || 'https://via.placeholder.com/300x150?text=SIN+FOTO'}" class="pop-img">
                <div style="position:absolute; top:10px; left:10px; background:white; border-radius:50%; width:25px; height:25px; border:2px solid #333; overflow:hidden">
                    <input type="color" value="${it.color}" onchange="upCol('${bid}',${lid},this.value)" style="opacity:0; cursor:pointer">
                </div>
            </div>
            <div class="pop-body">`;

        for(let key in it.data) {
            html += `<div class="f-row">
                <span class="v-lab">${key}</span>
                <input type="text" class="v-val" value="${it.data[key]}" onchange="upData('${bid}',${lid},'${key}',this.value)">
            </div>`;
        }

        html += `<input type="text" placeholder="URL Foto" value="${it.img}" onchange="upImg('${bid}',${lid},this.value)" style="width:100%; font-size:10px; margin-top:10px">
                 <button onclick="borrarPunto('${bid}',${lid})" style="background:none; border:none; color:red; font-size:10px; margin-top:10px; cursor:pointer">ELIMINAR REGISTRO</button>
                 </div><button class="pop-save" onclick="map.closePopup()">LISTO</button></div>`;

        l.bindPopup(html).openPopup();
    }

    function upData(bid, lid, k, v) { STORE[bid].items.find(x => x.lid === lid).data[k] = v; renderPanel(); }
    function upImg(bid, lid, v) { STORE[bid].items.find(x => x.lid === lid).img = v; abrirPopup(bid, lid); }
    function upCol(bid, lid, v) { 
        const it = STORE[bid].items.find(x => x.lid === lid);
        it.color = v;
        const l = STORE[bid].group.getLayer(lid);
        if(l.setIcon) l.setIcon(getIcon(v));
        renderPanel();
        abrirPopup(bid, lid);
    }

    // PANEL LATERAL REPARADO (Resumen en lugar de lista larga)
    function renderPanel() {
        const cont = document.getElementById('list-container'); cont.innerHTML = "";
        for(let id in STORE) {
            const capa = STORE[id];
            const res = obtenerResumen(id);
            const isActive = (id === activeId);

            let h = `<div class="b-card ${isActive?'active-b':''}" onclick="activeId='${id}';renderPanel()">
                <div style="padding:10px; display:flex; justify-content:space-between; align-items:center">
                    <b style="font-size:12px; color:white">${capa.name}</b>
                    <i class="fas fa-trash" style="color:var(--danger); font-size:10px; cursor:pointer" onclick="borrarCapa('${id}')"></i>
                </div>
                <div class="stats-grid">
                    <div class="stat-pill" style="background:var(--safe)">${res.vigentes} VIG</div>
                    <div class="stat-pill" style="background:var(--yellow); color:black">${res.temporales} TEMP</div>
                    <div class="stat-pill" style="background:var(--danger)">${res.deuda} DEUDA</div>
                </div>
                <div style="padding:8px; font-size:9px; color:#8b949e; text-align:center">Total Registros: ${res.total}</div>
            </div>`;
            cont.insertAdjacentHTML('beforeend', h);
        }
    }

    async function analizarExcel() {
        let url = document.getElementById('csv-url').value;
        if(url.includes('/edit')) url = url.replace(/\/edit.*$/, '/export?format=csv');
        try {
            const res = await fetch(url); const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
            allCols = rows[0]; rawData = [];
            for(let i=1; i<rows.length; i++) { if(rows[i].length >= allCols.length) { 
                let obj = {}; allCols.forEach((k, idx) => obj[k] = rows[i][idx]); rawData.push(obj); 
            }}
            document.getElementById('sel-coo').innerHTML = allCols.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-col').innerHTML = `<option value="">Sin Filtro</option>` + allCols.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('raw-ui').style.display = 'block';
        } catch (e) { alert("Error al conectar con Google Sheets"); }
    }

    function inyectarDatos() {
        const bid = 'b'+Date.now(); const grp = new L.FeatureGroup().addTo(map);
        const cCol = document.getElementById('sel-coo').value, sCol = document.getElementById('sel-col').value;
        const its = [];
        
        rawData.forEach(row => {
            const p = row[cCol].replace(/[A-Za-z()]/g, '').trim().split(/[, ]+/);
            const lat = parseFloat(p[0]), lng = parseFloat(p[1]);
            if(!isNaN(lat)) {
                let col = '#00f2ff';
                const val = row[sCol]?.toUpperCase() || "";
                if(val.includes("VIGENTE") || val.includes("PAGO")) col = "#238636";
                else if(val.includes("TEMPORAL")) col = "#fbbc04";
                else if(val.includes("SIN") || val.includes("DEUDA") || val.includes("VENCIDA")) col = "#da3633";

                const m = L.marker([lat, lng], { icon: getIcon(col), draggable: true });
                vinvularEvento(m, bid, m._leaflet_id);
                grp.addLayer(m);
                its.push({ lid: m._leaflet_id, data: {...row}, img: "", color: col, type: 'marker' });
            }
        });
        STORE[bid] = { name: "Censo Nuevo", items: its, group: grp };
        activeId = bid; renderPanel(); cerrarModal('m-csv');
    }

    function borrarPunto(bid, lid) { if(confirm("¿Eliminar?")) { STORE[bid].group.removeLayer(lid); STORE[bid].items = STORE[bid].items.filter(x => x.lid !== lid); renderPanel(); map.closePopup(); } }
    function borrarCapa(id) { event.stopPropagation(); if(confirm("¿Borrar sector completo?")) { map.removeLayer(STORE[id].group); delete STORE[id]; renderPanel(); } }
    function crearCapaManual() { const bid = 'b'+Date.now(); STORE[bid] = { name: "Nuevo Sector", items: [], group: new L.FeatureGroup().addTo(map) }; activeId = bid; renderPanel(); }
    function exportarJSON() { const blob = new Blob([JSON.stringify(STORE)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'hacienda_final.json'; a.click(); }
    function abrirModal(id) { document.getElementById(id).style.display = 'block'; }
    function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
    function filtrarTodo() { /* Lógica de búsqueda simple si es necesaria */ }
</script>
</body>
</html>
