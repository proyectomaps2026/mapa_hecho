<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF MASTER v3.0 - HACIENDA AYACUCHO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --google-blue: #1a73e8; --border: #dadce0; --text: #3c4043; --amarillo: #fbbc04; }
        body { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; height: 100vh; background: #f1f3f4; overflow: hidden; }

        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }

        /* BUSCADOR SUPERIOR */
        .search-container { position: absolute; top: 12px; left: 12px; z-index: 1000; width: 390px; }
        .search-bar { 
            background: white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); 
            display: flex; align-items: center; padding: 0 15px; height: 48px; border: 1px solid transparent;
        }
        .search-bar input { flex: 1; border: none; outline: none; font-size: 16px; color: var(--text); }

        /* TOOLBAR DIBUJO FLOTANTE */
        .draw-tools { 
            position: absolute; top: 12px; left: 420px; z-index: 1000; 
            background: white; display: flex; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); padding: 5px;
        }
        .tool-btn { 
            padding: 10px 15px; cursor: pointer; border-radius: 4px; border: none; 
            background: white; color: #5f6368; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px;
        }
        .tool-btn:hover { background: #f8f9fa; color: var(--google-blue); }
        .tool-sep { width: 1px; background: var(--border); margin: 5px 10px; }

        /* SIDEBAR FLOTANTE */
        #sidebar { 
            position: absolute; top: 72px; left: 12px; bottom: 20px; z-index: 1000; 
            width: 390px; background: white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .side-header { padding: 20px; border-bottom: 1px solid var(--border); background: #fff; border-top: 6px solid var(--amarillo); }
        .side-header h1 { margin: 0; font-size: 18px; color: #202124; }
        .side-header p { margin: 5px 0 0; font-size: 12px; color: var(--google-blue); font-weight: 700; text-transform: uppercase; }

        .side-content { flex: 1; overflow-y: auto; padding: 15px; }

        /* CAPAS Y LISTAS */
        .layer-box { margin-bottom: 20px; border-bottom: 1px solid #f1f3f4; padding-bottom: 15px; }
        .layer-row { display: flex; align-items: center; gap: 10px; padding: 8px; cursor: pointer; border-radius: 6px; }
        .layer-row:hover { background: #f8f9fa; }
        .layer-row.active { background: #e8f0fe; color: var(--google-blue); }
        .layer-title { font-weight: 500; font-size: 14px; flex: 1; }

        .feature-list { list-style: none; padding: 0 0 0 35px; margin: 5px 0; display: none; }
        .layer-box.open .feature-list { display: block; }
        .feature-item { 
            display: flex; align-items: center; gap: 10px; padding: 6px 8px; 
            font-size: 13px; color: #5f6368; cursor: pointer; border-radius: 4px;
        }
        .feature-item:hover { background: #f1f3f4; color: #202124; }

        .btn-main { 
            width: 100%; padding: 12px; background: white; border: 1px dashed var(--google-blue); 
            color: var(--google-blue); font-weight: 500; cursor: pointer; border-radius: 6px; margin-top: 10px;
        }

        /* MODAL MAPEO (SUBIR Y BAJAR) */
        .modal { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 2000; background: white; width: 400px; padding: 25px; border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); display: none;
        }
        .modal h2 { margin-top: 0; font-size: 18px; color: var(--text); }
        .scroll-area { max-height: 180px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 6px; margin: 10px 0; background: #f8f9fa; }
        .opt-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; }

        /* DIBUJO NEGRO/BLANCO */
        .leaflet-draw-draw-polygon { stroke: #000 !important; stroke-width: 4px !important; }
        .leaflet-draw-guide-marker { background: #fff !important; border: 2px solid #000 !important; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="search-container">
    <div class="search-bar">
        <input type="text" placeholder="Buscar en Hacienda Ayacucho...">
        <span style="opacity: 0.5;">🔍</span>
    </div>
</div>

<div class="draw-tools">
    <button class="tool-btn" id="btn-poly">📐 Polígono</button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="btn-marker">📍 Marcador</button>
</div>

<aside id="sidebar">
    <div class="side-header">
        <h1>SGF MASTER - Ayacucho</h1>
        <p>Sistema de Gestión Fiscal</p>
    </div>
    <div class="side-content">
        <div id="layer-list"></div>
        <button class="btn-main" onclick="openM('modal-add')">+ Añadir Capa (CSV/Manual)</button>
    </div>
</aside>

<div id="modal-add" class="modal">
    <h2>Nueva Capa</h2>
    <input type="text" id="in-name" class="btn-main" style="border: 1px solid #ddd; color: #333; text-align: left;" placeholder="Nombre de la capa (Ej: Sector 1)">
    <input type="text" id="in-url" class="btn-main" style="border: 1px solid #ddd; color: #333; text-align: left; margin-top:10px;" placeholder="Pegar URL de Google Sheets CSV">
    <div style="margin-top:20px; text-align:right;">
        <button onclick="closeM('modal-add')" style="background:none; border:none; color:#666; cursor:pointer;">Cancelar</button>
        <button onclick="startImport()" style="background:var(--google-blue); color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; margin-left:10px;">Continuar</button>
    </div>
</div>

<div id="modal-map" class="modal">
    <h2>Mapear Datos</h2>
    <p style="font-size: 12px; color: #666;">Selecciona la columna que tiene las Coordenadas:</p>
    <div class="scroll-area" id="list-coords"></div>
    
    <p style="font-size: 12px; color: #666; margin-top:15px;">Selecciona la columna del Título:</p>
    <div class="scroll-area" id="list-title"></div>
    
    <button onclick="processCSV()" style="width:100%; background:var(--google-blue); color:white; border:none; padding:12px; border-radius:6px; cursor:pointer; font-weight:bold;">Finalizar Importación</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const map = L.map('map', { center: [8.02611, -72.25244], zoom: 17, zoomControl: false });
    L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}').addTo(map);

    let db = {}; 
    let activeId = null;
    let tempCSV = null;
    let tempName = "";

    // DIBUJO
    const drawPoly = new L.Draw.Polygon(map, { shapeOptions: { color: '#000', weight: 4, fillOpacity: 0.3 } });
    const drawMarker = new L.Draw.Marker(map);
    document.getElementById('btn-poly').onclick = () => { if(activeId) drawPoly.enable(); else alert("Selecciona una capa"); };
    document.getElementById('btn-marker').onclick = () => { if(activeId) drawMarker.enable(); else alert("Selecciona una capa"); };

    map.on(L.Draw.Event.CREATED, (e) => {
        const layer = e.layer;
        const name = prompt("Nombre del elemento:");
        if(!name) return;
        const color = '#' + Math.floor(Math.random()*16777215).toString(16);
        if(layer instanceof L.Polygon) layer.setStyle({ fillColor: color });
        const lid = db[activeId].group.addLayer(layer)._leaflet_id;
        db[activeId].items.push({ id: lid, name: name, type: layer instanceof L.Polygon ? 'poly' : 'marker', color: color });
        renderSide(activeId);
    });

    function openM(id) { document.getElementById(id).style.display = 'block'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }

    function startImport() {
        tempName = document.getElementById('in-name').value;
        let url = document.getElementById('in-url').value;
        if(!tempName) return alert("Falta nombre");
        if(!url) { createL(tempName); closeM('modal-add'); return; }

        url = url.replace('/edit?usp=sharing', '/export?format=csv').replace('/edit#gid=', '/export?format=csv&gid=');
        Papa.parse(url, {
            download: true, header: true,
            complete: (r) => {
                tempCSV = r.data;
                const h = r.meta.fields;
                let html = "";
                h.forEach(f => html += `<div class="opt-row"><input type="radio" name="c-coord" value="${f}"> ${f}</div>`);
                document.getElementById('list-coords').innerHTML = html;
                html = "";
                h.forEach(f => html += `<div class="opt-row"><input type="radio" name="c-title" value="${f}"> ${f}</div>`);
                document.getElementById('list-title').innerHTML = html;
                closeM('modal-add');
                openM('modal-map');
            }
        });
    }

    // PROCESAR CSV (SOLUCIÓN COORDINADAS 1 COLUMNA)
    function processCSV() {
        const colC = document.querySelector('input[name="c-coord"]:checked')?.value;
        const colT = document.querySelector('input[name="c-title"]:checked')?.value;
        if(!colC || !colT) return alert("Selecciona las columnas");

        const group = new L.FeatureGroup().addTo(map);
        const items = [];

        tempCSV.forEach(row => {
            let lat, lon;
            let val = row[colC];
            if(val && val.includes(',')) {
                let parts = val.replace(/[()]/g, '').split(',');
                lat = parseFloat(parts[0].trim());
                lon = parseFloat(parts[1].trim());
            }

            if(!isNaN(lat) && !isNaN(lon)) {
                const m = L.marker([lat, lon]).bindPopup(`<b>${row[colT]}</b>`);
                const id = group.addLayer(m)._leaflet_id;
                items.push({ id: id, name: row[colT] || "Sin nombre", type: 'marker' });
            }
        });

        createL(tempName, group, items);
        closeM('modal-map');
    }

    function createL(name, group = null, items = []) {
        const id = 'l' + Date.now();
        db[id] = { name: name, group: group || new L.FeatureGroup().addTo(map), items: items };
        
        const html = `
            <div class="layer-box open" id="box-${id}">
                <div class="layer-row" onclick="setActive('${id}')">
                    <input type="checkbox" checked onclick="toggleV(event, '${id}')">
                    <span class="layer-title">📁 ${name}</span>
                </div>
                <ul class="feature-list" id="list-${id}"></ul>
            </div>`;
        document.getElementById('layer-list').insertAdjacentHTML('beforeend', html);
        setActive(id);
        renderSide(id);
    }

    function renderSide(lid) {
        const ul = document.getElementById('list-' + lid);
        ul.innerHTML = "";
        db[lid].items.forEach(i => {
            const icon = i.type === 'poly' ? `<div style="width:10px;height:10px;background:${i.color};border-radius:2px;"></div>` : '📍';
            ul.insertAdjacentHTML('beforeend', `<li class="feature-item" onclick="go('${lid}', ${i.id})">${icon} ${i.name}</li>`);
        });
    }

    function setActive(id) {
        activeId = id;
        document.querySelectorAll('.layer-row').forEach(r => r.classList.remove('active'));
        document.querySelector(`#box-${id} .layer-row`).classList.add('active');
    }

    function toggleV(e, id) {
        e.stopPropagation();
        if(e.target.checked) map.addLayer(db[id].group);
        else map.removeLayer(db[id].group);
    }

    function go(lid, iid) {
        const l = db[lid].group.getLayer(iid);
        if(l) {
            map.setView(l.getBounds ? l.getBounds().getCenter() : l.getLatLng(), 18);
            l.openPopup();
        }
    }
</script>
</body>
</html>
